<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Energy Concept</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- CONFIGURATION VISUELLE (PANNEAU DE CONTRÔLE) --- */
        :root {
            --primary-orange: #FF6B00;
            --bg-dark: #000000;
            --card-bg: #111111;
            --text-gray: #A0A0A0;
            --gauge-size: 140px; /* Taille de la jauge pour meilleure visibilité */
        }

        body { background-color: var(--bg-dark); color: white; font-family: sans-serif; overflow: hidden; }
        
        /* Style de la Jauge Arc-de-cercle */
        .gauge-container {
            position: relative;
            width: var(--gauge-size);
            height: calc(var(--gauge-size) / 2 + 20px);
            margin: 0 auto;
        }
        .gauge-svg { transform: rotate(-180deg); width: 100%; height: 100%; }
        .gauge-bg { fill: none; stroke: #333; stroke-width: 10; stroke-linecap: round; }
        .gauge-fill { 
            fill: none; stroke: var(--primary-orange); stroke-width: 10; 
            stroke-linecap: round; transition: stroke-dasharray 0.5s ease; 
        }
        .gauge-value {
            position: absolute; bottom: 0; left: 50%;
            transform: translateX(-50%); font-size: 2rem; font-weight: bold;
        }
    </style>
</head>
<body class="p-2">

    <div class="grid grid-cols-1 gap-2">
        
        <div class="bg-[#111] border-l-4 border-[#FF6B00] p-3 flex justify-between items-center">
            <div class="gauge-container">
                <svg class="gauge-svg" viewBox="0 0 100 60">
                    <path class="gauge-bg" d="M 10 50 A 40 40 0 0 1 90 50" />
                    <path id="gaugePath" class="gauge-fill" d="M 10 50 A 40 40 0 0 1 90 50" stroke-dasharray="0, 126" />
                </svg>
                <div class="gauge-value" id="valVitesse">0</div>
            </div>

            <div class="text-right text-xs space-y-1 uppercase tracking-tighter">
                <div class="flex justify-between gap-4"><span class="text-gray-400">Alt:</span><span id="alt">--m</span></div>
                <div class="flex justify-between gap-4"><span class="text-gray-400">Moy:</span><span id="avg_speed">0</span></div>
                <div class="flex justify-between gap-4"><span class="text-gray-400 text-[#FF6B00]">Max:</span><span id="max_speed" class="font-bold">0</span></div>
                <div class="flex justify-between gap-4"><span class="text-gray-400">Temp:</span><span>21°</span></div>
                <div class="flex justify-between gap-4"><span class="text-gray-400">Vent:</span><span>5k/h</span></div>
            </div>
        </div>

        <div id="station-list" class="space-y-1 overflow-y-auto" style="max-height: 60vh;">
            </div>

    </div>

    <script>
        /* --- LOGIQUE DE CALCUL ET DONNÉES --- */
        let maxSpeed = 0;
        let speedSum = 0;
        let speedCount = 0;

        // Données fictives simulant l'API (avec Noms et Adresses)
        const mockStations = [
            { name: "TotalEnergies", address: "Av. de Provence, Graulhet", price: "1.890", dist: "0.5 KM" },
            { name: "Intermarché", address: "Rte de Toulouse, Graulhet", price: "1.850", dist: "2.4 KM" },
            { name: "Esso", address: "Bd de l'Europe, Graulhet", price: "1.910", dist: "4.1 KM" }
        ];

        function updateDashboard(speed) {
            // 1. Mise à jour Jauge
            const speedVal = Math.round(speed);
            const path = document.getElementById('gaugePath');
            const display = document.getElementById('valVitesse');
            
            // Calcul du périmètre de l'arc (126 env pour 180 deg)
            const percentage = Math.min(speedVal / 130, 1); // Max 130 km/h
            const dash = percentage * 126;
            path.style.strokeDasharray = `${dash}, 126`;
            display.innerText = speedVal;

            // 2. Stats Max / Moy
            if (speedVal > maxSpeed) maxSpeed = speedVal;
            speedSum += speedVal;
            speedCount++;
            
            document.getElementById('max_speed').innerText = maxSpeed;
            document.getElementById('avg_speed').innerText = Math.round(speedSum / speedCount);
        }

        function renderStations() {
            const container = document.getElementById('station-list');
            container.innerHTML = mockStations.map(s => `
                <div class="bg-[#111] p-3 flex justify-between items-center border-b border-gray-900">
                    <div class="flex flex-col">
                        <span class="text-[#FF6B00] font-bold text-lg leading-tight">${s.name}</span>
                        <span class="text-gray-500 text-[10px] uppercase">${s.address}</span>
                        <span class="text-gray-400 text-xs mt-1 italic">${s.dist}</span>
                    </div>
                    <div class="flex flex-col items-end">
                        <span class="text-[#FF6B00] text-2xl font-mono font-bold">${s.price}€</span>
                        <div class="flex gap-1 mt-1">
                            <button class="bg-[#222] px-2 py-1 text-[9px]">WZ</button>
                            <button class="bg-[#222] px-2 py-1 text-[9px]">GM</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Simulation de mouvement
        setInterval(() => {
            const randomSpeed = Math.floor(Math.random() * 50);
            updateDashboard(randomSpeed);
        }, 3000);

        // Initialisation
        renderStations();
        document.getElementById('alt').innerText = "207m";
    </script>
</body>
</html>
