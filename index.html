<!DOCTYPE html>
<html lang="fr">
<script>
    const CONFIG = {
        version: "22.40-Master-Safe",          
        carburantCible: 'SP98',          
        rayonRechercheKm: 10,            
        vitesseMaxGraph: 150,            
        angleMaxGraph: 60,               
        angleSeuilPalier: 15,            
        rejectionTangage: 85,            
        angleSmoothing: 0.15,             
        seuilLuxJour: 60,                
        refreshRate: 500,                
        apiStations: 'https://data.economie.gouv.fr/api/records/1.0/search/?dataset=prix-des-carburants-en-france-flux-instantane-v2',
        radarRayonM: 500,
        apiRadars: 'https://overpass-api.de/api/interpreter'
    };
</script>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM Dash V22.40</title>
    <style>
        :root { --bg-color: #000; --panel-bg: #111; --sub-bg: #080808; --ktm-orange: #FF6600; --text-main: #fff; --text-dim: #888; --bar-off: #222; }
        body.day-mode { --bg-color: #fff; --panel-bg: #f2f2f2; --sub-bg: #e6e6e6; --text-main: #000; --text-dim: #444; --bar-off: #ddd; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 5px; transition: 0.3s; overflow-y: auto; overscroll-behavior-y: none; }
        #start-overlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .panel { background-color: var(--panel-bg); border-radius: 2px; padding: 8px 12px; position: relative; border-top: 2px solid #333; margin-bottom: 5px; min-height: 110px; }
        .accent-orange { border-top-color: var(--ktm-orange); }
        .title { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: bold; margin-bottom: 4px; }
        .main-display { display: grid; grid-template-columns: 80px 1fr 60px; align-items: center; height: 65px; position: relative; }
        .bargraph-svg { width: 75px; height: 50px; }
        .bar { fill: var(--bar-off); transition: fill 0.1s ease; }
        .bar.active { fill: var(--ktm-orange); }
        .val-main { font-size: 4.2rem; line-height: 1; text-align: center; font-family: 'Impact', sans-serif; }
        .unit { font-size: 1rem; color: var(--ktm-orange); margin-left: 5px; font-weight: bold; align-self: flex-end; padding-bottom: 10px; }
        .val-sub { display: flex; justify-content: space-between; font-size: 0.7rem; background: var(--sub-bg); padding: 4px 8px; border: 1px solid #222; }
        .btn-action { position: absolute; top: -5px; right: 0; height: 24px; min-width: 50px; border: 0.5px solid var(--ktm-orange); color: var(--ktm-orange); background: rgba(0,0,0,0.3); font-size: 0.55rem; text-transform: uppercase; z-index: 10; cursor: pointer; }
        .tool-grid { display: grid; grid-template-columns: 1.2fr 1fr 0.5fr; gap: 8px; align-items: center; }
        .tool-item { background: var(--sub-bg); padding: 5px; border-radius: 2px; border: 1px solid #222; height: 55px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        #btn-rec { font-size: 0.5rem; height: 18px; width: 100%; border: 0.5px solid var(--ktm-orange); background: #222; color: #fff; cursor: pointer; margin-top: 2px; }
        #radar-alert { display:none; position: fixed; bottom: 10px; left: 10px; right: 10px; background: linear-gradient(90deg, #ff0000, #660000); color: #fff; text-align: center; padding: 15px; font-family: 'Impact'; font-size: 1.5em; border: 2px solid #fff; z-index: 9999; border-radius: 5px; }
        #system-status { display:none; background:#ff6600; color:#000; font-family:'Impact'; font-size:0.65rem; text-align:center; padding:3px; margin-bottom:5px; border-radius:2px; letter-spacing:1px; border:1px solid #fff; }
    </style>
</head>

<body>
    <div id="start-overlay">
        <div style="font-size:2rem; color:#ff6600; font-weight:bold; font-style:italic; margin-bottom:20px;">READY TO RACE</div>
        <button id="btn-unlock" onclick="CORE.startBootSequence()" style="padding:15px 40px; background:transparent; border:2px solid #ff6600; color:#ff6600; font-weight:bold; cursor:pointer;">START SYSTEM</button>
    </div>

    <div id="radar-alert">⚠️ RADAR À <span id="radar-dist">0</span> M</div>

    <div id="dashboard" style="display:none;">
        <div class="panel accent-orange">
            <div class="title">Vitesse GPS</div>
            <div class="main-display">
                <svg class="bargraph-svg" viewBox="0 0 100 60">
                    <rect class="bar b1" x="0" y="40" width="15" height="20" /><rect class="bar b2" x="20" y="30" width="15" height="30" /><rect class="bar b3" x="40" y="20" width="15" height="40" /><rect class="bar b4" x="60" y="10" width="15" height="50" /><rect class="bar b5" x="80" y="0" width="15" height="60" />
                </svg>
                <div style="display:flex; justify-content: flex-end; width: 100%;"><span id="speed-val" class="val-main">0</span><span class="unit">KM/H</span></div>
                <button class="btn-action" onclick="STATE.gps.max=0; UI.update();">RESET</button>
            </div>
            <div class="val-sub"><span>MAX: <strong id="speed-max">0</strong></span></div>
        </div>

        <div class="panel">
            <div class="title">Inclinaison</div>
            <div class="main-display">
                <svg class="bargraph-svg" viewBox="0 0 100 60">
                    <rect class="bar a1" x="0" y="10" width="15" height="50" /><rect class="bar a2" x="20" y="25" width="15" height="35" /><rect class="bar a3" x="40" y="35" width="15" height="25" /><rect class="bar a4" x="60" y="25" width="15" height="35" /><rect class="bar a5" x="80" y="10" width="15" height="50" />
                </svg>
                <div style="display:flex; justify-content: flex-end; width: 100%;"><span id="angle-val" class="val-main">0</span><span class="unit">°</span></div>
                <button class="btn-action" onclick="CORE.calibrateGyro()">CALIB</button>
            </div>
            <div class="val-sub"><span>MAX: <strong id="angle-max">0</strong></span></div>
        </div>

        <div id="system-status">⚠️ ALERTE SYSTEME : <span id="status-msg">CHECK API</span></div>

        <div class="panel tool-grid">
            <div class="tool-item" onclick="CORE.openDynamicWeather()" style="cursor:pointer"><div class="title">Météo</div><div id="weather-temp">--°C</div></div>
            <div class="tool-item" style="text-align:center">
                <div class="title">Trace GPX</div>
                <div id="gpx-dist" style="font-weight:bold; color:#ff6600;">0.0 KM</div>
                <button id="btn-rec" onclick="CORE.toggleRecording()">REC</button>
            </div>
            <div class="tool-item" onclick="alert('Settings non-implémentés')" style="cursor:pointer; text-align:center;">🔧</div>
        </div>

        <div class="panel">
            <div class="title">STATIONS [<span id="ui-info-fuel">SP98</span>]</div>
            <button onclick="CORE.fetchStations()" style="width:100%; margin: 8px 0; border: 1px solid #ff6600; color:#ff6600; background:transparent; padding:8px;">SCANNER CARBURANT</button>
            <div id="stations-list"></div>
        </div>
    </div>

    <script>
        const STATE = {
            gps: { lat: null, lon: null, speed: 0, max: 0 },
            radarError: false, fuelError: false,
            angle: { current: 0, smoothed: 0, offset: 0, max: 0 },
            gpx: { active: false, points: [], distance: 0, denivPlus: 0, prev: null },
            radarsCache: [], lastRadarDist: null, radarsInit: false
        };

        const CORE = {
            startBootSequence: async () => {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try { await DeviceOrientationEvent.requestPermission(); } catch (e) {}
                }
                document.getElementById('start-overlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                CORE.initGyro(); CORE.initGPS(); UI.updateSystemStatus();
                setInterval(UI.checkRadars, 2000);
            },
            initGyro: () => {
                window.addEventListener('deviceorientation', (e) => {
                    let raw = e.beta;
                    if (raw !== null) {
                        STATE.angle.smoothed = (CONFIG.angleSmoothing * raw) + ((1 - CONFIG.angleSmoothing) * (STATE.angle.smoothed || raw));
                        let val = STATE.angle.smoothed - STATE.angle.offset;
                        STATE.angle.current = Math.abs(val) < 2 ? 0 : Math.min(Math.round(Math.abs(val)), 85);
                        if (STATE.angle.current > STATE.angle.max) STATE.angle.max = STATE.angle.current;
                        UI.update();
                        UI.updateBars('angle', val);
                    }
                });
            },
            calibrateGyro: () => { STATE.angle.offset = STATE.angle.smoothed || 0; STATE.angle.max = 0; },
            initGPS: () => {
                navigator.geolocation.watchPosition(pos => {
                    STATE.gps.lat = pos.coords.latitude; STATE.gps.lon = pos.coords.longitude;
                    const ele = pos.coords.altitude || 0;
                    STATE.gps.speed = Math.round((pos.coords.speed || 0) * 3.6);
                    if (STATE.gps.speed > STATE.gps.max) STATE.gps.max = STATE.gps.speed;
                    if (STATE.gpx.active) {
                        const pt = { lat: STATE.gps.lat, lon: STATE.gps.lon, ele, time: new Date().toISOString() };
                        if (STATE.gpx.prev) {
                            STATE.gpx.distance += CORE.calcDist(STATE.gpx.prev.lat, STATE.gpx.prev.lon, STATE.gps.lat, STATE.gps.lon);
                            let diff = ele - STATE.gpx.prev.ele; if (diff > 2) STATE.gpx.denivPlus += diff;
                        }
                        STATE.gpx.points.push(pt); STATE.gpx.prev = pt;
                    }
                    UI.update(); UI.updateSystemStatus();
                    if(!STATE.weatherInit) CORE.checkWeatherQueue();
                }, null, { enableHighAccuracy: true });
            },
            calcDist: (l1, n1, l2, n2) => {
                const R = 6371; const dLat = (l2-l1)*Math.PI/180; const dLon = (n2-n1)*Math.PI/180;
                const a = Math.sin(dLat/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dLon/2)**2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            },
            fetchStations: () => {
                if(!STATE.gps.lat) return;
                fetch(`${CONFIG.apiStations}&geofilter.distance=${STATE.gps.lat},${STATE.gps.lon},10000`)
                .then(r => { if(!r.ok) throw new Error(); return r.json(); })
                .then(data => {
                    STATE.stations = data.records.map(r => ({
                        nom: r.fields.nom, prix: r.fields.sp98_prix, dist: CORE.calcDist(STATE.gps.lat, STATE.gps.lon, r.geometry.coordinates[1], r.geometry.coordinates[0])
                    })).sort((a,b) => a.dist - b.dist);
                    STATE.fuelError = false; UI.updateSystemStatus(); UI.renderStations();
                }).catch(() => { STATE.fuelError = true; UI.updateSystemStatus(); });
            },
            fetchRadarsAPI: async () => {
                if (!STATE.gps.lat) return;
                try {
                    const q = `[out:json];node["highway"="speed_camera"](around:10000,${STATE.gps.lat},${STATE.gps.lon});out;`;
                    const r = await fetch(`${CONFIG.apiRadars}?data=${encodeURIComponent(q)}`);
                    if(!r.ok) throw new Error();
                    const d = await r.json(); STATE.radarsCache = d.elements || []; STATE.radarError = false;
                } catch(e) { STATE.radarError = true; }
                UI.updateSystemStatus();
            },
            checkWeatherQueue: () => {
                if(!STATE.gps.lat) return;
                fetch(`https://api.open-meteo.com/v1/forecast?latitude=${STATE.gps.lat}&longitude=${STATE.gps.lon}&current_weather=true`)
                .then(r => r.json()).then(d => {
                    const c = d.current_weather.weathercode;
                    let icon = "☀️"; if(c >= 1 && c <= 3) icon = "🌤️"; if(c >= 51) icon = "🌧️";
                    document.getElementById('weather-temp').innerText = `${icon} ${Math.round(d.current_weather.temperature)}°C`;
                    STATE.weatherInit = true;
                });
            },
            openDynamicWeather: () => { if(STATE.gps.lat) window.open(`https://www.windy.com/-Weather-radar-radar?radar,${STATE.gps.lat},${STATE.gps.lon},9`, '_blank'); },
            toggleRecording: () => {
                if (STATE.gpx.active) {
                    STATE.gpx.active = false; document.getElementById('btn-rec').innerText = "REC"; document.getElementById('btn-rec').style.background = "#222";
                    if (confirm("Sauvegarder trace ?")) CORE.saveGPX();
                    STATE.gpx.points = []; STATE.gpx.distance = 0; STATE.gpx.prev = null;
                } else {
                    STATE.gpx.active = true; document.getElementById('btn-rec').innerText = "STOP"; document.getElementById('btn-rec').style.background = "#f00";
                }
            },
            saveGPX: () => {
                let xml = `<?xml version="1.0"?><gpx creator="KTM_Dash"><trk><trkseg>`;
                STATE.gpx.points.forEach(p => { xml += `<trkpt lat="${p.lat}" lon="${p.lon}"><ele>${p.ele}</ele><time>${p.time}</time></trkpt>`; });
                xml += `</trkseg></trk></gpx>`;
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([xml], {type: 'application/gpx+xml'}));
                a.download = `Trip_${new Date().getTime()}.gpx`; a.click();
            }
        };

        const UI = {
            update: () => {
                document.getElementById('speed-val').innerText = STATE.gps.speed;
                document.getElementById('speed-max').innerText = STATE.gps.max;
                document.getElementById('angle-val').innerText = STATE.angle.current;
                document.getElementById('angle-max').innerText = STATE.angle.max;
                document.getElementById('gpx-dist').innerText = `${STATE.gpx.distance.toFixed(1)} KM`;
                UI.updateBars('speed', STATE.gps.speed);
            },
            updateBars: (type, val) => {
                if (type === 'speed') {
                    const p = (val / CONFIG.vitesseMaxGraph) * 100;
                    for(let i=1; i<=5; i++) {
                        const b = document.querySelector(`.b${i}`); if(b) b.classList.toggle('active', p >= (i*20));
                    }
                } else {
                    const absVal = Math.abs(val);
                    document.querySelector('.a3').classList.add('active');
                    document.querySelector('.a2').classList.toggle('active', val > 3 && absVal > 15);
                    document.querySelector('.a1').classList.toggle('active', val > 3 && absVal > 30);
                    document.querySelector('.a4').classList.toggle('active', val < -3 && absVal > 15);
                    document.querySelector('.a5').classList.toggle('active', val < -3 && absVal > 30);
                }
            },
            checkRadars: () => {
                if (!STATE.radarsInit && STATE.gps.lat) { STATE.radarsInit = true; CORE.fetchRadarsAPI(); setInterval(CORE.fetchRadarsAPI, 120000); }
                if (!STATE.radarsCache.length) return;
                let minDist = 999999;
                STATE.radarsCache.forEach(r => {
                    const d = CORE.calcDist(STATE.gps.lat, STATE.gps.lon, r.lat, r.lon) * 1000; if (d < minDist) minDist = d;
                });
                const alertBox = document.getElementById('radar-alert');
                if (minDist < CONFIG.radarRayonM) {
                    alertBox.style.display = 'block'; document.getElementById('radar-dist').innerText = Math.round(minDist);
                } else alertBox.style.display = 'none';
            },
            updateSystemStatus: () => {
                const box = document.getElementById('system-status'); const msg = document.getElementById('status-msg');
                let errs = [];
                if (!STATE.gps.lat) errs.push("SIGNAL GPS PERDU");
                if (STATE.radarError) errs.push("API RADAR HS");
                if (STATE.fuelError) errs.push("API STATIONS HS");
                if (errs.length > 0) {
                    box.style.display = 'block'; box.style.background = errs.includes("SIGNAL GPS PERDU") ? "#ff0000" : "#ff6600";
                    msg.innerText = errs.join(" | ");
                } else box.style.display = 'none';
            },
            renderStations: () => {
                document.getElementById('stations-list').innerHTML = STATE.stations.map(s => `
                    <div style="background:#0a0a0a; border-left:3px solid #ff6600; padding:10px; margin-bottom:5px;">
                        <div style="display:flex; justify-content:space-between;"><b>${s.nom}</b><span style="color:#ff6600">${s.prix ? s.prix.toFixed(3) : '--'}€</span></div>
                        <div style="font-size:0.6rem; color:#888">${s.dist.toFixed(1)}km</div>
                    </div>`).join('');
            }
        };

        setInterval(UI.update, 500);
    </script>
</body>
</html>
