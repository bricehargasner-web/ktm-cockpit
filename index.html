<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KTM Pro Cockpit V9.7</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <style>
        :root { --ktm: #ff6600; --bg: #000; --txt: #fff; --ok: #2ecc71; --err: #e74c3c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; }
        
        body { 
            background: var(--bg); color: var(--txt); 
            height: 100vh; width: 100vw; 
            overflow: hidden; display: flex; flex-direction: column;
            border-left: 6px solid var(--ktm);
        }

        /* --- DIAGNOSTIC RAPIDE --- */
        .sys-line { display: flex; justify-content: space-between; padding: 2px 10px; background: #111; font-size: 0.7rem; }
        .led { width: 10px; height: 10px; border-radius: 50%; background: var(--err); display: inline-block; margin-left: 5px; }
        .led.active { background: var(--ok); box-shadow: 0 0 8px var(--ok); }

        /* --- BLOC PRIORITAIRE (VITESSE / ANGLE / METEO) --- */
        .main-display { background: #000; border-bottom: 3px solid var(--ktm); }

        .vitesse-block { text-align: center; padding: 5px 0; border-bottom: 1px solid #222; }
        .v-val { font-size: 7rem; line-height: 0.8; font-style: italic; }
        .v-unit { font-size: 1.2rem; color: var(--ktm); }

        .angle-block { text-align: center; padding: 10px 0; border-bottom: 1px solid #222; }
        .a-val { font-size: 4rem; line-height: 1; }
        
        /* BARRE D'ANGLE CENTRE-GAUCHE-DROITE */
        .angle-track { 
            width: 90%; height: 20px; background: #222; margin: 10px auto; 
            position: relative; border-radius: 4px; overflow: hidden;
        }
        .center-line { position: absolute; left: 50%; width: 2px; height: 100%; background: #444; z-index: 2; }
        #a-bar-L { position: absolute; right: 50%; height: 100%; width: 0%; background: var(--ktm); }
        #a-bar-R { position: absolute; left: 50%; height: 100%; width: 0%; background: var(--ktm); }

        .meteo-block { display: flex; justify-content: space-around; padding: 15px; font-size: 1.5rem; background: #080808; }

        /* --- ZONE RECHERCHE (ARRÊT) --- */
        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; background: #050505; }
        
        .search-ui { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .row { display: flex; gap: 8px; margin-bottom: 15px; }
        select { background: #222; color: #fff; border: 2px solid #444; padding: 15px; border-radius: 8px; flex: 1; font-size: 1.2rem; }
        
        .btn-scan { background: var(--ktm); color: #000; font-weight: 900; border: none; width: 100%; padding: 25px; border-radius: 12px; font-size: 1.8rem; }

        /* --- CARTES STATIONS --- */
        .card { background: #1a1a1a; margin-bottom: 15px; padding: 20px; border-radius: 12px; border-left: 10px solid var(--ktm); }
        .card-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .st-n { font-size: 1.2rem; }
        .st-p { color: var(--ktm); font-size: 2.2rem; font-weight: 900; }
        .go-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .btn-go { background: #333; color: #fff; font-size: 0.9rem; padding: 15px 0; text-align: center; border-radius: 6px; text-decoration: none; font-weight: bold; }

        #mouchard { padding: 10px; font-family: monospace; font-size: 0.7rem; color: #0f0; background: #000; }
    </style>
</head>
<body onclick="MOTO.init()">

    <div class="sys-line">
        <div>GPS <span id="l-gps" class="led"></span></div>
        <div id="alt">ALT: --m</div>
        <div>GYRO <span id="l-gyro" class="led"></span></div>
    </div>

    <div class="main-display">
        <div class="vitesse-block">
            <div id="speed" class="v-val">0</div>
            <div class="v-unit">KM/H</div>
        </div>

        <div class="angle-block">
            <div id="a-txt" class="a-val">0°</div>
            <div class="angle-track">
                <div class="center-line"></div>
                <div id="a-bar-L"></div>
                <div id="a-bar-R"></div>
            </div>
            <div id="a-max" style="font-size: 0.9rem; color: #666;">MAX: 0°</div>
        </div>

        <div class="meteo-block">
            <div id="m-t">--°C</div>
            <div id="m-w">💨 -- k/h</div>
            <div style="color:var(--ktm)" onclick="window.open('https://meteofrance.com')">METEO ↗</div>
        </div>
    </div>

    <div class="scroll-area">
        <div class="search-ui">
            <div class="row">
                <select id="fuel"><option value="Gazole">Gazole</option><option value="SP98">SP98</option><option value="SP95">SP95</option><option value="E10">E10</option><option value="E85">E85</option></select>
                <select id="sort"><option value="price">€</option><option value="dist">KM</option></select>
            </div>
            <div style="margin-bottom: 15px;">
                <input type="range" id="radius" min="3" max="50" value="20" style="width:100%; accent-color:var(--ktm); height:30px;">
                <div style="text-align:center; font-size:0.8rem; color:#888;">Rayon de recherche</div>
            </div>
            <button class="btn-scan" onclick="event.stopPropagation(); MOTO.scan()">⛽ SCAN "REC"</button>
        </div>

        <div id="results"></div>
        <div id="mouchard"></div>
    </div>

    <script>
        let userPos = { lat: 0, lon: 0 };
        let maxLean = 0;

        const L = (m) => { document.getElementById('mouchard').innerHTML += `> ${m}<br>`; };

        const MOTO = {
            init() {
                L("Démarrage...");
                navigator.geolocation.watchPosition(p => {
                    userPos = { lat: p.coords.latitude, lon: p.coords.longitude };
                    document.getElementById('speed').innerText = Math.round((p.coords.speed || 0) * 3.6);
                    document.getElementById('alt').innerText = "ALT: " + (p.coords.altitude ? Math.round(p.coords.altitude) : "--") + "m";
                    document.getElementById('l-gps').classList.add('active');
                    this.updateWeather();
                }, e => L("Erreur GPS"), { enableHighAccuracy: true });
            },

            async updateWeather() {
                try {
                    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${userPos.lat}&longitude=${userPos.lon}&current_weather=true`);
                    const d = await r.json();
                    document.getElementById('m-t').innerText = Math.round(d.current_weather.temperature) + "°C";
                    document.getElementById('m-w').innerText = "💨 " + Math.round(d.current_weather.windspeed) + " k/h";
                } catch(e) {}
            },

            async scan() {
                if(!userPos.lat) return;
                const fuel = document.getElementById('fuel').value;
                const rad = document.getElementById('radius').value;
                const resZone = document.getElementById('results');
                resZone.innerHTML = "<div style='color:var(--ktm); text-align:center; padding:20px;'>SCAN EN COURS...</div>";
                try {
                    const r = await fetch(`https://data.economie.gouv.fr/api/records/1.0/search/?dataset=prix-des-carburants-en-france-flux-instantane-v2&geofilter.distance=${userPos.lat},${userPos.lon},${rad*1000}&rows=40`);
                    const data = await r.json();
                    let st = [];
                    data.records.forEach(i => {
                        const prix = this.extract(i.fields, fuel);
                        if(prix) st.push({ nom: i.fields.nom || i.fields.ville, prix: prix, dist: this.dist(userPos.lat, userPos.lon, i.fields.geom[0], i.fields.geom[1]), lat: i.fields.geom[0], lon: i.fields.geom[1] });
                    });
                    st.sort((a,b) => document.getElementById('sort').value === 'price' ? a.prix-b.prix : a.dist-b.dist);
                    resZone.innerHTML = st.map(s => `
                        <div class="card">
                            <div class="card-info"><span class="st-n">${s.nom.substring(0,18)}</span><span class="st-p">${s.prix.toFixed(3)}€</span></div>
                            <div class="go-grid">
                                <a class="btn-go" href="waze://?ll=${s.lat},${s.lon}&navigate=yes">WAZE</a>
                                <a class="btn-go" href="google.navigation:q=${s.lat},${s.lon}">MAPS</a>
                                <a class="btn-go" href="geo:${s.lat},${s.lon}">OSM</a>
                                <a class="btn-go" href="liberty-rider://navigation?lat=${s.lat}&lon=${s.lon}">LR</a>
                            </div>
                        </div>`).join('');
                } catch(e) { L("Erreur API"); }
            },

            extract(f, t) {
                const map = {"Gazole":"gazole_prix","SP98":"sp98_prix","SP95":"sp95_prix","E10":"e10_prix","E85":"e85_prix"};
                if(f[map[t]]) return parseFloat(f[map[t]]);
                try {
                    const a = JSON.parse(f.prix);
                    const found = a.find(x => x["@nom"] === t);
                    return found ? parseFloat(found["@valeur"]) : null;
                } catch(e) { return null; }
            },

            dist(la1, lo1, la2, lo2) {
                const p = 0.01745;
                const a = 0.5 - Math.cos((la2-la1)*p)/2 + Math.cos(la1*p)*Math.cos(la2*p)*(1-Math.cos((lo2-lo1)*p))/2;
                return 12742 * Math.asin(Math.sqrt(a));
            }
        };

        window.addEventListener("deviceorientation", (e) => {
            if(e.beta === null) return;
            document.getElementById('l-gyro').classList.add('active');
            
            // Correction pour USB à gauche : beta mesure l'inclinaison.
            let lean = Math.round(e.beta || 0) * -1;
            let absLean = Math.abs(lean);
            
            document.getElementById('a-txt').innerText = absLean + "°";
            
            // Mise à jour barre bilatérale
            const barL = document.getElementById('a-bar-L');
            const barR = document.getElementById('a-bar-R');
            
            if (lean < 0) { // Penche à gauche
                barL.style.width = Math.min(50, absLean * 1.5) + "%";
                barR.style.width = "0%";
            } else { // Penche à droite
                barR.style.width = Math.min(50, absLean * 1.5) + "%";
                barL.style.width = "0%";
            }

            if(absLean > maxLean) { 
                maxLean = absLean; 
                document.getElementById('a-max').innerText = "MAX: " + maxLean + "°"; 
            }
        });
    </script>
</body>
</html>
