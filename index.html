<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Energy Concept- KTM V37</title>
    
    <script>
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            SAFE_GREEN: '#2ecc71',
            DANGER_RED: '#ff4757',
            RADIUS: 20000, 
            MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records'
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        
        /* CARTES */
        #map { position: absolute; inset: 0; z-index: 1; filter: brightness(0.4) contrast(1.2); }
        
        /* NAVIGATION FULL SCREEN AVEC ITINÉRAIRE */
        #nav-container { position: absolute; inset: 0; z-index: 5; display: none; background: #000; }
        #nav-iframe { width: 100%; height: 100%; border: none; filter: brightness(0.7) contrast(1.1); }

        /* HUD CENTRAL */
        #hud-container {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; height: 320px; z-index: 60; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }
        #aim-sphere { position: absolute; width: 100%; height: 100%; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; }
        #horizon-gyro { position: absolute; top: 50%; width: 140%; left: -20%; height: 3px; box-shadow: 0 0 15px currentColor; transition: transform 0.05s linear; }
        #lean-display { position: absolute; width: 100%; top: 50%; transform: translateY(-50%); text-align: center; font-size: 4.5rem; font-weight: 900; text-shadow: 0 0 20px #000; }

        /* VITESSE */
        #speed-block { position: absolute; bottom: 120px; left: 5%; z-index: 80; pointer-events: none; }
        #speed-val { font-family: 'Barlow Condensed'; font-size: 8rem; font-weight: 900; line-height: 0.8; text-shadow: 0 0 30px #000; }

        /* INTERFACE HAUTE */
        #top-ui { position: absolute; top: 10px; width: 96%; left: 2%; z-index: 100; display: flex; gap: 8px; }
        #search-input { flex-grow: 1; background: rgba(0,0,0,0.8); border: 1px solid #FF6600; color: white; padding: 12px; border-radius: 4px; font-family: sans-serif; }
        .btn-ktm { background: #FF6600; color: #000; border: none; padding: 10px 15px; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        /* DASHBOARD */
        #dashboard { position: absolute; bottom: 0; width: 100%; z-index: 90; display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(0,0,0,0.9); border-top: 2px solid #FF6600; }
        .widget { padding: 10px; text-align: center; border-right: 1px solid #333; }
        .label { font-size: 0.6rem; color: #FF6600; }
        .value { font-family: 'Barlow Condensed'; font-size: 2.2rem; font-weight: 900; }

        .fuel-label { background: #FF6600; color: #fff; padding: 5px 8px; border-radius: 5px; font-weight: 900; border: 2px solid white; font-size: 15px; box-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

    <div id="top-ui">
        <input type="text" id="search-input" placeholder="DESTINATION (Ex: Calvi)">
        <button id="nav-btn" class="btn-ktm" onclick="toggleNav()">MISSION NAV</button>
        <button class="btn-ktm" style="background:#222; color:#FF6600;" onclick="findFuel()">FUEL SCAN</button>
        <button class="btn-ktm" style="background:#444; color:#fff;" onclick="calibrate()">ZERO</button>
    </div>

    <div id="nav-container">
        <iframe id="nav-iframe"></iframe>
    </div>

    <div id="hud-container">
        <div id="lean-display">0°</div>
        <div id="aim-sphere"></div>
        <div id="horizon-gyro"></div>
    </div>

    <div id="speed-block">
        <div id="speed-val">000</div>
        <div style="font-size:1.5rem; color:#FF6600; font-weight:900;">KM/H</div>
    </div>

    <div id="map"></div>

    <div id="dashboard">
        <div class="widget"><div class="label">ALTITUDE</div><div id="alt" class="value">--</div></div>
        <div class="widget"><div class="label">CAP</div><div id="cap" class="value">---</div></div>
        <div class="widget"><div class="label">TRIP</div><div id="dist" class="value">0.0</div></div>
        <div class="widget"><div class="label">ANGLE</div><div id="lean-alt" class="value">0°</div></div>
    </div>

    <script>
        let map, userMarker, totalDist = 0, offset = 0, lastRaw = 0, smoothedLean = 0, lastCoord = null;
        let fuelLayer = L.layerGroup();

        function updateHUD(angle) {
            const a = Math.abs(angle);
            const color = a < 25 ? CONFIG.SAFE_GREEN : (a < 40 ? CONFIG.KTM_ORANGE : CONFIG.DANGER_RED);
            document.getElementById('aim-sphere').style.borderColor = color;
            document.getElementById('horizon-gyro').style.backgroundColor = color;
            document.getElementById('lean-display').style.color = color;
            document.getElementById('lean-display').innerText = Math.round(a) + "°";
            document.getElementById('lean-alt').innerText = Math.round(a) + "°";
        }

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.76, 1.98], 14);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(map);
            fuelLayer.addTo(map);
            userMarker = L.circleMarker([0,0], { radius: 10, color: '#fff', fillColor: '#FF6600', fillOpacity: 1, weight: 3 }).addTo(map);

            window.addEventListener('deviceorientation', e => {
                let raw = (Math.abs(window.orientation) === 90) ? e.beta : e.gamma;
                lastRaw = raw;
                smoothedLean = (smoothedLean * 0.90) + ((raw - offset) * 0.10);
                document.getElementById('horizon-gyro').style.transform = `rotate(${smoothedLean}deg)`;
                updateHUD(smoothedLean);
                document.getElementById('pitch').innerText = Math.round(e.beta) + "°";
            }, true);

            navigator.geolocation.watchPosition(u => {
                const p = [u.coords.latitude, u.coords.longitude];
                userMarker.setLatLng(p);
                map.panTo(p);
                const s = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0);
                document.getElementById('speed-val').innerText = s.toString().padStart(3, '0');
                if (u.coords.altitude) document.getElementById('alt').innerText = Math.round(u.coords.altitude) + "m";
                if (u.coords.heading) document.getElementById('cap').innerText = Math.round(u.coords.heading) + "°";
                if (lastCoord) totalDist += map.distance(lastCoord, p) / 1000;
                lastCoord = p;
                document.getElementById('dist').innerText = totalDist.toFixed(1);
            }, null, { enableHighAccuracy: true });
        }

        function calibrate() { offset = lastRaw; smoothedLean = 0; updateHUD(0); }

        function toggleNav() {
            const dest = document.getElementById('search-input').value;
            const container = document.getElementById('nav-container');
            const iframe = document.getElementById('nav-iframe');
            const btn = document.getElementById('nav-btn');

            if (container.style.display === 'block') {
                container.style.display = 'none';
                iframe.src = '';
                btn.innerText = "MISSION NAV";
            } else if (dest) {
                // FORCE LE CALCUL D'ITINERAIRE DEPUIS MA POSITION
                const googleUrl = `https://www.google.com/maps/embed/v1/directions?key=REMPLACE_PAR_TA_CLE_SI_TU_EN_AS_UNE&origin=My+Location&destination=${encodeURIComponent(dest)}&mode=driving`;
                
                // FALLBACK SANS CLÉ (Plus simple)
                const fallbackUrl = `https://maps.google.com/maps?q=${encodeURIComponent(dest)}&output=embed&t=m&z=12`;
                
                iframe.src = fallbackUrl;
                container.style.display = 'block';
                btn.innerText = "FERMER NAV";
            }
        }

        async function findFuel() {
            const c = map.getCenter();
            const url = `${CONFIG.FUEL_API}?where=distance(geom, geom'POINT(${c.lng} ${c.lat})') < ${CONFIG.RADIUS}&limit=50`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                fuelLayer.clearLayers();
                data.results.forEach(st => {
                    let p = "?.??";
                    try {
                        let pArr = JSON.parse(st.prix.replace(/'/g, '"'));
                        let gas = pArr.find(x => x["@nom"].includes("95")) || pArr[0];
                        p = parseFloat(gas["@valeur"]).toFixed(2);
                    } catch(e) {}
                    L.marker([st.geom.lat, st.geom.lon], {
                        icon: L.divIcon({ html: `<div class="fuel-label">${p}€</div>`, iconSize: [50, 25] })
                    }).addTo(fuelLayer);
                });
            } catch(e) {}
        }

        window.onload = init;
    </script>
</body>
</html>
