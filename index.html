<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ENERGY CONCEPT - KTM HUD V6.6</title>
<script>
/* --- PANNEAU DE CONTRÔLE ENERGY CONCEPT (MODIFIABLE) --- */
const CONFIG = {
    USER: "Brice CARDONA",
    KTM_ORANGE: '#FF6600',
    DANGER_RED: '#FF4500',
    DAMPING: 0.03, // Plus bas = plus lent/fluide pour la boussole
    SCAN_RADIUS: 25000,
    MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}{r}.png'
};
</script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">

<style>
    :root { --ktm: #FF6600; --glass: rgba(0, 0, 0, 0.4); }
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Barlow Condensed', sans-serif; background: #000; overflow: hidden; color: white; }
    
    #portrait-blocker { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; color: var(--ktm); font-family: 'Orbitron'; }
    @media (orientation: portrait) { #portrait-blocker { display: flex; } }

    #map-main { position: absolute; width: 100%; height: 100%; z-index: 1; filter: brightness(0.5) saturate(1.2); }
    
    /* HUD CENTRAL & MIRE */
    #hud-container { 
        position: absolute; top: 46%; left: 50%; transform: translate(-50%, -50%);
        width: 340px; height: 340px; z-index: 100; pointer-events: none;
    }
    #compass-frame {
        width: 100%; height: 100%; border-radius: 50%; border: 1px solid rgba(255,102,0,0.15);
        position: relative; background: rgba(0,0,0,0.1); overflow: hidden;
    }
    #cardinal-ring {
        position: absolute; width: 420px; height: 420px; top: 50%; left: 50%;
        transform: translate(-50%, -50%); z-index: 110;
    }
    .cardinal { position: absolute; font-family: 'Orbitron'; font-weight: 900; font-size: 18px; color: var(--ktm); opacity: 0.8; }
    #n { top: 0; left: 50%; transform: translateX(-50%); }
    #e { right: 0; top: 50%; transform: translateY(-50%); }
    #s { bottom: 0; left: 50%; transform: translateX(-50%); }
    #w { left: 0; top: 50%; transform: translateY(-50%); }

    /* MIRE DE POSITION CENTRALE */
    #center-mire {
        position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
        transform: translate(-50%, -50%); z-index: 150;
    }
    #center-mire::before, #center-mire::after {
        content: ''; position: absolute; background: var(--ktm);
    }
    #center-mire::before { width: 100%; height: 1px; top: 50%; left: 0; box-shadow: 0 0 5px var(--ktm); }
    #center-mire::after { height: 100%; width: 1px; left: 50%; top: 0; box-shadow: 0 0 5px var(--ktm); }

    #horizon-bar {
        position: absolute; top: 50%; left: 5%; right: 5%; height: 2px;
        background: linear-gradient(90deg, transparent, #fff, var(--ktm), #fff, transparent);
        z-index: 140; transform-origin: center center; box-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    #map-zoom { width: 100%; height: 100%; }

    /* UI ELEMENTS - STEALTH DESIGN */
    .ui-group { position: absolute; z-index: 700; display: flex; gap: 0; }
    #left-ui { top: 15px; left: 15px; }
    #right-ui { top: 15px; right: 15px; flex-direction: column; align-items: flex-end; gap: 5px; }

    .stealth-box {
        background: var(--glass); border: 1px solid rgba(255,102,0,0.2);
        color: #fff; font-family: 'Orbitron'; font-weight: 900; font-size: 0.7rem;
        backdrop-filter: blur(8px); outline: none; padding: 10px;
    }
    .btn-nav { clip-path: polygon(0 0, 85% 0, 100% 30%, 100% 100%, 0 100%); cursor: pointer; }
    .btn-nav:active { background: var(--ktm); color: #000; }

    /* DASHBOARD SANS ESPACE (GRID) */
    #dash-bottom {
        position: absolute; bottom: 0; width: 100%; height: 80px;
        z-index: 500; display: grid; grid-template-columns: repeat(5, 1fr);
        background: var(--glass); backdrop-filter: blur(10px);
        border-top: 1px solid rgba(255,102,0,0.3);
    }
    .widget {
        text-align: center; padding: 10px 5px; position: relative;
        border-right: 1px solid rgba(255,255,255,0.05);
    }
    /* Liseré dossier KTM */
    .widget::before {
        content: ''; position: absolute; top: -1px; left: 0; width: 40px; height: 3px;
        background: var(--ktm); clip-path: polygon(0 0, 100% 0, 80% 100%, 0 100%);
    }
    .stat-label { font-size: 0.6rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 1.6rem; font-weight: 700; display: block; margin-top: 5px; }
    #v-speed { font-size: 3rem; color: #fff; line-height: 0.8; }

    #map-tools { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); z-index: 800; display: flex; flex-direction: column; gap: 5px; }
    .btn-tool { width: 45px; height: 45px; background: var(--glass); border: 1px solid var(--ktm); color: var(--ktm); font-family: 'Orbitron'; font-weight: 900; cursor: pointer; backdrop-filter: blur(5px); }
</style>
</head>
<body>

<div id="portrait-blocker"><h1>READY TO RACE</h1><p>PAYSAGE REQUIS</p></div>

<div id="left-ui" class="ui-group">
    <input type="text" id="dest-input" class="stealth-box" style="width:180px; border-radius: 0;" placeholder="DESTINATION...">
    <button class="stealth-box btn-nav" onclick="runSearch()">NAV</button>
</div>

<div id="right-ui" class="ui-group">
    <select id="fuel-select" class="stealth-box" style="width:130px; background: #000;">
        <option value="gazole_prix">GAZOLE</option>
        <option value="sp95_prix">SP95</option>
    </select>
    <button class="stealth-box btn-nav" style="width:130px;" onclick="scanFuel()">⛽ SCAN</button>
</div>

<div id="map-tools">
    <button class="btn-tool" onclick="mapZoom(1)">+</button>
    <button class="btn-tool" onclick="mapZoom(-1)">-</button>
    <button class="btn-tool" style="font-size: 10px;" onclick="recenterMap()">RTR</button>
</div>

<div id="hud-container">
    <div id="cardinal-ring">
        <div class="cardinal" id="n">N</div><div class="cardinal" id="e">E</div>
        <div class="cardinal" id="s">S</div><div class="cardinal" id="w">W</div>
    </div>
    <div id="compass-frame">
        <div id="horizon-bar"></div>
        <div id="center-mire"></div>
        <div id="map-zoom"></div>
    </div>
</div>

<div id="map-main"></div>

<div id="dash-bottom">
    <div class="widget"><span class="stat-label">Altitude</span><span id="v-alt" class="stat-value">---</span></div>
    <div class="widget"><span class="stat-label">Inclinaison</span><span id="v-lean" class="stat-value">0°</span></div>
    <div class="widget" style="background: rgba(255,102,0,0.05);"><span id="v-speed" class="stat-value">00</span><span class="stat-label">KM/H</span></div>
    <div class="widget"><span class="stat-label">Cap</span><span id="v-cap" class="stat-value">---</span></div>
    <div class="widget" style="border:none;"><span class="stat-label">Trip</span><span id="v-dist" class="stat-value">0.0</span></div>
</div>

<script>
let mainMap, zoomMap, fuelLayer, routeLayerMain, routeLayerZoom;
let userPos = [41.9, 8.7], lastPos = null, tripDist = 0;
let isFollowMode = true;
let currentHeading = 0, targetHeading = 0;

function init() {
    mainMap = L.map('map-main', { zoomControl: false, attributionControl: false }).setView(userPos, 13);
    L.tileLayer(CONFIG.MAP_STYLE).addTo(mainMap);
    zoomMap = L.map('map-zoom', { zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false, touchZoom: false }).setView(userPos, 15);
    L.tileLayer(CONFIG.MAP_STYLE).addTo(zoomMap);
    
    fuelLayer = L.layerGroup().addTo(mainMap);
    routeLayerMain = L.layerGroup().addTo(mainMap);
    routeLayerZoom = L.layerGroup().addTo(zoomMap);

    mainMap.on('move', () => { zoomMap.setView(mainMap.getCenter(), mainMap.getZoom() + 2, { animate: false }); });
    mainMap.on('dragstart', () => { isFollowMode = false; });

    startGPS();
    smoothHUD();
    window.addEventListener('deviceorientation', handleOrientation);
}

function startGPS() {
    navigator.geolocation.watchPosition(p => {
        userPos = [p.coords.latitude, p.coords.longitude];
        if(isFollowMode) mainMap.panTo(userPos);
        
        document.getElementById('v-speed').innerText = p.coords.speed ? Math.round(p.coords.speed * 3.6) : "00";
        if(p.coords.altitude) document.getElementById('v-alt').innerText = Math.round(p.coords.altitude) + "m";
        
        targetHeading = p.coords.heading || 0;
        document.getElementById('v-cap').innerText = Math.round(targetHeading) + "°";

        if(lastPos) tripDist += (mainMap.distance(lastPos, userPos) / 1000);
        document.getElementById('v-dist').innerText = tripDist.toFixed(1);
        lastPos = userPos;
    }, null, { enableHighAccuracy: true });
}

function smoothHUD() {
    let diff = targetHeading - currentHeading;
    if (diff > 180) diff -= 360;
    if (diff < -180) diff += 360;
    currentHeading += diff * CONFIG.DAMPING; 
    
    document.getElementById('cardinal-ring').style.transform = `translate(-50%, -50%) rotate(${-currentHeading}deg)`;
    requestAnimationFrame(smoothHUD);
}

function handleOrientation(e) {
    // Mode Paysage : Bord droit = Avant. L'inclinaison moto est gérée par e.beta
    let lean = Math.round(e.beta); 
    if (window.orientation === -90) lean = -lean;

    const absLean = Math.abs(lean);
    const bar = document.getElementById('horizon-bar');
    const display = document.getElementById('v-lean');
    
    bar.style.transform = `translateY(-50%) rotate(${-lean}deg)`;
    display.innerText = absLean + "°";

    let color = "#FFF";
    if(absLean > 15) color = CONFIG.KTM_ORANGE;
    if(absLean > 35) color = CONFIG.DANGER_RED;
    
    display.style.color = color;
    bar.style.boxShadow = `0 0 15px ${color}`;
}

function mapZoom(delta) { mainMap.setZoom(mainMap.getZoom() + delta); }
function recenterMap() { isFollowMode = true; mainMap.panTo(userPos); }

async function runSearch() {
    const q = document.getElementById('dest-input').value;
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
    const data = await res.json();
    if(data[0]) {
        drawNav([data[0].lat, data[0].lon]);
        isFollowMode = false;
    }
}

async function drawNav(target) {
    const url = `https://router.project-osrm.org/route/v1/driving/${userPos[1]},${userPos[0]};${target[1]},${target[0]}?overview=full&geometries=geojson`;
    const res = await fetch(url);
    const data = await res.json();
    routeLayerMain.clearLayers(); routeLayerZoom.clearLayers();
    if(data.routes[0]) {
        const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
        L.polyline(coords, { color: CONFIG.KTM_ORANGE, weight: 6 }).addTo(routeLayerMain);
        L.polyline(coords, { color: CONFIG.KTM_ORANGE, weight: 10 }).addTo(routeLayerZoom);
        mainMap.fitBounds(L.polyline(coords).getBounds());
    }
}

async function scanFuel() {
    const type = document.getElementById('fuel-select').value;
    const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?where=within_distance(geom, geom'POINT(${userPos[1]} ${userPos[0]})', ${CONFIG.SCAN_RADIUS}m)&limit=15`;
    const res = await fetch(url);
    const data = await res.json();
    fuelLayer.clearLayers();
    data.results.forEach(st => {
        const price = parseFloat(st[type]);
        if(price) L.marker([st.geom.lat, st.geom.lon], { icon: L.divIcon({ html: `<div style="background:#fff; color:#000; font-weight:900; padding:2px; border:2px solid ${CONFIG.KTM_ORANGE}; border-radius:3px; font-size:12px;">${price.toFixed(2)}</div>` }) }).addTo(fuelLayer);
    });
}

window.onload = init;
</script>
</body>
</html>
