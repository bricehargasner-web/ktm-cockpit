<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Concept - Cockpit Navigation</title>
    
    <script>
        const CONFIG = {
            COULEUR_MIN: "#ff8c00", // Orange
            COULEUR_MAX: "#ff0000", // Rouge vif
            VITESSE_ANIMATION: 1000, // ms pour le zoom station
            ZOOM_STATION: 15,        // Niveau de zoom sur sélection
            TITRE_PROJET: "Energy Concept - Navigation Solaire",
            MSG_ERREUR_STATION: "Station introuvable ou données manquantes."
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* ===========================================================================
        STRUCTURE VISUELLE (CSS) - ÉTANCHE
        ===========================================================================
        */
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --panel-width: 350px;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }

        #app-container { display: flex; height: 100vh; width: 100vw; position: relative; }

        /* Panneau de recherche Latéral */
        #side-panel {
            width: var(--panel-width);
            background: #f8f9fa;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        #side-panel.hidden { transform: translateX(-100%); position: absolute; }

        .panel-header { padding: 15px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; }

        .search-box { padding: 15px; border-bottom: 1px solid #ddd; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }

        #station-list { flex: 1; overflow-y: auto; padding: 10px; }
        .station-item { 
            padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s;
            border-left: 4px solid transparent;
        }
        .station-item:hover { background: #e9ecef; border-left: 4px solid var(--accent); }

        /* Bouton bascule (Toggle) */
        #toggle-panel {
            position: absolute; left: 10px; top: 10px; z-index: 1100;
            background: var(--primary); color: white; border: none; padding: 10px;
            border-radius: 4px; cursor: pointer; display: none;
        }

        /* Zone Carte */
        #map-wrapper { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }

        /* COCKPIT (Boussole) */
        #cockpit {
            position: absolute; bottom: 20px; right: 20px; z-index: 1000;
            background: rgba(255,255,255,0.9); padding: 15px; border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 150px; height: 150px;
            display: flex; align-items: center; justify-content: center; border: 4px solid #333;
        }

        .compass-ring {
            position: absolute; width: 100%; height: 100%;
            background-image: repeating-conic-gradient(
                from 0deg,
                #333 0deg 1deg,
                transparent 1deg 10deg
            );
            border-radius: 50%;
        }

        #angle-display {
            font-size: 1.5rem; font-weight: bold; z-index: 2;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Alerte Erreur */
        #alert-box {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #ff4444; color: white; padding: 15px 30px; border-radius: 8px;
            display: none; z-index: 2000; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="alert-box"></div>
    <button id="toggle-panel" onclick="toggleSidebar()">☰ Ouvrir Recherche</button>

    <div id="app-container">
        <aside id="side-panel">
            <div class="panel-header">
                <span>STATIONS</span>
                <button onclick="toggleSidebar()" style="background:none; border:none; color:white; cursor:pointer; font-size:1.2rem;">✖</button>
            </div>
            <div class="search-box">
                <input type="text" id="city-search" placeholder="Rechercher une ville..." onkeyup="searchCity(this.value)">
                <input type="text" id="station-filter" placeholder="Filtrer les stations..." onkeyup="filterStations(this.value)" style="margin-top:10px;">
            </div>
            <div id="station-list">
                </div>
        </aside>

        <main id="map-wrapper">
            <div id="map"></div>
            
            <div id="cockpit">
                <div class="compass-ring"></div>
                <div id="angle-display">0°</div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        /* ===========================================================================
        LOGIQUE (JS) - ÉTANCHE
        ===========================================================================
        */
        let map;
        let markers = [];
        let allStations = [ // Exemple de données (Simulant le retour de ton API actuelle)
            { id: 1, name: "Station Alpha", lat: 43.6047, lng: 1.4442, angle: 45 },
            { id: 2, name: "Station Beta", lat: 48.8566, lng: 2.3522, angle: 120 },
            { id: 3, name: "Station Gamma", lat: 45.7640, lng: 4.8357, angle: 310 }
        ];

        // Initialisation
        function initApp() {
            map = L.map('map').setView([46.6033, 1.8883], 6);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            renderStationList(allStations);
            allStations.forEach(s => addMarker(s));
        }

        // --- VISUEL & NAVIGATION ---

        function toggleSidebar() {
            const panel = document.getElementById('side-panel');
            const btn = document.getElementById('toggle-panel');
            panel.classList.toggle('hidden');
            btn.style.display = panel.classList.contains('hidden') ? 'block' : 'none';
            setTimeout(() => map.invalidateSize(), 300);
        }

        function renderStationList(stations) {
            const list = document.getElementById('station-list');
            list.innerHTML = '';
            stations.forEach(s => {
                const div = document.createElement('div');
                div.className = 'station-item';
                div.innerHTML = `<strong>${s.name}</strong><br><small>Angle: ${s.angle}°</small>`;
                div.onclick = () => selectStation(s);
                list.appendChild(div);
            });
        }

        function selectStation(station) {
            if(!station || !station.lat) {
                showAlert(CONFIG.MSG_ERREUR_STATION);
                return;
            }
            // Animation vers la station
            map.flyTo([station.lat, station.lng], CONFIG.ZOOM_STATION, {
                animate: true,
                duration: CONFIG.VITESSE_ANIMATION / 1000
            });
            updateCockpit(station.angle);
        }

        function updateCockpit(angle) {
            const display = document.getElementById('angle-display');
            display.innerText = `${angle}°`;

            // Calcul du dégradé (Orange -> Rouge vif)
            // L'angle est ramené entre 0 et 1 (ratio)
            const ratio = angle / 360;
            const color = interpolateColor(CONFIG.COULEUR_MIN, CONFIG.COULEUR_MAX, ratio);
            
            display.style.color = color;
            document.getElementById('cockpit').style.borderColor = color;
        }

        // --- LOGIQUE MATHÉMATIQUE ---

        function interpolateColor(color1, color2, factor) {
            const r1 = parseInt(color1.substring(1,3), 16);
            const g1 = parseInt(color1.substring(3,5), 16);
            const b1 = parseInt(color1.substring(5,7), 16);

            const r2 = parseInt(color2.substring(1,3), 16);
            const g2 = parseInt(color2.substring(3,5), 16);
            const b2 = parseInt(color2.substring(5,7), 16);

            const r = Math.round(r1 + factor * (r2 - r1));
            const g = Math.round(g1 + factor * (g2 - g1));
            const b = Math.round(b1 + factor * (b2 - b1));

            return `rgb(${r}, ${g}, ${b})`;
        }

        // --- GESTION DES ERREURS ---

        function showAlert(msg) {
            const box = document.getElementById('alert-box');
            box.innerText = msg;
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 4000);
        }

        // --- RECHERCHE (API SIMULÉE) ---

        function searchCity(val) {
            // Ici, garde ton code de recherche API ville existant
            console.log("Recherche ville : " + val);
        }

        function filterStations(val) {
            const filtered = allStations.filter(s => 
                s.name.toLowerCase().includes(val.toLowerCase())
            );
            renderStationList(filtered);
        }

        function addMarker(s) {
            const marker = L.marker([s.lat, s.lng]).addTo(map);
            marker.bindPopup(`<b>${s.name}</b><br>Angle: ${s.angle}°`);
            marker.on('click', () => updateCockpit(s.angle));
            markers.push(marker);
        }

        window.onload = initApp;
    </script>
</body>
</html>
