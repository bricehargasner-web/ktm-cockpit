<!-- Dans la section CONFIGURATION (Lignes 1-20) -->
<style>
    :root {
        --primary-color: #00ff88;
        --alert-color: #ff4d4d;
    }
    /* Ajout d'un style pour le slider de volume */
    .volume-controls {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 15px;
        background: #21262d;
        padding: 10px;
        border-radius: 8px;
    }
</style>

<!-- Dans le corps du HTML (Section Contrôles) -->
<div class="card">
    <div id="status" class="status-badge">PRÊT / SILENCIEUX</div>
    
    <div class="controls">
        <span>Sensibilité (Toc) : <b id="seuilVal">0.3</b></span>
        <input type="range" id="sensitivity" min="0.1" max="2" step="0.1" value="0.3">
    </div>

    <div class="volume-controls">
        <div class="controls">
            <span>Volume Bip : <b id="volVal">80</b>%</span>
            <input type="range" id="volume" min="0" max="100" step="5" value="80">
        </div>
        <div class="controls">
            <span>Fréquence : <b id="freqVal">880</b>Hz</span>
            <input type="range" id="freq" min="440" max="2000" step="100" value="880">
        </div>
    </div>
    
    <canvas id="vibeChart" height="150"></canvas>
</div>

<script>
/* ==========================================================
   LOGIQUE AUDIO ET FILTRAGE AMÉLIORÉE
   ========================================================== */

let audioCtx = null;
let volumeLevel = 0.8;
let frequency = 880;
let threshold = 0.3;
let isAlerting = false;

// Initialisation au premier clic (sécurité navigateur)
document.body.onclick = () => {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    // ... reste du code d'init capteurs ...
};

// Update des variables via sliders
document.getElementById('volume').addEventListener('input', (e) => {
    volumeLevel = e.target.value / 100;
    document.getElementById('volVal').innerText = e.target.value;
});
document.getElementById('freq').addEventListener('input', (e) => {
    frequency = e.target.value;
    document.getElementById('freqVal').innerText = e.target.value;
});

function triggerAlert() {
    if (isAlerting) return;
    
    isAlerting = true;
    statusBadge.innerText = "!!! TOC !!!";
    statusBadge.classList.add('alert-active');

    // GÉNÉRATION DU BIP PUISSANT
    if (audioCtx) {
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = 'square'; // Type 'square' pour un son plus percutant/agressif
        oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
        
        gainNode.gain.setValueAtTime(volumeLevel, audioCtx.currentTime);
        // Fade out rapide pour éviter le "clac" audio
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.3);
    }

    // Verrou de sécurité pour éviter les rebonds
    setTimeout(() => {
        isAlerting = false;
        statusBadge.innerText = "LIGNE TENDUE...";
        statusBadge.classList.remove('alert-active');
    }, 800); 
}
</script>
