    <script>
        const STATE = {
            gps: { lat: null, lon: null, speed: 0, max: 0, sum: 0, count: 0 },
            angle: { current: 0, smoothed: 0, offset: 0, max: 0, sum: 0, count: 0 },
            lux: 0, weatherInit: false, gpx: { active: false, points: [], distance: 0, prev: null }, stations: [],
            lastRadarDist: null,
            radarsCache: [],  // AJOUT : Stocke les radars autour de toi
            radarsInit: false // AJOUT : Vérifie si le téléchargement a commencé
        };

        const CORE = {
           startBootSequence: async () => {
                const bar = document.getElementById('boot-bar');
                const status = document.getElementById('boot-status');
                const btn = document.getElementById('btn-unlock');

                // --- COMPATIBILITÉ IPHONE (iOS) ---
                // On demande l'accès aux capteurs avant de cacher le bouton
                if (typeof DeviceOrientationEvent !== 'undefined' && 
                    typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        console.log("Permission iOS:", permission);
                    } catch (error) {
                        console.error("Erreur permission iOS:", error);
                    }
                }

                if(btn) btn.style.display = 'none';

                // Liste des tests cliniques pour le look "ordinateur de bord"
                const steps = [
                    { p: 15, t: "Initialisation Kernel KTM..." },
                    { p: 35, t: "Liaison API Gouvernement (Carburants)..." },
                    { p: 55, t: "Scan Base Radars (Zone 10km)..." },
                    { p: 75, t: "Recherche Satellites GPS..." },
                    { p: 90, t: "Calibrage Gyroscopique..." },
                    { p: 100, t: "Système Optimal - READY TO RACE" }
                ];

                for (let step of steps) {
                    if(bar) bar.style.width = step.p + "%";
                    if(status) status.innerText = step.t;
                    await new Promise(r => setTimeout(r, 600)); 
                }

                // Une fois à 100%, on affiche le dashboard
                setTimeout(() => {
                    document.getElementById('start-overlay').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    
                    UI.syncConfig(); 
                    CORE.initGyro(); 
                    CORE.initLight(); 
                    CORE.initGPS();
                    
                    setInterval(CORE.checkWeatherQueue, 10000);
                }, 400);
            },
            
            initLight: () => {
                if ('AmbientLightSensor' in window) {
                    const sensor = new AmbientLightSensor();
                    sensor.onreading = () => { 
                        STATE.lux = Math.round(sensor.illuminance); 
                        UI.setTheme(STATE.lux > CONFIG.seuilLuxJour);
                    };
                    sensor.start();
                }
            },
            initGyro: () => {
                window.addEventListener('deviceorientation', (e) => {
                    // Fusion mathématique Roulis (beta) + Tangage (gamma)
                    let x = e.beta;  
                    let y = e.gamma; 
                    
                    if (x !== null && y !== null) {
                        const toRad = Math.PI / 180;
                        
                        // Calcul d'angle compensé par trigonométrie sphérique
                        // Formule : arctan2(sin(beta), sqrt(cos^2(beta) + sin^2(gamma)))
                        let combinedAngle = Math.atan2(
                            Math.sin(x * toRad), 
                            Math.sqrt(Math.pow(Math.cos(x * toRad), 2) + Math.pow(Math.sin(y * toRad), 2))
                        ) * (180 / Math.PI);

                        // Lissage dynamique (Filtre passe-bas)
                        STATE.angle.smoothed = (CONFIG.angleSmoothing * combinedAngle) + ((1 - CONFIG.angleSmoothing) * (STATE.angle.smoothed || combinedAngle));
                        
                        let valPure = STATE.angle.smoothed - STATE.angle.offset;
                        
                        // Filtrage des bruits de capteur (vibrations moteur)
                        STATE.angle.current = Math.abs(valPure) < 2 ? 0 : Math.min(Math.round(Math.abs(valPure)), 85);
                        
                        if (STATE.angle.current > 0) { 
                            STATE.angle.sum += STATE.angle.current; 
                            STATE.angle.count++; 
                        }
                        if(STATE.angle.current > STATE.angle.max) STATE.angle.max = STATE.angle.current;
                        
                        UI.updateBars('angle', valPure);
                    }
                });
            },
            calibrateGyro: () => { 
                STATE.angle.offset = STATE.angle.smoothed || 0; 
                STATE.angle.max = 0; STATE.angle.sum = 0; STATE.angle.count = 0; 
            },
            initGPS: () => {
                navigator.geolocation.watchPosition(pos => {
                    STATE.gps.lat = pos.coords.latitude; STATE.gps.lon = pos.coords.longitude;
                    STATE.gps.speed = Math.round((pos.coords.speed || 0) * 3.6);
                    if (STATE.gps.speed > 2) { STATE.gps.sum += STATE.gps.speed; STATE.gps.count++; }
                    if(STATE.gps.speed > STATE.gps.max) STATE.gps.max = STATE.gps.speed;
                    UI.updateBars('speed', STATE.gps.speed);
                    
                    if(STATE.gpx.active && STATE.gps.lat) {
                        const pt = { lat: STATE.gps.lat, lon: STATE.gps.lon, ele: pos.coords.altitude || 0, time: new Date().toISOString() };
                        STATE.gpx.points.push(pt);
                        if(STATE.gpx.prev) STATE.gpx.distance += CORE.calcDist(STATE.gpx.prev.lat, STATE.gpx.prev.lon, pt.lat, pt.lon);
                        STATE.gpx.prev = pt;
                    }
                }, null, { enableHighAccuracy: true });
            },
            calcDist: (l1, n1, l2, n2) => {
                const R = 6371; const dLat = (l2-l1)*Math.PI/180; const dLon = (n2-n1)*Math.PI/180;
                const a = Math.sin(dLat/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dLon/2)**2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            },
            fetchStations: () => {
                if(!STATE.gps.lat) return alert("Signal GPS requis");
                fetch(`${CONFIG.apiStations}&geofilter.distance=${STATE.gps.lat},${STATE.gps.lon},${CONFIG.rayonRechercheKm * 1000}`)
                .then(r => r.json()).then(data => {
                    const f = CONFIG.carburantCible.toLowerCase() + '_prix';
                    STATE.stations = data.records.map(r => ({
                        nom: r.fields.nom || "Station", ville: r.fields.ville || "--", prix: r.fields[f], 
                        lat: r.geometry.coordinates[1], lon: r.geometry.coordinates[0],
                        dist: CORE.calcDist(STATE.gps.lat, STATE.gps.lon, r.geometry.coordinates[1], r.geometry.coordinates[0])
                    }));
                    UI.sortStations('prix');
                    document.getElementById('stations-labels').style.display = 'flex';
                });
            },
            toggleRecording: () => {
                // 1. Si on est en train d'enregistrer, on veut passer sur STOP
                if (STATE.gpx.active) {
                    STATE.gpx.active = false;
                    const btn = document.getElementById('btn-rec');
                    btn.innerText = "REC";
                    btn.style.background = "#222";

                    // 2. Vérification s'il y a des points enregistrés
                    if (STATE.gpx.points.length > 0) {
                        // Fenêtre de confirmation clinique
                        const saveConfirm = confirm(`Fin de parcours. Enregistrer la trace (${STATE.gpx.points.length} points) ?`);
                        
                        if (saveConfirm) {
                            CORE.saveGPX(); // On télécharge
                        } else {
                            console.log("Trace annulée par l'utilisateur");
                        }
                    }
                    
                    // 3. Reset de la mémoire dans tous les cas pour repartir à zéro
                    STATE.gpx.points = [];
                    STATE.gpx.distance = 0;
                    STATE.gpx.prev = null;

                } else {
                    // 4. Si on était sur STOP, on lance l'enregistrement
                    STATE.gpx.active = true;
                    STATE.gpx.points = []; // On s'assure que c'est vide au départ
                    const btn = document.getElementById('btn-rec');
                    btn.innerText = "STOP";
                    btn.style.background = "#f00";
                }
            },
           saveGPX: () => {
                if (STATE.gpx.points.length === 0) return;

                let xml = `<?xml version="1.1"?><gpx creator="KTM_Dash"><trk><trkseg>`;
                STATE.gpx.points.forEach(p => { 
                    xml += `<trkpt lat="${p.lat}" lon="${p.lon}"><ele>${p.ele}</ele><time>${p.time}</time></trkpt>`; 
                });
                xml += `</trkseg></trk></gpx>`;
                
                // Formatage du nom : REC_2026-05-11_10h30.gpx
                const now = new Date();
                const dateStr = now.toISOString().split('T')[0];
                const timeStr = now.getHours() + "h" + now.getMinutes();
                const fileName = `REC_${dateStr}_${timeStr}.gpx`;

                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([xml], {type: 'application/gpx+xml'}));
                a.download = fileName; 
                a.click();
                
                console.log(`Trace sauvegardée : ${fileName}`);
            }, 
            checkWeatherQueue: () => {
    // Si on n'a pas encore de position GPS, on ne fait rien
    if (!STATE.gps.lat) return;
    
    // Requête à l'API Open-Meteo (celle que tu as testée avec succès)
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${STATE.gps.lat}&longitude=${STATE.gps.lon}&current_weather=true`)
    .then(r => r.json()).then(d => {
        const cw = d.current_weather;
        const code = cw.weathercode;
        const dir = cw.winddirection; // C'est ici qu'on récupère les degrés du vent (ex: 301)
        
        // 1. Détermination de l'icône (Correction du bug "Flocon")
        let icon = "☀️"; // Par défaut
        if (code >= 1 && code <= 3) icon = "🌤️";
        if (code >= 45 && code <= 48) icon = "🌫️";
        if (code >= 51 && code <= 67) icon = "🌧️";
        if (code >= 71 && code <= 77) icon = "❄️";
        if (code >= 80 && code <= 82) icon = "🌦️"; // Ton code 80 s'affichera ici (Averses)
        if (code >= 95) icon = "⚡";

        // 2. Mise à jour de l'affichage (Température, Vent, Altitude)
        const tE = document.getElementById('weather-temp');
        const wE = document.getElementById('weather-wind');
        const iE = document.getElementById('wind-icon');
        const aE = document.getElementById('alt-val');

        if (tE) tE.innerText = `${icon} ${Math.round(cw.temperature)}°C`;
        if (wE) wE.innerText = `${Math.round(cw.windspeed)} km/h`;
        if (aE) aE.innerText = `⛰️ ${Math.round(d.elevation || 0)} m`;
        
        // 3. Rotation de la flèche de vent (Magie visuelle)
        // La flèche pointe dans la direction D'OÙ vient le vent
        if (iE) iE.style.transform = `rotate(${dir}deg)`;

        // 4. Gestion automatique du mode Jour/Nuit
        UI.setTheme(cw.is_day === 1);
        
        STATE.weatherInit = true;
    }).catch(e => {
        console.error("Diagnostic : Erreur de flux météo", e);
    });
},
            openDynamicWeather: () => { 
                if(STATE.gps.lat && STATE.gps.lon) {
                    const windyUrl = `https://www.windy.com/-Weather-radar-radar?radar,${STATE.gps.lat},${STATE.gps.lon},9`;
                    window.open(windyUrl, '_blank'); 
                } else {
                    window.open('https://www.windy.com/-Weather-radar-radar?radar,46.5,2.0,5', '_blank');
                }
            },
            loadExternalGPX: (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    STATE.currentGPXContent = e.target.result;
                    STATE.currentGPXName = file.name;
                    
                    document.getElementById('gpx-info').innerText = file.name.toUpperCase();
                    const btn = document.getElementById('btn-launch-nav');
                    btn.style.color = "var(--ktm-orange)";
                    btn.style.borderColor = "var(--ktm-orange)";
                    btn.disabled = false;
                };
                reader.readAsText(file);
            },

            launchNav: () => {
                if (!STATE.currentGPXContent) return;
                const blob = new Blob([STATE.currentGPXContent], {type: 'application/gpx+xml'});
                const fileURL = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = fileURL;
                a.download = STATE.currentGPXName;
                a.click();
            }
        };
const UI = {
    setRadarStatus: (isOk) => {
        const led = document.getElementById('led-radar');
        if (!led) return;
        if (isOk) {
            led.style.background = "#0f0"; // Vert quand ça capte
            led.style.boxShadow = "none";
        } else {
            led.style.background = "#f00"; // Rouge flash quand l'API est HS
            led.style.boxShadow = "0 0 8px #f00";
        }
    },
            syncConfig: () => {
                document.getElementById('cfg-fuel').value = CONFIG.carburantCible;
                document.getElementById('input-radius').value = CONFIG.rayonRechercheKm;
                document.getElementById('radius-val').innerText = CONFIG.rayonRechercheKm;
                document.getElementById('ui-info-fuel').innerText = CONFIG.carburantCible;
                document.getElementById('ui-info-radius').innerText = CONFIG.rayonRechercheKm;
            },
            update: () => {
                document.getElementById('speed-val').innerText = Math.round(STATE.gps.speed);
                document.getElementById('speed-max').innerText = Math.round(STATE.gps.max);
                document.getElementById('angle-val').innerText = Math.abs(Math.round(STATE.angle.current));
                document.getElementById('angle-max').innerText = Math.round(STATE.angle.max);
                document.getElementById('gpx-dist').innerText = `${STATE.gpx.distance.toFixed(1)} KM`;
                document.getElementById('speed-moy').innerText = STATE.gps.count > 0 ? Math.round(STATE.gps.sum / STATE.gps.count) : 0;
                document.getElementById('angle-moy').innerText = STATE.angle.count > 0 ? Math.round(STATE.angle.sum / STATE.angle.count) : 0;
                const radarStatusText = STATE.radarsCache.length > 0 ? `${STATE.radarsCache.length} en zone` : "0 détecté";
                document.getElementById('diag-radar').innerText = `Radar API : ${radarStatusText}`;
                document.getElementById('diag-meteo').innerText = `Météo : ${STATE.weatherInit ? 'OK' : '--'}`;
                document.getElementById('diag-gps').innerText = `GPS : ${STATE.gps.lat ? 'FIX' : '--'}`;
                document.getElementById('diag-light').innerText = `Lux : ${STATE.lux}`;
                UI.updateBars('speed', STATE.gps.speed);
                UI.updateBars('angle', STATE.angle.current);
            },
            updateBars: (type, val) => {
                if (type === 'speed') {
                    const p = (val / CONFIG.vitesseMaxGraph) * 100;
                    for(let i=1; i<=5; i++) {
                        const b = document.querySelector(`.b${i}`);
                        if(b) b.classList.toggle('active', p >= (i*20));
                    }
                } 
                else {
                    const absVal = Math.abs(val);
                    const a3 = document.querySelector('.a3');
                    if(a3) a3.classList.add('active');
                    const a2 = document.querySelector('.a2'); if(a2) a2.classList.toggle('active', val > 3 && absVal > CONFIG.angleSeuilPalier);
                    const a1 = document.querySelector('.a1'); if(a1) a1.classList.toggle('active', val > 3 && absVal > (CONFIG.angleSeuilPalier * 2));
                    const a4 = document.querySelector('.a4'); if(a4) a4.classList.toggle('active', val < -3 && absVal > CONFIG.angleSeuilPalier);
                    const a5 = document.querySelector('.a5'); if(a5) a5.classList.toggle('active', val < -3 && absVal > (CONFIG.angleSeuilPalier * 2));
                }
            },
            sortStations: (criteria) => {
                if (criteria === 'prix') { STATE.stations.sort((a,b) => (a.prix || 9) - (b.prix || 9)); }
                else { STATE.stations.sort((a,b) => a.dist - b.dist); }
                UI.renderStations();
            },
            renderStations: () => {
                const list = document.getElementById('stations-list');
                if(!list) return;
                list.innerHTML = STATE.stations.map(s => `
                    <div class="station-item">
                        <div class="st-header">
                            <div><div class="st-name">${s.nom}</div><div class="st-city">${s.ville}</div></div>
                            <div style="text-align:right">
                                <div class="st-price">${s.prix ? s.prix.toFixed(3)+'€' : 'N.C'}</div>
                                <div class="st-dist">${s.dist.toFixed(1)}km</div>
                            </div>
                        </div>
                        <div class="st-nav">
                            <button class="btn-nav" onclick="window.location.href='waze://?ll=${s.lat},${s.lon}&navigate=yes'">WAZE</button>
                            <button class="btn-nav" onclick="window.location.href='google.navigation:q=${s.lat},${s.lon}'">MAPS</button>
                            <button class="btn-nav" onclick="window.location.href='intent:geo:${s.lat},${s.lon}#Intent;package=net.osmand.plus;end;'">OSM+</button>
                        </div>
                    </div>`).join('');
            },
            fetchRadarsAPI: async () => {
    if (!STATE.gps.lat) return;
    try {
        // On demande spécifiquement le tag "maxspeed" en plus des coordonnées
        const query = `[out:json][timeout:15];node["highway"="speed_camera"](around:12000,${STATE.gps.lat},${STATE.gps.lon});out tags center;`;
        const url = `https://overpass.kumi.systems/api/interpreter?data=${encodeURIComponent(query)}`;
        
        const res = await fetch(url);
        if (!res.ok) throw new Error("Réseau instable");
        
        const data = await res.json();
        STATE.radarsCache = data.elements || [];
        
        // LED : Toujours Vert si on a fini la requête avec succès
        UI.setRadarStatus(true); 
    } catch (e) {
        console.log("Erreur API, passage en mode cache.");
        // Si on a encore des radars en mémoire, on passe en Orange (on simule par un style)
        if (STATE.radarsCache.length > 0) {
            document.getElementById('led-radar').style.background = "#FFA500"; // Orange
            document.getElementById('led-radar').style.boxShadow = "0 0 5px #FFA500";
        } else {
            UI.setRadarStatus(false); // Rouge : plus rien en mémoire
        }
    }   
},
            
            checkRadars: () => {
    if (!STATE.radarsInit && STATE.gps.lat) {
        STATE.radarsInit = true;
        UI.fetchRadarsAPI(); 
        setInterval(UI.fetchRadarsAPI, 120000); // Ping toutes les 2 minutes
    }

    if (!STATE.radarsCache || STATE.radarsCache.length === 0) return;

    const radius = CONFIG.radarRayonM; 
    let closestRadar = null;
    let minDeviceInfo = { dist: 999999 };
    
    STATE.radarsCache.forEach(node => {
        const d = CORE.calcDist(STATE.gps.lat, STATE.gps.lon, node.lat, node.lon) * 1000;
        if (d < minDeviceInfo.dist) {
            minDeviceInfo.dist = d;
            closestRadar = node;
        }
    });

    const alertBox = document.getElementById('radar-alert');
    const distSpan = document.getElementById('radar-dist');
    
    if (closestRadar && minDeviceInfo.dist <= radius) {
        // FILTRE VECTORIEL : On ne sonne que si on se rapproche
        const isApproaching = !STATE.lastRadarDist || minDeviceInfo.dist < (STATE.lastRadarDist - 2);
        
        if (isApproaching) {
            alertBox.style.display = 'block';
            distSpan.innerText = Math.round(minDeviceInfo.dist);
            
            // LOGIQUE VITESSE (Couleur Dynamique)
            const speedLimit = parseInt(closestRadar.tags.maxspeed) || 80; // 80 par défaut si inconnu
            const currentSpeed = STATE.gps.speed;

            if (currentSpeed > speedLimit) {
                // ROUGE CLIGNOTANT : Excès de vitesse
                alertBox.style.background = "linear-gradient(90deg, #ff0000 0%, #660000 50%, #ff0000 100%)";
                alertBox.style.opacity = (Date.now() % 400 < 200) ? "1" : "0.6";
                distSpan.innerHTML = `${Math.round(minDeviceInfo.dist)}m <span style="font-size:0.8em; color:yellow;">(LIMIT ${speedLimit})</span>`;
            } else {
                // VERT FIXE : Vitesse OK
                alertBox.style.background = "linear-gradient(90deg, #006400 0%, #00FF00 50%, #006400 100%)";
                alertBox.style.opacity = "1";
                distSpan.innerHTML = `${Math.round(minDeviceInfo.dist)}m <span style="font-size:0.8em; color:white;">OK</span>`;
            }
        } else {
            // On s'éloigne ou radar passé : on cache l'alerte
            alertBox.style.display = 'none';
        }
        STATE.lastRadarDist = minDeviceInfo.dist; 
    } else {
        alertBox.style.display = 'none';
        STATE.lastRadarDist = null;
    }
},
            updateRadius: v => { CONFIG.rayonRechercheKm = v; UI.syncConfig(); },
            openSettings: () => document.getElementById('settings-modal').style.display = 'flex',
            closeSettings: () => document.getElementById('settings-modal').style.display = 'none',
            saveSettings: () => { CONFIG.carburantCible = document.getElementById('cfg-fuel').value; UI.syncConfig(); },
            resetSpeed: () => { 
                STATE.gps.max = 0; STATE.gps.sum = 0; STATE.gps.count = 0; 
                document.getElementById('speed-max').innerText = 0;
                document.getElementById('speed-moy').innerText = 0;
            },
            manualToggleTheme: () => document.body.classList.toggle('day-mode'),
            setTheme: (isDay) => document.body.classList.toggle('day-mode', isDay)
        };
               //setInterval(UI.update, CONFIG.refreshRate); setInterval(UI.checkRadars, 10000);
        setInterval(UI.update, CONFIG.refreshRate); setInterval(UI.checkRadars, 500);
        document.getElementById('btn-unlock').style.display = 'block';
        // Bloque l'événement de "tirage" vers le bas au niveau tactile
window.addEventListener('touchstart', (e) => {
    if (e.touches.length > 1) return;
    this.lastY = e.touches[0].pageY;
}, { passive: false });

window.addEventListener('touchmove', (e) => {
    const y = e.touches[0].pageY;
    // Si on tire vers le bas alors qu'on est déjà en haut de page
    if (y > this.lastY && window.scrollY === 0) {
        e.preventDefault(); // On bloque l'action
    }
    this.lastY = y;
}, { passive: false });
    </script>
