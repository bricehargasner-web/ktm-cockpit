<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM COCKPIT V55 - TACTICAL</title>
    
    <script>
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records'
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        
        #portrait-blocker { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; color: #FF6600; }
        @media (orientation: portrait) { #portrait-blocker { display: flex; } }

        #map { position: absolute; width: 100%; height: 100%; z-index: 1; filter: brightness(0.7) contrast(1.1); }

        /* HUD CENTRAL */
        #hud-container { position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; z-index: 60; pointer-events: none; }
        #aim-sphere { position: absolute; width: 100%; height: 100%; border: 2px solid #2ecc71; border-radius: 50%; }
        #horizon-line { position: absolute; top: 50%; width: 140%; left: -20%; height: 2px; background: #FFF; box-shadow: 0 0 10px #FFF; transition: transform 0.1s linear; }

        /* VITESSE */
        #speed-block { position: absolute; bottom: 85px; left: 30px; z-index: 80; }
        #speed-val { font-family: 'Barlow Condensed'; font-size: 6rem; font-weight: 900; line-height: 0.8; color: #FFF; text-shadow: 0 0 20px #000; }

        /* TOP BAR */
        #top-ui { position: absolute; top: 10px; width: 96%; left: 2%; z-index: 100; display: flex; gap: 8px; }
        #search-input { flex-grow: 1; background: rgba(0,0,0,0.7); border: 1px solid #444; color: white; padding: 10px; border-radius: 4px; }
        .fuel-select { background: #111; color: #FF6600; border: 1px solid #FF6600; padding: 9px; border-radius: 4px; font-weight: bold; }
        .btn-ktm { background: #FF6600; color: #000; border: none; padding: 10px 15px; border-radius: 4px; font-weight: 900; cursor: pointer; }

        /* DASHBOARD */
        #dashboard { position: absolute; bottom: 0; width: 100%; z-index: 90; display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(0,0,0,0.85); border-top: 2px solid #FF6600; }
        .widget { padding: 8px; text-align: center; border-right: 1px solid rgba(255,255,255,0.1); position: relative; }
        .label { font-size: 0.55rem; color: #888; text-transform: uppercase; }
        .value { font-family: 'Barlow Condensed'; font-size: 1.8rem; font-weight: 900; }

        /* BOUSSOLE TACTIQUE */
        #compass-disk { width: 50px; height: 50px; border: 1px solid #FF6600; border-radius: 50%; margin: 0 auto; position: relative; transition: transform 0.2s linear; }
        #compass-arrow { position: absolute; top: -5px; left: 50%; transform: translateX(-50%); color: #FF6600; font-size: 10px; }
        #compass-val { font-size: 1rem; margin-top: 2px; }

        #btn-zero { position: absolute; bottom: 4px; right: 4px; background: #222; color: #666; font-size: 8px; padding: 3px; border: 1px solid #444; border-radius: 2px; }
    </style>
</head>
<body>

    <div id="portrait-blocker">
        <h1>KTM COCKPIT</h1>
        <p>BASCULEZ EN PAYSAGE</p>
    </div>

    <div id="top-ui">
        <input type="text" id="search-input" placeholder="DESTINATION...">
        <button class="btn-ktm" onclick="startNav()">NAV</button>
        <select id="fuel-type" class="fuel-select">
            <option value="Gazole">GAZOLE</option>
            <option value="SP95">SP95</option>
            <option value="SP98">SP98</option>
            <option value="E10">E10</option>
        </select>
        <button class="btn-ktm" onclick="findFuel()">⛽ SCAN</button>
    </div>

    <div id="hud-container">
        <div id="aim-sphere"></div>
        <div id="horizon-line"></div>
    </div>

    <div id="speed-block">
        <div id="speed-val">000</div>
        <div style="font-size:1rem; color:#FF6600; font-weight:900;">KM/H</div>
    </div>

    <div id="map"></div>

    <div id="dashboard">
        <div class="widget"><div class="label">Altitude</div><div id="alt" class="value">--</div></div>
        <div class="widget">
            <div class="label">Cap</div>
            <div id="compass-disk">
                <div id="compass-arrow">▼</div>
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:10px;" id="dir-txt">N</div>
            </div>
            <div id="compass-val">0°</div>
        </div>
        <div class="widget"><div class="label">Trip</div><div id="dist" class="value">0.0</div></div>
        <div class="widget">
            <div class="label">Angle</div>
            <div id="lean-val" class="value">0°</div>
            <button id="btn-zero" onclick="calibrate()">ZERO</button>
        </div>
    </div>

    <script>
        let map, userMarker, totalDist = 0, offset = 0, lastRaw = 0, smoothedLean = 0, lastCoord = null;
        let fuelLayer = L.layerGroup();

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([42.15, 9.1], 13);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(map);
            fuelLayer.addTo(map);
            userMarker = L.circleMarker([0,0], { radius: 8, color: '#fff', fillColor: CONFIG.KTM_ORANGE, fillOpacity: 1, weight: 2 }).addTo(map);
            
            window.addEventListener('deviceorientation', e => {
                let raw = e.beta; 
                lastRaw = raw;
                let currentLean = raw - offset;
                smoothedLean = (smoothedLean * 0.8) + (currentLean * 0.2);
                let angle = Math.abs(Math.round(smoothedLean));

                document.getElementById('horizon-line').style.transform = `rotate(${smoothedLean}deg)`;
                document.getElementById('lean-val').innerText = angle + "°";
                
                const sphere = document.getElementById('aim-sphere');
                if(angle < 25) sphere.style.borderColor = "#2ecc71";
                else if(angle < 45) sphere.style.borderColor = "#FF6600";
                else sphere.style.borderColor = "#ff4757";
            });

            navigator.geolocation.watchPosition(u => {
                const p = [u.coords.latitude, u.coords.longitude];
                userMarker.setLatLng(p);
                map.panTo(p);

                if (u.coords.heading !== null) {
                    const h = Math.round(u.coords.heading);
                    document.getElementById('compass-val').innerText = h + "°";
                    document.getElementById('compass-disk').style.transform = `rotate(${-h}deg)`;
                    const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
                    document.getElementById('dir-txt').innerText = dirs[Math.round(h / 45) % 8];
                }

                document.getElementById('speed-val').innerText = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0).toString().padStart(3, '0');
                if (u.coords.altitude) document.getElementById('alt').innerText = Math.round(u.coords.altitude) + "m";
                if (lastCoord) totalDist += map.distance(lastCoord, p) / 1000;
                lastCoord = p;
                document.getElementById('dist').innerText = totalDist.toFixed(1);
            }, null, { enableHighAccuracy: true });
        }

        async function findFuel() {
            const c = map.getCenter();
            const fuel = document.getElementById('fuel-type').value;
            const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${c.lng} ${c.lat})', 30000)&limit=50`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                fuelLayer.clearLayers();
                
                data.results.forEach(st => {
                    let price = "N/A";
                    if (st.prix) {
                        try {
                            const pData = JSON.parse(st.prix);
                            const found = pData.find(f => f["@nom"] === fuel);
                            if (found) price = parseFloat(found["@valeur"]).toFixed(2);
                        } catch(e) { }
                    }

                    if (price !== "N/A") {
                        L.marker([st.geom.lat, st.geom.lon], {
                            icon: L.divIcon({ 
                                html: `<div style="background:#FF6600; color:white; padding:2px 5px; border:1px solid white; font-weight:bold; font-size:11px; border-radius:3px;">${price}</div>`,
                                iconSize: [40, 20]
                            })
                        }).addTo(fuelLayer);
                    }
                });
            } catch(e) { alert("Erreur Scan"); }
        }

        function startNav() {
            const dest = document.getElementById('search-input').value;
            if (dest) window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(dest)}&travelmode=driving`, '_blank');
        }

        function calibrate() { offset = lastRaw; }
        window.onload = init;
    </script>
</body>
</html>
