<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM HUD V64 - OSM NAVIGATION</title>
    
    <script>
        /* --- PANNEAU DE CONTRÔLE ENERGY CONCEPT (BRICE CARDONA) --- */
        const CONFIG = {
            USER: "Brice CARDONA",
            KTM_ORANGE: '#FF6600',
            SAFE_GREEN: '#2ecc71',
            DANGER_RED: '#ff4757',
            SCAN_RADIUS: 30000, 
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records',
            // STYLE OSMAND (OpenStreetMap Standard)
            MAP_STYLE: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        #map { position: absolute; width: 100%; height: 100%; z-index: 1; filter: brightness(0.5) contrast(1.2) saturate(0.8); }
        
        /* BLOQUEUR PAYSAGE */
        #portrait-blocker { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; color: #FF6600; text-align: center; }
        @media (orientation: portrait) { #portrait-blocker { display: flex; } }

        /* LISTE DES STATIONS */
        #fuel-list-panel {
            position: absolute; top: 70px; right: 10px; width: 280px; max-height: 60%;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px);
            border-left: 3px solid #FF6600; z-index: 300; display: none; overflow-y: auto;
        }
        .fuel-item { padding: 12px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .fuel-name { font-size: 0.65rem; color: #aaa; text-transform: uppercase; }
        .fuel-price { font-family: 'Barlow Condensed'; font-size: 1.6rem; color: #FFF; font-weight: 900; }
        .fuel-dist { font-size: 0.8rem; color: #FF6600; }
        .btn-go { background: #FF6600; color: #000; border: none; padding: 10px 15px; border-radius: 4px; font-weight: 900; cursor: pointer; }

        /* HUD */
        #hud-container { position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%); width: 320px; height: 320px; z-index: 60; pointer-events: none; }
        #aim-circle { position: absolute; width: 100%; height: 100%; border: 4px solid #2ecc71; border-radius: 50%; }
        #horizon-line { position: absolute; top: 50%; width: 150%; left: -25%; height: 2px; background: #FFF; box-shadow: 0 0 15px #FFF; }

        /* VITESSE */
        #speed-block { position: absolute; bottom: 95px; left: 30px; z-index: 80; }
        #speed-val { font-family: 'Barlow Condensed'; font-size: 7rem; font-weight: 900; line-height: 0.8; }

        /* UI CONTROLS */
        #top-ui { position: absolute; top: 10px; width: 96%; left: 2%; z-index: 400; display: flex; gap: 10px; }
        .btn-ktm { background: #FF6600; color: #000; border: none; padding: 12px; font-weight: 900; cursor: pointer; border-radius: 4px; }

        #dashboard { position: absolute; bottom: 0; width: 100%; z-index: 90; display: grid; grid-template-columns: repeat(4, 1fr); background: #000; border-top: 2px solid #FF6600; height: 85px; }
        .widget { text-align: center; border-right: 1px solid #222; display: flex; flex-direction: column; justify-content: center; }
        .value { font-family: 'Barlow Condensed'; font-size: 2.2rem; font-weight: 900; }
        .fuel-marker { background: #FF6600; color: white; padding: 3px 6px; border: 1px solid white; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="portrait-blocker"><h1>KTM HUD</h1><p>BASCULEZ EN PAYSAGE</p></div>

    <div id="top-ui">
        <select id="fuel-type" style="flex-grow:1; background:#111; color:#FF6600; border:1px solid #FF6600; padding:10px; border-radius:4px; font-weight:bold;">
            <option value="gazole_prix">GAZOLE</option>
            <option value="sp95_prix">SP95</option>
            <option value="e10_prix">E10</option>
            <option value="sp98_prix">SP98</option>
        </select>
        <button class="btn-ktm" onclick="findFuel()">⛽ SCAN STATIONS</button>
    </div>

    <div id="fuel-list-panel"></div>

    <div id="hud-container"><div id="aim-circle"></div><div id="horizon-line"></div></div>

    <div id="speed-block">
        <div id="speed-val">000</div>
        <div style="color:#FF6600; font-weight:900;">KM/H</div>
    </div>

    <div id="map"></div>

    <div id="dashboard">
        <div class="widget"><div id="alt" class="value">--</div><div style="font-size:0.6rem">ALT (M)</div></div>
        <div class="widget"><div id="dist" class="value">0.0</div><div style="font-size:0.6rem">TRIP (KM)</div></div>
        <div class="widget"><div id="cap" class="value" style="font-size: 1.5rem;">---</div><div style="font-size:0.6rem">CAP</div></div>
        <div class="widget" style="background:#111">
            <div id="lean-val" class="value" style="font-size:3.5rem">0°</div>
            <button onclick="calibrate()" style="font-size:8px; background:#333; color:white; border:none;">ZERO</button>
        </div>
    </div>

    <script>
        let map, userMarker, fuelLayer, totalDist = 0, offset = 0, lastRaw = 0, smoothedLean = 0, lastCoord = null;

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.6, 1.9], 13);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(map);
            fuelLayer = L.layerGroup().addTo(map);
            userMarker = L.circleMarker([0,0], { radius: 8, color: '#fff', fillColor: CONFIG.KTM_ORANGE, fillOpacity: 1, weight: 3 }).addTo(map);

            window.addEventListener('deviceorientation', handleOrientation);
            startTracking();
        }

        function handleOrientation(e) {
            let screenAngle = window.orientation || 0;
            let raw = (Math.abs(screenAngle) === 90) ? e.beta : e.gamma;
            if (screenAngle === -90) raw = -raw;
            lastRaw = raw;
            let currentLean = raw - offset;
            smoothedLean = (smoothedLean * 0.8) + (currentLean * 0.2);
            let angle = Math.abs(Math.round(smoothedLean));

            document.getElementById('horizon-line').style.transform = `translateY(-50%) rotate(${smoothedLean}deg)`;
            const val = document.getElementById('lean-val');
            val.innerText = angle + "°";
            
            if (angle < 20) val.style.color = CONFIG.SAFE_GREEN;
            else if (angle < 42) val.style.color = CONFIG.KTM_ORANGE;
            else val.style.color = CONFIG.DANGER_RED;
        }

        function startTracking() {
            navigator.geolocation.watchPosition(u => {
                const p = [u.coords.latitude, u.coords.longitude];
                userMarker.setLatLng(p);
                map.panTo(p);

                document.getElementById('speed-val').innerText = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0).toString().padStart(3, '0');
                if (u.coords.altitude) document.getElementById('alt').innerText = Math.round(u.coords.altitude);
                
                if (lastCoord) totalDist += map.distance(lastCoord, p) / 1000;
                lastCoord = p;
                document.getElementById('dist').innerText = totalDist.toFixed(1);
            }, null, { enableHighAccuracy: true });
        }

        async function findFuel() {
            const center = map.getCenter();
            const fuelType = document.getElementById('fuel-type').value;
            const panel = document.getElementById('fuel-list-panel');
            const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${center.lng} ${center.lat})', ${CONFIG.SCAN_RADIUS}m)&limit=40`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                fuelLayer.clearLayers();
                panel.innerHTML = "";
                panel.style.display = "block";

                if (data.results) {
                    let stations = data.results.map(st => {
                        let price = st[fuelType];
                        const d = (map.distance([center.lat, center.lng], [st.geom.lat, st.geom.lon]) / 1000).toFixed(1);
                        return { ...st, price, distance: d };
                    }).filter(st => st.price).sort((a,b) => a.price - b.price);

                    stations.slice(0, 8).forEach(st => {
                        L.marker([st.geom.lat, st.geom.lon], {
                            icon: L.divIcon({ html: `<div class="fuel-marker">${st.price.toFixed(2)}</div>`, iconSize: [45, 20] })
                        }).addTo(fuelLayer);

                        const item = document.createElement('div');
                        item.className = 'fuel-item';
                        item.innerHTML = `
                            <div>
                                <div class="fuel-name">${(st.nom || st.adresse).substring(0, 20)}</div>
                                <div class="fuel-price">${st.price.toFixed(2)}€ <span class="fuel-dist">${st.distance}km</span></div>
                            </div>
                            <button class="btn-go" onclick="navigate(${st.geom.lat}, ${st.geom.lon})">GO</button>
                        `;
                        panel.appendChild(item);
                    });
                }
            } catch(e) { console.error(e); }
        }

        function navigate(lat, lon) {
            // Déclenche l'application OsmAnd ou le sélecteur GPS du téléphone
            window.location.href = `geo:${lat},${lon}?q=${lat},${lon}`;
        }

        function calibrate() { offset = lastRaw; }
        window.onload = init;
    </script>
</body>
</html>
