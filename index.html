<!DOCTYPE html>
<html lang="fr">
<!-- 1. CONFIGURATION (LIGNES 1-45) -->
<script>
    const CONFIG = {
        version: "22.24-Graulhet-D83",          
        carburantCible: 'SP98',          
        rayonRadarM: 100, // Seuil d'alerte ajustable           
        refreshRate: 300,                
        apiStations: 'https://data.economie.gouv.fr/api/records/1.0/search/?dataset=prix-des-carburants-en-france-flux-instantane-v2'
    };

    // BASE DE DONNÉES RADARS : INCLUANT VOTRE POINT PRÉCIS
    const RADARS_DATA = [
        {lat: 43.767694, lon: 2.042111, type: "Fixe 50 - Graulhet D83"}, // Coordonnées 43°46'03.7"N 2°02'31.6"E
        {lat: 43.7210, lon: 1.8315, type: "Fixe 80 - Briatexte"},
        {lat: 43.7915, lon: 1.9842, type: "Fixe 80 - Gaillac"},
        {lat: 43.9215, lon: 2.1147, type: "Fixe 90 - Albi"}
    ];
</script>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM Dash - Test Local</title>
    <style>
        :root { --bg-color: #000; --panel-bg: #111; --ktm-orange: #FF6600; --text-main: #fff; --danger: #ff0000; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 10px; font-family: sans-serif; margin: 0; }
        #radar-alert { display: none; background: var(--danger); color: #fff; padding: 25px; text-align: center; font-family: 'Impact', sans-serif; font-size: 1.8rem; border: 4px solid #fff; margin-bottom: 15px; animation: blink 0.6s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
        .panel { background: var(--panel-bg); border-top: 2px solid var(--ktm-orange); padding: 15px; margin-bottom: 10px; border-radius: 4px; }
        .val-main { font-size: 4rem; font-family: 'Impact'; display: block; text-align: right; }
        #btn-start { width: 100%; padding: 25px; background: var(--ktm-orange); border: none; font-family: 'Impact'; font-size: 1.5rem; cursor: pointer; color: #000; }
        #settings-modal { display: none; position: fixed; inset: 0; background: #000; z-index: 100; padding: 20px; flex-direction: column; }
        .cfg-row { border: 1px solid var(--ktm-orange); padding: 15px; margin-top: 10px; }
        select { width: 100%; padding: 15px; background: #222; color: #fff; border: 1px solid #444; margin-top: 10px; font-size: 1.1rem; }
    </style>
</head>

<body>
    <div id="start-screen" style="display: flex; height: 90vh; align-items: center;">
        <button id="btn-start" onclick="CORE.start()">VÉRIFIER RADAR LOCAL</button>
    </div>

    <div id="dashboard" style="display: none;">
        <div id="radar-alert">⚠ <span id="radar-type">RADAR</span><br><span id="radar-dist-val">0</span> m</div>
        
        <div class="panel">
            <span style="color:var(--ktm-orange); font-weight:bold; font-size:0.8rem;">VITESSE GPS</span>
            <span id="speed-val" class="val-main">0</span>
        </div>

        <div class="panel" onclick="UI.openSettings()" style="cursor:pointer;">
            <span style="color:var(--ktm-orange); font-weight:bold; font-size:0.8rem;">RÉGLAGES TEST 🔧</span>
            <div id="diag-pos" style="font-family: monospace; font-size: 0.8rem; margin-top: 10px; color: #0f0;">ATTENTE SIGNAL...</div>
        </div>
    </div>

    <div id="settings-modal">
        <button onclick="UI.closeSettings()" style="padding: 15px; background: var(--ktm-orange); border:none; font-weight:bold; width: 100%; color:#000;">RETOUR</button>
        <div class="cfg-row">
            <label style="color:var(--ktm-orange); font-weight:bold;">RAYON DE DÉTECTION (TEST)</label>
            <select id="cfg-radar-dist" onchange="UI.saveSettings()">
                <option value="100">100 mètres</option>
                <option value="500">500 mètres</option>
                <option value="2000">2 000 mètres (2 km)</option>
                <option value="10000" selected>10 000 mètres (10 km)</option>
            </select>
        </div>
        <p style="color:#888; font-size:0.7rem; margin-top:10px;">Le radar D83 de Graulhet est configuré. Si vous êtes en ville, il doit apparaître en mode 10km.</p>
    </div>

    <script>
        const STATE = { gps: { lat: null, lon: null, speed: 0 }, radar: null };

        const CORE = {
            start: () => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                CORE.initGPS();
            },
            initGPS: () => {
                navigator.geolocation.watchPosition(pos => {
                    STATE.gps.lat = pos.coords.latitude;
                    STATE.gps.lon = pos.coords.longitude;
                    STATE.gps.speed = Math.round((pos.coords.speed || 0) * 3.6);
                    CORE.checkRadars();
                }, null, { enableHighAccuracy: true });
            },
            checkRadars: () => {
                if (!STATE.gps.lat) return;
                let proche = null;
                let dMini = CONFIG.rayonRadarM / 1000;

                RADARS_DATA.forEach(r => {
                    const d = CORE.calcDist(STATE.gps.lat, STATE.gps.lon, r.lat, r.lon);
                    if (d < dMini) {
                        dMini = d;
                        proche = { ...r, distM: Math.round(d * 1000) };
                    }
                });
                STATE.radar = proche;
            },
            calcDist: (l1, n1, l2, n2) => {
                const R = 6371;
                const dLat = (l2-l1)*Math.PI/180;
                const dLon = (n2-n1)*Math.PI/180;
                const a = Math.sin(dLat/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dLon/2)**2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            }
        };

        const UI = {
            update: () => {
                document.getElementById('speed-val').innerText = STATE.gps.speed;
                const alert = document.getElementById('radar-alert');
                if (STATE.radar) {
                    alert.style.display = 'block';
                    document.getElementById('radar-type').innerText = STATE.radar.type;
                    document.getElementById('radar-dist-val').innerText = STATE.radar.distM;
                } else {
                    alert.style.display = 'none';
                }
                document.getElementById('diag-pos').innerText = STATE.gps.lat ? "LAT: " + STATE.gps.lat.toFixed(5) + " | LON: " + STATE.gps.lon.toFixed(5) : "GPS: RECHERCHE...";
            },
            openSettings: () => document.getElementById('settings-modal').style.display = 'flex',
            closeSettings: () => document.getElementById('settings-modal').style.display = 'none',
            saveSettings: () => {
                CONFIG.rayonRadarM = parseInt(document.getElementById('cfg-radar-dist').value);
                CORE.checkRadars();
            }
        };
        setInterval(UI.update, CONFIG.refreshRate);
        UI.saveSettings();
    </script>
</body>
</html>
