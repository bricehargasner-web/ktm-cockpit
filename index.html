<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LABO TEST - ENERGY CONCEPT</title>
    <style>
        body { font-family: monospace; background: #eee; padding: 10px; font-size: 12px; }
        .tiroir { background: white; border: 2px solid #333; margin-bottom: 10px; padding: 10px; }
        .label { font-weight: bold; color: #FF6600; text-decoration: underline; }
        .data { background: #000; color: #0f0; padding: 5px; margin: 5px 0; }
        .error { color: white; background: red; padding: 5px; font-weight: bold; }
        button { padding: 10px; margin: 5px 0; width: 100%; cursor: pointer; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
    </style>
</head>
<body>

    <h2>🛠 LABO DE VALIDATION TECHNIQUE</h2>

    <div class="tiroir">
        <span class="label">[CORE-SYSTEM]</span>
        <div id="orientation-status">Vérification orientation...</div>
        <div id="gps-status" class="data">GPS : Recherche...</div>
        <button onclick="requestPermissions()">1. ACTIVER TOUS LES CAPTEURS</button>
    </div>

    <div class="tiroir">
        <span class="label">[MOTO-SENSORS]</span>
        <div>Vitesse : <span id="val-speed" class="data">0</span> km/h</div>
        <div>Altitude : <span id="val-alt" class="data">--</span> m</div>
        <div style="margin-top:10px;">
            Angle (Tranche Gauche) : <span id="val-angle" class="data">0</span>°
            <br>Max Session : <span id="val-angle-max">0</span>°
            <button onclick="resetAngle()" style="background:#ddd; width:auto; padding:2px 10px;">ZÉRO ANGLE</button>
        </div>
    </div>

    <div class="tiroir">
        <span class="label">[FUEL-API]</span>
        <select id="fuel-choice">
            <option value="Gazole">Gazole</option>
            <option value="SP95">SP95</option>
            <option value="SP98">SP98</option>
            <option value="E10">E10</option>
            <option value="E85">E85</option>
        </select>
         Rayon : <input type="range" id="fuel-radius" min="1" max="20" value="10" oninput="this.nextElementSibling.value = this.value + 'km'"> <output>10km</output>
        <button onclick="testFuelAPI()" style="background:#28a745; color:white;">TESTER RECHERCHE STATIONS</button>
        <div id="fuel-results" style="max-height:150px; overflow-y:auto; font-size:10px;"></div>
    </div>

    <div class="tiroir">
        <span class="label">[GPX-REC]</span>
        <div id="rec-status" class="data">Enregistrement : OFF</div>
        <button id="btn-rec" onclick="toggleREC()" style="background:red; color:white;">DÉMARRER REC ("C'est parti")</button>
    </div>

    <div class="tiroir">
        <span class="label">[WEATHER]</span>
        <div id="weather-data">--°C / Vent: --km/h</div>
        <button onclick="testWeather()">TESTER MÉTÉO</button>
    </div>

    <script>
        let isRecording = false;
        let gpxLogs = [];
        let angleZero = 0;
        let maxAngle = 0;
        let coords = { lat: null, lon: null };

        // [MOTO-SENSORS] Logique Tranche Gauche
        function handleOrientation(e) {
            // En paysage, tranche gauche en haut, l'inclinaison est gérée par e.beta
            let raw = e.beta; 
            let currentAngle = Math.abs(raw - angleZero);
            currentAngle = Math.min(60, Math.round(currentAngle));
            
            document.getElementById('val-angle').innerText = currentAngle;
            if(currentAngle > maxAngle) {
                maxAngle = currentAngle;
                document.getElementById('val-angle-max').innerText = maxAngle;
            }
            window.lastRaw = raw;
        }

        function resetAngle() { angleZero = window.lastRaw || 0; maxAngle = 0; }

        function requestPermissions() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => {
                    if(s === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                });
            } else { window.addEventListener('deviceorientation', handleOrientation); }
            
            navigator.geolocation.watchPosition(p => {
                coords.lat = p.coords.latitude;
                coords.lon = p.coords.longitude;
                document.getElementById('gps-status').innerText = `GPS OK: ${coords.lat.toFixed(4)}, ${coords.lon.toFixed(4)}`;
                document.getElementById('val-speed').innerText = Math.round(p.coords.speed * 3.6) || 0;
                document.getElementById('val-alt').innerText = Math.round(p.coords.altitude) || "--";
                
                if(isRecording) {
                    gpxLogs.push({ t: new Date().toISOString(), lat: coords.lat, lon: coords.lon, s: Math.round(p.coords.speed*3.6), a: Math.round(p.coords.altitude) });
                }
            }, e => console.error(e), { enableHighAccuracy: true });
        }

        // [FUEL-API] Correction 404 (Utilisation API Explore V2.1 stable)
        async function testFuelAPI() {
            const list = document.getElementById('fuel-results');
            const fuel = document.getElementById('fuel-choice').value.toLowerCase() + "_prix";
            const rad = document.getElementById('fuel-radius').value;
            list.innerHTML = "Recherche...";

            if(!coords.lat) return list.innerHTML = "<span class='error'>GPS REQUIS</span>";

            const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-carburants-fichier-instantane-test-public-copy/records?where=within_distance(geom%2C%20geom'POINT(${coords.lon}%20${coords.lat})'%2C%20${rad}km)&limit=20`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                const items = data.results || [];
                
                list.innerHTML = items.map(s => `
                    <div style="border-bottom:1px solid #ccc">
                        ${s.ville.toUpperCase()} : ${s[fuel] ? s[fuel]+"€" : "<b style='color:red'>N.C</b>"}
                    </div>
                `).join('');
            } catch(e) { list.innerHTML = "<span class='error'>ERREUR API (Vérifiez Internet)</span>"; }
        }

        function toggleREC() {
            isRecording = !isRecording;
            const btn = document.getElementById('btn-rec');
            if(isRecording) {
                gpxLogs = [];
                alert("C'est parti !");
                btn.innerText = "ARRÊTER ET ENREGISTRER";
                document.getElementById('rec-status').innerText = "Enregistrement : ON";
            } else {
                alert("Fin du trajet. " + gpxLogs.length + " points enregistrés.");
                btn.innerText = "DÉMARRER REC";
                document.getElementById('rec-status').innerText = "Enregistrement : OFF";
                console.log("Données GPX :", gpxLogs);
            }
        }

        function testWeather() {
            if(!coords.lat) return alert("GPS REQUIS");
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&current_weather=true`)
                .then(r => r.json()).then(d => {
                    document.getElementById('weather-data').innerText = `${d.current_weather.temperature}°C / Vent: ${d.current_weather.windspeed}km/h`;
                });
        }
    </script>
</body>
</html>
