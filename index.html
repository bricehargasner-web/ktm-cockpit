<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ENERGY CONCEPT - KTM RACING HUD</title>
    
    <script>
        /* ============================================================
           PANNEAU DE CONTRÔLE (MODIFIABLE)
           ============================================================ */
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            DANGER_RED: '#FF0000',
            DEFAULT_ZOOM: 16,            // Zoom plus proche pour la moto
            SCAN_RADIUS_KM: 10,          // Réglage par défaut (5 à 50)
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records',
            ROUTING_API: 'https://router.project-osrm.org/route/v1/driving/',
            WEATHER_MS: 900000
        };
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --ktm: #FF6600; --bg: rgba(0,0,0,0.85); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: white; font-family: 'Saira Condensed', sans-serif; overflow: hidden; }
        
        #map { position: fixed; inset: 0; z-index: 1; }

        /* MOUCHARD & TBT DÉPLACÉS EN HAUT À GAUCHE */
        #tech-snitch { position: fixed; top: 10px; left: 10px; z-index: 2000; color: var(--ktm); font-size: 0.8rem; background: var(--bg); padding: 5px 10px; border-radius: 4px; border-left: 3px solid var(--ktm); pointer-events: none; }
        #tbt-hud { position: fixed; top: 50px; left: 10px; z-index: 2000; background: var(--bg); border: 2px solid var(--ktm); padding: 10px; border-radius: 8px; display: none; align-items: center; gap: 10px; min-width: 120px; }
        #tbt-icon { font-size: 2rem; color: var(--ktm); }
        #tbt-dist { font-size: 1.5rem; font-weight: 900; }

        /* CONTRÔLES CARTE (CADENAS / ZOOM) */
        .map-ctrl { position: fixed; right: 15px; top: 80px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
        .ctrl-btn { width: 55px; height: 55px; background: var(--bg); border: 2px solid var(--ktm); color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; }
        .ctrl-btn.active { background: var(--ktm); color: black; }

        /* TIROIR À GAUCHE - TAILLE ADAPTÉE AU PAYSAGE */
        #mission-drawer { position: fixed; top: 0; left: 0; width: 320px; height: 100%; background: #050505; border-right: 2px solid var(--ktm); z-index: 3000; transition: transform 0.3s; transform: translateX(-100%); }
        #mission-drawer.open { transform: translateX(0); }
        #ui-trigger { position: fixed; top: 10px; right: 15px; z-index: 3100; padding: 15px; background: var(--ktm); border-radius: 8px; cursor: pointer; }
        
        /* CONTENU TIROIR */
        .pane { padding: 20px; display: none; height: 80vh; overflow-y: auto; }
        .pane.active { display: block; }
        .tab-nav { display: flex; background: #111; padding-top: 60px; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: transparent; fill: #666; cursor: pointer; }
        .tab-btn.active { fill: var(--ktm); border-bottom: 3px solid var(--ktm); }

        /* INPUTS GÉANTS POUR GANTS */
        input, select, .big-btn { width: 100%; padding: 18px; margin-bottom: 15px; background: #222; border: 1px solid #444; color: white; font-family: inherit; font-size: 1.2rem; border-radius: 8px; box-sizing: border-box; }
        .big-btn { background: var(--ktm); color: black; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; }

        /* WIDGETS FLOTTANTS */
        .widget-float { position: fixed; bottom: 12vh; z-index: 1000; pointer-events: none; }
        #angle-box { left: 20px; color: var(--ktm); }
        #speed-box { right: 20px; color: var(--ktm); text-align: right; }
        .num-big { font-size: 5rem; font-weight: 900; line-height: 0.8; }

        /* DASHBOARD BAS */
        #dash-bottom { position: fixed; bottom: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.95); border-top: 2px solid var(--ktm); display: grid; grid-template-columns: repeat(5, 1fr); z-index: 2500; }
        .dash-item { border-right: 1px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.8rem; }
        .dash-val { font-size: 1.2rem; font-weight: 900; color: #fff; }

        /* HUD CENTRAL COMPAS */
        #compass-hud { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 70vmin; height: 70vmin; pointer-events: none; z-index: 100; }
        #horizon { position: absolute; top: 50%; width: 100%; height: 2px; background: var(--ktm); box-shadow: 0 0 10px var(--ktm); }
        
        /* LISTE STATIONS */
        .station-card { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid var(--ktm); }
        .st-row { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div id="tech-snitch">> KTM READY</div>
    
    <div id="tbt-hud">
        <div id="tbt-icon">⬆️</div>
        <div id="tbt-dist">---</div>
    </div>

    <div id="ui-trigger" onclick="APP.toggleDrawer()">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="black"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </div>

    <div class="map-ctrl">
        <div id="lock-btn" class="ctrl-btn active" onclick="APP.toggleLock()" title="Verrouiller sur position">🔒</div>
        <div class="ctrl-btn" onclick="APP.map.zoomIn()">+</div>
        <div class="ctrl-btn" onclick="APP.map.zoomOut()">-</div>
    </div>

    <div id="compass-hud">
        <div id="horizon"></div>
        <svg viewBox="0 0 200 200" style="width:100%; height:100%;">
            <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(255,102,0,0.2)" stroke-width="1"/>
            <g id="compass-ticks"></g>
        </svg>
    </div>

    <div id="angle-box" class="widget-float">
        <div class="num-big"><span id="val-angle">0</span>°</div>
        <button class="big-btn" style="padding:5px 10px; width:auto;" onclick="APP.resetGyro()">ZERO</button>
    </div>

    <div id="speed-box" class="widget-float">
        <div class="num-big" id="val-speed">000</div>
        <div style="font-weight:900; letter-spacing:3px;">KM/H</div>
    </div>

    <div id="mission-drawer">
        <div class="tab-nav">
            <button class="tab-btn active" onclick="APP.showPane('p-radar', this)"><svg viewBox="0 0 24 24" width="30"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 8 13 8 13s8-7.75 8-13c0-3.87-3.13-7-7-7z"/></svg></button>
            <button class="tab-btn" onclick="APP.showPane('p-search', this)"><svg viewBox="0 0 24 24" width="30"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5z"/></svg></button>
            <button class="tab-btn" onclick="APP.showPane('p-settings', this)"><svg viewBox="0 0 24 24" width="30"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65z"/></svg></button>
        </div>

        <div id="p-radar" class="pane active">
            <h3>RADAR FUEL</h3>
            <select id="fuel-type"><option value="gazole_prix">GAZOLE</option><option value="sp95_prix">SP95</option><option value="sp98_prix">SP98</option><option value="e10_prix">E10</option></select>
            <button class="big-btn" onclick="APP.scanFuel()">SCANNER PROXIMITÉ</button>
            <div id="station-list"></div>
        </div>

        <div id="p-search" class="pane">
            <h3>DESTINATION</h3>
            <input type="text" id="city-in" placeholder="Ex: Albi, Castres...">
            <button class="big-btn" onclick="APP.searchCity()">LANCER GUIDAGE</button>
            <button class="big-btn" style="background:#444;" onclick="APP.clearNav()">STOP NAVIGATION</button>
        </div>

        <div id="p-settings" class="pane">
            <h3>RÉGLAGES KTM</h3>
            <label>DISTANCE DE RECHERCHE (KM)</label>
            <input type="range" min="5" max="50" value="10" oninput="APP.updateScanRange(this.value)">
            <div id="range-val" style="text-align:center; font-size:2rem; color:var(--ktm);">10 KM</div>
            
            <label style="margin-top:20px; display:block;">ZOOM NAVIGATION</label>
            <input type="range" min="12" max="18" value="16" oninput="APP.updateNavZoom(this.value)">
            <div id="nav-zoom-val" style="text-align:center; font-size:2rem; color:var(--ktm);">16</div>
        </div>
    </div>

    <div id="dash-bottom">
        <div class="dash-item" onclick="APP.toggleRec()"><div id="rec-status">⚪ REC</div></div>
        <div class="dash-item"><div class="dash-val" id="alt-val">---</div><div>ALT</div></div>
        <div class="dash-item"><div class="dash-val" id="azi-val">0°</div><div>AZI</div></div>
        <div class="dash-item"><div class="dash-val" id="weather-val">--°</div><div id="weather-loc">...</div></div>
        <div class="dash-item" onclick="APP.recenter()"><div class="dash-val">🎯</div></div>
    </div>

    <script>
        const APP = {
            map: null, userMarker: null, isLocked: true, scanRange: 10000, navZoom: 16,
            lastLat: 43.76, lastLng: 1.99, isRecording: false, track: [], offset: 0, lastRaw: 0,
            
            init: function() {
                this.map = L.map('map', { zoomControl: false, attributionControl: false })
                          .setView([this.lastLat, this.lastLng], CONFIG.DEFAULT_ZOOM);
                
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(this.map);
                this.fuelLayer = L.layerGroup().addTo(this.map);
                this.userMarker = L.circleMarker([0,0], {radius: 10, color: '#fff', fillColor: CONFIG.KTM_ORANGE, fillOpacity: 1}).addTo(this.map);
                
                this.startSensors();
                this.drawTicks();
            },

            updateSnitch: function(m) { document.getElementById('tech-snitch').innerText = '> ' + m; },
            
            toggleLock: function() { 
                this.isLocked = !this.isLocked;
                document.getElementById('lock-btn').classList.toggle('active', this.isLocked);
                this.updateSnitch(this.isLocked ? "CARTE VERROUILLÉE" : "EXPLORATION LIBRE");
            },

            updateScanRange: function(v) { this.scanRange = v * 1000; document.getElementById('range-val').innerText = v + " KM"; },
            updateNavZoom: function(v) { this.navZoom = parseInt(v); document.getElementById('nav-zoom-val').innerText = v; },

            startSensors: function() {
                navigator.geolocation.watchPosition(u => {
                    this.lastLat = u.coords.latitude; this.lastLng = u.coords.longitude;
                    const p = [this.lastLat, this.lastLng];
                    this.userMarker.setLatLng(p);
                    
                    if(this.isLocked) {
                        this.map.setView(p, this.navZoom, { animate: true });
                    }

                    document.getElementById('val-speed').innerText = u.coords.speed ? Math.round(u.coords.speed * 3.6).toString().padStart(3, '0') : "000";
                    document.getElementById('alt-val').innerText = Math.round(u.coords.altitude || 0) + 'm';
                    if(u.coords.heading) document.getElementById('azi-val').innerText = Math.round(u.coords.heading) + '°';
                }, null, { enableHighAccuracy: true });

                window.addEventListener('deviceorientation', e => {
                    let raw = window.orientation || 0 === 90 ? e.beta : e.gamma;
                    this.lastRaw = raw;
                    let lean = Math.round(raw - this.offset);
                    document.getElementById('val-angle').innerText = Math.abs(lean);
                    document.getElementById('horizon').style.transform = `rotate(${lean}deg)`;
                });
            },

            scanFuel: async function() {
                const list = document.getElementById('station-list');
                list.innerHTML = "SCAN EN COURS...";
                this.updateSnitch("SCAN FUEL " + (this.scanRange/1000) + "KM");
                
                const fuelType = document.getElementById('fuel-type').value;
                const filter = `within_distance(geom, geom'POINT(${this.lastLng} ${this.lastLat})', ${this.scanRange}m)`;
                const url = `${CONFIG.FUEL_API}?where=${encodeURIComponent(filter)}&limit=20`;

                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    list.innerHTML = "";
                    this.fuelLayer.clearLayers();

                    if(!data.results.length) { list.innerHTML = "AUCUNE STATION TROUVÉE"; return; }

                    data.results.forEach(st => {
                        const price = st[fuelType];
                        if(!price) return;
                        const d = (this.map.distance([this.lastLat, this.lastLng], [st.geom.lat, st.geom.lon]) / 1000).toFixed(1);
                        
                        const card = document.createElement('div');
                        card.className = "station-card";
                        card.innerHTML = `
                            <div class="st-row">
                                <div style="font-size:1.4rem; font-weight:900;">${price.toFixed(2)}€</div>
                                <div style="color:var(--ktm)">${d} KM</div>
                                <button class="big-btn" style="width:auto; margin:0; padding:10px 20px;" onclick="APP.startNav(${st.geom.lat}, ${st.geom.lon})">GO</button>
                            </div>
                            <div style="font-size:0.8rem; opacity:0.6; margin-top:5px;">${st.nom || st.adresse}</div>
                        `;
                        list.appendChild(card);
                        L.marker([st.geom.lat, st.geom.lon]).addTo(this.fuelLayer);
                    });
                } catch(e) { this.updateSnitch("ERREUR RÉSEAU"); }
            },

            startNav: async function(lat, lng) {
                this.updateSnitch("CALCUL ITINÉRAIRE...");
                const url = `${CONFIG.ROUTING_API}${this.lastLng},${this.lastLat};${lng},${lat}?overview=full&geometries=geojson&steps=true`;
                const res = await fetch(url);
                const data = await res.json();
                if(data.routes.length) {
                    if(this.navLine) this.map.removeLayer(this.navLine);
                    this.navLine = L.geoJSON(data.routes[0].geometry, {style: {color: CONFIG.KTM_ORANGE, weight: 8}}).addTo(this.map);
                    this.isLocked = true;
                    this.toggleDrawer();
                    this.updateSnitch("GUIDAGE ACTIF");
                }
            },

            drawTicks: function() {
                const g = document.getElementById('compass-ticks');
                for(let i=0; i<360; i+=10) {
                    let a = (i * Math.PI) / 180;
                    let x1 = 100 + 85 * Math.sin(a), y1 = 100 - 85 * Math.cos(a);
                    let x2 = 100 + 80 * Math.sin(a), y2 = 100 - 80 * Math.cos(a);
                    let l = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    l.setAttribute("x1", x1); l.setAttribute("y1", y1); l.setAttribute("x2", x2); l.setAttribute("y2", y2);
                    l.setAttribute("stroke", i%90==0 ? "var(--ktm)" : "white");
                    l.setAttribute("stroke-width", i%90==0 ? "2" : "1");
                    g.appendChild(l);
                }
            },

            toggleDrawer: function() { document.getElementById('mission-drawer').classList.toggle('open'); },
            showPane: function(id, btn) { 
                document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                btn.classList.add('active');
            },
            resetGyro: function() { this.offset = this.lastRaw; },
            recenter: function() { this.isLocked = true; this.map.setView([this.lastLat, this.lastLng], this.navZoom); },
            searchCity: async function() {
                const q = document.getElementById('city-in').value;
                const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
                const d = await r.json();
                if(d.length) this.startNav(d[0].lat, d[0].lon);
            }
        };

        window.onload = () => APP.init();
    </script>
</body>
</html>
