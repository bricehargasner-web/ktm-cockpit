<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM Dash V22.26 - Energy Concept</title>
    <style>
        :root { --bg-color: #000; --panel-bg: #111; --ktm-orange: #FF6600; --text-main: #fff; --text-dim: #888; --danger: #ff0000; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 5px; font-family: -apple-system, sans-serif; margin: 0; }
        
        #radar-alert { display: none; background: var(--danger); color: #fff; padding: 20px; text-align: center; font-family: 'Impact', sans-serif; font-size: 1.8rem; border: 4px solid #fff; margin-bottom: 5px; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .panel { background-color: var(--panel-bg); border-radius: 2px; padding: 12px; position: relative; border-top: 2px solid #333; margin-bottom: 5px; }
        .accent-orange { border-top-color: var(--ktm-orange); }
        .val-main { font-size: 4.5rem; line-height: 1; text-align: right; font-family: 'Impact', sans-serif; display: block; }
        .unit { font-size: 1rem; color: var(--ktm-orange); font-weight: bold; }
        
        #btn-start { width: 100%; padding: 25px; background: var(--ktm-orange); border: none; font-family: 'Impact'; font-size: 2rem; cursor: pointer; color: #000; }
        #settings-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; flex-direction: column; overflow-y: auto; }
        .cfg-row { background:#111; padding:15px; border:1px solid var(--ktm-orange); margin-top:10px; }
        select { width: 100%; padding: 15px; background: #222; color: #fff; border: 1px solid #444; margin-top: 10px; font-size: 1.1rem; }
    </style>
</head>

<body>
    <div id="start-screen" style="display: flex; height: 95vh; align-items: center; justify-content: center;">
        <button id="btn-start" onclick="CORE.start()">READY TO RACE</button>
    </div>

    <div id="dashboard" style="display: none;">
        <!-- ALERTE RADAR -->
        <div id="radar-alert">⚠ <span id="radar-type">RADAR</span><br><span id="radar-dist-val">0</span> m</div>

        <!-- VITESSE (Architecture Index 19) -->
        <div class="panel accent-orange">
            <span class="unit">VITESSE KM/H</span>
            <span id="speed-val" class="val-main">0</span>
            <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-top: 5px;">
                <span>MAX: <strong id="speed-max">0</strong></span>
                <span id="gps-status" style="color:red">GPS: WAIT</span>
            </div>
        </div>

        <!-- CONTRÔLES & DIAGNOSTIC -->
        <div style="display: grid; grid-template-columns: 1fr 1.2fr; gap: 5px;">
            <div class="panel" onclick="UI.openSettings()" style="text-align: center;">
                <span class="unit">MENU</span><br><span style="font-size: 1.5rem;">🔧</span>
            </div>
            <div class="panel">
                <span class="unit">BASE RADARS</span><br>
                <span id="radar-count" style="font-size: 1.2rem; font-weight: bold;">--</span> points
            </div>
        </div>
    </div>

    <!-- RÉGLAGES -->
    <div id="settings-modal">
        <button onclick="UI.closeSettings()" style="width:100%; padding:15px; background:var(--ktm-orange); border:none; font-family: 'Impact'; font-size: 1.2rem;">RETOUR</button>
        <div class="cfg-row">
            <label class="unit">DISTANCE D'ALERTE</label>
            <select id="cfg-radar-dist" onchange="UI.saveSettings()">
                <option value="100">100 m (Urbain)</option>
                <option value="500">500 m (Route)</option>
                <option value="10000">10 000 m (Mode Test)</option>
            </select>
        </div>
        <div class="cfg-row" style="color: #0f0; font-family: monospace; font-size: 0.75rem;">
            DIAGNOSTIC :<br>
            - Coordonnées : <span id="diag-pos">--</span><br>
            - Audio Context : <span id="diag-audio">Inactif</span>
        </div>
    </div>

    <script>
        // AUDIO (Initialisation clinique au clic utilisateur)
        const AUDIO_CTX = new (window.AudioContext || window.webkitAudioContext)();
        function playAlert() {
            const osc = AUDIO_CTX.createOscillator();
            const gain = AUDIO_CTX.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(880, AUDIO_CTX.currentTime);
            osc.connect(gain); gain.connect(AUDIO_CTX.destination);
            gain.gain.setValueAtTime(0.1, AUDIO_CTX.currentTime);
            osc.start(); osc.stop(AUDIO_CTX.currentTime + 0.15);
        }

        const STATE = { gps: { lat: null, lon: null, speed: 0, max: 0 }, radar: null, lastAlertId: null };

        const CORE = {
            start: () => {
                AUDIO_CTX.resume();
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('radar-count').innerText = RADARS_DATA.length;
                document.getElementById('diag-count').innerText = RADARS_DATA.length;
                CORE.initGPS();
            },
            initGPS: () => {
                navigator.geolocation.watchPosition(pos => {
                    STATE.gps.lat = pos.coords.latitude;
                    STATE.gps.lon = pos.coords.longitude;
                    STATE.gps.speed = Math.round((pos.coords.speed || 0) * 3.6);
                    if(STATE.gps.speed > STATE.gps.max) STATE.gps.max = STATE.gps.speed;
                    document.getElementById('gps-status').innerText = "GPS: FIX";
                    document.getElementById('gps-status').style.color = "lime";
                    CORE.checkRadars();
                }, null, { enableHighAccuracy: true });
            },
            checkRadars: () => {
                if (!STATE.gps.lat) return;
                let proche = null;
                let dMini = CONFIG.rayonRadarM / 1000;

                // Algorithme de recherche optimisé pour 3500 points
                for (let i = 0; i < RADARS_DATA.length; i++) {
                    const r = RADARS_DATA[i];
                    const d = CORE.calcDist(STATE.gps.lat, STATE.gps.lon, r.lat, r.lon);
                    if (d < dMini) {
                        dMini = d;
                        proche = { ...r, distM: Math.round(d * 1000), id: i };
                    }
                }

                if (proche && STATE.lastAlertId !== proche.id) {
                    playAlert();
                    STATE.lastAlertId = proche.id;
                } else if (!proche) {
                    STATE.lastAlertId = null;
                }
                STATE.radar = proche;
            },
            calcDist: (l1, n1, l2, n2) => {
                const R = 6371;
                const dLat = (l2-l1)*Math.PI/180;
                const dLon = (n2-n1)*Math.PI/180;
                const a = Math.sin(dLat/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dLon/2)**2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            }
        };

        const UI = {
            update: () => {
                document.getElementById('speed-val').innerText = STATE.gps.speed;
                document.getElementById('speed-max').innerText = STATE.gps.max;
                const alert = document.getElementById('radar-alert');
                if (STATE.radar) {
                    alert.style.display = 'block';
                    document.getElementById('radar-type').innerText = STATE.radar.type;
                    document.getElementById('radar-dist-val').innerText = STATE.radar.distM;
                } else {
                    alert.style.display = 'none';
                }
                document.getElementById('diag-pos').innerText = STATE.gps.lat ? STATE.gps.lat.toFixed(4) + "," + STATE.gps.lon.toFixed(4) : "SEARCHING...";
                document.getElementById('diag-audio').innerText = AUDIO_CTX.state === 'running' ? "ACTIF" : "OFF";
            },
            openSettings: () => document.getElementById('settings-modal').style.display = 'flex',
            closeSettings: () => document.getElementById('settings-modal').style.display = 'none',
            saveSettings: () => {
                CONFIG.rayonRadarM = parseInt(document.getElementById('cfg-radar-dist').value);
                CORE.checkRadars();
            }
        };
        setInterval(UI.update, CONFIG.refreshRate);
    </script>
</body>
</html>
