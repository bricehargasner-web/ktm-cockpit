<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM HUD V71 - TARGET LOCK</title>
    
    <script>
        /* --- CONFIGURATION BRICE CARDONA --- */
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            SCAN_RADIUS: 30000, 
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records',
            MAP_STYLE: 'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png'
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        #map { position: absolute; width: 100%; height: 100%; z-index: 1; filter: brightness(0.3); }
        #fuel-list-panel { position: absolute; top: 70px; right: 10px; width: 290px; max-height: 65%; background: rgba(0,0,0,0.95); border-left: 4px solid #FF6600; z-index: 300; display: none; overflow-y: auto; }
        .fuel-item { padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .fuel-price { font-family: 'Barlow Condensed'; font-size: 2.2rem; color: #FFF; font-weight: 900; }
        .btn-go-link { background: #FF6600; color: #000; padding: 12px 20px; border-radius: 5px; font-weight: 900; text-decoration: none; font-size: 1.2rem; }
        #speed-block { position: absolute; bottom: 100px; left: 30px; z-index: 80; }
        #speed-val { font-family: 'Barlow Condensed'; font-size: 8rem; font-weight: 900; line-height: 0.7; }
        #horizon-line { position: absolute; top: 50%; width: 160%; left: -30%; height: 2px; background: #FFF; box-shadow: 0 0 10px #FFF; z-index: 60; pointer-events: none; }
        #dashboard { position: absolute; bottom: 0; width: 100%; z-index: 90; display: grid; grid-template-columns: repeat(4, 1fr); background: #000; border-top: 3px solid #FF6600; height: 90px; }
        .widget { text-align: center; border-right: 1px solid #222; display: flex; flex-direction: column; justify-content: center; }
        .value { font-family: 'Barlow Condensed'; font-size: 2.4rem; font-weight: 900; }
        #top-ui { position: absolute; top: 10px; width: 96%; left: 2%; z-index: 400; display: flex; gap: 10px; }
        .btn-ktm { background: #FF6600; color: #000; border: none; padding: 15px; font-weight: 900; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="top-ui">
        <select id="fuel-type" style="flex-grow:1; background:#111; color:#FF6600; border:1px solid #FF6600; padding:12px; font-weight:900;">
            <option value="gazole_prix">GAZOLE</option>
            <option value="sp95_prix">SP95</option>
            <option value="e10_prix">E10</option>
            <option value="sp98_prix">SP98</option>
        </select>
        <button class="btn-ktm" onclick="findFuel()">⛽ SCAN</button>
    </div>

    <div id="fuel-list-panel"></div>
    <div id="horizon-line"></div>
    <div id="speed-block"><div id="speed-val">000</div><div style="color:#FF6600; font-weight:900;">KM/H</div></div>
    <div id="map"></div>

    <div id="dashboard">
        <div class="widget"><div id="alt" class="value">--</div><div style="font-size:0.6rem">ALT</div></div>
        <div class="widget"><div id="dist" class="value">0.0</div><div style="font-size:0.6rem">TRIP</div></div>
        <div class="widget"><div id="cap" class="value" style="font-size: 1.2rem;">---</div><div style="font-size:0.6rem">CAP</div></div>
        <div class="widget" style="background:#111">
            <div id="lean-val" class="value" style="font-size:3.5rem">0°</div>
            <button onclick="calibrate()" style="font-size:8px; background:#333; color:white; border:none;">ZERO</button>
        </div>
    </div>

    <script>
        let map, userMarker, fuelLayer, totalDist = 0, offset = 0, lastRaw = 0, smoothedLean = 0, lastCoord = null;

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.6, 1.9], 13);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(map);
            fuelLayer = L.layerGroup().addTo(map);
            userMarker = L.circleMarker([0,0], { radius: 8, color: '#fff', fillColor: CONFIG.KTM_ORANGE, fillOpacity: 1, weight: 3 }).addTo(map);
            window.addEventListener('deviceorientation', handleOrientation);
            startTracking();
        }

        function handleOrientation(e) {
            let screenAngle = window.orientation || 0;
            let raw = (Math.abs(screenAngle) === 90) ? e.beta : e.gamma;
            if (screenAngle === -90) raw = -raw;
            lastRaw = raw;
            let currentLean = raw - offset;
            smoothedLean = (smoothedLean * 0.8) + (currentLean * 0.2);
            document.getElementById('horizon-line').style.transform = `translateY(-50%) rotate(${smoothedLean}deg)`;
            document.getElementById('lean-val').innerText = Math.abs(Math.round(smoothedLean)) + "°";
        }

        function startTracking() {
            navigator.geolocation.watchPosition(u => {
                const p = [u.coords.latitude, u.coords.longitude];
                userMarker.setLatLng(p);
                map.panTo(p);
                document.getElementById('speed-val').innerText = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0).toString().padStart(3, '0');
                if (u.coords.altitude) document.getElementById('alt').innerText = Math.round(u.coords.altitude);
                if (lastCoord) totalDist += map.distance(lastCoord, p) / 1000;
                lastCoord = p;
                document.getElementById('dist').innerText = totalDist.toFixed(1);
            }, null, { enableHighAccuracy: true });
        }

        async function findFuel() {
            const center = map.getCenter();
            const fuelType = document.getElementById('fuel-type').value;
            const panel = document.getElementById('fuel-list-panel');
            const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${center.lng} ${center.lat})', ${CONFIG.SCAN_RADIUS}m)&limit=40`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                fuelLayer.clearLayers();
                panel.innerHTML = "";
                panel.style.display = "block";

                if (data.results) {
                    let stations = data.results.map(st => {
                        let price = st[fuelType];
                        const lat = parseFloat(st.geom.lat).toFixed(6); 
                        const lon = parseFloat(st.geom.lon).toFixed(6);
                        const d = (map.distance([center.lat, center.lng], [lat, lon]) / 1000).toFixed(1);
                        return { ...st, price, distance: d, lat, lon };
                    }).filter(st => st.price).sort((a,b) => a.price - b.price);

                    stations.slice(0, 8).forEach(st => {
                        L.marker([st.lat, st.lon], {
                            icon: L.divIcon({ html: `<div style="background:#FF6600; color:white; padding:3px; border-radius:3px; font-weight:bold; border:1px solid white;">${st.price.toFixed(2)}</div>`, iconSize: [45, 20] })
                        }).addTo(fuelLayer);

                        const item = document.createElement('div');
                        item.className = 'fuel-item';
                        
                        // --- LE NOUVEAU LIEN CIBLE ---
                        // On utilise le format le plus simple accepté par Magic Earth pour forcer l'itinéraire
                        const navUrl = `magicearth://?q=${st.lat},${st.lon}`;
                        
                        item.innerHTML = `
                            <div>
                                <div style="font-size:0.7rem; color:#aaa;">${(st.nom || st.adresse).substring(0, 18)}</div>
                                <div class="fuel-price">${st.price.toFixed(2)}€</div>
                                <div style="font-size:0.8rem; color:#FF6600; font-weight:bold;">${st.distance} KM</div>
                            </div>
                            <a href="${navUrl}" class="btn-go-link">NAV</a>
                        `;
                        panel.appendChild(item);
                    });
                }
            } catch(e) { console.error(e); }
        }

        function calibrate() { offset = lastRaw; }
        window.onload = init;
    </script>
</body>
</html>
