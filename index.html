<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM COCKPIT V2.1 - MISSION CONTROL</title>
    <script>
    /* --- PANNEAU DE CONTRÔLE ENERGY CONCEPT --- */
    const CONFIG = {
        USER: "Brice CARDONA",
        COLORS: {
            KTM: '#FF6600',
            DANGER: '#FF0000',
            BG: '#0a0a0a'
        },
        SCAN_RADIUS: 30000,
        ZOOM_OFFSET: 2, // La loupe centrale est toujours +2 de zoom
        FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records',
        MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}{r}.png'
    };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root { --ktm: #FF6600; --danger: #FF0000; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        
        #portrait-blocker { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; color: var(--ktm); text-align: center; }
        @media (orientation: portrait) { #portrait-blocker { display: flex; } }

        #map-main { position: absolute; width: 100%; height: 100%; z-index: 1; filter: saturate(1.2); }
        
        /* HUD CENTRAL AFFINÉ */
        #hud-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 220px; height: 220px; z-index: 100; pointer-events: none;
        }
        #zoom-circle-container {
            width: 100%; height: 100%; border-radius: 50%; 
            overflow: hidden; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.8);
            background: #000; border: 2px solid rgba(255,102,0,0.5);
        }
        #map-zoom { width: 100%; height: 100%; transform: scale(1.1); }
        
        #compass-ring {
            position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 4px solid var(--ktm); border-radius: 50%;
            transition: all 0.1s ease; opacity: 0.8;
        }

        /* UI DROITE - CARBURANT */
        #right-controls { 
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%); 
            z-index: 500; display: flex; flex-direction: column; gap: 10px; align-items: flex-end;
        }
        #fuel-type {
            background: rgba(0,0,0,0.7); color: var(--ktm); border: 1px solid var(--ktm);
            padding: 10px; border-radius: 4px; font-family: 'Barlow Condensed'; font-weight: 900;
            outline: none; cursor: pointer; text-transform: uppercase;
        }

        /* UI HAUT - RECHERCHE */
        #top-bar { position: absolute; top: 15px; width: 40%; left: 30%; z-index: 500; display: flex; gap: 5px; }
        #search-input { 
            flex-grow: 1; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); 
            color: #fff; padding: 10px; border-radius: 20px; text-align: center; font-size: 0.9rem;
        }
        
        .btn-ktm { background: var(--ktm); color: #000; border: none; padding: 10px 20px; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        /* LISTE STATIONS */
        #station-panel {
            position: absolute; right: 100px; top: 70px; width: 250px; max-height: 50vh;
            background: rgba(0,0,0,0.85); border-radius: 8px; backdrop-filter: blur(5px);
            z-index: 600; display: none; overflow-y: auto; border: 1px solid #333;
        }

        /* DASHBOARD BAS */
        #dash-bottom {
            position: absolute; bottom: 0; width: 100%; height: 70px;
            background: rgba(0,0,0,0.8); z-index: 500; display: flex;
            justify-content: space-around; align-items: center; border-top: 2px solid var(--ktm);
        }
        .stat-box { text-align: center; min-width: 80px; }
        .stat-label { font-size: 0.5rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.6rem; font-family: 'Barlow Condensed'; font-weight: 900; }
        #speed-main { font-size: 3rem; color: #fff; line-height: 1; }

        .fuel-marker { background: var(--ktm); color: #000; font-weight: 900; padding: 2px 4px; border-radius: 3px; font-size: 11px; }
    </style>
</head>
<body>

<div id="portrait-blocker">
    <h1 style="font-size: 4rem; margin: 0;">KTM</h1>
    <p>ORIENTATION PAYSAGE REQUISE</p>
</div>

<div id="top-bar">
    <input type="text" id="search-input" placeholder="DESTINATION CORSE...">
    <button class="btn-ktm" style="border-radius: 20px;" onclick="searchLocation()">GO</button>
</div>

<div id="right-controls">
    <select id="fuel-type">
        <option value="gazole_prix">GAZOLE</option>
        <option value="sp95_prix">SP95</option>
        <option value="sp98_prix">SP98</option>
        <option value="e10_prix">E10</option>
    </select>
    <button class="btn-ktm" onclick="findGas()">⛽ SCAN</button>
</div>

<div id="station-panel">
    <div style="background:#222; padding:5px; font-size:0.6rem; text-align:center;" onclick="this.parentElement.style.display='none'">FERMER [X]</div>
    <div id="station-list"></div>
</div>

<div id="hud-overlay">
    <div id="compass-ring"></div>
    <div id="zoom-circle-container">
        <div id="map-zoom"></div>
    </div>
</div>

<div id="map-main"></div>

<div id="dash-bottom">
    <div class="stat-box"><div class="stat-label">Altitude</div><div id="val-alt" class="stat-value">--</div></div>
    <div class="stat-box"><div class="stat-label">Inclinaison</div><div id="val-lean" class="stat-value">0°</div></div>
    <div class="stat-box" style="min-width: 120px;"><div id="speed-main" class="stat-value">00</div><div class="stat-label">KM/H</div></div>
    <div class="stat-box"><div class="stat-label">Cap</div><div id="val-cap" class="stat-value">--</div></div>
    <div class="stat-box"><div class="stat-label">Trip</div><div id="val-trip" class="stat-value">0.0</div></div>
</div>

<script>
let mainMap, zoomMap, userMarkerMain, userMarkerZoom, fuelLayer;
let lastCoord = null, totalDist = 0;

function init() {
    // Carte Principale
    mainMap = L.map('map-main', { zoomControl: false, attributionControl: false }).setView([41.92, 8.73], 13);
    L.tileLayer(CONFIG.MAP_STYLE).addTo(mainMap);

    // Carte Loupe
    zoomMap = L.map('map-zoom', { 
        zoomControl: false, attributionControl: false, 
        dragging: false, scrollWheelZoom: false, touchZoom: false, doubleClickZoom: false 
    }).setView([41.92, 8.73], 15);
    L.tileLayer(CONFIG.MAP_STYLE).addTo(zoomMap);

    // SYNCHRONISATION : La carte zoomée suit la carte principale
    mainMap.on('move', () => {
        zoomMap.setView(mainMap.getCenter(), mainMap.getZoom() + CONFIG.ZOOM_OFFSET, { animate: false });
    });

    fuelLayer = L.layerGroup().addTo(mainMap);
    userMarkerMain = L.circleMarker([0,0], { radius: 6, color: '#fff', fillColor: CONFIG.COLORS.KTM, fillOpacity: 1, weight: 2 }).addTo(mainMap);
    userMarkerZoom = L.circleMarker([0,0], { radius: 8, color: '#fff', fillColor: CONFIG.COLORS.KTM, fillOpacity: 1, weight: 2 }).addTo(zoomMap);

    setupTracking();
    window.addEventListener('deviceorientation', handleInclinaison);
}

function setupTracking() {
    navigator.geolocation.watchPosition(pos => {
        const coords = [pos.coords.latitude, pos.coords.longitude];
        const speed = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
        
        mainMap.panTo(coords);
        userMarkerMain.setLatLng(coords);
        userMarkerZoom.setLatLng(coords);

        document.getElementById('speed-main').innerText = speed.toString().padStart(2, '0');
        if(pos.coords.altitude) document.getElementById('val-alt').innerText = Math.round(pos.coords.altitude) + "m";
        
        if (lastCoord) {
            totalDist += mainMap.distance(lastCoord, coords) / 1000;
            document.getElementById('val-trip').innerText = totalDist.toFixed(1);
        }
        lastCoord = coords;

        if (pos.coords.heading) {
            const h = Math.round(pos.coords.heading);
            document.getElementById('val-cap').innerText = h + "°";
        }
    }, null, { enableHighAccuracy: true });
}

function handleInclinaison(e) {
    let angle = Math.round(e.gamma);
    if (window.orientation === -90) angle = -angle;
    const absAngle = Math.abs(angle);
    
    const ring = document.getElementById('compass-ring');
    const leanVal = document.getElementById('val-lean');
    
    let color = CONFIG.COLORS.KTM;
    let thickness = 4;

    if (absAngle > 20) {
        const ratio = Math.min((absAngle - 20) / 30, 1);
        color = interpolateKTM(ratio);
        thickness = 4 + (ratio * 10);
    }

    ring.style.borderColor = color;
    ring.style.borderWidth = thickness + "px";
    leanVal.innerText = absAngle + "°";
    leanVal.style.color = color;
}

function interpolateKTM(factor) {
    // Orange KTM (255, 102, 0) vers Rouge Vif (255, 0, 0)
    const r = 255;
    const g = Math.round(102 * (1 - factor));
    const b = 0;
    return `rgb(${r}, ${g}, ${b})`;
}

async function findGas() {
    const center = mainMap.getCenter();
    const type = document.getElementById('fuel-type').value;
    const panel = document.getElementById('station-panel');
    const list = document.getElementById('station-list');
    
    panel.style.display = 'block';
    list.innerHTML = "<p style='padding:10px; font-size:0.7rem;'>SCAN CORSE EN COURS...</p>";

    try {
        const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${center.lng} ${center.lat})', ${CONFIG.SCAN_RADIUS}m)&limit=15`;
        const res = await fetch(url);
        const data = await res.json();
        
        fuelLayer.clearLayers();
        list.innerHTML = "";

        if (data.results && data.results.length > 0) {
            data.results.forEach(st => {
                const price = st[type] || "?";
                if(price === "?") return;

                L.marker([st.geom.lat, st.geom.lon], {
                    icon: L.divIcon({ className: 'fuel-marker', html: price.toFixed(2) })
                }).addTo(fuelLayer);

                const div = document.createElement('div');
                div.style.padding = "8px";
                div.style.borderBottom = "1px solid #333";
                div.innerHTML = `
                    <div style="font-size:0.6rem; color:#aaa">${st.nom || st.adresse}</div>
                    <div style="font-family:'Barlow Condensed'; font-size:1.2rem; color:var(--ktm)">${price.toFixed(2)}€</div>
                `;
                list.appendChild(div);
            });
        } else {
            list.innerHTML = "<p style='padding:10px'>AUCUNE STATION PROCHE</p>";
        }
    } catch (e) { console.error(e); }
}

async function searchLocation() {
    const q = document.getElementById('search-input').value;
    if(!q) return;
    try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
        const data = await res.json();
        if(data[0]) mainMap.setView([data[0].lat, data[0].lon], 14);
    } catch(e) {}
}

window.onload = init;
</script>
</body>
</html>
