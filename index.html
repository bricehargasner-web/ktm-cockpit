<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENERGY CONCEPT - KTM V29 RACING</title>
    
    <script>
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            SAFE_GREEN: '#2ecc71',
            DANGER_RED: '#e74c3c',
            MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records'
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        #map { position: absolute; width: 100%; height: 100%; z-index: 1; filter: brightness(0.4) contrast(1.4); }

        /* HUD CENTRAL - COULEURS DYNAMIQUES */
        #hud-container {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; height: 320px; z-index: 60; pointer-events: none;
        }
        #aim-sphere { position: absolute; width: 100%; height: 100%; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; }
        #horizon-gyro { position: absolute; top: 50%; width: 140%; left: -20%; height: 3px; background: #2ecc71; box-shadow: 0 0 15px #2ecc71; transition: background 0.3s, box-shadow 0.3s; }
        #lean-display { position: absolute; width: 100%; top: 50%; transform: translateY(-50%); text-align: center; font-size: 4rem; font-weight: 900; color: #2ecc71; text-shadow: 0 0 20px #000; }

        /* NAV OVERLAY */
        #nav-overlay { position: absolute; inset: 0; z-index: 150; display: none; background: #000; }
        #nav-overlay iframe { width: 100%; height: 100%; border: none; }
        #close-nav { position: absolute; top: 80px; right: 20px; z-index: 160; background: #FF6600; color: #000; border: none; padding: 15px; font-weight: 900; border-radius: 4px; }

        /* TOP UI */
        #top-ui { position: absolute; top: 10px; width: 96%; left: 2%; z-index: 200; display: flex; gap: 10px; }
        #search-input { flex-grow: 1; background: rgba(0,0,0,0.8); border: 1px solid #FF6600; color: white; padding: 12px; border-radius: 4px; font-family: sans-serif; }
        .btn-ktm { background: #FF6600; color: #000; border: none; padding: 12px 20px; border-radius: 4px; font-weight: 900; cursor: pointer; }

        /* DASHBOARD */
        #dashboard { position: absolute; bottom: 0; width: 100%; z-index: 100; display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(0,0,0,0.9); border-top: 2px solid #FF6600; }
        .widget { padding: 10px; text-align: center; border-right: 1px solid #333; }
        .label { font-size: 0.6rem; color: #FF6600; }
        .value { font-family: 'Barlow Condensed'; font-size: 2rem; font-weight: 900; }

        #speed-main { position: absolute; bottom: 120px; left: 5%; z-index: 110; font-family: 'Barlow Condensed'; font-size: 7rem; font-weight: 900; text-shadow: 0 0 20px #000; }
        .fuel-marker { background: #FF6600; color: #fff; padding: 3px 6px; border-radius: 4px; font-weight: 900; border: 1px solid white; font-size: 12px; }
    </style>
</head>
<body>

    <div id="top-ui">
        <input type="text" id="search-input" placeholder="DESTINATION (CALVI, PORTO...)">
        <button class="btn-ktm" onclick="startNav()">NAV</button>
        <button class="btn-ktm" style="background:#222; color:#FF6600;" onclick="findFuel()">FUEL</button>
        <button class="btn-ktm" style="background:#444; color:#fff;" onclick="calibrate()">ZERO</button>
    </div>

    <div id="nav-overlay">
        <button id="close-nav" onclick="stopNav()">RETOUR DASHBOARD</button>
        <iframe id="nav-iframe"></iframe>
    </div>

    <div id="hud-container">
        <div id="lean-display">0°</div>
        <div id="aim-sphere"></div>
        <div id="horizon-gyro"></div>
    </div>

    <div id="speed-main">000</div>

    <div id="map"></div>

    <div id="dashboard">
        <div class="widget"><div class="label">ALTITUDE</div><div id="alt" class="value">--</div></div>
        <div class="widget"><div class="label">CAP</div><div id="cap" class="value">---</div></div>
        <div class="widget"><div class="label">DISTANCE</div><div id="dist" class="value">0.0</div></div>
        <div class="widget"><div class="label">PITCH</div><div id="pitch" class="value">0°</div></div>
    </div>

    <script>
        let map, userMarker, totalDist = 0, offset = 0, lastRaw = 0, smoothedLean = 0, lastCoord = null;
        let fuelLayer = L.layerGroup();

        function getLeanColor(angle) {
            const a = Math.abs(angle);
            if (a < 25) return CONFIG.SAFE_GREEN;
            if (a < 40) return CONFIG.KTM_ORANGE;
            return CONFIG.DANGER_RED;
        }

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([42.15, 9.1], 14);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(map);
            fuelLayer.addTo(map);
            userMarker = L.circleMarker([0,0], { radius: 10, color: '#fff', fillColor: '#FF6600', fillOpacity: 1, weight: 3 }).addTo(map);

            window.addEventListener('deviceorientation', e => {
                let raw = (Math.abs(window.orientation) === 90) ? e.beta : e.gamma;
                lastRaw = raw;
                let current = raw - offset;

                // LISSAGE EXTRÊME (95%) + ZONE MORTE
                if (Math.abs(current - smoothedLean) > 1.2) {
                    smoothedLean = (smoothedLean * 0.95) + (current * 0.05);
                }
                
                const color = getLeanColor(smoothedLean);
                const gyro = document.getElementById('horizon-gyro');
                const display = document.getElementById('lean-display');
                
                gyro.style.transform = `rotate(${smoothedLean}deg)`;
                gyro.style.background = color;
                gyro.style.boxShadow = `0 0 15px ${color}`;
                display.style.color = color;
                display.innerText = Math.abs(Math.round(smoothedLean)) + "°";
                document.getElementById('pitch').innerText = Math.round(e.beta) + "°";
            });

            navigator.geolocation.watchPosition(u => {
                const p = [u.coords.latitude, u.coords.longitude];
                userMarker.setLatLng(p);
                map.panTo(p);
                if (u.coords.heading !== null && u.coords.speed > 2) map.setBearing(u.coords.heading);
                
                const s = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0);
                document.getElementById('speed-main').innerText = s.toString().padStart(3, '0');
                if (u.coords.altitude) document.getElementById('alt').innerText = Math.round(u.coords.altitude) + "m";
                if (u.coords.heading) document.getElementById('cap').innerText = Math.round(u.coords.heading) + "°";

                if (lastCoord) totalDist += map.distance(lastCoord, p) / 1000;
                lastCoord = p;
                document.getElementById('dist').innerText = totalDist.toFixed(1);
            }, null, { enableHighAccuracy: true });
        }

        function startNav() {
            const dest = document.getElementById('search-input').value;
            if (!dest) return;
            document.getElementById('nav-iframe').src = `https://www.google.com/maps?q=${encodeURIComponent(dest)}&output=embed`;
            document.getElementById('nav-overlay').style.display = 'block';
        }

        function stopNav() {
            document.getElementById('nav-overlay').style.display = 'none';
            document.getElementById('nav-iframe').src = '';
        }

        async function findFuel() {
            const c = map.getCenter();
            const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${c.lng} ${c.lat})', 40000)&limit=20`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                fuelLayer.clearLayers();
                data.results.forEach(st => {
                    let price = "?.??";
                    try {
                        // Nouveau format de parsing plus robuste
                        const prixRaw = st.prix.replace(/'/g, '"');
                        const pArr = JSON.parse(prixRaw);
                        const find = pArr.find(p => p["@nom"].includes("95")) || pArr[0];
                        price = parseFloat(find["@valeur"]).toFixed(2);
                    } catch(e) {}
                    L.marker([st.geom.lat, st.geom.lon], {
                        icon: L.divIcon({ html: `<div class="fuel-marker">${price}€</div>`, iconSize: [45, 20] })
                    }).addTo(fuelLayer);
                });
            } catch(e) { alert("Erreur API Essence"); }
        }

        function calibrate() { offset = lastRaw; }
        window.onload = init;
    </script>
</body>
</html>
