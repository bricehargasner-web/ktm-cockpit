<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENERGY CONCEPT - KTM HUD V25</title>
    
    <script>
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
            // URL corrigée pour l'API v2.1
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records'
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        #map-container { position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; z-index: 1; transition: transform 0.3s ease-out; }
        #map { width: 100%; height: 100%; filter: brightness(0.75) contrast(1.2); }

        /* HUD CENTRAL */
        #hud-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; z-index: 60; pointer-events: none; }
        #aim-sphere { position: absolute; width: 100%; height: 100%; border: 1px solid rgba(255,102,0,0.3); border-radius: 50%; }
        #horizon-gyro { position: absolute; top: 50%; width: 140%; left: -20%; height: 2px; background: #FF6600; box-shadow: 0 0 15px #FF6600; transition: transform 0.1s linear; }
        #lean-val { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 2.5rem; color: #FF6600; text-shadow: 2px 2px 4px #000; }

        /* INTERFACE */
        #top-ui { position: absolute; top: 10px; width: 96%; left: 2%; z-index: 100; display: flex; gap: 8px; }
        #search-input { flex-grow: 1; background: rgba(0,0,0,0.8); border: 1px solid #FF6600; color: white; padding: 12px; border-radius: 4px; backdrop-filter: blur(10px); }
        .btn-ktm { background: #FF6600; color: #000; border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }

        #dashboard { position: absolute; bottom: 10px; width: 96%; left: 2%; z-index: 90; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .widget { background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 8px; border-bottom: 3px solid #FF6600; text-align: center; }
        .label { font-size: 0.6rem; color: #FF6600; }
        .value { font-family: 'Barlow Condensed'; font-size: 2rem; font-weight: 900; }

        #speed-main { position: absolute; bottom: 120px; width: 100%; text-align: center; z-index: 85; font-size: 5rem; font-weight: 900; pointer-events: none; }
        
        /* Style des marqueurs essence */
        .fuel-marker { background: #FF6600; color: black; border: 2px solid white; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 11px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="top-ui">
        <input type="text" id="search-input" placeholder="DESTINATION...">
        <button class="btn-ktm" onclick="findFuel()">⛽ RECHERCHE ESSENCE</button>
        <button class="btn-ktm" style="background:#444; color:#fff;" onclick="calibrate()">ZERO</button>
    </div>

    <div id="hud-container">
        <div id="lean-val">0°</div>
        <div id="aim-sphere"></div>
        <div id="horizon-gyro"></div>
    </div>

    <div id="speed-main">000</div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <div id="dashboard">
        <div class="widget"><div class="label">Heading</div><div id="cap" class="value">---</div></div>
        <div class="widget"><div class="label">Altitude</div><div id="alt" class="value">--</div></div>
        <div class="widget"><div class="label">Dist. Trip</div><div id="dist" class="value">0.0</div></div>
        <div class="widget"><div class="label">Unit</div><div class="value" style="color:#FF6600;">890 R</div></div>
    </div>

    <script>
        let map, userMarker, totalDist = 0, offset = 0, lastG = 0, smoothedLean = 0, lastCoord = null;
        let fuelLayer = L.layerGroup();

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([42.15, 9.1], 12);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(map);
            fuelLayer.addTo(map);
            userMarker = L.circleMarker([0,0], { radius: 10, color: '#fff', fillColor: '#005fb7', fillOpacity: 1, weight: 4 }).addTo(map);

            window.addEventListener('deviceorientation', e => {
                lastG = e.gamma;
                let raw = e.gamma - offset;
                smoothedLean = (smoothedLean * 0.8) + (raw * 0.2);
                document.getElementById('horizon-gyro').style.transform = `rotate(${smoothedLean}deg)`;
                document.getElementById('lean-val').innerText = Math.abs(Math.round(smoothedLean)) + "°";
            });

            navigator.geolocation.watchPosition(u => {
                const p = [u.coords.latitude, u.coords.longitude];
                userMarker.setLatLng(p);
                map.panTo(p);

                if (u.coords.heading !== null) {
                    document.getElementById('map-container').style.transform = `rotate(${-u.coords.heading}deg)`;
                    document.getElementById('cap').innerText = Math.round(u.coords.heading).toString().padStart(3, '0') + "°";
                }

                const s = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0).toString().padStart(3, '0');
                document.getElementById('speed-main').innerText = s;
                if (u.coords.altitude) document.getElementById('alt').innerText = Math.round(u.coords.altitude) + "m";

                if (lastCoord) totalDist += map.distance(lastCoord, p) / 1000;
                lastCoord = p;
                document.getElementById('dist').innerText = totalDist.toFixed(1);
            }, null, { enableHighAccuracy: true });
        }

        async function findFuel() {
            const c = map.getCenter();
            // Utilisation d'un cercle de 30km pour être sûr de trouver en Corse
            const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${c.lng} ${c.lat})', 30000)&limit=20`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                fuelLayer.clearLayers();
                
                if (data.results && data.results.length > 0) {
                    data.results.forEach(st => {
                        // On prend le premier prix disponible (Gazole, E10 ou SP98)
                        let prix = st.gazole_prix || st.e10_prix || st.sp98_prix || st.sp95_prix;
                        if (prix && st.geom) {
                            L.marker([st.geom.lat, st.geom.lon], {
                                icon: L.divIcon({ 
                                    className: '', 
                                    html: `<div class="fuel-marker">${prix.toFixed(2)}</div>` 
                                })
                            }).addTo(fuelLayer).bindPopup(`<b>${st.adresse}</b><br>Gazole: ${st.gazole_prix || '--'}€<br>E10: ${st.e10_prix || '--'}€`);
                        }
                    });
                    alert(data.results.length + " stations trouvées autour de vous.");
                } else {
                    alert("Aucune station trouvée dans un rayon de 30km.");
                }
            } catch (e) {
                console.error(e);
                alert("Erreur de connexion aux données carburant.");
            }
        }

        function calibrate() { offset = lastG; }
        window.onload = init;
    </script>
</body>
</html>
