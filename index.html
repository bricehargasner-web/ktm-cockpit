<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ENERGY CONCEPT - KTM V113 CLEAN</title>
    
    <script>
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            SAFE_WHITE: '#FFFFFF',
            DANGER_RED: '#FF0000',
            NAV_BLUE: '#00D2FF',
            MAP_DAY: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
            MAP_NIGHT: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records',
            ROUTING_API: 'https://router.project-osrm.org/route/v1/driving/',
            DEFAULT_ZOOM: 14
        };
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --ktm: #FF6600; --dynamic-hud: #FFFFFF; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: white; overflow: hidden; font-family: 'Saira Condensed', sans-serif; touch-action: none; }
        
        #map { position: fixed; inset: 0; z-index: 1; filter: brightness(0.9) contrast(1.1); }

        /* ÉCRAN DE VERROUILLAGE PORTRAIT */
        #portrait-lock { display: none; }
        @media screen and (orientation: portrait) {
            #portrait-lock { 
                display: flex; position: fixed; inset: 0; z-index: 9999; background: #000; color: var(--ktm);
                align-items: center; justify-content: center; flex-direction: column; text-align: center;
                font-size: 2rem; font-weight: 900; letter-spacing: 2px; padding: 20px;
            }
            #app-core { display: none; }
        }

        /* HUD CENTRAL FUSIONNÉ */
        #central-hud {
            position: fixed; top: 48%; left: 50%; transform: translate(-50%, -50%);
            width: 85vmin; height: 85vmin; z-index: 100; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }
        #compass-svg { width: 100%; height: 100%; filter: drop-shadow(0px 0px 4px rgba(0,0,0,0.9)); }
        .tick-line { stroke: var(--dynamic-hud); stroke-width: 2.5; transition: 0.3s; }
        .azimut-text { fill: var(--dynamic-hud); font-weight: 900; font-size: 11px; stroke: rgba(0,0,0,0.8); stroke-width: 1px; paint-order: stroke; }

        #horizon-line {
            position: absolute; width: calc(100% + 50px); height: 4px;
            background: linear-gradient(90deg, transparent 0%, var(--dynamic-hud) 15%, #fff 50%, var(--dynamic-hud) 85%, transparent 100%);
            border-top: 1.5px solid rgba(255, 102, 0, 0.7); box-shadow: 0 0 15px var(--dynamic-hud); z-index: 110;
        }

        /* WIDGETS HUD */
        .flight-widget { position: fixed; bottom: 16%; z-index: 700; color: var(--ktm); }
        .val-big { font-size: clamp(3rem, 12vmin, 7rem); font-weight: 900; line-height: 0.8; text-shadow: 3px 3px 10px black; }
        .sub-label { font-size: 1rem; font-weight: 800; letter-spacing: 3px; text-shadow: 2px 2px 5px black; }
        #angle-widget { left: 6vw; text-align: left; }
        #speed-widget { right: 6vw; text-align: right; }
        .btn-zero { background: rgba(0,0,0,0.7); border: 1px solid var(--ktm); color: white; padding: 3px 10px; font-size: 0.7rem; border-radius: 2px; margin-top: 5px; pointer-events: auto; font-family: inherit; font-weight: 900;}

        /* MOUCHARD TOP-LEFT */
        #tech-snitch { position: fixed; top: 15px; left: 15px; z-index: 900; color: var(--ktm); font-size: 0.7rem; font-family: monospace; text-transform: uppercase; text-shadow: 1px 1px 2px black; }

        /* UI TRIGGER & LOCK */
        .side-btn { position: fixed; right: 15px; z-index: 2100; cursor: pointer; pointer-events: auto; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); border: 1px solid var(--ktm); border-radius: 4px; }
        #ui-trigger { top: 15px; width: 45px; height: 40px; flex-direction: column; gap: 4px; }
        .bar { width: 25px; height: 3px; background: var(--ktm); border-radius: 2px; }
        #map-lock-btn { top: 65px; width: 45px; height: 40px; font-size: 1.2rem; color: white; }

        /* TIROIR MISSION */
        #mission-drawer { 
            position: fixed; top: 0; right: 0; width: 300px; height: 100dvh; 
            background: rgba(10,10,10,0.98); border-left: 2px solid var(--ktm); 
            z-index: 2000; transition: 0.3s; transform: translateX(100%);
        }
        #mission-drawer.open { transform: translateX(0); }
        .tab-nav { display: flex; justify-content: space-around; padding: 15px; border-bottom: 1px solid #333; margin-top: 40px; }
        .tab-btn { background: transparent; border: none; fill: white; padding: 10px; cursor: pointer; }
        .tab-btn.active { fill: var(--ktm); transform: scale(1.1); }
        .pane { display: none; padding: 20px; height: calc(100% - 160px); overflow-y: auto; padding-bottom: 100px; }
        .pane.active { display: block; }

        /* BOUTONS ET FORMULAIRES */
        .go-btn { background: var(--ktm); color: black; border: none; padding: 8px 15px; font-weight: 900; border-radius: 3px; cursor: pointer; font-family: inherit; width: 100%; margin-bottom: 10px; }
        .sort-btn { flex: 1; background: #111; color: #888; margin: 0; border: none; padding: 8px 15px; font-weight: 900; border-radius: 3px; cursor: pointer; font-family: inherit; transition: 0.2s; }
        .sort-btn.active { background: var(--ktm); color: black; }
        input, select { width: 100%; background: #111; border: 1px solid #333; color: white; padding: 12px; margin-bottom: 10px; font-family: inherit; box-sizing: border-box; }

        /* CARTES STATIONS (NOUVELLE ÉTANCHÉITÉ CSS) */
        .station-card { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 4px; margin-bottom: 8px; border-left: 3px solid var(--ktm); position: relative; }
        .st-go { float: right; width: auto; padding: 6px 12px; margin: 0; }
        .st-city { font-weight: 900; font-size: 0.8rem; color: #ccc; text-transform: uppercase; }
        .st-addr { font-size: 0.7rem; color: #888; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%; }
        .st-price { font-size: 1.4rem; font-weight: 900; color: white; margin-top: 5px; }
        .st-dist { color: var(--ktm); font-size: 0.9rem; }
        .map-marker-ktm { background: var(--ktm); color: black; padding: 2px 5px; border-radius: 3px; font-weight: 900; font-size: 0.7rem; border: 1px solid white; box-shadow: 0 0 5px black; text-align: center; }

        /* DASHBOARD BAS */
        #dash-bottom { position: fixed; bottom: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.95); border-top: 1px solid rgba(255,102,0,0.4); display: grid; grid-template-columns: repeat(4, 1fr) 1.2fr; z-index: 800; }
        .widget { border-right: 1px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
        .label { font-size: 0.6rem; color: #888; text-transform: uppercase; }
        .data { font-size: 1.1rem; font-weight: 800; white-space: nowrap; }
        .sub-data { font-size: 0.55rem; color: var(--ktm); text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="portrait-lock">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="var(--ktm)"><path d="M16 1H8C6.34 1 5 2.34 5 4v16c0 1.66 1.34 3 3 3h8c1.66 0 3-1.34 3-3V4c0-1.66-1.34-3-3-3zm-4 21c-.83 0-1.5-.67-1.5-1.5S11.17 19 12 19s1.5.67 1.5 1.5S12.83 22 12 22zm3.25-4H8.75V4h6.5v14z"/></svg>
        <p>BASCULER LE TÉLÉPHONE<br>EN MODE PAYSAGE</p>
        <p style="font-size: 1rem; color: #888;">(Bord droit vers l'avant)</p>
    </div>

    <div id="app-core">
        <div id="map"></div>

        <div id="tech-snitch">> SYS: STANDBY</div>

        <div id="ui-trigger" class="side-btn" onclick="APP.toggleDrawer()">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        <div id="map-lock-btn" class="side-btn" onclick="APP.toggleMapLock()">🔒</div>

        <div id="central-hud">
            <div id="horizon-line"></div>
            <svg id="compass-svg" viewBox="0 0 200 200">
                <g id="ticks-layer"></g>
            </svg>
        </div>

        <div id="angle-widget" class="flight-widget">
            <div class="val-big"><span id="angle-val">0</span>°</div>
            <div class="sub-label">ANGLE</div>
            <button class="btn-zero" onclick="APP.resetGyro()">ZÉRO</button>
        </div>

        <div id="speed-widget" class="flight-widget">
            <div id="speed-val" class="val-big">000</div>
            <div class="sub-label">KM/H</div>
        </div>

        <div id="mission-drawer">
            <div class="tab-nav">
                <button class="tab-btn" onclick="APP.recenterMap()"><svg width="24" height="24" viewBox="0 0 24 24" fill="inherit"><path d="M12 2c-5.52 0-10 4.48-10 10s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v3h-2zm0 10h2v3h-2zm7-7v2h-3v-2zm-10 0v2h-3v-2z"/></svg></button>
                <button class="tab-btn active" onclick="APP.showPane('p-radar', this)"><svg width="24" height="24" viewBox="0 0 24 24" fill="inherit"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 8 13 8 13s8-7.75 8-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></button>
                <button class="tab-btn" onclick="APP.showPane('p-search', this)"><svg width="24" height="24" viewBox="0 0 24 24" fill="inherit"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>
                <button class="tab-btn" onclick="APP.showPane('p-settings', this)"><svg width="24" height="24" viewBox="0 0 24 24" fill="inherit"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg></button>
            </div>

            <div id="p-radar" class="pane active">
                <h3 style="color:var(--ktm); margin-top:0;">RADAR FUEL</h3>
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <button id="sort-price" class="sort-btn active" onclick="APP.setSort('price')">PRIX</button>
                    <button id="sort-dist" class="sort-btn" onclick="APP.setSort('dist')">KM</button>
                </div>
                <select id="fuel-type"><option value="gazole_prix">GAZOLE</option><option value="sp95_prix">SP95</option><option value="sp98_prix">SP98</option><option value="e10_prix">E10</option></select>
                
                <label style="color:#888; font-size:0.8rem;">DISTANCE SCAN : <span id="rad-val" style="color:white;">15</span> KM</label>
                <input type="range" id="rad-input" min="5" max="50" value="15" oninput="document.getElementById('rad-val').innerText=this.value">
                
                <button class="go-btn" onclick="APP.scanFuel()">LANCER LE SCAN</button>
                <div id="station-list"></div>
            </div>
            <div id="p-search" class="pane">
                <h3 style="color:var(--ktm); margin-top:0;">DESTINATION</h3>
                <input type="text" id="city-in" placeholder="Ex: Albi, Corte, Gaillac...">
                <button class="go-btn" onclick="APP.searchCity()">NAVIGUER VERS</button>
                <button class="go-btn" style="background:transparent; border:1px solid #444; color:white;" onclick="APP.clearNav()">EFFACER LA ROUTE</button>
            </div>
            <div id="p-settings" class="pane">
                <h3 style="color:var(--ktm); margin-top:0;">RÉGLAGES</h3>
                <button class="go-btn" style="margin-bottom:20px;" onclick="APP.toggleTheme()">SWITCH JOUR / NUIT</button>
                <label style="color:#888;">ZOOM CARTE : <span id="zoom-val">14</span></label>
                <input type="range" min="8" max="18" value="14" oninput="APP.updateZoom(this.value)">
            </div>
        </div>

        <div id="dash-bottom">
            <div class="widget" id="btn-rec" onclick="APP.toggleRec()">
                <div class="label">GPX</div>
                <div class="data" id="rec-label">🔴 REC</div>
            </div>
            <div class="widget"><div class="label">Alt</div><div id="alt-val" class="data">---</div></div>
            <div class="widget"><div class="label">Cap</div><div id="cap-val" class="data">--</div></div>
            <div class="widget"><div class="label">Azi</div><div id="azi-val" class="data">0°</div></div>
            <div class="widget" style="border:none;" onclick="APP.openWeather()">
                <div class="label">Météo LIVE</div>
                <div id="weather-val" class="data">--°C</div>
                <div id="weather-loc" class="sub-data">...</div>
            </div>
        </div>
    </div>

    <script>
        const APP = {
            map: null, userMarker: null, fuelLayer: null, navLine: null,
            isNight: false, sortMode: 'price', offset: 0, lastRaw: 0, lastWeatherUpdate: 0,
            stationsData: [], lastLat: 43.76, lastLng: 1.99,
            isRecording: false, trackData: [], mapLocked: true,

            init: function() {
                this.map = L.map('map', { 
                    zoomControl: false, attributionControl: false, 
                    dragging: false, touchZoom: false, doubleClickZoom: false, scrollWheelZoom: false 
                }).setView([this.lastLat, this.lastLng], CONFIG.DEFAULT_ZOOM); 
                
                L.tileLayer(CONFIG.MAP_DAY).addTo(this.map);
                this.fuelLayer = L.layerGroup().addTo(this.map);
                this.userMarker = L.circleMarker([0,0], {radius: 8, color: '#fff', fillColor: CONFIG.KTM_ORANGE, fillOpacity: 1}).addTo(this.map);
                
                this.drawCompass();
                this.startSensors();
                this.updateSnitch('> SYS: ONLINE | ARCHITECTURE CLEAN');
            },

            updateSnitch: function(msg) { document.getElementById('tech-snitch').innerText = msg; },
            updateZoom: function(v) { this.map.setZoom(v); document.getElementById('zoom-val').innerText = v; },
            toggleDrawer: function() { document.getElementById('mission-drawer').classList.toggle('open'); },
            
            toggleMapLock: function() {
                this.mapLocked = !this.mapLocked;
                const btn = document.getElementById('map-lock-btn');
                if(this.mapLocked) {
                    this.map.dragging.disable(); this.map.touchZoom.disable(); this.map.doubleClickZoom.disable(); this.map.scrollWheelZoom.disable();
                    btn.innerText = '🔒';
                    this.recenterMap();
                    this.updateSnitch('> MAP: VERROUILLÉE');
                } else {
                    this.map.dragging.enable(); this.map.touchZoom.enable(); this.map.doubleClickZoom.enable(); this.map.scrollWheelZoom.enable();
                    btn.innerText = '🔓';
                    this.updateSnitch('> MAP: LIBRE');
                }
            },

            showPane: function(id, btn) {
                document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(id).classList.add('active'); btn.classList.add('active');
            },
            recenterMap: function() { 
                this.map.setView(this.userMarker.getLatLng(), this.map.getZoom()); 
                document.getElementById('mission-drawer').classList.remove('open');
                if(!this.mapLocked) this.toggleMapLock(); 
            },
            
            resetGyro: function() { 
                this.offset = this.lastRaw; 
                this.updateSnitch('> GYRO: CALIBRÉ'); 
            },

            openWeather: function() {
                const url = `https://www.meteoblue.com/fr/meteo/semaine/index?lat=${this.lastLat}&lon=${this.lastLng}`;
                window.open(url, '_blank');
            },

            drawCompass: function() {
                const g = document.getElementById('ticks-layer');
                const pts = { 0:'N', 90:'E', 180:'S', 270:'W' };
                for(let i=0; i<360; i+=10) {
                    let a = (i * Math.PI) / 180;
                    let x1 = 100 + 92 * Math.sin(a), y1 = 100 - 92 * Math.cos(a);
                    let x2 = 100 + 84 * Math.sin(a), y2 = 100 - 84 * Math.cos(a);
                    let l = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    l.setAttribute("x1", x1); l.setAttribute("y1", y1); l.setAttribute("x2", x2); l.setAttribute("y2", y2);
                    l.setAttribute("class", "tick-line"); g.appendChild(l);
                    if (pts[i] || i % 30 === 0) {
                        let t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                        t.setAttribute("x", 100 + 74 * Math.sin(a)); t.setAttribute("y", 100 - 74 * Math.cos(a));
                        t.setAttribute("class", "azimut-text");
                        t.setAttribute("fill", i % 90 === 0 ? CONFIG.KTM_ORANGE : "white");
                        t.setAttribute("text-anchor", "middle"); t.setAttribute("dominant-baseline", "middle");
                        t.textContent = pts[i] || (i/10); g.appendChild(t);
                    }
                }
            },

            startSensors: function() {
                if(navigator.geolocation) {
                    navigator.geolocation.watchPosition(u => {
                        this.lastLat = u.coords.latitude; this.lastLng = u.coords.longitude;
                        const p = [this.lastLat, this.lastLng]; 
                        this.userMarker.setLatLng(p);
                        
                        if(!this.navLine && this.mapLocked) this.map.setView(p, this.map.getZoom());
                        
                        document.getElementById('speed-val').innerText = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0).toString().padStart(3, '0');
                        document.getElementById('alt-val').innerText = u.coords.altitude ? Math.round(u.coords.altitude) + 'm' : '---';
                        if(u.coords.heading) document.getElementById('azi-val').innerText = Math.round(u.coords.heading) + '°';

                        this.fetchWeather(p[0], p[1]);
                        if(this.isRecording) this.trackData.push({lat: p[0], lng: p[1], time: Date.now()});
                    }, null, { enableHighAccuracy: true });
                }

                window.addEventListener('deviceorientation', e => {
                    this.lastRaw = e.beta; 
                    let lean = Math.round(this.lastRaw - this.offset);
                    let absLean = Math.abs(lean);
                    
                    document.getElementById('angle-val').innerText = absLean;
                    document.getElementById('horizon-line').style.transform = `rotate(${lean}deg)`;
                    
                    let col = absLean > 42 ? CONFIG.DANGER_RED : (absLean > 25 ? CONFIG.KTM_ORANGE : CONFIG.SAFE_WHITE);
                    document.documentElement.style.setProperty('--dynamic-hud', col);
                    document.querySelectorAll('.tick-line').forEach(l => l.style.stroke = col);
                });
            },

            fetchWeather: async function(lat, lng) {
                const now = Date.now();
                if(now - this.lastWeatherUpdate < 600000) return;
                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`);
                    const data = await res.json();
                    document.getElementById('weather-val').innerText = Math.round(data.current_weather.temperature) + '°C';
                    const loc = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                    const lData = await loc.json();
                    document.getElementById('weather-loc').innerText = lData.address.city || lData.address.town || "PROXIMITÉ";
                    this.lastWeatherUpdate = now;
                } catch(e) {}
            },

            scanFuel: async function() {
                const radius = document.getElementById('rad-input').value * 1000;
                const type = document.getElementById('fuel-type').value;
                this.updateSnitch('> SCANNING RADAR...');
                
                const query = `within_distance(geom, geom'POINT(${this.lastLng} ${this.lastLat})', ${radius}m)`;
                const api = `${CONFIG.FUEL_API}?where=${encodeURIComponent(query)}&limit=100`;
                
                try {
                    const res = await fetch(api); const data = await res.json();
                    this.stationsData = data.results.map(st => {
                        const price = st[type] || null;
                        const d = (this.map.distance([this.lastLat, this.lastLng], [st.geom.lat, st.geom.lon]) / 1000);
                        return { ...st, price, distance: d };
                    }).filter(s => s.price !== null && s.price > 0);
                    
                    this.renderStations();
                    this.updateSnitch(`> TROUVÉ ${this.stationsData.length} STATIONS`);
                } catch(e) { this.updateSnitch('> ERREUR API GOUV'); }
            },

            renderStations: function() {
                this.fuelLayer.clearLayers();
                const list = document.getElementById('station-list');
                list.innerHTML = "";
                this.stationsData.sort((a,b) => this.sortMode === 'price' ? a.price - b.price : a.distance - b.distance);
                
                this.stationsData.forEach(st => {
                    const card = document.createElement('div'); 
                    card.className = "station-card";
                    card.innerHTML = `
                        <button class="go-btn st-go" onclick="APP.startNav(${st.geom.lat}, ${st.geom.lon})">GO</button>
                        <div class="st-city">${st.ville || "VILLE"}</div>
                        <div class="st-addr">${(st.nom || st.adresse)}</div>
                        <div class="st-price">${st.price.toFixed(2)}€ <span class="st-dist">| ${st.distance.toFixed(1)}KM</span></div>`;
                    list.appendChild(card);
                    
                    L.marker([st.geom.lat, st.geom.lon], { 
                        icon: L.divIcon({ className:'', html:`<div class="map-marker-ktm">${st.price.toFixed(2)}</div>`}) 
                    }).addTo(this.fuelLayer);
                });
            },

            searchCity: async function() {
                const city = document.getElementById('city-in').value;
                if(!city) return;
                this.updateSnitch('> SEARCHING ' + city.toUpperCase());
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}`);
                    const data = await res.json();
                    if(data.length > 0) this.startNav(data[0].lat, data[0].lon);
                } catch(e) { this.updateSnitch('> SEARCH ERROR'); }
            },

            startNav: async function(lat, lng) {
                const url = `${CONFIG.ROUTING_API}${this.lastLng},${this.lastLat};${lng},${lat}?overview=full&geometries=geojson`;
                try {
                    const res = await fetch(url); const data = await res.json();
                    if(this.navLine) this.map.removeLayer(this.navLine);
                    this.navLine = L.geoJSON(data.routes[0].geometry, { style: { color: CONFIG.NAV_BLUE, weight: 6, dashArray: '1, 10' } }).addTo(this.map);
                    this.map.fitBounds(this.navLine.getBounds(), {padding: [50, 50]});
                    this.updateSnitch('> CAP GPS VERROUILLÉ');
                    document.getElementById('mission-drawer').classList.remove('open');
                } catch(e) {}
            },

            clearNav: function() { if(this.navLine) this.map.removeLayer(this.navLine); this.navLine = null; this.updateSnitch('> CAP EFFACÉ'); },
            
            toggleRec: function() {
                this.isRecording = !this.isRecording;
                document.getElementById('rec-label').innerText = this.isRecording ? '🟠 REC...' : '🔴 REC';
                if(!this.isRecording && this.trackData.length > 0) {
                    let gpx = '<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1"><trk><trkseg>';
                    this.trackData.forEach(p => gpx += `<trkpt lat="${p.lat}" lon="${p.lng}"><time>${new Date(p.time).toISOString()}</time></trkpt>`);
                    gpx += '</trkseg></trk></gpx>';
                    const blob = new Blob([gpx], {type: 'application/gpx+xml'});
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'KTM_Trace.gpx'; a.click();
                }
            },
            
            setSort: function(m) { 
                this.sortMode = m; 
                document.getElementById('sort-price').classList.toggle('active', m === 'price');
                document.getElementById('sort-dist').classList.toggle('active', m === 'dist');
                if(this.stationsData.length > 0) this.renderStations();
            },
            
            toggleTheme: function() { this.isNight = !this.isNight; this.map.eachLayer(l => { if(l._url) this.map.removeLayer(l); }); L.tileLayer(this.isNight ? CONFIG.MAP_NIGHT : CONFIG.MAP_DAY).addTo(this.map); }
        };
        window.onload = () => APP.init();
    </script>
</body>
</html>
