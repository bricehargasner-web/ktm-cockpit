<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENERGY CONCEPT - COCKPIT V30</title>

    <script>
        /* --- PANNEAU DE CONTRÔLE ENERGY CONCEPT --- */
        var CONFIG_KTM = {
            THEME_CARTE: "jour",         
            COULEUR_ACCENT: "#FF6600",
            CARBURANT_PREF: "Gazole",       
            RAYON_RECHERCHE: 50,         
            ANGLE_ALERTE_ROUGE: 45,      
            PITCH_3D: 75,                
            ZOOM_NAV: 18.5               
        };
    </script>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
        :root { --ktm: #FF6600; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; margin: 0; padding: 0; }
        body { background: #000; color: #fff; overflow: hidden; height: 100vh; width: 100vw; }
        
        #map { position: absolute; inset: 0; z-index: 1; }
        .pointer-auto { pointer-events: auto; }

        /* HUD LAYOUT */
        .hud-container { position: absolute; inset: 0; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        
        .side-panel { width: 240px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 25px 20px; pointer-events: auto; }
        .panel-left { background: linear-gradient(to right, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 60%, transparent 100%); }
        .panel-right { background: linear-gradient(to left, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 60%, transparent 100%); align-items: center; }
        
        .panel-center { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding: 20px; position: relative; gap: 15px; }

        /* INSTRUMENTS */
        .val-giant { font-size: 5.5rem; font-weight: 900; color: var(--ktm); line-height: 1; text-align: center; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); }
        .val-label { font-size: 12px; color: #888; font-weight: bold; text-align: center; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        
        /* TÉLÉMÉTRIE */
        .telemetry-box { width: 100%; margin-top: 5px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px; }
        .tele-row { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; margin-bottom: 4px; font-weight: bold; }
        .tele-val { color: #fff; font-size: 13px; }

        /* JAUGE D'ANGLE VERTICALE */
        .vertical-gauge { width: 4px; height: 160px; background: rgba(50,50,50,0.6); border-radius: 2px; position: relative; margin: 15px 0; }
        .gauge-cursor { width: 18px; height: 6px; background: var(--ktm); position: absolute; left: -7px; top: 50%; transform: translateY(-50%); transition: top 0.1s; border-radius: 2px; box-shadow: 0 0 8px var(--ktm); }

        /* BOUTONS */
        .btn-ktm-ui { background: rgba(15,15,15,0.8); border: 1px solid #444; color: white; padding: 10px 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px; backdrop-filter: blur(5px); }
        .btn-ktm-ui:active { border-color: var(--ktm); color: var(--ktm); }
        
        #btn-rec { display: flex; align-items: center; gap: 8px; pointer-events: auto; }
        #btn-rec::before { content: ''; display: inline-block; width: 10px; height: 10px; background: red; border-radius: 50%; }
        .rec-active { border-color: red !important; box-shadow: 0 0 15px rgba(255,0,0,0.3); }
        .rec-active::before { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* NAVIGATION */
        .nav-instruction { background: rgba(15,15,15,0.95); border: 1px solid var(--ktm); border-radius: 8px; padding: 15px 25px; display: flex; align-items: center; gap: 15px; opacity: 0; transition: 0.3s; pointer-events: auto; min-width: 300px; box-shadow: 0 10px 20px rgba(0,0,0,0.6); }
        .nav-instruction.active { opacity: 1; }

        /* DRAPEAUX CARTE */
        .station-flag { background: rgba(15, 15, 15, 0.95); border: 2px solid var(--ktm); color: white; font-weight: bold; font-size: 13px; padding: 4px 8px; border-radius: 4px; position: relative; cursor: pointer; display: inline-block !important; white-space: nowrap !important; width: max-content !important; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .station-flag::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); border-width: 8px 6px 0; border-style: solid; border-color: var(--ktm) transparent transparent transparent; }

        /* MENUS LATÉRAUX */
        .drawer { position: fixed; background: rgba(10,10,10,0.98); z-index: 2000; transition: 0.4s; padding: 25px; border: 1px solid #333; pointer-events: auto; display: flex; flex-direction: column; }
        
        #settings-drawer { top: 0; right: -340px; width: 320px; height: 100%; border-left: 3px solid var(--ktm); }
        #settings-drawer.open { right: 0; }
        
        .menu-row { margin-bottom: 20px; flex-shrink: 0; }
        .search-input { width: 100%; background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 4px; margin-bottom: 10px; outline: none; }
        
        #search-results { position: relative; width: 100%; top: 5px; display: none; background: #111; max-height: 160px; overflow-y: auto; border: 1px solid #444; border-radius: 4px; }
        
        #fuel-drawer { bottom: -80%; left: 10%; right: 10%; height: 70%; border-top: 3px solid var(--ktm); border-radius: 10px 10px 0 0; }
        #fuel-drawer.open { bottom: 0; }
        .station-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #222; background: #151515; margin-bottom: 5px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="hud-container">
        
        <div class="side-panel panel-left">
            <div>
                <div class="val-label">Vitesse</div>
                <div class="val-giant" id="speed-val">0</div>
                <div class="telemetry-box">
                    <div class="tele-row">MAX <span class="tele-val" id="speed-max">0</span></div>
                    <div class="tele-row">MOY <span class="tele-val" id="speed-avg">0</span></div>
                    <button class="btn-ktm-ui" style="width:100%; font-size:10px; padding:5px; margin-top:5px;" onclick="MOTO_LOGIC.resetSpeed()">RST Vitesse</button>
                </div>
            </div>
            
            <div style="cursor: pointer;" onclick="window.open('https://meteofrance.com/', '_blank')">
                <div id="temp-val" style="font-size: 26px; font-weight: 900; color: #fff;">--°C</div>
                <div id="wind-val" style="font-size: 13px; color: #888;">Vent: -- km/h</div>
            </div>
        </div>

        <div class="panel-center">
            <button class="btn-ktm-ui rec-active" id="btn-rec" onclick="UI.toggleREC()">REC</button>
            
            <div class="nav-instruction" id="nav-instruction">
                <div id="nav-arrow" style="font-size: 40px; color: var(--ktm);">➔</div>
                <div style="flex-grow: 1;">
                    <div id="nav-dist" style="font-size: 24px; font-weight: 900;">-- m</div>
                    <div id="nav-text" style="color: #fff; font-size: 15px;">Calcul...</div>
                </div>
                <button onclick="MOTO_LOGIC.stopNav()" style="background:none; border:none; color:#555; font-size:20px;">✖</button>
            </div>

            <div style="position: absolute; top: 20px; right: 20px; pointer-events: auto;">
                <div style="color: var(--ktm); font-size: 32px; cursor: pointer; text-shadow: 0 0 10px #000;" onclick="UI.toggleSettings()">⋮</div>
            </div>
        </div>

        <div class="side-panel panel-right">
            <div style="width:100%;">
                <div class="val-label">Inclinaison</div>
                <div class="val-giant" style="color:#fff;" id="angle-val">0°</div>
                <div class="telemetry-box">
                    <div class="tele-row">MAX <span class="tele-val" id="angle-max">0°</span></div>
                    <div class="tele-row">MOY <span class="tele-val" id="angle-avg">0°</span></div>
                </div>
            </div>

            <div class="vertical-gauge">
                <div class="gauge-cursor" id="gauge-cursor"></div>
            </div>

            <button class="btn-ktm-ui" style="width: 100%; border-color: #333; color: #888;" onclick="MOTO_LOGIC.setZeroAngle()">ZÉRO</button>
        </div>
    </div>

    <div id="settings-drawer" class="drawer">
        <h2 style="color: var(--ktm); margin-bottom: 20px; flex-shrink: 0;">SYSTEM HUB</h2>
        
        <div class="menu-row">
            <div class="val-label" style="text-align:left;">Recherche Destination</div>
            <input type="text" id="search-input" class="search-input" placeholder="Ville, adresse...">
            <button class="btn-ktm-ui" style="width:100%; background:var(--ktm); color:black;" onclick="MOTO_LOGIC.searchLocation()">CHERCHER</button>
            <div id="search-results"></div>
        </div>

        <div class="menu-row" style="border-top: 1px solid #333; padding-top:20px;">
            <button class="btn-ktm-ui" style="width:100%;" onclick="MOTO_LOGIC.scanFuel()">⛽ SCAN CARBURANTS</button>
        </div>

        <div class="menu-row" style="border-top: 1px solid #333; padding-top:20px;">
            <div class="val-label" style="text-align:left;">Rayon : <span id="rad-disp">50</span> km</div>
            <input type="range" min="1" max="50" value="50" oninput="document.getElementById('rad-disp').innerText=this.value; CONFIG_KTM.RAYON_RECHERCHE=this.value">
        </div>

        <button class="btn-ktm-ui" style="width: 100%; margin-top: auto; border-color:#555; flex-shrink: 0;" onclick="UI.closeAllDrawers()">RETOUR CARTE</button>
    </div>

    <div id="fuel-drawer" class="drawer">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-shrink: 0;">
            <h3 style="color: var(--ktm);">STATIONS PROCHES</h3>
            <div style="display:flex; align-items:center; gap:10px; font-size:12px; color:#888;">
                DRAPEAUX <label class="switch"><input type="checkbox" id="toggle-flags" checked onchange="MOTO_LOGIC.toggleMarkers()"><span class="slider"></span></label>
            </div>
        </div>
        <div id="fuel-list-content" style="overflow-y: auto; flex-grow: 1;"></div>
    </div>

    <script>
        var map, userMarker;
        var userPos = { lat: 43.761, lng: 1.990 }; 
        var angleOffset = 0, currentBeta = 0;
        var stats = { speed: { max: 0, sum: 0, count: 0 }, angle: { max: 0, sum: 0, count: 0 } };
        var isRecording = false, recordedTrack = [], stationsData = [], markers = [];

        function getDistance(lat1, lon1, lat2, lon2) {
            var p = 0.01745;
            var a = 0.5 - Math.cos((lat2 - lat1) * p)/2 + Math.cos(lat1 * p) * Math.cos(lat2 * p) * (1 - Math.cos((lon2 - lon1) * p))/2;
            return (12742 * Math.asin(Math.sqrt(a))).toFixed(1);
        }

        var MOTO_LOGIC = {
            initSystem: function() {
                map = new maplibregl.Map({
                    container: 'map',
                    style: {
                        version: 8,
                        sources: { 'osm': { type: 'raster', tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'], tileSize: 256 } },
                        layers: [{ id: 'osm', type: 'raster', source: 'osm' }]
                    },
                    center: [userPos.lng, userPos.lat], zoom: 15, pitch: CONFIG_KTM.PITCH_3D, antialias: true
                });

                var el = document.createElement('div');
                el.style = "width:20px; height:20px; background:#00ccff; border-radius:50%; border:3px solid #fff; box-shadow:0 0 10px #00ccff;";
                userMarker = new maplibregl.Marker(el).setLngLat([userPos.lng, userPos.lat]).addTo(map);

                // --- NOUVEAUTÉ V30 : CLIC SUR LA CARTE = FERMETURE DES MENUS ---
                map.on('click', function() {
                    UI.closeAllDrawers();
                });

                this.startSensors();
            },

            startSensors: function() {
                navigator.geolocation.watchPosition(function(p) {
                    userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                    var s = Math.round(p.coords.speed * 3.6) || 0;
                    document.getElementById('speed-val').innerText = s;
                    
                    if(s > 0) {
                        stats.speed.max = Math.max(stats.speed.max, s);
                        stats.speed.sum += s; stats.speed.count++;
                        document.getElementById('speed-max').innerText = stats.speed.max;
                        document.getElementById('speed-avg').innerText = Math.round(stats.speed.sum/stats.speed.count);
                    }

                    userMarker.setLngLat([userPos.lng, userPos.lat]);
                    if(isRecording) recordedTrack.push(userPos);
                    
                    if(document.getElementById('nav-instruction').classList.contains('active')) {
                        map.easeTo({ center: [userPos.lng, userPos.lat], bearing: p.coords.heading || 0, pitch: CONFIG_KTM.PITCH_3D, zoom: CONFIG_KTM.ZOOM_NAV });
                    } else { map.panTo([userPos.lng, userPos.lat]); }
                    MOTO_LOGIC.updateWeather();
                }, null, { enableHighAccuracy: true });

                window.addEventListener('deviceorientation', function(e) {
                    if(!e.beta) return;
                    currentBeta = e.beta;
                    var lean = Math.abs(Math.round(e.beta - angleOffset));
                    lean = Math.min(60, lean);
                    
                    stats.angle.max = Math.max(stats.angle.max, lean);
                    stats.angle.sum += lean; stats.angle.count++;

                    document.getElementById('angle-val').innerText = lean + "°";
                    document.getElementById('angle-max').innerText = stats.angle.max + "°";
                    document.getElementById('angle-avg').innerText = Math.round(stats.angle.sum/stats.angle.count) + "°";
                    
                    var pos = 50 + (((e.beta - angleOffset) / 60) * 50);
                    document.getElementById('gauge-cursor').style.top = Math.max(0, Math.min(100, pos)) + "%";
                });
            },

            resetSpeed: function() { stats.speed = { max:0, sum:0, count:0 }; document.getElementById('speed-max').innerText = "0"; document.getElementById('speed-avg').innerText = "0"; },
            
            setZeroAngle: function() { 
                angleOffset = currentBeta; 
                stats.angle = { max:0, sum:0, count:0 };
                document.getElementById('angle-max').innerText = "0°"; 
                document.getElementById('angle-avg').innerText = "0°";
            },

            searchLocation: async function() {
                var q = document.getElementById('search-input').value;
                if(q.length < 3) return;
                var resBox = document.getElementById('search-results');
                resBox.style.display = 'block'; resBox.innerHTML = "<div style='padding:10px; color:#fff;'>Recherche...</div>";
                try {
                    var r = await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=5`);
                    var d = await r.json();
                    if(d.length === 0) { resBox.innerHTML = "<div style='padding:10px; color:red;'>Aucun résultat.</div>"; return; }
                    resBox.innerHTML = d.map(p => `<div style="padding:15px; border-bottom:1px solid #333; cursor:pointer;" onclick="MOTO_LOGIC.startRouting(${p.lat}, ${p.lon}, '${p.display_name.split(',')[0]}')">📍 ${p.display_name}</div>`).join('');
                } catch(e) { resBox.style.display = 'none'; }
            },

            startRouting: async function(lat, lon, name) {
                UI.closeAllDrawers();
                try {
                    var r = await fetch(`https://router.project-osrm.org/route/v1/driving/${userPos.lng},${userPos.lat};${lon},${lat}?overview=full&geometries=geojson&steps=true`);
                    var d = await r.json();
                    if(d.code !== 'Ok') return;
                    
                    if(map.getSource('route')) { map.removeLayer('route-layer'); map.removeSource('route'); }
                    map.addSource('route', { type: 'geojson', data: d.routes[0].geometry });
                    map.addLayer({ id: 'route-layer', type: 'line', source: 'route', paint: { 'line-color': CONFIG_KTM.COULEUR_ACCENT, 'line-width': 8 } });

                    var step = d.routes[0].legs[0].steps[1] || d.routes[0].legs[0].steps[0];
                    document.getElementById('nav-instruction').classList.add('active');
                    document.getElementById('nav-dist').innerText = Math.round(step.distance) + " m";
                    document.getElementById('nav-text').innerText = "Vers " + name;
                    map.easeTo({ center: [userPos.lng, userPos.lat], pitch: CONFIG_KTM.PITCH_3D, zoom: CONFIG_KTM.ZOOM_NAV });
                } catch(e) { alert("Erreur de calcul d'itinéraire."); }
            },

            stopNav: function() { document.getElementById('nav-instruction').classList.remove('active'); if(map.getSource('route')) { map.removeLayer('route-layer'); map.removeSource('route'); } },

            scanFuel: async function() {
                UI.closeAllDrawers();
                document.getElementById('fuel-drawer').classList.add('open');
                var list = document.getElementById('fuel-list-content');
                list.innerHTML = "<div style='padding:20px; text-align:center;'>Recherche stations...</div>";
                try {
                    var r = await fetch(`https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?where=within_distance(geom%2C%20geom'POINT(${userPos.lng}%20${userPos.lat})'%2C%20${CONFIG_KTM.RAYON_RECHERCHE}km)&limit=40`);
                    var d = await r.json();
                    markers.forEach(m => m.remove()); markers = [];
                    stationsData = d.results.map(s => {
                        var p = s[CONFIG_KTM.CARBURANT_PREF.toLowerCase() + "_prix"];
                        var el = document.createElement('div'); el.className = 'station-flag'; el.innerHTML = p ? p+'€' : 'N.C';
                        el.onclick = () => MOTO_LOGIC.startRouting(s.geom.lat, s.geom.lon, s.ville);
                        var marker = new maplibregl.Marker(el).setLngLat([s.geom.lon, s.geom.lat]);
                        markers.push(marker); if(document.getElementById('toggle-flags').checked) marker.addTo(map);
                        return { ville: s.ville, prix: p || 999, dist: getDistance(userPos.lat, userPos.lng, s.geom.lat, s.geom.lon), lat: s.geom.lat, lon: s.geom.lon };
                    });
                    MOTO_LOGIC.sortStations('dist');
                } catch(e) { list.innerHTML = "<div style='padding:20px; color:red; text-align:center;'>Erreur serveur.</div>"; }
            },

            sortStations: function(mode) {
                stationsData.sort((a,b) => mode === 'dist' ? a.dist - b.dist : a.prix - b.prix);
                document.getElementById('fuel-list-content').innerHTML = stationsData.map(s => `
                    <div class="station-item">
                        <div><b style="color:white; font-size:16px;">${s.ville}</b><br><small style="color:#aaa;">${s.dist} km</small></div>
                        <div style="font-size:20px; font-weight:bold; color:${s.prix === 999 ? '#666' : 'var(--ktm)'}">${s.prix === 999 ? 'N.C' : s.prix+'€'}</div>
                        <button class="btn-ktm-ui" onclick="MOTO_LOGIC.startRouting(${s.lat}, ${s.lon}, '${s.ville}')">GO</button>
                    </div>`).join('');
            },

            toggleMarkers: function() { var on = document.getElementById('toggle-flags').checked; markers.forEach(m => on ? m.addTo(map) : m.remove()); },

            updateWeather: async function() {
                try {
                    var r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${userPos.lat}&longitude=${userPos.lng}&current_weather=true`);
                    var d = await r.json();
                    document.getElementById('temp-val').innerText = Math.round(d.current_weather.temperature) + "°C";
                    document.getElementById('wind-val').innerText = "Vent: " + Math.round(d.current_weather.windspeed) + " km/h";
                } catch(e) {}
            }
        };

        var UI = {
            toggleSettings: function() { 
                var drawer = document.getElementById('settings-drawer');
                if(drawer.classList.contains('open')) {
                    this.closeAllDrawers();
                } else {
                    this.closeAllDrawers(); // Ferme les carburants si ouvert
                    drawer.classList.add('open');
                }
            },
            
            // --- NOUVELLE FONCTION UNIVERSELLE DE FERMETURE ---
            closeAllDrawers: function() {
                var sDrawer = document.getElementById('settings-drawer');
                var fDrawer = document.getElementById('fuel-drawer');
                
                // On referme le grand menu et on vide la recherche pour faire propre
                if(sDrawer.classList.contains('open')) {
                    sDrawer.classList.remove('open');
                    document.getElementById('search-input').value = "";
                    document.getElementById('search-results').style.display = "none";
                }
                
                // On referme le tiroir du bas
                if(fDrawer.classList.contains('open')) {
                    fDrawer.classList.remove('open');
                }
            },

            toggleREC: function() {
                isRecording = !isRecording; var btn = document.getElementById('btn-rec');
                if(isRecording) { btn.classList.add('rec-active'); recordedTrack = []; }
                else {
                    btn.classList.remove('rec-active');
                    if(recordedTrack.length > 0 && confirm("Sauvegarder la trace GPX ?")) {
                        var gpx = '<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1"><trk><trkseg>' + recordedTrack.map(p => `<trkpt lat="${p.lat}" lon="${p.lng}"></trkpt>`).join('') + '</trkseg></trk></gpx>';
                        var a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([gpx], {type:"application/gpx+xml"}));
                        a.download = "Rando_KTM.gpx"; a.click();
                    }
                }
            }
        };

        window.onload = MOTO_LOGIC.initSystem;
    </script>
</body>
</html>
