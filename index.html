<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>KTM RACING HUD - V120 ROTATION</title>
    
    <script>
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            MAP_NIGHT: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
            MAP_DAY: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
            DEFAULT_ZOOM: 17,
            ROUTING_API: 'https://router.project-osrm.org/route/v1/driving/',
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records'
        };
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --ktm: #FF6600; --carbon: #0a0a0a; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: white; font-family: 'Saira Condensed', sans-serif; overflow: hidden; }
        
        /* TRANSITION DE ROTATION SUR LA CARTE */
        #map { position: fixed; inset: 0; z-index: 1; filter: brightness(0.7); transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        /* BOUTONS NAVIGATION */
        .ui-btn { position: fixed; width: 55px; height: 55px; z-index: 2000; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); border-radius: 50%; border: 1.5px solid var(--ktm); color: white; cursor: pointer; }
        #btn-lock { top: 15px; left: 15px; }
        #btn-lock.active { background: var(--ktm); color: black; box-shadow: 0 0 15px var(--ktm); }
        #btn-menu { top: 15px; right: 15px; }

        /* HUD CENTRAL - POSITIONNÉ TRÈS BAS */
        #hud-anchor { 
            position: fixed; bottom: -20px; left: 50%; transform: translateX(-50%); 
            width: 100%; max-width: 550px; height: 220px; z-index: 1000; 
            pointer-events: none; background: linear-gradient(to top, black 30%, transparent); 
        }
        .arc-svg { width: 100%; height: 100%; }
        .arc-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 5; }
        .arc-val { fill: none; stroke: var(--ktm); stroke-width: 10; stroke-linecap: round; transition: 0.3s; }

        #speed-wrap { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); text-align: center; }
        .speed-val { font-size: 6rem; font-weight: 900; line-height: 0.8; }
        .speed-unit { font-size: 1rem; color: var(--ktm); font-weight: 800; letter-spacing: 2px; }

        /* TBT NAVIGATION COMPACT */
        #nav-msg { 
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.9); border-left: 5px solid var(--ktm); 
            padding: 12px 25px; border-radius: 4px; display: none; z-index: 1500; 
            align-items: center; gap: 20px; width: 85%; max-width: 400px; 
        }

        /* DASHBOARD BAS */
        #dash-bar { position: fixed; bottom: 0; width: 100%; height: 50px; display: grid; grid-template-columns: repeat(4, 1fr); z-index: 1100; border-top: 1px solid rgba(255,102,0,0.2); background: rgba(0,0,0,0.8); }
        .dash-item { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .dash-v { font-size: 1.1rem; font-weight: 900; }
        .dash-l { font-size: 0.6rem; color: #666; text-transform: uppercase; }

        /* MENU FULL SCREEN */
        #drawer { position: fixed; inset: 0; background: var(--carbon); z-index: 3000; transform: translateY(100%); transition: 0.4s ease-out; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        #drawer.open { transform: translateY(0); }
        .btn-action { width: 100%; padding: 22px; background: var(--ktm); border: none; border-radius: 12px; font-weight: 900; font-size: 1.3rem; margin-bottom: 15px; color: black; font-family: inherit; cursor: pointer; }
        input { width: 100%; padding: 20px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 12px; font-size: 1.2rem; margin-bottom: 15px; box-sizing: border-box; font-family: inherit; }
        
        .st-card { background: #151515; padding: 15px; border-radius: 12px; border-left: 4px solid var(--ktm); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        #status-log { position: fixed; top: 20px; left: 80px; font-size: 0.7rem; color: var(--ktm); z-index: 2000; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="status-log">> KTM READY</div>

    <div id="btn-lock" class="ui-btn active" onclick="APP.toggleLock()">🔒</div>
    <div id="btn-menu" class="ui-btn" onclick="APP.toggleDrawer()">☰</div>

    <div id="nav-msg">
        <span id="nav-icon" style="font-size: 2.5rem; color:var(--ktm)">⬆️</span>
        <div style="flex-grow:1">
            <div id="nav-dist" style="font-size: 1.8rem; font-weight: 900;">---</div>
            <div id="nav-dest" style="font-size: 0.7rem; opacity: 0.6; text-transform: uppercase;">DESTINATION</div>
        </div>
        <div onclick="APP.clearNav()" style="font-size: 1.5rem; color:#888;">✕</div>
    </div>

    <div id="hud-anchor">
        <svg class="arc-svg" viewBox="0 0 400 200">
            <path class="arc-bg" d="M 70 170 A 130 130 0 0 1 330 170" />
            <path id="arc-speed" class="arc-val" d="M 70 170 A 130 130 0 0 1 330 170" stroke-dasharray="390" stroke-dashoffset="390" />
        </svg>
        
        <div id="speed-wrap">
            <div class="speed-val" id="ui-speed">000</div>
            <div class="speed-unit">KM/H</div>
        </div>
    </div>

    <div id="dash-bar">
        <div class="dash-item" onclick="APP.toggleRec()"><div class="dash-v" id="rec-icon" style="color:red;">🔴</div><div class="dash-l">GPX REC</div></div>
        <div class="dash-item"><div class="dash-v" id="ui-alt">---</div><div class="dash-l">ALTITUDE</div></div>
        <div class="dash-item" onclick="APP.fetchWeather()"><div class="dash-v" id="ui-temp">--°</div><div class="dash-l">METEO</div></div>
        <div class="dash-item" onclick="APP.recenter()"><div class="dash-v">🎯</div><div class="dash-l">CENTER</div></div>
    </div>

    <div id="drawer">
        <div style="text-align:right; font-size:2.5rem; color:var(--ktm); font-weight:bold;" onclick="APP.toggleDrawer()">✕</div>
        <h2 style="color:var(--ktm); margin-top:0; border-bottom: 2px solid var(--ktm); padding-bottom: 10px;">MISSION CONTROL</h2>
        
        <input type="text" id="in-dest" placeholder="Ex: V and B Sequestre, Albi...">
        <button class="btn-action" onclick="APP.searchPlace()">LANCER LE GUIDAGE</button>
        
        <h2 style="color:var(--ktm); margin-top:30px;">STATIONS PROCHES</h2>
        <button class="btn-action" style="background:#222; color:var(--ktm);" onclick="APP.scanFuel()">SCANNER 15 KM</button>
        <div id="list-fuel"></div>

        <div style="margin-top:40px; border-top:1px solid #333; padding-top:20px;">
            <button class="btn-action" style="background:#333; color:white;" onclick="APP.toggleTheme()">🌓 JOUR / NUIT</button>
            <button class="btn-action" style="background:#333; color:white;" onclick="APP.resetGyro()">📐 CALIBRER ANGLE</button>
        </div>
    </div>

    <script>
        const APP = {
            map: null, userMarker: null, navLine: null, tiles: null,
            isLocked: true, isNight: true, lastLat: 43.76, lastLng: 1.99,
            lastHeading: 0, offset: 0, lastRaw: 0, isRecording: false, track: [],

            init: function() {
                this.map = L.map('map', { zoomControl: false, attributionControl: false }).setView([this.lastLat, this.lastLng], CONFIG.DEFAULT_ZOOM);
                this.tiles = L.tileLayer(CONFIG.MAP_NIGHT).addTo(this.map);
                
                // Point utilisateur "fixe" visuellement par rapport au HUD
                this.userMarker = L.circleMarker([0,0], {radius: 12, color: '#fff', fillColor: CONFIG.KTM_ORANGE, fillOpacity: 1, weight:3, zIndexOffset: 1000}).addTo(this.map);
                
                this.startSensors();
            },

            // LOGIQUE DE ROTATION ET DE DÉCALAGE
            recenter: function() {
                if(!this.lastLat) return;
                
                // 1. Gérer la rotation de la carte selon le cap (Heading)
                // On utilise le heading GPS ou une boussole logicielle
                const mapDiv = document.getElementById('map');
                mapDiv.style.transform = `rotate(${-this.lastHeading}deg)`;

                // 2. Calculer le décalage (Offset) pour placer le point au dessus du HUD
                // On centre sur la position de l'utilisateur
                const userPoint = this.map.project([this.lastLat, this.lastLng], this.map.getZoom());
                
                // On décale de 30% vers le bas pour "remonter" la route
                const offsetPixels = window.innerHeight * 0.30;
                
                // Attention : comme la carte tourne, le décalage doit être calculé 
                // selon l'angle actuel pour rester "devant" la moto
                const angleRad = (this.lastHeading * Math.PI) / 180;
                userPoint.x += offsetPixels * Math.sin(angleRad);
                userPoint.y -= offsetPixels * Math.cos(angleRad);

                const targetLatLng = this.map.unproject(userPoint, this.map.getZoom());
                this.map.setView(targetLatLng, this.map.getZoom(), {animate: false});
            },

            startSensors: function() {
                navigator.geolocation.watchPosition(p => {
                    this.lastLat = p.coords.latitude;
                    this.lastLng = p.coords.longitude;
                    
                    // Mise à jour du cap (Heading) pour la rotation
                    if(p.coords.heading !== null) {
                        this.lastHeading = p.coords.heading;
                    }
                    
                    this.userMarker.setLatLng([this.lastLat, this.lastLng]);
                    
                    if(this.isLocked) this.recenter();

                    const spd = p.coords.speed ? Math.round(p.coords.speed * 3.6) : 0;
                    document.getElementById('ui-speed').innerText = spd.toString().padStart(3, '0');
                    document.getElementById('arc-speed').style.strokeDashoffset = 390 - (390 * Math.min(spd/180, 1));
                    document.getElementById('ui-alt').innerText = Math.round(p.coords.altitude || 0) + "M";
                    
                    if(this.isRecording) this.track.push({lat:this.lastLat, lng:this.lastLng, t:new Date().toISOString()});
                }, null, { enableHighAccuracy: true });
            },

            searchPlace: async function() {
                const query = document.getElementById('in-dest').value;
                if(!query) return;
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                    const data = await res.json();
                    if(data.length > 0) this.startNav(data[0].lat, data[0].lon, query);
                } catch(e) { alert("Erreur recherche"); }
            },

            startNav: async function(lat, lng, label) {
                const url = `${CONFIG.ROUTING_API}${this.lastLng},${this.lastLat};${lng},${lat}?overview=full&geometries=geojson`;
                const res = await fetch(url);
                const data = await res.json();
                
                if(this.navLine) this.map.removeLayer(this.navLine);
                this.navLine = L.geoJSON(data.routes[0].geometry, {style:{color:CONFIG.KTM_ORANGE, weight:8, opacity:0.8}}).addTo(this.map);
                
                document.getElementById('nav-msg').style.display = 'flex';
                document.getElementById('nav-dist').innerText = (data.routes[0].distance / 1000).toFixed(1) + " KM";
                document.getElementById('nav-dest').innerText = label;
                
                this.toggleDrawer();
                this.isLocked = true;
                this.recenter();
            },

            scanFuel: async function() {
                const list = document.getElementById('list-fuel');
                list.innerHTML = "SCAN...";
                const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${this.lastLng} ${this.lastLat})', 15000m)&limit=20`;
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    list.innerHTML = "";
                    data.results.forEach(st => {
                        const card = document.createElement('div');
                        card.className = "st-card";
                        card.innerHTML = `<div><b>${st.ville}</b><br><small>${st.nom || st.adresse}</small></div><button onclick="APP.startNav(${st.geom.lat}, ${st.geom.lon}, '${st.ville}')" style="background:var(--ktm); border:none; padding:12px; border-radius:8px; font-weight:bold;">GO</button>`;
                        list.appendChild(card);
                    });
                } catch(e) {}
            },

            toggleTheme: function() {
                this.isNight = !this.isNight;
                this.map.removeLayer(this.tiles);
                this.tiles = L.tileLayer(this.isNight ? CONFIG.MAP_NIGHT : CONFIG.MAP_DAY).addTo(this.map);
            },
            toggleLock: function() { this.isLocked = !this.isLocked; document.getElementById('btn-lock').classList.toggle('active', this.isLocked); },
            toggleDrawer: function() { document.getElementById('drawer').classList.toggle('open'); },
            clearNav: function() { if(this.navLine) this.map.removeLayer(this.navLine); document.getElementById('nav-msg').style.display = 'none'; },
            resetGyro: function() { this.offset = this.lastRaw; },
            fetchWeather: async function() {
                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${this.lastLat}&longitude=${this.lastLng}&current_weather=true`);
                    const data = await res.json();
                    document.getElementById('ui-temp').innerText = Math.round(data.current_weather.temperature) + "°";
                } catch(e) {}
            },
            toggleRec: function() {
                this.isRecording = !this.isRecording;
                document.getElementById('rec-icon').innerText = this.isRecording ? "⏹️" : "🔴";
                if(!this.isRecording && this.track.length > 0) {
                    let gpx = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1"><trk><trkseg>`;
                    this.track.forEach(p => gpx += `<trkpt lat="${p.lat}" lon="${p.lng}"><time>${p.t}</time></trkpt>`);
                    gpx += `</trkseg></trk></gpx>`;
                    const blob = new Blob([gpx], {type:'application/gpx+xml'});
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `TRIP.gpx`; a.click();
                }
            }
        };
        window.onload = () => APP.init();
    </script>
</body>
</html>
