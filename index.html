<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM 890 - V30 LIMIT PRO</title>
    
    <script>
        // PANNEAU DE CONTRÔLE (REGLAGES)
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            SAFE_GREEN: '#2ecc71',
            DANGER_RED: '#ff0000',
            ALERT_LIMIT: 48, // Limite physique repose-pieds
            MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records'
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        #map { position: absolute; width: 100%; height: 100%; z-index: 1; filter: brightness(0.35) contrast(1.5); }

        /* HUD CENTRAL DYNAMIQUE */
        #hud-container {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; height: 320px; z-index: 60; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }
        #aim-sphere { 
            position: absolute; width: 100%; height: 100%; 
            border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; 
            transition: all 0.2s ease; /* Fluidité de l'épaississement */
        }
        #horizon-gyro { position: absolute; top: 50%; width: 140%; left: -20%; height: 3px; transition: background 0.2s, box-shadow 0.2s; }
        #lean-display { position: absolute; width: 100%; top: 50%; transform: translateY(-50%); text-align: center; font-size: 4.5rem; font-weight: 900; text-shadow: 0 0 20px #000; }

        /* NAV OVERLAY */
        #nav-overlay { position: absolute; inset: 0; z-index: 150; display: none; background: #000; }
        #nav-overlay iframe { width: 100%; height: 100%; border: none; opacity: 0.85; }
        #close-nav { position: absolute; top: 85px; right: 20px; z-index: 160; background: #FF6600; color: #000; border: none; padding: 15px; font-weight: 900; border-radius: 4px; }

        /* UI HAUTE */
        #top-ui { position: absolute; top: 10px; width: 96%; left: 2%; z-index: 200; display: flex; gap: 10px; }
        #search-input { flex-grow: 1; background: rgba(0,0,0,0.85); border: 1px solid #FF6600; color: white; padding: 12px; border-radius: 4px; font-family: sans-serif; font-weight: bold; }
        .btn-ktm { background: #FF6600; color: #000; border: none; padding: 12px 20px; border-radius: 4px; font-weight: 900; cursor: pointer; }

        /* DASHBOARD BAS */
        #dashboard { position: absolute; bottom: 0; width: 100%; z-index: 100; display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(0,0,0,0.9); border-top: 2px solid #FF6600; }
        .widget { padding: 10px; text-align: center; border-right: 1px solid #333; }
        .label { font-size: 0.6rem; color: #FF6600; text-transform: uppercase; }
        .value { font-family: 'Barlow Condensed'; font-size: 2.2rem; font-weight: 900; }

        #speed-main { position: absolute; bottom: 130px; left: 4%; z-index: 110; font-family: 'Barlow Condensed'; font-size: 8rem; font-weight: 900; text-shadow: 0 0 30px #000; pointer-events: none; }
        .fuel-marker { background: #FF6600; color: #fff; padding: 4px 8px; border-radius: 4px; font-weight: 900; border: 2px solid white; font-size: 14px; }
    </style>
</head>
<body>

    <div id="top-ui">
        <input type="text" id="search-input" placeholder="DESTINATION (CALVI, AJACCIO...)">
        <button class="btn-ktm" onclick="startNav()">NAV</button>
        <button class="btn-ktm" style="background:#222; color:#FF6600;" onclick="findFuel()">FUEL</button>
        <button class="btn-ktm" style="background:#444; color:#fff;" onclick="calibrate()">ZERO</button>
    </div>

    <div id="nav-overlay">
        <button id="close-nav" onclick="stopNav()">FERMER NAV</button>
        <iframe id="nav-iframe"></iframe>
    </div>

    <div id="hud-container">
        <div id="lean-display">0°</div>
        <div id="aim-sphere"></div>
        <div id="horizon-gyro"></div>
    </div>

    <div id="speed-main">000</div>

    <div id="map"></div>

    <div id="dashboard">
        <div class="widget"><div class="label">Altitude</div><div id="alt" class="value">--</div></div>
        <div class="widget"><div class="label">Cap</div><div id="cap" class="value">---</div></div>
        <div class="widget"><div class="label">Distance</div><div id="dist" class="value">0.0</div></div>
        <div class="widget"><div class="label">Pitch</div><div id="pitch" class="value">0°</div></div>
    </div>

    <script>
        let map, userMarker, totalDist = 0, offset = 0, lastRaw = 0, smoothedLean = 0, lastCoord = null;
        let fuelLayer = L.layerGroup();

        function updateVisuals(angle) {
            const a = Math.abs(angle);
            const sphere = document.getElementById('aim-sphere');
            const gyro = document.getElementById('horizon-gyro');
            const display = document.getElementById('lean-display');
            
            let color = CONFIG.SAFE_GREEN;
            let weight = 1;
            let glow = 5;

            if (a >= 25 && a < 40) {
                color = CONFIG.KTM_ORANGE;
                weight = 3;
                glow = 15;
            } else if (a >= 40 && a < CONFIG.ALERT_LIMIT) {
                color = CONFIG.DANGER_RED;
                weight = 7;
                glow = 30;
            } else if (a >= CONFIG.ALERT_LIMIT) {
                color = '#ff0000'; // Rouge Vif
                weight = 12;
                glow = 50;
                // Effet de flash si on dépasse la limite
                sphere.style.opacity = (Math.floor(Date.now() / 200) % 2) ? "1" : "0.5";
            } else {
                sphere.style.opacity = "1";
            }

            sphere.style.borderColor = color;
            sphere.style.borderWidth = weight + "px";
            sphere.style.boxShadow = `0 0 ${glow}px ${color}, inset 0 0 ${glow/2}px ${color}`;
            
            gyro.style.background = color;
            gyro.style.boxShadow = `0 0 ${glow}px ${color}`;
            display.style.color = color;
            display.innerText = Math.round(a) + "°";
        }

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([42.15, 9.1], 14);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(map);
            fuelLayer.addTo(map);
            userMarker = L.circleMarker([0,0], { radius: 10, color: '#fff', fillColor: '#FF6600', fillOpacity: 1, weight: 3 }).addTo(map);

            window.addEventListener('deviceorientation', e => {
                let raw = (Math.abs(window.orientation) === 90) ? e.beta : e.gamma;
                lastRaw = raw;
                let current = raw - offset;

                // FILTRE STABLE-LOCK (Lissage 95%)
                if (Math.abs(current - smoothedLean) > 1.2) {
                    smoothedLean = (smoothedLean * 0.95) + (current * 0.05);
                }
                
                document.getElementById('horizon-gyro').style.transform = `rotate(${smoothedLean}deg)`;
                updateVisuals(smoothedLean);
                document.getElementById('pitch').innerText = Math.round(e.beta) + "°";
            });

            navigator.geolocation.watchPosition(u => {
                const p = [u.coords.latitude, u.coords.longitude];
                userMarker.setLatLng(p);
                map.panTo(p);
                if (u.coords.heading !== null && u.coords.speed > 2) map.setBearing(u.coords.heading);
                
                const s = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0);
                document.getElementById('speed-main').innerText = s.toString().padStart(3, '0');
                if (u.coords.altitude) document.getElementById('alt').innerText = Math.round(u.coords.altitude) + "m";
                if (u.coords.heading) document.getElementById('cap').innerText = Math.round(u.coords.heading) + "°";

                if (lastCoord) totalDist += map.distance(lastCoord, p) / 1000;
                lastCoord = p;
                document.getElementById('dist').innerText = totalDist.toFixed(1);
            }, null, { enableHighAccuracy: true });
        }

        function startNav() {
            const dest = document.getElementById('search-input').value;
            if (!dest) return;
            document.getElementById('nav-iframe').src = `https://maps.google.com/maps?q=${encodeURIComponent(dest)}&output=embed`;
            document.getElementById('nav-overlay').style.display = 'block';
        }

        function stopNav() {
            document.getElementById('nav-overlay').style.display = 'none';
            document.getElementById('nav-iframe').src = '';
        }

        async function findFuel() {
            const c = map.getCenter();
            const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${c.lng} ${c.lat})', 40000)&limit=20`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                fuelLayer.clearLayers();
                data.results.forEach(st => {
                    let pVal = "?.??";
                    try {
                        let pArr = JSON.parse(st.prix.replace(/'/g, '"'));
                        let sp95 = pArr.find(p => p["@nom"].includes("95")) || pArr[0];
                        pVal = parseFloat(sp95["@valeur"]).toFixed(2);
                    } catch(e) {}
                    L.marker([st.geom.lat, st.geom.lon], {
                        icon: L.divIcon({ html: `<div class="fuel-marker">${pVal}€</div>`, iconSize: [45, 20] })
                    }).addTo(fuelLayer);
                });
            } catch(e) { alert("Fuel API Error"); }
        }

        function calibrate() { offset = lastRaw; }
        window.onload = init;
    </script>
</body>
</html>
