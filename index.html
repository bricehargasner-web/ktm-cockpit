<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Energy Concept - SmartBite Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ==========================================================
           1. CONFIGURATION (Lignes 1-20)
           ========================================================== */
        :root {
            --neon: #00ff88;
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --danger: #f85149;
        }

        body { 
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; 
            background: var(--bg); color: var(--text); overflow: hidden;
        }

        /* 2. SEGMENTATION : INTERFACE */
        .app-shell { display: flex; flex-direction: column; height: 100vh; }
        
        .header { 
            padding: 10px 15px; background: var(--card); border-bottom: 1px solid #30363d;
            display: flex; justify-content: space-between; align-items: center;
        }

        .main-display { flex: 1; padding: 10px; overflow-y: auto; position: relative; }

        .status-hero {
            background: #21262d; border-radius: 12px; padding: 20px; text-align: center;
            border: 2px solid #30363d; margin-bottom: 15px; transition: 0.3s;
        }
        .status-hero.active { border-color: var(--neon); box-shadow: 0 0 15px rgba(0,255,136,0.2); }
        .status-hero.hit { background: var(--danger); color: white; border-color: white; }

        /* Panneau de paramètres coulissant */
        #settingsPanel {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--card);
            border-radius: 20px 20px 0 0; transform: translateY(100%);
            transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); padding: 20px; z-index: 100;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        #settingsPanel.open { transform: translateY(0); }

        .btn { 
            border: none; border-radius: 8px; padding: 12px 20px; font-weight: bold; 
            cursor: pointer; transition: 0.2s;
        }
        .btn-neon { background: var(--neon); color: black; }
        .btn-outline { background: transparent; border: 1px solid #30363d; color: var(--text); }
        .btn-stop { background: var(--danger); color: white; }

        .control-group { margin-bottom: 15px; }
        input[type=range] { width: 100%; accent-color: var(--neon); }
        
        #windy-widget { width: 100%; height: 250px; border-radius: 12px; border: 1px solid #30363d; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="header">
        <b style="color: var(--neon)">SMARTBITE PRO</b>
        <button class="btn btn-outline" onclick="toggleSettings()">⚙️ RÉGLAGES</button>
    </div>

    <div class="main-display">
        <div id="hero" class="status-hero">SYSTÈME EN PAUSE</div>
        
        <canvas id="liveChart" style="height: 180px; width: 100%;"></canvas>

        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button id="startBtn" class="btn btn-neon" style="flex:2" onclick="startSystem()">DÉMARRER SCAN</button>
            <button id="stopBtn" class="btn btn-stop" style="flex:1; display:none" onclick="stopSystem()">STOP</button>
        </div>

        <div id="windy-container">
            <!-- Widget Windy intégré correctement -->
            <iframe id="windy-widget" 
                src="https://www.windy.com/multicast?43.604,2.243,9,m:eX3afWj" 
                frameborder="0"></iframe>
        </div>
    </div>
</div>

<!-- PANNEAU PARAMÈTRES -->
<div id="settingsPanel">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <h3>Configuration</h3>
        <button class="btn btn-outline" onclick="toggleSettings()">Fermer</button>
    </div>

    <div class="control-group">
        <label>Sensibilité du "Toc" : <b id="lblSens">0.3</b></label>
        <input type="range" id="rngSens" min="0.1" max="1.5" step="0.1" value="0.3">
    </div>

    <div class="control-group">
        <label>Volume : <b id="lblVol">70</b>%</label>
        <input type="range" id="rngVol" min="0" max="100" step="5" value="70">
    </div>

    <div class="control-group">
        <label>Vue temporelle (Zoom) : <b id="lblZoom">30</b> points</label>
        <input type="range" id="rngZoom" min="10" max="100" step="5" value="30">
    </div>
</div>

<script>
/* ==========================================================
   3. LOGIQUE FONCTIONNELLE
   ========================================================== */
let audioCtx = null;
let isRunning = false;
let isAlerting = false;
let threshold = 0.3;
let volume = 0.7;
let lastAcc = { x: 0, y: 0, z: 0 };
let zoom = 30;

// Initialisation Graphique
const ctx = document.getElementById('liveChart').getContext('2d');
const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: Array(100).fill(''),
        datasets: [{
            borderColor: '#00ff88',
            borderWidth: 2,
            data: Array(100).fill(0),
            fill: { target: 'origin', above: 'rgba(0, 255, 136, 0.05)' },
            pointRadius: 0,
            tension: 0.4
        }]
    },
    options: {
        responsive: true, maintainAspectRatio: false,
        scales: { y: { min: 0, max: 2, display: true, grid: { color: '#21262d' } }, x: { display: false } },
        plugins: { legend: { display: false } },
        animation: false
    }
});

function toggleSettings() {
    document.getElementById('settingsPanel').classList.toggle('open');
}

function startSystem() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    isRunning = true;
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'block';
    document.getElementById('hero').innerText = "SCAN EN COURS...";
    document.getElementById('hero').classList.add('active');
    
    if (typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission().then(res => { if(res === 'granted') listen(); });
    } else { listen(); }
}

function stopSystem() {
    isRunning = false;
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('stopBtn').style.display = 'none';
    document.getElementById('hero').innerText = "SYSTÈME EN PAUSE";
    document.getElementById('hero').classList.remove('active');
}

function listen() {
    window.addEventListener('devicemotion', (e) => {
        if (!isRunning || isAlerting) return;
        const acc = e.acceleration;
        if (!acc || acc.x === null) return;

        const delta = Math.abs(acc.x - lastAcc.x) + Math.abs(acc.y - lastAcc.y) + Math.abs(acc.z - lastAcc.z);
        lastAcc = { x: acc.x, y: acc.y, z: acc.z };

        // Mise à jour graphique avec gestion du zoom
        chart.data.datasets[0].data.push(delta);
        if (chart.data.datasets[0].data.length > zoom) {
            chart.data.datasets[0].data.shift();
        }
        chart.update();

        if (delta > threshold) triggerBip();
    });
}

function triggerBip() {
    isAlerting = true;
    const hero = document.getElementById('hero');
    hero.innerText = "!!! TOC !!!";
    hero.classList.add('hit');

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);

    setTimeout(() => {
        isAlerting = false;
        hero.innerText = "SCAN EN COURS...";
        hero.classList.remove('hit');
    }, 1000);
}

// Sliders
document.getElementById('rngSens').oninput = function() { threshold = this.value; document.getElementById('lblSens').innerText = this.value; };
document.getElementById('rngVol').oninput = function() { volume = this.value/100; document.getElementById('lblVol').innerText = this.value; };
document.getElementById('rngZoom').oninput = function() { 
    zoom = parseInt(this.value); 
    document.getElementById('lblZoom').innerText = this.value;
    // On réinitialise la taille du tableau pour le zoom
    chart.data.datasets[0].data = Array(zoom).fill(0);
};
</script>
</body>
</html>
