<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM Dash V9.2 - Black Box</title>
    
    <style>
        :root { --ktm: #ff6600; --bg: #000; --txt: #fff; --grey: #1a1a1a; --ok: #2ecc71; --err: #e74c3c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; user-select: none; }
        
        body { background: var(--bg); color: var(--txt); height: 100vh; overflow: hidden; display: flex; flex-direction: column; border-left: 3px solid var(--ktm); }

        /* --- BARRE D'ÉTAT LEDS --- */
        .status-bar { position: absolute; top: 10px; right: 10px; display: flex; gap: 8px; z-index: 100; }
        .led { width: 10px; height: 10px; border-radius: 50%; background: var(--err); box-shadow: 0 0 5px var(--err); }
        .led.active { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
        .led-label { font-size: 0.5rem; color: #555; text-align: center; margin-top: 12px; position: absolute; white-space: nowrap; }

        /* --- COMPTEUR & GAUGE --- */
        .gauge-container {
            position: relative; width: 100%; height: 130px;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #111 0%, #000 80%);
            border-bottom: 1px solid #333;
        }
        .angle-arc {
            position: absolute; width: 170px; height: 170px;
            border-radius: 50%; border: 6px solid #222;
            border-top-color: transparent; transform: rotate(-90deg);
            transition: 0.1s ease-out;
        }
        .speed-data { text-align: center; z-index: 10; }
        .speed-val { font-size: 3.8rem; line-height: 1; font-style: italic; }
        .speed-unit { font-size: 0.7rem; color: var(--ktm); display: block; }
        .angle-val { position: absolute; bottom: 5px; font-size: 1.4rem; font-weight: 900; }

        /* --- SUB-STATS --- */
        .sub-stats { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #333; }
        .stat-item { padding: 4px; border: 1px solid #050505; text-align: center; }
        .stat-label { font-size: 0.55rem; color: #666; text-transform: uppercase; }
        .stat-v { font-size: 0.85rem; font-weight: bold; }

        /* --- ACTIONS & SEARCH --- */
        .action-row { display: flex; border-bottom: 2px solid var(--ktm); }
        .meteo-btn { flex: 2; padding: 6px; font-size: 0.65rem; background: #080808; cursor: pointer; }
        .btn-rec { flex: 1; background: #111; border: none; color: #fff; font-size: 0.65rem; border-left: 1px solid #333; font-weight: bold; }
        .btn-rec.on { background: #900; animation: blink 1s infinite; }

        .search-area { padding: 8px; background: #050505; flex: 1; overflow-y: auto; }
        select { background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 6px; border-radius: 4px; flex: 1; font-size: 0.75rem; }
        .btn-scan { background: var(--ktm); color: #000; font-weight: 900; border: none; width: 100%; padding: 12px; margin-top: 5px; border-radius: 4px; font-size: 0.8rem; }

        /* --- MOUCHARD / CONSOLE --- */
        #mouchard {
            position: fixed; bottom: -180px; left: 0; width: 100%; height: 200px;
            background: rgba(0,0,0,0.95); border-top: 2px solid var(--ktm);
            transition: bottom 0.3s ease; z-index: 1000; padding: 10px;
        }
        #mouchard.open { bottom: 0; }
        .mouchard-handle { 
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            background: var(--ktm); color: #000; font-size: 0.6rem; padding: 5px 15px;
            border-radius: 10px 10px 0 0; font-weight: bold; cursor: pointer;
        }
        #console-log { font-family: monospace; font-size: 0.6rem; color: #0f0; overflow-y: auto; height: 100%; }

        /* --- STATIONS --- */
        .st-card { background: #111; margin-bottom: 6px; padding: 8px; border-radius: 4px; border-left: 3px solid var(--ktm); }
        .st-top { display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; }
        .st-price { color: var(--ktm); font-size: 1.1rem; font-weight: bold; }
        .go-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; margin-top: 4px; }
        .btn-go { background: #222; color: #fff; font-size: 0.5rem; padding: 5px 0; text-align: center; border-radius: 2px; text-decoration: none; border: 1px solid #333; }

        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="status-bar">
        <div id="led-gps" class="led"></div>
        <div id="led-gyro" class="led"></div>
    </div>

    <div class="gauge-container" onclick="MOTO.initGPS()">
        <div id="arc" class="angle-arc"></div>
        <div class="speed-data">
            <div id="speed" class="speed-val">0</div>
            <span class="speed-unit">KM/H</span>
        </div>
        <div id="lean-val" class="angle-val">0°</div>
        <div style="position:absolute; top:5px; font-size:0.5rem; color:#444;">CLIQUER ICI POUR RÉVEILLER</div>
    </div>

    <div class="sub-stats">
        <div class="stat-item"><div class="stat-label">Altitude</div><div id="alt" class="stat-v">-- m</div></div>
        <div class="stat-item"><div class="stat-label">Angle Max</div><div id="angle-max" class="stat-v">0°</div></div>
    </div>

    <div class="action-row">
        <div class="meteo-btn" onclick="window.open('https://meteofrance.com', '_blank')">
            <span id="m-temp" style="color:var(--ktm)">--°C</span> | <span id="m-wind">Vent: -- km/h</span>
            <div id="m-desc" style="color:#555; font-size:0.5rem">Météo France</div>
        </div>
        <button id="btn-rec" class="btn-rec" onclick="REC.toggle()">REC GPX</button>
    </div>

    <div class="search-area">
        <div style="display:flex; gap:4px;">
            <select id="fuel"><option value="Gazole">Gazole</option><option value="SP98">SP98</option><option value="SP95">SP95</option><option value="E10">E10</option><option value="E85">E85</option></select>
            <select id="sort"><option value="price">Prix €</option><option value="dist">Dist. km</option></select>
        </div>
        <button class="btn-scan" onclick="MOTO.scan()">⛽ SCAN STATIONS</button>
        <div id="results" style="margin-top:8px;"></div>
    </div>

    <div id="mouchard">
        <div class="mouchard-handle" onclick="document.getElementById('mouchard').classList.toggle('open')">CONSOLE SWIPE</div>
        <div id="console-log"></div>
    </div>

    <script>
        let userPos = { lat: 0, lon: 0 };
        let track = [], isRecording = false, maxLean = 0;

        const LOG = (msg) => {
            const c = document.getElementById('console-log');
            const now = new Date().toLocaleTimeString();
            c.innerHTML = `[${now}] ${msg}<br>` + c.innerHTML;
        };

        const MOTO = {
            initGPS() {
                LOG("Demande d'accès GPS...");
                navigator.geolocation.watchPosition(p => {
                    userPos = { lat: p.coords.latitude, lon: p.coords.longitude };
                    document.getElementById('speed').innerText = Math.round((p.coords.speed || 0) * 3.6);
                    document.getElementById('alt').innerText = p.coords.altitude ? Math.round(p.coords.altitude) + " m" : "-- m";
                    document.getElementById('led-gps').classList.add('active');
                    if(isRecording) track.push({ lat: userPos.lat, lon: userPos.lon });
                    this.updateWeather();
                }, e => {
                    LOG("ERREUR GPS: " + e.message);
                    document.getElementById('led-gps').classList.remove('active');
                }, { enableHighAccuracy: true });
            },

            async updateWeather() {
                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${userPos.lat}&longitude=${userPos.lon}&current_weather=true`);
                    const d = await res.json();
                    document.getElementById('m-temp').innerText = Math.round(d.current_weather.temperature) + "°C";
                    document.getElementById('m-wind').innerText = "Vent: " + Math.round(d.current_weather.windspeed) + " km/h";
                    LOG("Météo mise à jour.");
                } catch(e) { LOG("Echec Météo."); }
            },

            async scan() {
                if(!userPos.lat) { LOG("Scan impossible : Pas de GPS."); return; }
                const fuel = document.getElementById('fuel').value;
                const container = document.getElementById('results');
                LOG(`Recherche ${fuel} (Rayon 20km)...`);
                container.innerHTML = "<div style='color:var(--ktm); font-size:0.7rem;'>SCAN...</div>";

                try {
                    const url = `https://data.economie.gouv.fr/api/records/1.0/search/?dataset=prix-des-carburants-en-france-flux-instantane-v2&geofilter.distance=${userPos.lat},${userPos.lon},20000&rows=30`;
                    const res = await fetch(url);
                    const data = await res.json();
                    
                    let stations = [];
                    data.records.forEach(r => {
                        const prix = this.extract(r.fields, fuel);
                        if(prix) stations.push({ nom: r.fields.nom || r.fields.ville, ville: r.fields.ville, prix: prix, dist: this.dist(userPos.lat, userPos.lon, r.fields.geom[0], r.fields.geom[1]), lat: r.fields.geom[0], lon: r.fields.geom[1] });
                    });

                    stations.sort((a,b) => document.getElementById('sort').value === 'price' ? a.prix-b.prix : a.dist-b.dist);
                    LOG(`${stations.length} stations trouvées.`);

                    container.innerHTML = stations.map(s => `
                        <div class="st-card">
                            <div class="st-top">
                                <div><b>${s.nom.substring(0,12)}</b><br><small>${s.dist.toFixed(1)}km</small></div>
                                <div class="st-price">${s.prix.toFixed(3)}€</div>
                            </div>
                            <div class="go-grid">
                                <a class="btn-go" href="waze://?ll=${s.lat},${s.lon}&navigate=yes">WAZE</a>
                                <a class="btn-go" href="google.navigation:q=${s.lat},${s.lon}">MAPS</a>
                                <a class="btn-go" href="geo:${s.lat},${s.lon}">OSM</a>
                                <a class="btn-go" href="liberty-rider://navigation?lat=${s.lat}&lon=${s.lon}">LR</a>
                            </div>
                        </div>`).join('');
                } catch(e) { LOG("Erreur API."); }
            },

            extract(f, type) {
                const map = {"Gazole":"gazole_prix","SP98":"sp98_prix","SP95":"sp95_prix","E10":"e10_prix","E85":"e85_prix"};
                if(f[map[type]]) return parseFloat(f[map[type]]);
                try {
                    const arr = JSON.parse(f.prix);
                    const found = arr.find(x => x["@nom"] === type);
                    return found ? parseFloat(found["@valeur"]) : null;
                } catch(e) { return null; }
            },

            dist(la1, lo1, la2, lo2) {
                const p = 0.01745;
                const a = 0.5 - Math.cos((la2-la1)*p)/2 + Math.cos(la1*p)*Math.cos(la2*p)*(1-Math.cos((lo2-lo1)*p))/2;
                return 12742 * Math.asin(Math.sqrt(a));
            }
        };

        const REC = {
            toggle() {
                isRecording = !isRecording;
                const btn = document.getElementById('btn-rec');
                if(isRecording) { track = []; btn.classList.add('on'); btn.innerText = "FIN REC"; LOG("Enregistrement GPX démarré."); }
                else { btn.classList.remove('on'); btn.innerText = "REC GPX"; if(track.length > 5) this.save(); }
            },
            save() {
                const gpx = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1"><trk><trkseg>${track.map(p => `<trkpt lat="${p.lat}" lon="${p.lon}"></trkpt>`).join('')}</trkseg></trk></gpx>`;
                const blob = new Blob([gpx], {type:'application/gpx+xml'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `Trace_${Date.now()}.gpx`;
                a.click();
                LOG("Fichier GPX généré et téléchargé.");
            }
        };

        window.addEventListener("deviceorientation", (e) => {
            if(e.gamma === null) return;
            document.getElementById('led-gyro').classList.add('active');
            let lean = Math.round(e.gamma || 0);
            let absLean = Math.abs(lean);
            const arc = document.getElementById('arc');
            const valTxt = document.getElementById('lean-val');

            arc.style.transform = `rotate(${-90 + lean}deg)`;
            valTxt.innerText = absLean + "°";
            
            if(absLean > 35) { arc.style.borderColor = "red"; valTxt.style.color = "red"; }
            else if(absLean > 20) { arc.style.borderColor = "orange"; valTxt.style.color = "orange"; }
            else { arc.style.borderColor = "var(--ktm)"; valTxt.style.color = "white"; }

            if(absLean > maxLean) { maxLean = absLean; document.getElementById('angle-max').innerText = maxLean + "°"; }
        });

        window.onload = () => LOG("Système prêt. Cliquez sur le compteur pour démarrer.");
    </script>
</body>
</html>
