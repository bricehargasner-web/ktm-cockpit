<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM 890 - V27 GYRO-FIX</title>
    
    <script>
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records'
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        #map { position: absolute; width: 100%; height: 100%; z-index: 1; filter: brightness(0.65) contrast(1.2); }

        /* HUD CENTRAL RECALIBRÉ */
        #hud-container {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 280px; height: 280px; z-index: 60; pointer-events: none;
        }
        #aim-sphere { position: absolute; width: 100%; height: 100%; border: 1.5px solid rgba(255,102,0,0.4); border-radius: 50%; }
        #horizon-gyro { position: absolute; top: 50%; width: 140%; left: -20%; height: 2px; background: #FF6600; box-shadow: 0 0 15px #FF6600; transition: transform 0.1s linear; }
        #lean-display { position: absolute; width: 100%; top: 50%; transform: translateY(-50%); text-align: center; font-size: 3.5rem; font-weight: 900; color: #FF6600; text-shadow: 0 0 15px #000; }

        /* VITESSE */
        #speed-block {
            position: absolute; bottom: 18%; left: 3%; z-index: 80;
            text-align: left; pointer-events: none;
        }
        #speed-val { font-family: 'Barlow Condensed'; font-size: 7rem; font-weight: 900; line-height: 0.8; color: #FFF; text-shadow: 0 0 20px #000; }
        .unit { font-size: 1.5rem; color: #FF6600; font-weight: 900; margin-left: 10px; }

        /* TOP UI */
        #top-ui { position: absolute; top: 10px; width: 96%; left: 2%; z-index: 100; display: flex; gap: 10px; }
        .btn-ktm { background: rgba(0,0,0,0.8); color: #FF6600; border: 2px solid #FF6600; padding: 12px 25px; border-radius: 4px; font-weight: 900; cursor: pointer; }

        /* DASHBOARD */
        #dashboard { position: absolute; bottom: 0; width: 100%; z-index: 90; display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(0,0,0,0.85); border-top: 2px solid #FF6600; }
        .widget { padding: 12px; text-align: center; border-right: 1px solid #333; }
        .label { font-size: 0.7rem; color: #FF6600; font-weight: bold; }
        .value { font-family: 'Barlow Condensed'; font-size: 2rem; font-weight: 900; }

        .fuel-marker { background: #FF6600; color: #fff; padding: 4px 8px; border-radius: 4px; font-weight: 900; border: 2px solid white; font-size: 14px; }
    </style>
</head>
<body>

    <div id="top-ui">
        <button class="btn-ktm" onclick="calibrate()">ZERO</button>
        <button class="btn-ktm" style="background:#FF6600; color:#000;" onclick="findFuel()">⛽ ESSENCE</button>
        <div style="flex-grow:1"></div>
        <div style="font-size:0.6rem; text-align:right; color:#999;">KTM 890 ADV R<br>SYSTEM V27.GYRO</div>
    </div>

    <div id="hud-container">
        <div id="lean-display">0°</div>
        <div id="aim-sphere"></div>
        <div id="horizon-gyro"></div>
    </div>

    <div id="speed-block">
        <div id="speed-val">000</div>
        <span class="unit">KM/H</span>
    </div>

    <div id="map"></div>

    <div id="dashboard">
        <div class="widget"><div class="label">ALTITUDE</div><div id="alt" class="value">--</div></div>
        <div class="widget"><div class="label">CAP</div><div id="cap" class="value">---</div></div>
        <div class="widget"><div class="label">TRIP</div><div id="dist" class="value">0.0</div></div>
        <div class="widget"><div class="label">PITCH</div><div id="pitch" class="value">0°</div></div>
    </div>

    <script>
        let map, userMarker, totalDist = 0, offset = 0, lastVal = 0, smoothedLean = 0, lastCoord = null;
        let fuelLayer = L.layerGroup();

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([42.15, 9.1], 14);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(map);
            fuelLayer.addTo(map);
            userMarker = L.circleMarker([0,0], { radius: 10, color: '#fff', fillColor: '#FF6600', fillOpacity: 1, weight: 3 }).addTo(map);

            window.addEventListener('deviceorientation', e => {
                // DETECTION AUTO DE L'AXE SELON L'ORIENTATION
                let rawLean = 0;
                if (Math.abs(window.orientation) === 90) {
                    // MODE PAYSAGE : On utilise Beta
                    rawLean = e.beta; 
                } else {
                    // MODE PORTRAIT : On utilise Gamma
                    rawLean = e.gamma;
                }
                
                lastVal = rawLean;
                let currentAngle = rawLean - offset;

                // FILTRE PASSE-BAS (Lissage 85%)
                smoothedLean = (smoothedLean * 0.85) + (currentAngle * 0.15);
                
                document.getElementById('horizon-gyro').style.transform = `rotate(${smoothedLean}deg)`;
                document.getElementById('lean-display').innerText = Math.abs(Math.round(smoothedLean)) + "°";
                document.getElementById('pitch').innerText = Math.round(e.beta) + "°";
            });

            navigator.geolocation.watchPosition(u => {
                const p = [u.coords.latitude, u.coords.longitude];
                userMarker.setLatLng(p);
                map.panTo(p);

                if (u.coords.heading !== null && u.coords.speed > 1) {
                    map.setBearing(u.coords.heading);
                    document.getElementById('cap').innerText = Math.round(u.coords.heading) + "°";
                }

                const s = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0);
                document.getElementById('speed-val').innerText = s.toString().padStart(3, '0');
                if (u.coords.altitude) document.getElementById('alt').innerText = Math.round(u.coords.altitude) + "m";

                if (lastCoord) totalDist += map.distance(lastCoord, p) / 1000;
                lastCoord = p;
                document.getElementById('dist').innerText = totalDist.toFixed(1);
            }, null, { enableHighAccuracy: true });
        }

        async function findFuel() {
            const c = map.getCenter();
            const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${c.lng} ${c.lat})', 30000)&limit=20`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                fuelLayer.clearLayers();
                data.results.forEach(st => {
                    let prixLabel = "?.??";
                    try {
                        let prixArray = JSON.parse(st.prix.replace(/'/g, '"'));
                        let sp95 = prixArray.find(p => p["@nom"].includes("95")) || prixArray[0];
                        prixLabel = parseFloat(sp95["@valeur"]).toFixed(2);
                    } catch(e) {}

                    L.marker([st.geom.lat, st.geom.lon], {
                        icon: L.divIcon({ html: `<div class="fuel-marker">${prixLabel}€</div>`, iconSize: [50, 25] })
                    }).addTo(fuelLayer).bindPopup(`<b>${st.adresse}</b>`);
                });
            } catch(e) {}
        }

        function calibrate() { offset = lastVal; }
        window.onload = init;
    </script>
</body>
</html>
