<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KTM HUD V7.8 - LANDSCAPE ONLY</title>
<script>
/* --- PANNEAU DE CONTRÔLE ENERGY CONCEPT (MODIFIABLE) --- */
const CONFIG = {
    USER: "Brice CARDONA",
    KTM: '#FF6600',
    DANGER: '#FF0000',
    NORMAL: '#FFFFFF',
    START_ZOOM: 18,
    SCAN_RADIUS: 20000, 
    FUEL_TYPE: 'gazole_prix',
    DAMPING: 0.05,
    MAP_NIGHT: 'https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}{r}.png',
    MAP_DAY: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png'
};
</script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">

<style>
    :root { --ktm: #FF6600; --glass: rgba(0, 0, 0, 0.7); --txt: #FFFFFF; --dynamic-color: #FFFFFF; }
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Barlow Condensed', sans-serif; background: #000; overflow: hidden; color: var(--txt); }
    
    /* ALERTE MODE PORTRAIT */
    #landscape-alert {
        position: fixed; inset: 0; background: #000; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; padding: 20px; font-family: 'Orbitron';
    }
    @media (orientation: landscape) { #landscape-alert { display: none; } }

    #map-main { position: absolute; width: 100%; height: 100%; z-index: 1; filter: brightness(0.6); transition: filter 0.3s; }
    .day-mode-map { filter: brightness(1) !important; }

    .leaflet-control-scale-line { 
        background: rgba(0,0,0,0.5) !important; border: 1px solid var(--ktm) !important; 
        color: white !important; font-family: 'Orbitron' !important; font-size: 10px !important;
    }

    /* HUD CENTRAL */
    #hud-container { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 280px; z-index: 100; pointer-events: none; }
    #compass-frame { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--dynamic-color); position: relative; overflow: hidden; background: rgba(0,0,0,0.2); }
    #graduations { position: absolute; inset: 5px; border-radius: 50%; background: repeating-conic-gradient(from -0.5deg, var(--dynamic-color) 0deg 1deg, transparent 1deg 10deg); -webkit-mask-image: radial-gradient(circle, transparent 88%, black 89%); z-index: 105; }
    #horizon-bar { position: absolute; top: 50%; left: 0%; right: 0%; height: 3px; background: var(--dynamic-color); z-index: 140; transform-origin: center center; box-shadow: 0 0 15px var(--dynamic-color); }
    
    #cardinal-ring { position: absolute; width: 360px; height: 360px; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 110; }
    .cardinal { position: absolute; font-family: 'Orbitron'; font-weight: 900; font-size: 20px; color: var(--ktm); text-shadow: 0 0 8px #000; }
    #n { top: 0; left: 50%; transform: translateX(-50%); color: var(--dynamic-color); font-size: 24px; }
    #e { right: 0; top: 50%; transform: translateY(-50%); }
    #s { bottom: 0; left: 50%; transform: translateX(-50%); }
    #w { left: 0; top: 50%; transform: translateY(-50%); }

    /* DASHBOARD BAS : XXL TRANSPARENT */
    #dash-bottom { position: absolute; bottom: 5px; width: 100%; height: 85px; z-index: 500; display: grid; grid-template-columns: 1fr 1fr 1.5fr 1fr 1fr; background: transparent; pointer-events: none; align-items: end; }
    .widget { text-align: center; padding: 0; }
    .stat-label { font-size: 0.7rem; color: rgba(255,255,255,0.5); text-transform: uppercase; display: block; font-family: 'Orbitron'; margin-bottom: -5px; }
    .stat-value { font-size: 2.2rem; font-weight: 900; display: block; color: #FFF; text-shadow: 3px 3px 6px #000; font-family: 'Barlow Condensed'; }
    
    /* FOCUS VITESSE ET ANGLE */
    #v-speed { font-size: 5rem; line-height: 0.9; color: var(--ktm); font-family: 'Orbitron'; }
    #v-lean { font-size: 3rem; font-family: 'Orbitron'; }

    /* UI BOUTONS */
    .btn-ktm { background: var(--ktm); color: #000; border: none; padding: 12px 20px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; pointer-events: auto; }
    #search-box { position: absolute; top: 15px; left: 15px; z-index: 700; display: flex; }
    #top-right-ui { position: absolute; top: 15px; right: 15px; z-index: 700; display: flex; flex-direction: column; gap: 10px; }
    #map-tools { position: absolute; left: 15px; top: 55%; transform: translateY(-50%); z-index: 800; display: flex; flex-direction: column; gap: 8px; }
    .btn-tool { width: 45px; height: 45px; background: var(--glass); border: 1.5px solid var(--ktm); color: #fff; cursor: pointer; font-family: 'Orbitron'; }
</style>
</head>
<body>

<div id="landscape-alert">
    <div style="font-size: 40px; color: var(--ktm);">🔄</div>
    <h1 style="color: white; margin-top: 20px;">MISSION CONTROL</h1>
    <p style="color: var(--ktm);">BASCULEZ EN MODE PAYSAGE</p>
    <p style="font-size: 12px; color: #666;">BRICE CARDONA - ENERGY CONCEPT</p>
</div>

<div id="map-main"></div>

<div id="search-box">
    <input type="text" id="dest-input" style="background:var(--glass); border:1px solid var(--ktm); color:#fff; padding:12px; font-family:Orbitron;" placeholder="CITY...">
    <button class="btn-ktm" onclick="runSearch()">NAV</button>
</div>

<div id="top-right-ui">
    <button class="btn-ktm" onclick="scanFuel()">⛽ FUEL</button>
    <button class="btn-ktm" onclick="toggleSettings()">SET</button>
</div>

<div id="map-tools">
    <button class="btn-tool" onclick="mapZoom(1)">+</button>
    <button class="btn-tool" onclick="mapZoom(-1)">-</button>
    <button class="btn-tool" style="background:var(--ktm); color:#000;" onclick="recenterMap()">RTR</button>
</div>

<div id="dash-bottom">
    <div class="widget"><span class="stat-label">Alt</span><span id="v-alt" class="stat-value">---</span></div>
    <div class="widget"><span class="stat-label">Lean</span><span id="v-lean" class="stat-value">0°</span></div>
    <div class="widget"><span id="v-speed" class="stat-value">00</span><span class="stat-label" style="margin-top:5px;">KM/H</span></div>
    <div class="widget"><span class="stat-label">Cap</span><span id="v-cap" class="stat-value">---</span></div>
    <div class="widget"><span class="stat-label">Trip</span><span id="v-dist" class="stat-value">0.0</span></div>
</div>

<script>
let mainMap, zoomMap, fuelLayer, routeLayer, tileLayerMain, tileLayerZoom;
let userPos = [41.92, 8.73], lastPos = null, tripDist = 0, isFollow = true, curH = 0, tarH = 0;

function init() {
    mainMap = L.map('map-main', { zoomControl: false, attributionControl: false }).setView(userPos, CONFIG.START_ZOOM);
    tileLayerMain = L.tileLayer(CONFIG.MAP_NIGHT).addTo(mainMap);
    L.control.scale({ imperial: false, position: 'bottomleft' }).addTo(mainMap);
    
    zoomMap = L.map('map-zoom', { zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false, touchZoom: false }).setView(userPos, CONFIG.START_ZOOM + 1);
    tileLayerZoom = L.tileLayer(CONFIG.MAP_NIGHT).addTo(zoomMap);
    
    fuelLayer = L.layerGroup().addTo(mainMap);
    routeLayer = L.layerGroup().addTo(mainMap);
    mainMap.on('move', () => { zoomMap.setView(mainMap.getCenter(), mainMap.getZoom() + 1, { animate: false }); });
    mainMap.on('dragstart', () => isFollow = false);

    startGPS();
    animateHUD();
    window.addEventListener('deviceorientation', handleSensors);
}

function startGPS() {
    navigator.geolocation.watchPosition(p => {
        userPos = [p.coords.latitude, p.coords.longitude];
        if(isFollow) mainMap.panTo(userPos);
        document.getElementById('v-speed').innerText = p.coords.speed ? Math.round(p.coords.speed * 3.6) : "00";
        if(p.coords.altitude) document.getElementById('v-alt').innerText = Math.round(p.coords.altitude) + "m";
        tarH = p.coords.heading || 0;
        document.getElementById('v-cap').innerText = Math.round(tarH) + "°";
        if(lastPos) tripDist += (mainMap.distance(lastPos, userPos) / 1000);
        document.getElementById('v-dist').innerText = tripDist.toFixed(1);
        lastPos = userPos;
    }, null, { enableHighAccuracy: true });
}

function animateHUD() {
    let diff = tarH - curH;
    if (diff > 180) diff -= 360; if (diff < -180) diff += 360;
    curH += diff * CONFIG.DAMPING;
    document.getElementById('cardinal-ring').style.transform = `translate(-50%, -50%) rotate(${-curH}deg)`;
    document.getElementById('graduations').style.transform = `rotate(${-curH}deg)`;
    requestAnimationFrame(animateHUD);
}

function handleSensors(e) {
    let lean = Math.round(e.beta); 
    if (window.orientation === -90) lean = -lean;
    const abs = Math.abs(lean);
    let activeColor = CONFIG.NORMAL;
    if (abs >= 35) activeColor = CONFIG.DANGER;
    else if (abs >= 15) activeColor = CONFIG.KTM;
    document.documentElement.style.setProperty('--dynamic-color', activeColor);
    document.getElementById('horizon-bar').style.transform = `translateY(-50%) rotate(${-lean}deg)`;
    const txt = document.getElementById('v-lean');
    txt.innerText = abs + "°";
    txt.style.color = activeColor;
}

// Fonctions Navigation / Fuel simplifiées pour l'espace Paysage
async function scanFuel() {
    fuelLayer.clearLayers();
    const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?where=within_distance(geom, geom'POINT(${userPos[1]} ${userPos[0]})', ${CONFIG.SCAN_RADIUS}m)&limit=15`;
    try {
        const res = await fetch(url);
        const data = await res.json();
        data.results.forEach(st => {
            const p = parseFloat(st[CONFIG.FUEL_TYPE]);
            if(p) {
                L.marker([st.geom.lat, st.geom.lon], {
                    icon: L.divIcon({ html: `<div style="background:#FFF; color:#000; font-weight:900; padding:4px 8px; border:2px solid ${CONFIG.KTM}; border-radius:4px; font-size:16px;">${p.toFixed(2)}</div>` })
                }).addTo(fuelLayer).on('click', () => drawNav([st.geom.lat, st.geom.lon]));
            }
        });
    } catch(e) { console.error("API error"); }
}

async function runSearch() {
    const q = document.getElementById('dest-input').value;
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
    const data = await res.json();
    if(data[0]) drawNav([data[0].lat, data[0].lon]);
}

async function drawNav(target) {
    const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${userPos[1]},${userPos[0]};${target[1]},${target[0]}?overview=full&geometries=geojson`);
    const data = await res.json();
    routeLayer.clearLayers();
    if(data.routes[0]) {
        const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
        L.polyline(coords, { color: CONFIG.KTM, weight: 8, opacity: 0.8 }).addTo(routeLayer);
        mainMap.fitBounds(routeLayer.getBounds());
    }
}

function mapZoom(d) { mainMap.setZoom(mainMap.getZoom() + d); }
function recenterMap() { isFollow = true; mainMap.panTo(userPos); }
function toggleSettings() { alert("Radius: " + (CONFIG.SCAN_RADIUS/1000) + "km\nUse RTR to follow GPS."); }

window.onload = init;
</script>
</body>
</html>
