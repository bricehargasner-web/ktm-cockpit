<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moto Dash</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
:root {
    --orange:#FF6B00;
}

body {
    background:black;
    color:white;
    font-family:sans-serif;
    margin:0;
    overflow:hidden;
}

.card {
    background:#111;
    border-left:4px solid var(--orange);
    padding:8px;
}

.big {
    font-size:28px;
    font-weight:bold;
}

.btn {
    background:#222;
    padding:10px;
    font-size:14px;
    border-radius:6px;
}

.btn-orange {
    background:var(--orange);
}

.station {
    background:#111;
    padding:8px;
    border-bottom:1px solid #222;
}
</style>
</head>

<body>

<div class="flex flex-col h-screen">

<!-- TOP -->
<div class="card flex justify-between items-center">

    <div>
        <div>Angle</div>
        <div id="angle" class="big">0°</div>
    </div>

    <div>
        <div>Vitesse</div>
        <div id="speed" class="big">0</div>
    </div>

    <div>
        <div>Temp</div>
        <div id="temp" class="big">--°</div>
    </div>

</div>

<!-- CONTROLS -->
<div class="flex gap-2 p-2">

<select id="radius" class="btn">
    <option value="2000">2km</option>
    <option value="5000">5km</option>
    <option value="10000">10km</option>
</select>

<button onclick="scanStations()" class="btn btn-orange flex-1">
SCAN
</button>

</div>

<!-- STATIONS -->
<div id="stations" class="flex-1 overflow-auto"></div>

</div>

<script>

// ======================
// GPS SPEED
// ======================
navigator.geolocation.watchPosition((pos)=>{
    let speed = pos.coords.speed;
    if(speed){
        speed = speed * 3.6;
        document.getElementById("speed").innerText = Math.round(speed);
    }

    currentLat = pos.coords.latitude;
    currentLon = pos.coords.longitude;

    getWeather(currentLat,currentLon);

},console.error,{enableHighAccuracy:true});

// ======================
// ANGLE
// ======================
let lastAngle = 0;

window.addEventListener("deviceorientation",(e)=>{
    let angle = Math.abs(e.gamma || 0);
    angle = lastAngle*0.8 + angle*0.2;
    lastAngle = angle;

    document.getElementById("angle").innerText = Math.round(angle);
});

// ======================
// WEATHER
// ======================
async function getWeather(lat,lon){
    try{
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
        const data = await res.json();

        document.getElementById("temp").innerText =
            Math.round(data.current_weather.temperature) + "°";

    }catch(e){}
}

// ======================
// STATIONS (OSM)
// ======================
let currentLat=0,currentLon=0;

async function scanStations(){

    const radius = document.getElementById("radius").value;

    const query = `
    [out:json];
    node["amenity"="fuel"](around:${radius},${currentLat},${currentLon});
    out;
    `;

    const res = await fetch("https://overpass-api.de/api/interpreter",{
        method:"POST",
        body:query
    });

    const data = await res.json();

    renderStations(data.elements);
}

// ======================
// RENDER
// ======================
function renderStations(list){

    const container = document.getElementById("stations");

    container.innerHTML = list.map(s=>{

        const name = s.tags?.name || "Station";
        const lat = s.lat;
        const lon = s.lon;

        return `
        <div class="station flex justify-between items-center">

            <div>
                <div style="color:var(--orange)">${name}</div>
            </div>

            <div class="flex gap-2">
                <button class="btn" onclick="openWaze(${lat},${lon})">WZ</button>
                <button class="btn" onclick="openGM(${lat},${lon})">GM</button>
            </div>

        </div>
        `;

    }).join("");
}

// ======================
// NAVIGATION
// ======================
function openWaze(lat,lon){
    window.location.href = `waze://?ll=${lat},${lon}&navigate=yes`;
}

function openGM(lat,lon){
    window.location.href = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;
}

</script>

</body>
</html>
