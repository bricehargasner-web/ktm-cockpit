<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM HUD V68 - MISSION CONTROL</title>
    
    <script>
        /* --- PANNEAU DE CONTRÔLE ENERGY CONCEPT (MODIFIABLE) --- */
        const CONFIG = {
            USER: "Brice CARDONA",
            KTM_ORANGE: '#FF6600',
            DANGER_RED: '#FF0000',
            SAFE_GREEN: '#2ecc71',
            SCAN_RADIUS: 30000, 
            MAP_ZOOM: 14,       
            SORT_MODE: 'price', 
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records',
            MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png'
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        
        #map { position: absolute; width: 100%; height: 100%; z-index: 1; filter: brightness(0.6) contrast(1.2); }

        /* BOUTON REGLAGES DÉDIÉ */
        #btn-settings-toggle {
            position: absolute; top: 15px; left: 15px; width: 50px; height: 50px;
            background: #FF6600; color: #000; border: 3px solid #FFF; border-radius: 8px;
            z-index: 500; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; box-shadow: 0 0 15px rgba(255,102,0,0.5);
        }

        /* MODAL PARAMETRES */
        #settings-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        .settings-box {
            width: 85%; max-width: 500px; border: 2px solid #FF6600; padding: 25px;
            background: #111; border-radius: 8px;
        }
        .setting-row { margin-bottom: 25px; }
        .setting-row label { display: block; font-size: 0.8rem; color: #FF6600; margin-bottom: 10px; font-weight: 900; }
        .slider { width: 100%; appearance: none; height: 6px; background: #333; outline: none; }
        .slider::-webkit-slider-thumb { appearance: none; width: 24px; height: 24px; background: #FF6600; border-radius: 50%; cursor: pointer; border: 2px solid white; }
        .val-display { float: right; color: white; font-family: 'Barlow Condensed'; font-size: 1.2rem; }

        /* RESTE DE L'UI */
        #top-ui { position: absolute; top: 15px; width: 75%; left: 80px; z-index: 400; display: flex; gap: 10px; }
        #search-input { flex-grow: 1; background: rgba(0,0,0,0.8); border: 1px solid #444; color: white; padding: 12px; border-radius: 4px; font-family: 'Orbitron'; }
        .btn-ktm { background: #FF6600; color: #000; border: none; padding: 12px 20px; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        
        #fuel-list-panel {
            position: absolute; top: 80px; right: 15px; width: 320px; max-height: 55%;
            background: rgba(0, 0, 0, 0.9); border: 1px solid #333; border-top: 4px solid #FF6600;
            z-index: 300; display: none; overflow-y: auto; border-radius: 4px;
        }
        .fuel-item { padding: 12px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .fuel-price { font-family: 'Barlow Condensed'; font-size: 1.6rem; font-weight: 900; }

        /* HUD & DASHBOARD */
        #hud-container { position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%); width: 340px; height: 340px; z-index: 60; pointer-events: none; }
        #aim-circle { position: absolute; width: 100%; height: 100%; border: 2px solid #FF6600; border-radius: 50%; }
        .tick { position: absolute; width: 2px; height: 10px; background: rgba(255,255,255,0.3); left: 50%; transform-origin: 0 170px; }
        #speed-block { position: absolute; bottom: 85px; left: 30px; z-index: 80; }
        #speed-val { font-family: 'Barlow Condensed'; font-size: 7rem; font-weight: 900; line-height: 0.8; }
        #dashboard { position: absolute; bottom: 0; width: 100%; z-index: 90; display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(0,0,0,0.95); border-top: 2px solid #FF6600; height: 85px; }
        .widget { text-align: center; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid rgba(255,255,255,0.1); }
        
        #btn-recenter { position: absolute; bottom: 100px; right: 20px; z-index: 400; background: rgba(0,0,0,0.8); border: 2px solid #FF6600; color: #FF6600; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; }
        .fuel-marker { background: #FF6600; color: white; padding: 3px 6px; border: 1.5px solid white; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="btn-settings-toggle" onclick="toggleSettings()">⚙️</div>

    <div id="settings-modal">
        <div class="settings-box">
            <h2 style="color:#FF6600; margin-top:0; border-bottom:1px solid #333; padding-bottom:10px;">RÉGLAGES MISSION</h2>
            
            <div class="setting-row">
                <label>RAYON DE SCAN <span id="val-radius" class="val-display">30 km</span></label>
                <input type="range" class="slider" id="input-radius" min="5" max="100" value="30" oninput="updateSettings()">
            </div>

            <div class="setting-row">
                <label>ZOOM PAR DÉFAUT <span id="val-zoom" class="val-display">14</span></label>
                <input type="range" class="slider" id="input-zoom" min="10" max="18" value="14" oninput="updateSettings()">
            </div>

            <div class="setting-row">
                <label>TRI DES STATIONS</label>
                <div style="display:flex; gap:10px;">
                    <button id="set-price" class="btn-ktm" style="flex:1;" onclick="setSort('price')">LE MOINS CHER</button>
                    <button id="set-dist" class="btn-ktm" style="flex:1; background:#333; color:#fff;" onclick="setSort('distance')">LE PLUS PROCHE</button>
                </div>
            </div>

            <button class="btn-ktm" style="width:100%; padding:15px; margin-top:10px; border:2px solid white;" onclick="toggleSettings()">APPLIQUER ET RETOUR</button>
        </div>
    </div>

    <div id="top-ui">
        <input type="text" id="search-input" placeholder="VILLE OU ADRESSE...">
        <select id="fuel-type" style="background:#111; color:#FF6600; border:1px solid #FF6600; padding:10px; border-radius:4px; font-weight:bold;">
            <option value="gazole_prix">GAZOLE</option>
            <option value="sp95_prix">SP95</option>
            <option value="e10_prix">E10</option>
        </select>
        <button class="btn-ktm" onclick="findFuel()">⛽ SCAN</button>
    </div>

    <div id="fuel-list-panel">
        <div style="padding:10px; background:#111; border-bottom:1px solid #333; font-weight:900; font-size:0.7rem; color:#FF6600; display:flex; justify-content:space-between;">
            <span>RESULTATS</span>
            <span onclick="document.getElementById('fuel-list-panel').style.display='none'" style="cursor:pointer;">[X]</span>
        </div>
        <div id="fuel-list-content"></div>
    </div>

    <div id="btn-recenter" onclick="recenterGPS()">⊕</div>

    <div id="hud-container">
        <div id="aim-circle"></div>
        <div id="horizon-line" style="position: absolute; top: 50%; width: 140%; left: -20%; height: 2px; background: rgba(255,255,255,0.8);"></div>
    </div>

    <div id="speed-block">
        <div id="speed-val">000</div>
        <div style="font-size:1.2rem; color:#FF6600; font-weight:900;">KM/H</div>
    </div>

    <div id="map"></div>

    <div id="dashboard">
        <div class="widget"><div style="font-size:0.6rem; color:#888;">ALTITUDE</div><div id="alt" style="font-size:2rem; font-weight:900;">--</div></div>
        <div class="widget"><div style="font-size:0.6rem; color:#888;">TRIP</div><div id="dist" style="font-size:2rem; font-weight:900;">0.0</div></div>
        <div class="widget"><div style="font-size:0.6rem; color:#888;">CAP</div><div id="cap" style="font-size:1.4rem; font-weight:900;">---</div></div>
        <div class="widget">
            <div id="lean-val" style="font-size: 4rem; line-height: 1; font-weight: 900;">0°</div>
            <button onclick="calibrate()" style="background:none; border:none; color:#555; font-size:10px; cursor:pointer;">ZERO</button>
        </div>
    </div>

    <script>
        let map, userMarker, fuelLayer, totalDist = 0, offset = 0, lastRaw = 0, smoothedLean = 0, lastCoord = null;
        let currentStations = [];

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        function setSort(mode) {
            CONFIG.SORT_MODE = mode;
            document.getElementById('set-price').style.background = mode === 'price' ? '#FF6600' : '#333';
            document.getElementById('set-price').style.color = mode === 'price' ? '#000' : '#fff';
            document.getElementById('set-dist').style.background = mode === 'distance' ? '#FF6600' : '#333';
            document.getElementById('set-dist').style.color = mode === 'distance' ? '#000' : '#fff';
        }

        function updateSettings() {
            const rad = document.getElementById('input-radius').value;
            const zoom = document.getElementById('input-zoom').value;
            CONFIG.SCAN_RADIUS = rad * 1000;
            CONFIG.MAP_ZOOM = parseInt(zoom);
            document.getElementById('val-radius').innerText = rad + " km";
            document.getElementById('val-zoom').innerText = zoom;
            if (map) map.setZoom(CONFIG.MAP_ZOOM);
        }

        function createCompassTicks() {
            const container = document.getElementById('aim-circle');
            for (let i = 0; i < 360; i += 10) {
                const tick = document.createElement('div');
                tick.className = 'tick';
                tick.style.cssText = `position:absolute; width:2px; height:${i%30===0?18:10}px; background:rgba(255,255,255,${i%30===0?0.6:0.3}); left:50%; transform-origin:0 170px; transform:translateX(-50%) rotate(${i}deg);`;
                container.appendChild(tick);
            }
        }

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.6, 1.9], CONFIG.MAP_ZOOM);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(map);
            fuelLayer = L.layerGroup().addTo(map);
            userMarker = L.circleMarker([0,0], { radius: 10, color: '#fff', fillColor: CONFIG.KTM_ORANGE, fillOpacity: 1, weight: 3 }).addTo(map);
            createCompassTicks();
            window.addEventListener('deviceorientation', handleOrientation);
            startTracking();
            document.getElementById('search-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchCity(e.target.value); });
            setSort('price');
        }

        function handleOrientation(e) {
            let screenAngle = window.orientation || 0;
            let raw = (Math.abs(screenAngle) === 90) ? e.beta : e.gamma;
            if (screenAngle === -90) raw = -raw;
            lastRaw = raw;
            let currentLean = raw - offset;
            smoothedLean = (smoothedLean * 0.85) + (currentLean * 0.15);
            let angle = Math.abs(Math.round(smoothedLean));
            const color = `rgb(255, ${Math.floor(102 * (1 - Math.min(angle/60,1)))}, 0)`;
            document.getElementById('horizon-line').style.transform = `translateY(-50%) rotate(${smoothedLean}deg)`;
            const leanTxt = document.getElementById('lean-val');
            leanTxt.innerText = angle + "°";
            leanTxt.style.color = color;
            document.getElementById('aim-circle').style.borderColor = color;
        }

        async function findFuel() {
            const center = map.getCenter();
            const fuelType = document.getElementById('fuel-type').value;
            try {
                const res = await fetch(`${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${center.lng} ${center.lat})', ${CONFIG.SCAN_RADIUS}m)&limit=50`);
                const data = await res.json();
                if (data.results) {
                    currentStations = data.results.map(st => {
                        let price = st[fuelType];
                        const d = parseFloat((map.distance([center.lat, center.lng], [st.geom.lat, st.geom.lon]) / 1000).toFixed(1));
                        return { ...st, price, distance: d };
                    }).filter(st => st.price);
                    currentStations.sort((a,b) => CONFIG.SORT_MODE === 'price' ? a.price - b.price : a.distance - b.distance);
                    renderList();
                }
            } catch(e) { console.error("API Error"); }
        }

        function renderList() {
            const listContent = document.getElementById('fuel-list-content');
            const panel = document.getElementById('fuel-list-panel');
            fuelLayer.clearLayers();
            listContent.innerHTML = "";
            panel.style.display = "block";
            currentStations.forEach(st => {
                L.marker([st.geom.lat, st.geom.lon], {
                    icon: L.divIcon({ html: `<div class="fuel-marker">${st.price.toFixed(2)}</div>`, iconSize: [45, 20] })
                }).addTo(fuelLayer);
                const item = document.createElement('div');
                item.className = 'fuel-item';
                item.innerHTML = `<div style="flex-grow:1; cursor:pointer;" onclick="map.flyTo([${st.geom.lat}, ${st.geom.lon}], 16)">
                    <div style="font-size:0.6rem; color:#888;">${st.nom || st.adresse}</div>
                    <div class="fuel-price">${st.price.toFixed(2)}€ <span style="color:#FF6600; font-size:0.8rem;">${st.distance}km</span></div>
                </div><button class="btn-go" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${st.geom.lat},${st.geom.lon}&travelmode=driving')">GO</button>`;
                listContent.appendChild(item);
            });
        }

        function recenterGPS() { if (lastCoord) map.flyTo(lastCoord, CONFIG.MAP_ZOOM); }

        function startTracking() {
            navigator.geolocation.watchPosition(u => {
                const p = [u.coords.latitude, u.coords.longitude];
                userMarker.setLatLng(p);
                document.getElementById('speed-val').innerText = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0).toString().padStart(3, '0');
                if (u.coords.altitude) document.getElementById('alt').innerText = Math.round(u.coords.altitude) + "m";
                if (lastCoord) totalDist += map.distance(lastCoord, p) / 1000;
                lastCoord = p;
                document.getElementById('dist').innerText = totalDist.toFixed(1);
            }, null, { enableHighAccuracy: true });
        }

        async function searchCity(query) {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
            const data = await res.json();
            if (data.length > 0) map.flyTo([data[0].lat, data[0].lon], CONFIG.MAP_ZOOM);
        }

        function calibrate() { offset = lastRaw; smoothedLean = 0; }
        window.onload = init;
    </script>
</body>
</html>
