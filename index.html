<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Energy Concept - Dash V9.4</title>
    
    <style>
        :root { --ktm: #ff6600; --bg: #000; --panel: #111; --txt: #fff; --ok: #2ecc71; --err: #e74c3c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Narrow', sans-serif; user-select: none; }
        
        body { 
            background: var(--bg); color: var(--txt); 
            height: 100vh; width: 100vw; 
            overflow: hidden; display: flex; flex-direction: column;
            border-left: 2px solid var(--ktm);
        }

        /* --- BANDEAU LEDS (TOP FIXE) --- */
        .system-status { 
            display: flex; justify-content: flex-end; gap: 10px; 
            padding: 4px 10px; background: #000; font-size: 0.6rem;
        }
        .led-group { display: flex; align-items: center; gap: 4px; }
        .led { width: 7px; height: 7px; border-radius: 50%; background: var(--err); transition: 0.3s; }
        .led.active { background: var(--ok); box-shadow: 0 0 5px var(--ok); }

        /* --- DASHBOARD HORIZONTAL ULTRA-COMPACT --- */
        .dash-row { 
            display: grid; grid-template-columns: 1.2fr 1fr 1fr; 
            height: 75px; background: linear-gradient(180deg, #151515, #000);
            border-bottom: 1px solid var(--ktm); align-items: center;
        }

        /* Vitesse */
        .speed-zone { text-align: center; border-right: 1px solid #333; }
        .speed-val { font-size: 3.2rem; font-weight: 900; line-height: 1; font-style: italic; color: var(--txt); }
        .speed-unit { font-size: 0.6rem; color: var(--ktm); display: block; font-weight: bold; }

        /* Inclinaison (Barre Horizontale) */
        .angle-zone { padding: 0 10px; text-align: center; border-right: 1px solid #333; position: relative; }
        .angle-bar-bg { width: 100%; height: 6px; background: #222; border-radius: 3px; position: relative; margin: 8px 0; }
        #angle-cursor { 
            position: absolute; top: -4px; left: 50%; width: 4px; height: 14px; 
            background: var(--ktm); transition: 0.1s; transform: translateX(-50%); 
        }
        .angle-txt { font-size: 1.1rem; font-weight: 900; line-height: 1; }

        /* Infos Environnement */
        .env-zone { padding-left: 8px; line-height: 1.1; }
        .env-item { font-size: 0.7rem; color: #bbb; display: flex; justify-content: space-between; padding-right: 10px; }
        .env-val { color: var(--ktm); font-weight: bold; }

        /* --- ACTIONS RAPIDES --- */
        .action-bar { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #222; }
        .btn-action { background: #080808; border: none; border-right: 1px solid #222; color: #fff; padding: 8px; font-size: 0.65rem; font-weight: bold; text-decoration: none; text-align: center; }
        .btn-action.rec-on { background: #900; animation: pulse 1s infinite; }

        /* --- ZONE DE RECHERCHE --- */
        .search-container { flex: 1; overflow-y: auto; background: #050505; padding: 5px; }
        .search-ui { display: flex; gap: 3px; margin-bottom: 5px; }
        select, .btn-scan { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 6px; border-radius: 3px; font-size: 0.75rem; }
        .btn-scan { background: var(--ktm); color: #000; font-weight: 900; flex: 1; }

        /* --- CARTES STATIONS --- */
        .st-card { background: #111; margin-bottom: 5px; padding: 8px; border-radius: 4px; border-left: 3px solid var(--ktm); }
        .st-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .st-name { font-size: 0.75rem; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 65%; }
        .st-price { color: var(--ktm); font-size: 1.1rem; font-weight: 900; }
        .st-go-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; }
        .btn-go { background: #222; color: #fff; font-size: 0.55rem; padding: 6px 0; text-align: center; border-radius: 2px; text-decoration: none; border: 1px solid #333; font-weight: bold; }

        /* --- MOUCHARD (SWIPE UP) --- */
        #mouchard { position: fixed; bottom: -120px; left: 0; width: 100%; height: 140px; background: rgba(0,0,0,0.95); border-top: 2px solid var(--ktm); transition: 0.3s; z-index: 1000; padding: 5px; }
        #mouchard.open { bottom: 0; }
        .handle { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); background: var(--ktm); color: #000; font-size: 0.5rem; padding: 2px 10px; border-radius: 5px 5px 0 0; font-weight: bold; }
        #log { font-family: monospace; font-size: 0.55rem; color: #0f0; overflow-y: auto; height: 100%; }

        @keyframes pulse { 50% { opacity: 0.5; } }
    </style>
</head>
<body onclick="MOTO.init()">

    <div class="system-status">
        <div class="led-group"><span>GPS</span><div id="led-gps" class="led"></div></div>
        <div class="led-group"><span>ANGLE</span><div id="led-gyro" class="led"></div></div>
    </div>

    <div class="dash-row">
        <div class="speed-zone">
            <div id="speed" class="speed-val">0</div>
            <span class="speed-unit">KM/H</span>
        </div>
        
        <div class="angle-zone">
            <div id="angle-txt" class="angle-txt">0°</div>
            <div class="angle-bar-bg">
                <div id="angle-cursor"></div>
            </div>
            <div id="angle-max" style="font-size:0.5rem; color:#666;">MAX: 0°</div>
        </div>

        <div class="env-zone">
            <div class="env-item">Alt <span class="env-val" id="alt">--m</span></div>
            <div class="env-item">Temp <span class="env-val" id="m-temp">--°C</span></div>
            <div class="env-item">Vent <span class="env-val" id="m-wind">--k/h</span></div>
        </div>
    </div>

    <div class="action-bar">
        <button id="btn-rec" class="btn-action" onclick="event.stopPropagation(); REC.toggle()">REC GPX</button>
        <a href="https://meteofrance.com" class="btn-action" target="_blank" onclick="event.stopPropagation()">METEO FRANCE</a>
    </div>

    <div class="search-container">
        <div class="search-ui">
            <select id="fuel"><option value="Gazole">Gazole</option><option value="SP98">SP98</option><option value="SP95">SP95</option><option value="E10">E10</option><option value="E85">E85</option></select>
            <select id="sort"><option value="price">Prix €</option><option value="dist">Dist. km</option></select>
            <button class="btn-scan" onclick="event.stopPropagation(); MOTO.scan()">SCAN</button>
        </div>
        <div id="results"></div>
    </div>

    <div id="mouchard">
        <div class="handle" onclick="event.stopPropagation(); document.getElementById('mouchard').classList.toggle('open')">JOURNAL TECHNIQUE (SWIPE)</div>
        <div id="log">Système prêt. Clique pour activer.</div>
    </div>

    <script>
        let userPos = { lat: 0, lon: 0 };
        let track = [], isRecording = false, maxLean = 0;

        const L = (m) => {
            const l = document.getElementById('log');
            l.innerHTML = `[${new Date().toLocaleTimeString()}] ${m}<br>` + l.innerHTML;
        };

        const MOTO = {
            init() {
                L("Initialisation des capteurs...");
                navigator.geolocation.watchPosition(p => {
                    userPos = { lat: p.coords.latitude, lon: p.coords.longitude };
                    document.getElementById('speed').innerText = Math.round((p.coords.speed || 0) * 3.6);
                    document.getElementById('alt').innerText = (p.coords.altitude ? Math.round(p.coords.altitude) : "--") + "m";
                    document.getElementById('led-gps').classList.add('active');
                    if(isRecording) track.push({ lat: userPos.lat, lon: userPos.lon });
                    this.updateMeteo();
                }, e => L("Erreur GPS: " + e.message), { enableHighAccuracy: true });
            },

            async updateMeteo() {
                try {
                    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${userPos.lat}&longitude=${userPos.lon}&current_weather=true`);
                    const d = await r.json();
                    document.getElementById('m-temp').innerText = Math.round(d.current_weather.temperature) + "°C";
                    document.getElementById('m-wind').innerText = Math.round(d.current_weather.windspeed) + "k/h";
                    L("Météo OK");
                } catch(e) { L("Météo Échec"); }
            },

            async scan() {
                if(!userPos.lat) { L("Pas de GPS pour le scan."); return; }
                const res = document.getElementById('results');
                res.innerHTML = "<div style='color:var(--ktm); font-size:0.7rem; text-align:center;'>RECHERCHE...</div>";
                try {
                    const r = await fetch(`https://data.economie.gouv.fr/api/records/1.0/search/?dataset=prix-des-carburants-en-france-flux-instantane-v2&geofilter.distance=${userPos.lat},${userPos.lon},20000&rows=25`);
                    const data = await r.json();
                    let st = [];
                    data.records.forEach(i => {
                        const prix = this.extract(i.fields, document.getElementById('fuel').value);
                        if(prix) st.push({ nom: i.fields.nom || i.fields.ville || "Station", ville: i.fields.ville, prix: prix, dist: this.dist(userPos.lat, userPos.lon, i.fields.geom[0], i.fields.geom[1]), lat: i.fields.geom[0], lon: i.fields.geom[1] });
                    });
                    st.sort((a,b) => document.getElementById('sort').value === 'price' ? a.prix-b.prix : a.dist-b.dist);
                    res.innerHTML = st.map(s => `
                        <div class="st-card">
                            <div class="st-header"><span class="st-name">${s.nom} (${s.dist.toFixed(1)}km)</span><span class="st-price">${s.prix.toFixed(3)}€</span></div>
                            <div class="st-go-grid">
                                <a class="btn-go" href="waze://?ll=${s.lat},${s.lon}&navigate=yes">WAZE</a>
                                <a class="btn-go" href="google.navigation:q=${s.lat},${s.lon}">MAPS</a>
                                <a class="btn-go" href="geo:${s.lat},${s.lon}">OSM</a>
                                <a class="btn-go" href="liberty-rider://navigation?lat=${s.lat}&lon=${s.lon}">LIBERTY</a>
                            </div>
                        </div>`).join('');
                } catch(e) { L("API Erreur"); }
            },

            extract(f, t) {
                const map = {"Gazole":"gazole_prix","SP98":"sp98_prix","SP95":"sp95_prix","E10":"e10_prix","E85":"e85_prix"};
                if(f[map[t]]) return parseFloat(f[map[t]]);
                try {
                    const a = JSON.parse(f.prix);
                    const found = a.find(x => x["@nom"] === t);
                    return found ? parseFloat(found["@valeur"]) : null;
                } catch(e) { return null; }
            },

            dist(la1, lo1, la2, lo2) {
                const p = 0.01745;
                const a = 0.5 - Math.cos((la2-la1)*p)/2 + Math.cos(la1*p)*Math.cos(la2*p)*(1-Math.cos((lo2-lo1)*p))/2;
                return 12742 * Math.asin(Math.sqrt(a));
            }
        };

        const REC = {
            toggle() {
                isRecording = !isRecording;
                const b = document.getElementById('btn-rec');
                if(isRecording) { track = []; b.classList.add('rec-on'); b.innerText = "ARRÊTER REC"; L("Enregistrement..."); }
                else { b.classList.remove('rec-on'); b.innerText = "REC GPX"; if(track.length > 5) this.save(); }
            },
            save() {
                const gpx = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1"><trk><trkseg>${track.map(p => `<trkpt lat="${p.lat}" lon="${p.lon}"></trkpt>`).join('')}</trkseg></trk></gpx>`;
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([gpx], {type:'application/gpx+xml'}));
                a.download = `Balade_${Date.now()}.gpx`; a.click();
            }
        };

        window.addEventListener("deviceorientation", (e) => {
            if(e.beta === null) return;
            document.getElementById('led-gyro').classList.add('active');
            
            // LOGIQUE INVERSÉE (USB À GAUCHE) : 
            // Quand tu penches la moto, c'est l'axe beta qui varie.
            // On le multiplie par -1 pour que la gauche reste la gauche.
            let lean = Math.round(e.beta || 0) * -1;
            
            // On limite l'affichage à 50% de la barre (position curseur)
            let pos = 50 + (lean); 
            pos = Math.max(5, Math.min(95, pos));
            
            document.getElementById('angle-cursor').style.left = pos + "%";
            document.getElementById('angle-txt').innerText = Math.abs(lean) + "°";
            
            if(Math.abs(lean) > 35) document.getElementById('angle-txt').style.color = "red";
            else if(Math.abs(lean) > 20) document.getElementById('angle-txt').style.color = "orange";
            else document.getElementById('angle-txt').style.color = "white";

            if(Math.abs(lean) > maxLean) { 
                maxLean = Math.abs(lean); 
                document.getElementById('angle-max').innerText = "MAX: " + maxLean + "°"; 
            }
        });
    </script>
</body>
</html>
