<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENERGY CONCEPT - KTM COCKPIT V2.0</title>
    <script>
    /* --- PANNEAU DE CONTRÔLE ENERGY CONCEPT (MODIFIABLE) --- */
    const CONFIG = {
        USER: "Brice CARDONA",
        COLORS: {
            KTM: '#FF6600',        // Orange KTM
            DANGER: '#8B0000',     // Rouge Sang Vif
            SAFE: '#2ecc71',       // Vert Sécurité
            BG: '#0a0a0a'          // Noir profond
        },
        SCAN_RADIUS: 30000,        // Rayon de recherche stations (30km)
        ZOOM_OFFSET: 2,            // Différence de zoom pour l'effet "loupe" central
        FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records',
        MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}{r}.png'
    };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root { --ktm: #FF6600; --danger: #8B0000; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        
        /* BLOQUEUR PAYSAGE STRICT */
        #portrait-blocker { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; color: var(--ktm); text-align: center; }
        @media (orientation: portrait) { #portrait-blocker { display: flex; } }

        /* CARTOGRAPHIE */
        #map-main { position: absolute; width: 100%; height: 100%; z-index: 1; }
        
        /* HUD CENTRAL & EFFET LOUPE */
        #hud-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 350px; height: 350px; z-index: 100; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }
        #zoom-circle-container {
            width: 280px; height: 280px; border-radius: 50%; border: 4px solid var(--ktm);
            overflow: hidden; position: relative; box-shadow: 0 0 30px rgba(255, 102, 0, 0.4);
            background: #000;
        }
        #map-zoom { width: 100%; height: 100%; }
        
        /* COMPAS DYNAMIQUE */
        #compass-ring {
            position: absolute; width: 100%; height: 100%;
            border: 8px solid var(--ktm); border-radius: 50%;
            transition: border-width 0.1s ease, border-color 0.1s ease;
            box-sizing: border-box;
        }

        /* UI CONTROLS */
        #top-bar { position: absolute; top: 10px; width: 95%; left: 2.5%; z-index: 500; display: flex; gap: 10px; }
        #search-input { flex-grow: 1; background: rgba(0,0,0,0.85); border: 2px solid #333; color: #fff; padding: 12px; border-radius: 5px; font-family: 'Barlow Condensed'; font-size: 1.2rem; }
        .btn-action { background: var(--ktm); color: #000; border: none; padding: 0 20px; border-radius: 5px; font-weight: 900; cursor: pointer; height: 50px; }
        
        /* LISTE STATIONS ESCAMOTABLE */
        #station-panel {
            position: absolute; right: 10px; top: 70px; width: 300px; max-height: 60vh;
            background: rgba(0,0,0,0.9); border-left: 4px solid var(--ktm);
            z-index: 600; display: none; overflow-y: auto; border-radius: 0 0 0 10px;
        }
        .close-panel { background: #222; color: #fff; text-align: center; padding: 5px; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }
        .station-card { padding: 10px; border-bottom: 1px solid #222; }
        .station-price { font-family: 'Barlow Condensed'; font-size: 1.8rem; color: var(--ktm); }

        /* DASHBOARD */
        #dash-bottom {
            position: absolute; bottom: 0; width: 100%; height: 90px;
            background: linear-gradient(to top, #000, transparent);
            z-index: 500; display: grid; grid-template-columns: 1fr 1fr 2fr 1fr 1fr;
            align-items: center; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .stat-box { text-align: center; }
        .stat-label { font-size: 0.6rem; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 2rem; font-family: 'Barlow Condensed'; font-weight: 900; }
        #speed-main { font-size: 4rem; color: #fff; }

        .fuel-marker { background: var(--ktm); color: #000; font-weight: 900; padding: 2px 5px; border-radius: 3px; border: 1px solid #fff; font-size: 12px; }
    </style>
</head>
<body>

<div id="portrait-blocker">
    <h1 style="font-size: 5rem; margin: 0;">KTM</h1>
    <p>LOCK LANDSCAPE MODE REQUIRED</p>
    <p style="font-size: 0.8rem; opacity: 0.6;">Activez la rotation automatique sur votre téléphone</p>
</div>

<div id="top-bar">
    <input type="text" id="search-input" placeholder="CHERCHER UNE DESTINATION (CORSE)...">
    <button class="btn-action" onclick="searchLocation()">OK</button>
    <button class="btn-action" onclick="findGas()">⛽ SCAN</button>
</div>

<div id="station-panel">
    <div class="close-panel" onclick="document.getElementById('station-panel').style.display='none'">Fermer la liste [X]</div>
    <div id="station-list"></div>
</div>

<div id="hud-overlay">
    <div id="compass-ring"></div>
    <div id="zoom-circle-container">
        <div id="map-zoom"></div>
    </div>
</div>

<div id="map-main"></div>

<div id="dash-bottom">
    <div class="stat-box"><div class="stat-label">Altitude</div><div id="val-alt" class="stat-value">--</div></div>
    <div class="stat-box"><div class="stat-label">Angle</div><div id="val-lean" class="stat-value">0°</div></div>
    <div class="stat-box"><div id="speed-main" class="stat-value">00</div><div class="stat-label">KM/H</div></div>
    <div class="stat-box"><div class="stat-label">Cap</div><div id="val-cap" class="stat-value">--</div></div>
    <div class="stat-box"><div class="stat-label">Trip</div><div id="val-trip" class="stat-value">0.0</div></div>
</div>

<script>
let mainMap, zoomMap, userMarkerMain, userMarkerZoom, fuelLayer;
let lastCoord = null, totalDist = 0, offset = 0;

function init() {
    // Initialisation Carte Principale
    mainMap = L.map('map-main', { zoomControl: false, attributionControl: false }).setView([41.92, 8.73], 12);
    L.tileLayer(CONFIG.MAP_STYLE).addTo(mainMap);

    // Initialisation Carte Loupe (Zoom)
    zoomMap = L.map('map-zoom', { 
        zoomControl: false, attributionControl: false, 
        dragging: false, scrollWheelZoom: false, touchZoom: false, doubleClickZoom: false 
    }).setView([41.92, 8.73], 14);
    L.tileLayer(CONFIG.MAP_STYLE).addTo(zoomMap);

    fuelLayer = L.layerGroup().addTo(mainMap);

    userMarkerMain = L.circleMarker([0,0], { radius: 8, color: '#fff', fillColor: CONFIG.COLORS.KTM, fillOpacity: 1, weight: 2 }).addTo(mainMap);
    userMarkerZoom = L.circleMarker([0,0], { radius: 10, color: '#fff', fillColor: CONFIG.COLORS.KTM, fillOpacity: 1, weight: 3 }).addTo(zoomMap);

    setupTracking();
    window.addEventListener('deviceorientation', handleInclinaison);
}

function setupTracking() {
    navigator.geolocation.watchPosition(pos => {
        const coords = [pos.coords.latitude, pos.coords.longitude];
        const speed = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
        
        mainMap.panTo(coords);
        zoomMap.setView(coords, mainMap.getZoom() + CONFIG.ZOOM_OFFSET);
        userMarkerMain.setLatLng(coords);
        userMarkerZoom.setLatLng(coords);

        document.getElementById('speed-main').innerText = speed.toString().padStart(2, '0');
        if(pos.coords.altitude) document.getElementById('val-alt').innerText = Math.round(pos.coords.altitude) + "m";
        
        if (lastCoord) {
            totalDist += mainMap.distance(lastCoord, coords) / 1000;
            document.getElementById('val-trip').innerText = totalDist.toFixed(1);
        }
        lastCoord = coords;

        if (pos.coords.heading) {
            document.getElementById('val-cap').innerText = Math.round(pos.coords.heading) + "°";
        }
    }, err => console.error("GPS Error"), { enableHighAccuracy: true });
}

function handleInclinaison(e) {
    let angle = Math.round(e.gamma); // Utilise gamma pour le mode paysage
    if (window.orientation === -90) angle = -angle;
    
    const absAngle = Math.abs(angle);
    const ring = document.getElementById('compass-ring');
    const leanDisplay = document.getElementById('val-lean');
    
    // Logique de couleur et épaisseur
    let color = CONFIG.COLORS.KTM;
    let weight = 8;
    
    if (absAngle > 25) {
        // Transition vers le rouge sang
        const ratio = Math.min((absAngle - 25) / 25, 1);
        color = interpolateColor(CONFIG.COLORS.KTM, CONFIG.COLORS.DANGER, ratio);
        weight = 8 + (ratio * 12); // S'épaissit jusqu'à 20px
    }

    ring.style.borderColor = color;
    ring.style.borderWidth = weight + "px";
    leanDisplay.innerText = absAngle + "°";
    leanDisplay.style.color = color;
}

// Utilitaire de transition de couleur
function interpolateColor(color1, color2, factor) {
    const r1 = 255, g1 = 102, b1 = 0; // KTM Orange
    const r2 = 139, g2 = 0, b2 = 0;   // Dark Red
    const r = Math.round(r1 + factor * (r2 - r1));
    const g = Math.round(g1 + factor * (g2 - g1));
    const b = Math.round(b1 + factor * (b2 - b1));
    return `rgb(${r}, ${g}, ${b})`;
}

async function findGas() {
    const center = mainMap.getCenter();
    const panel = document.getElementById('station-panel');
    const list = document.getElementById('station-list');
    
    panel.style.display = 'block';
    list.innerHTML = "<p style='padding:10px'>Recherche en cours...</p>";

    try {
        const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${center.lng} ${center.lat})', ${CONFIG.SCAN_RADIUS}m)&limit=20`;
        const res = await fetch(url);
        const data = await res.json();
        
        fuelLayer.clearLayers();
        list.innerHTML = "";

        if (data.results && data.results.length > 0) {
            data.results.forEach(st => {
                const price = st.gazole_prix || st.sp95_prix || "?";
                L.marker([st.geom.lat, st.geom.lon], {
                    icon: L.divIcon({ className: 'fuel-marker', html: price + "€" })
                }).addTo(fuelLayer);

                const div = document.createElement('div');
                div.className = 'station-card';
                div.innerHTML = `
                    <div style="font-size:0.7rem; color:#888">${st.nom || st.adresse}</div>
                    <div class="station-price">${price}€ <small style="font-size:0.8rem">Gazole/SP</small></div>
                    <button class="btn-action" style="height:30px; font-size:0.7rem" onclick="setRoute(${st.geom.lat}, ${st.geom.lon})">Y ALLER</button>
                `;
                list.appendChild(div);
            });
        } else {
            list.innerHTML = "<p style='padding:10px'>Aucune station trouvée</p>";
        }
    } catch (e) {
        alert("Erreur de connexion aux données carburant.");
    }
}

async function searchLocation() {
    const query = document.getElementById('search-input').value;
    if(!query) return;
    
    try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
        const data = await res.json();
        if(data.length > 0) {
            const target = [data[0].lat, data[0].lon];
            mainMap.setView(target, 14);
            L.marker(target, {title: "Destination"}).addTo(mainMap);
        }
    } catch(e) {
        alert("Erreur lors de la recherche du lieu.");
    }
}

function setRoute(lat, lon) {
    // Dans une version cockpit, on trace un trait simple vers la cible
    const line = L.polyline([userMarkerMain.getLatLng(), [lat, lon]], {color: CONFIG.COLORS.KTM, weight: 5, dashArray: '10, 10'}).addTo(mainMap);
    mainMap.fitBounds(line.getBounds());
    document.getElementById('station-panel').style.display = 'none';
}

window.onload = init;
</script>

</body>
</html>
