<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENERGY CONCEPT - KTM AVIONICS V4.0</title>
    <script>
    /* --- PANNEAU DE CONTRÔLE ENERGY CONCEPT --- */
    const CONFIG = {
        USER: "Brice CARDONA",
        KTM_ORANGE: '#FF6600',
        DANGER_RED: '#FF0000',
        MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}{r}.png',
        FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records',
        OSRM_API: 'https://router.project-osrm.org/route/v1/driving/'
    };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --ktm: #FF6600; --glass: rgba(10, 10, 10, 0.9); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Barlow Condensed', sans-serif; background: #000; overflow: hidden; color: white; }
        
        #portrait-blocker { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; color: var(--ktm); font-family: 'Orbitron'; }
        @media (orientation: portrait) { #portrait-blocker { display: flex; } }

        #map-main { position: absolute; width: 100%; height: 100%; z-index: 1; filter: brightness(0.6) saturate(1.2); }
        
        /* HUD AZIMUT AVIONIQUE */
        #hud-container { 
            position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; height: 300px; z-index: 100; pointer-events: none;
        }
        #compass-frame {
            width: 100%; height: 100%; border-radius: 50%; border: 1px solid rgba(255,102,0,0.4);
            overflow: hidden; position: relative; background: #000; box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        /* Graduation Azimut (Aviation style) */
        #azimuth-ring {
            position: absolute; inset: 0; border-radius: 50%; z-index: 105;
            background: 
                repeating-conic-gradient(from 0deg, var(--ktm) 0deg 0.3deg, transparent 0.3deg 10deg),
                repeating-conic-gradient(from 0deg, rgba(255,255,255,0.5) 0deg 0.1deg, transparent 0.1deg 2deg);
            -webkit-mask-image: radial-gradient(circle, transparent 94%, black 95%);
        }
        .cardinal { position: absolute; font-family: 'Orbitron'; font-weight: 900; font-size: 14px; color: var(--ktm); z-index: 106; }
        #n { top: 8px; left: 50%; transform: translateX(-50%); }
        #s { bottom: 8px; left: 50%; transform: translateX(-50%); }
        #e { right: 8px; top: 50%; transform: translateY(-50%); }
        #w { left: 8px; top: 50%; transform: translateY(-50%); }

        #map-zoom { width: 100%; height: 100%; }

        /* Icone Moto Stylisée (Azimut) */
        #moto-marker {
            position: absolute; top: 50%; left: 50%; width: 24px; height: 32px;
            transform: translate(-50%, -50%); z-index: 110;
            background: var(--ktm); clip-path: polygon(50% 0%, 100% 100%, 50% 80%, 0% 100%);
            box-shadow: 0 0 15px var(--ktm);
        }

        /* ZOOM BUTTONS */
        .zoom-ctrl { 
            position: absolute; left: calc(50% + 160px); top: 50%; transform: translateY(-50%);
            z-index: 600; display: flex; flex-direction: column; gap: 15px; pointer-events: all;
        }
        .btn-zoom { 
            background: rgba(30,30,30,0.8); border: 1px solid var(--ktm); color: var(--ktm);
            width: 45px; height: 45px; border-radius: 50%; font-family: 'Orbitron'; font-weight: 900; font-size: 20px; cursor: pointer;
        }

        /* DASHBOARD GLOSSY FIN */
        #dash-bottom {
            position: absolute; bottom: 0; width: 100%; height: 70px;
            z-index: 500; display: flex; justify-content: center; gap: 4px; padding: 0 5px 5px 5px; box-sizing: border-box;
        }
        .widget {
            background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.9) 100%);
            border-top: 1px solid var(--ktm); border-left: 1px solid rgba(255,255,255,0.1);
            flex: 1; text-align: center; padding: 6px; position: relative;
            clip-path: polygon(0 0, 100% 0, 100% 80%, 92% 100%, 0 100%);
        }
        .stat-label { font-size: 0.6rem; color: #888; text-transform: uppercase; font-family: 'Orbitron'; letter-spacing: 1px; }
        .stat-value { font-size: 1.6rem; font-weight: 700; color: #fff; }
        .widget.speed { flex: 1.4; background: linear-gradient(180deg, rgba(255,102,0,0.1) 0%, rgba(0,0,0,0.95) 100%); }
        .widget.speed .stat-value { font-size: 2.8rem; line-height: 1; }

        /* UI CONTROLS */
        .ui-panel { position: absolute; top: 15px; z-index: 700; display: flex; gap: 8px; }
        #left-ui { left: 20px; width: 300px; }
        #right-ui { right: 20px; flex-direction: column; align-items: flex-end; }

        .btn-ktm {
            background: var(--ktm); color: #000; border: none; padding: 10px 18px;
            font-family: 'Orbitron'; font-weight: 900; font-size: 0.7rem; cursor: pointer;
            clip-path: polygon(0 0, 95% 0, 100% 30%, 100% 100%, 5% 100%, 0 70%);
        }
        .input-dark {
            background: rgba(0,0,0,0.85); border: 1px solid #333; border-left: 3px solid var(--ktm);
            color: #fff; padding: 10px; font-family: 'Barlow Condensed'; font-size: 1rem; outline: none;
        }

        #station-list {
            position: absolute; right: 20px; top: 110px; width: 250px; max-height: 40vh;
            background: var(--glass); border-right: 3px solid var(--ktm); display: none; overflow-y: auto; z-index: 800;
        }
        .fuel-item { padding: 10px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="portrait-blocker"><h1>KTM Cockpit</h1><p>ORIENTATION PAYSAGE REQUISE</p></div>

<div id="left-ui" class="ui-panel">
    <input type="text" id="dest-search" class="input-dark" style="flex-grow:1" placeholder="DESTINATION (Corse)...">
    <button class="btn-ktm" onclick="findRoute()">NAV</button>
</div>

<div id="right-ui" class="ui-panel">
    <select id="fuel-type" class="input-dark" style="border-left:none; border-right:3px solid var(--ktm); background:#222;">
        <option value="gazole_prix">GAZOLE</option>
        <option value="sp95_prix">SP95</option>
        <option value="sp98_prix">SP98</option>
    </select>
    <button class="btn-ktm" onclick="scanFuel()">⛽ SCAN STATIONS</button>
</div>

<div id="station-list">
    <div style="background:#111; color:var(--ktm); padding:5px; font-size:0.6rem; text-align:center; cursor:pointer;" onclick="this.parentElement.style.display='none'">FERMER [X]</div>
    <div id="fuel-results"></div>
</div>

<div id="hud-container">
    <div id="compass-frame">
        <div id="azimuth-ring"></div>
        <div class="cardinal" id="n">N</div><div class="cardinal" id="s">S</div><div class="cardinal" id="e">E</div><div class="cardinal" id="w">W</div>
        <div id="map-zoom"></div>
        <div id="moto-marker"></div>
    </div>
</div>

<div class="zoom-ctrl">
    <button class="btn-zoom" onclick="manualZoom(1)">+</button>
    <button class="btn-zoom" onclick="manualZoom(-1)">-</button>
</div>

<div id="map-main"></div>

<div id="dash-bottom">
    <div class="widget"><div class="stat-label">Altitude</div><div id="v-alt" class="stat-value">---</div></div>
    <div class="widget"><div class="stat-label">Inclinaison</div><div id="v-lean" class="stat-value">0°</div></div>
    <div class="widget speed"><div id="v-speed" class="stat-value">00</div><div class="stat-label">KM/H</div></div>
    <div class="widget"><div class="stat-label">Cap</div><div id="v-cap" class="stat-value">---</div></div>
    <div class="widget"><div class="stat-label">Trip</div><div id="v-dist" class="stat-value">0.0</div></div>
</div>

<script>
let mainMap, zoomMap, fuelLayer, routeLayerMain, routeLayerZoom;
let userPos = [41.9, 8.7], lastCoord = null, trip = 0;

function init() {
    mainMap = L.map('map-main', { zoomControl: false, attributionControl: false }).setView(userPos, 13);
    L.tileLayer(CONFIG.MAP_STYLE).addTo(mainMap);

    zoomMap = L.map('map-zoom', { zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false, touchZoom: false }).setView(userPos, 15);
    L.tileLayer(CONFIG.MAP_STYLE).addTo(zoomMap);

    fuelLayer = L.layerGroup().addTo(mainMap);
    routeLayerMain = L.layerGroup().addTo(mainMap);
    routeLayerZoom = L.layerGroup().addTo(zoomMap);

    mainMap.on('move', () => {
        zoomMap.setView(mainMap.getCenter(), mainMap.getZoom() + 2, { animate: false });
    });

    startTracking();
    window.addEventListener('deviceorientation', handleSensors);
}

function startTracking() {
    navigator.geolocation.watchPosition(p => {
        userPos = [p.coords.latitude, p.coords.longitude];
        mainMap.panTo(userPos);
        
        document.getElementById('v-speed').innerText = p.coords.speed ? Math.round(p.coords.speed * 3.6) : "00";
        if(p.coords.altitude) document.getElementById('v-alt').innerText = Math.round(p.coords.altitude) + "m";
        
        if(p.coords.heading) {
            const h = Math.round(p.coords.heading);
            document.getElementById('v-cap').innerText = h + "°";
            // Rotation du marqueur moto au centre
            document.getElementById('moto-marker').style.transform = `translate(-50%, -50%) rotate(${h}deg)`;
        }

        if(lastCoord) trip += mainMap.distance(lastCoord, userPos) / 1000;
        document.getElementById('v-dist').innerText = trip.toFixed(1);
        lastCoord = userPos;
    }, null, { enableHighAccuracy: true });
}

function handleSensors(e) {
    // Compensation paysage : Si paysage, gamma devient l'inclinaison latérale
    let lean = Math.abs(Math.round(e.gamma));
    const vLean = document.getElementById('v-lean');
    vLean.innerText = lean + "°";

    const ring = document.getElementById('compass-frame');
    if(lean > 25) {
        ring.style.borderColor = CONFIG.DANGER_RED;
        vLean.style.color = CONFIG.DANGER_RED;
    } else {
        ring.style.borderColor = "rgba(255,102,0,0.4)";
        vLean.style.color = "#fff";
    }
}

async function findRoute() {
    const q = document.getElementById('dest-search').value;
    if(!q) return;
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
    const data = await res.json();
    if(data[0]) drawNavigation([data[0].lat, data[0].lon]);
}

async function drawNavigation(target) {
    const url = `${CONFIG.OSRM_API}${userPos[1]},${userPos[0]};${target[1]},${target[0]}?overview=full&geometries=geojson`;
    try {
        const res = await fetch(url);
        const data = await res.json();
        routeLayerMain.clearLayers(); routeLayerZoom.clearLayers();
        if(data.routes[0]) {
            const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
            L.polyline(coords, { color: CONFIG.KTM_ORANGE, weight: 5, opacity: 0.8 }).addTo(routeLayerMain);
            L.polyline(coords, { color: CONFIG.KTM_ORANGE, weight: 8, opacity: 1 }).addTo(routeLayerZoom);
            mainMap.fitBounds(L.polyline(coords).getBounds());
        }
    } catch(e) { alert("Erreur d'itinéraire."); }
}

async function scanFuel() {
    const type = document.getElementById('fuel-type').value;
    const list = document.getElementById('fuel-results');
    document.getElementById('station-list').style.display = 'block';
    list.innerHTML = "<p style='padding:10px; font-size:0.7rem'>SCAN CORSE...</p>";

    try {
        const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${userPos[1]} ${userPos[0]})', 30000m)&limit=15`;
        const res = await fetch(url);
        const data = await res.json();
        fuelLayer.clearLayers(); list.innerHTML = "";

        if(data.results && data.results.length > 0) {
            data.results.forEach(st => {
                let price = st[type] || (st.prix ? JSON.parse(st.prix).find(p => p["@nom"].toLowerCase().includes(type.split('_')[0]))?.["@valeur"] : null);
                if(!price) return;
                price = parseFloat(price);

                L.marker([st.geom.lat, st.geom.lon], {
                    icon: L.divIcon({ html: `<div style="background:white; color:black; font-weight:900; padding:2px; border:1px solid ${CONFIG.KTM_ORANGE}; font-size:10px;">${price.toFixed(2)}</div>` })
                }).addTo(fuelLayer);

                const div = document.createElement('div');
                div.className = "fuel-item";
                div.innerHTML = `<div><small style="color:#888">${st.nom || 'STATION'}</small><br><b style="color:var(--ktm)">${price.toFixed(2)}€</b></div>
                                 <button class="btn-ktm" style="padding:5px 10px; font-size:0.6rem" onclick="drawNavigation([${st.geom.lat}, ${st.geom.lon}])">GO</button>`;
                list.appendChild(div);
            });
        } else { list.innerHTML = "<p style='padding:10px'>AUCUNE STATION TROUVÉE</p>"; }
    } catch(e) { list.innerHTML = "<p style='padding:10px'>ERREUR DONNÉES</p>"; }
}

function manualZoom(delta) {
    mainMap.setZoom(mainMap.getZoom() + delta);
}

window.onload = init;
</script>
</body>
</html>
