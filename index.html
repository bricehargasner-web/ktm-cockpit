<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENERGY CONCEPT - SUPER DIAG V2</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #000; color: #0f0; padding: 10px; font-size: 11px; }
        .tiroir { border: 1px solid #333; margin-bottom: 10px; padding: 10px; border-left: 4px solid #FF6600; background: #0a0a0a; }
        .label { font-weight: bold; color: #FF6600; display: block; margin-bottom: 5px; font-size: 13px; }
        .log-box { background: #000; color: #0f0; padding: 8px; height: 120px; overflow-y: auto; border: 1px solid #222; margin-top: 10px; border-radius: 4px; }
        button { background: #FF6600; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 5px; }
        select, input { width: 100%; padding: 10px; margin: 5px 0; background: #111; color: #fff; border: 1px solid #444; }
        .valeur { color: #fff; font-size: 1.2em; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="color:#FF6600">FORCE DIAG V2 - ENERGY CONCEPT</h2>

    <div class="tiroir">
        <span class="label">[MOTO-SENSORS] - INCLINAISON & GPS</span>
        <button onclick="demarrerCapteurs()">ACTIVER CAPTEURS</button>
        <div>GPS : <span id="gps-val" class="valeur">Fix en cours...</span></div>
        <div>Vitesse : <span id="speed-val" class="valeur">0</span> km/h | Alt : <span id="alt-val" class="valeur">--</span> m</div>
        <div style="margin-top:10px; border-top: 1px solid #333; padding-top:10px;">
            Angle (Tranche G) : <span id="angle-val" class="valeur">0</span>°
            <button onclick="resetAngle()" style="width: auto; padding: 2px 10px; background:#444; font-size:10px;">ZÉRO ANGLE</button>
        </div>
        <div class="log-box" id="log-sensors">En attente de mouvement...</div>
    </div>

    <div class="tiroir">
        <span class="label">[FUEL-API] - RECHERCHE STATIONS</span>
        <label>Choix Carburant :</label>
        <select id="fuel-select">
            <option value="Gazole">Gazole</option>
            <option value="SP95">Sans Plomb 95</option>
            <option value="SP98">Sans Plomb 98</option>
            <option value="E10">E10</option>
            <option value="E85">E85</option>
            <option value="GPLc">GPL</option>
        </select>
        <label>Rayon (1-20km) :</label>
        <input type="range" id="fuel-rad" min="1" max="20" value="10" oninput="this.nextElementSibling.innerText = this.value + 'km'"> <span>10km</span>
        <button onclick="testNouvelleAPI()" style="background:#28a745;">LANCER RECHERCHE (V2.1 STABLE)</button>
        <div class="log-box" id="log-fuel">Prêt pour requête...</div>
    </div>

    <div class="tiroir">
        <span class="label">[GPX-REC] - TEST ENREGISTREMENT</span>
        <div id="rec-info" class="valeur">Points : 0</div>
        <button id="btn-rec" onclick="toggleREC()" style="background:#dc3545;">DÉMARRER REC</button>
        <div class="log-box" id="log-rec">Historique GPX...</div>
    </div>

    <script>
        const log = (id, msg) => {
            const el = document.getElementById(id);
            el.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
            el.scrollTop = el.scrollHeight;
        };

        let coords = { lat: null, lon: null };
        let angleZero = 0;
        let isREC = false;
        let logs = [];

        function demarrerCapteurs() {
            log('log-sensors', "Demande GPS + Orientation...");
            navigator.geolocation.watchPosition(p => {
                coords.lat = p.coords.latitude;
                coords.lon = p.coords.longitude;
                document.getElementById('gps-val').innerText = `${coords.lat.toFixed(4)}, ${coords.lon.toFixed(4)}`;
                document.getElementById('speed-val').innerText = Math.round(p.coords.speed * 3.6) || 0;
                document.getElementById('alt-val').innerText = Math.round(p.coords.altitude) || "--";
                if(isREC) logs.push({ t: Date.now(), lat: coords.lat, lon: coords.lon, s: Math.round(p.coords.speed*3.6), a: Math.round(p.coords.altitude) });
                document.getElementById('rec-info').innerText = `Points : ${logs.length}`;
            }, e => log('log-sensors', "ERREUR GPS : " + e.message), { enableHighAccuracy: true });

            if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => {
                    if(s === 'granted') window.addEventListener('deviceorientation', handleAngle);
                });
            } else { window.addEventListener('deviceorientation', handleAngle); }
        }

        function handleAngle(e) {
            // Orientation paysage : tranche gauche en haut = inclinaison sur l'axe Beta ou Gamma
            let val = Math.abs(e.beta - angleZero); 
            val = Math.min(60, Math.round(val));
            document.getElementById('angle-val').innerText = val;
            window.lastRaw = e.beta;
        }
        function resetAngle() { angleZero = window.lastRaw || 0; log('log-sensors', "Zéro angle effectué."); }

        async function testNouvelleAPI() {
            const fuel = document.getElementById('fuel-select').value;
            const radius = document.getElementById('fuel-rad').value;
            const logId = 'log-fuel';
            
            if(!coords.lat) return log(logId, "ERREUR : Attendez le Fix GPS.");
            
            // Nouvelle URL V2.1 avec le dataset officiel flux instantané
            const dataset = "prix-des-carburants-en-france-flux-instantane-v2";
            const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/${dataset}/records?where=within_distance(geom%2C%20geom'POINT(${coords.lon}%20${coords.lat})'%2C%20${radius}km)&limit=20`;
            
            log(logId, `Appel API V2.1 (${fuel})...`);
            try {
                const res = await fetch(url);
                log(logId, `Code Réponse : ${res.status}`);
                if(!res.ok) throw new Error("Dataset non trouvé (404) ou Serveur HS");
                
                const data = await res.json();
                const items = data.results || [];
                log(logId, `Succès : ${items.length} stations trouvées.`);

                items.forEach(s => {
                    // Extraction du prix spécifique selon le carburant choisi
                    const prix = s[fuel.toLowerCase() + "_prix"] ? s[fuel.toLowerCase() + "_prix"] + "€" : "N.C"; 
                    log(logId, `> ${s.adresse || s.ville} : ${prix}`);
                });
            } catch(e) { log(logId, "ÉCHEC : " + e.message); }
        }

        function toggleREC() {
            isREC = !isREC;
            const btn = document.getElementById('btn-rec');
            if(isREC) {
                logs = [];
                alert("C'est parti !"); // Source 11
                btn.innerText = "ARRÊTER ET SAUVER";
                log('log-rec', "Enregistrement en cours...");
            } else {
                if(confirm("Voulez-vous enregistrer votre course ?")) { // Source 11
                    log('log-rec', `Session terminée. ${logs.length} points sauvegardés.`);
                }
                btn.innerText = "DÉMARRER REC";
            }
        }
    </script>
</body>
</html>
