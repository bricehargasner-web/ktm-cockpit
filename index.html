<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENERGY CONCEPT - KTM AVIONICS V5.1</title>
    <script>
    /* --- PANNEAU DE CONTRÔLE ENERGY CONCEPT (MODIFIABLE) --- */
    const CONFIG = {
        USER: "Brice CARDONA",
        KTM_ORANGE: '#FF6600',
        DANGER_RED: '#FF0000',
        SCAN_RADIUS: 20000, // Rayon réduit à 20km pour plus de précision
        MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}{r}.png',
        FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records',
        OSRM_API: 'https://router.project-osrm.org/route/v1/driving/'
    };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --ktm: #FF6600; --glass: rgba(10, 10, 10, 0.9); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Barlow Condensed', sans-serif; background: #000; overflow: hidden; color: white; }
        
        #portrait-blocker { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; color: var(--ktm); font-family: 'Orbitron'; }
        @media (orientation: portrait) { #portrait-blocker { display: flex; } }

        #map-main { position: absolute; width: 100%; height: 100%; z-index: 1; filter: brightness(0.6) saturate(1.1); }
        
        /* HUD AZIMUT AVEC HORIZON */
        #hud-container { 
            position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%);
            width: 260px; height: 260px; z-index: 100; pointer-events: none;
        }
        #compass-frame {
            width: 100%; height: 100%; border-radius: 50%; border: 1px solid rgba(255,102,0,0.3);
            overflow: hidden; position: relative; background: #000; box-shadow: 0 0 50px #000;
        }
        #azimuth-ring {
            position: absolute; inset: 0; border-radius: 50%; z-index: 105;
            background: 
                repeating-conic-gradient(from 0deg, var(--ktm) 0deg 0.5deg, transparent 0.5deg 10deg),
                repeating-conic-gradient(from 0deg, rgba(255,255,255,0.3) 0deg 0.2deg, transparent 0.2deg 2deg);
            -webkit-mask-image: radial-gradient(circle, transparent 94%, black 95%);
        }
        #artificial-horizon {
            position: absolute; top: 50%; left: -50%; width: 200%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--ktm), #fff, var(--ktm), transparent);
            z-index: 120; transition: transform 0.1s linear;
        }
        #map-zoom { width: 100%; height: 100%; }
        #moto-marker {
            position: absolute; top: 50%; left: 50%; width: 18px; height: 24px;
            transform: translate(-50%, -50%); z-index: 130;
            background: #fff; clip-path: polygon(50% 0%, 100% 100%, 50% 80%, 0% 100%);
        }

        /* RECHERCHE COURTE AVEC CROIX */
        #search-area { position: absolute; top: 15px; left: 15px; z-index: 700; width: 280px; display: flex; gap: 5px; }
        .search-container { position: relative; flex-grow: 1; display: flex; }
        .input-dark {
            background: rgba(0,0,0,0.85); border: 1px solid #333; border-left: 3px solid var(--ktm);
            color: #fff; padding: 10px 35px 10px 10px; font-family: 'Barlow Condensed'; font-size: 0.9rem; outline: none; width: 100%;
        }
        .btn-clear {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: #666; font-size: 1.2rem; cursor: pointer; display: none;
        }

        /* CONTRÔLES DROITE COMPACTS */
        #right-ui { position: absolute; top: 15px; right: 15px; z-index: 700; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
        .btn-ktm {
            background: var(--ktm); color: #000; border: none; padding: 8px 15px;
            font-family: 'Orbitron'; font-weight: 900; font-size: 0.7rem; cursor: pointer;
            clip-path: polygon(0 0, 95% 0, 100% 30%, 100% 100%, 5% 100%, 0 70%);
        }

        /* LISTE STATIONS DISCRÈTE À DROITE */
        #station-list {
            position: absolute; right: 15px; top: 105px; width: 220px; max-height: 45vh;
            background: var(--glass); border-right: 3px solid var(--ktm); display: none; overflow-y: auto; z-index: 800;
        }
        .fuel-card { padding: 10px; border-bottom: 1px solid #222; font-size: 0.8rem; }
        .fuel-price { color: var(--ktm); font-size: 1.2rem; font-weight: 700; }
        .fuel-meta { font-size: 0.6rem; color: #888; text-transform: uppercase; margin-bottom: 3px; }

        /* DASHBOARD GLOSSY */
        #dash-bottom {
            position: absolute; bottom: 0; width: 100%; height: 65px;
            z-index: 500; display: flex; justify-content: center; gap: 3px; padding: 0 5px 5px 5px; box-sizing: border-box;
        }
        .widget {
            background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(0,0,0,0.95) 100%);
            border-top: 1px solid var(--ktm); flex: 1; text-align: center; padding: 5px;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 95% 100%, 0 100%);
        }
        .stat-label { font-size: 0.55rem; color: #777; font-family: 'Orbitron'; letter-spacing: 1px; }
        .stat-value { font-size: 1.4rem; font-weight: 700; }

        /* PRIX SUR LA CARTE */
        .price-label {
            background: #fff; color: #000; border: 1.5px solid var(--ktm);
            font-weight: 900; font-size: 11px; padding: 2px 4px; border-radius: 3px; text-align: center;
        }
    </style>
</head>
<body>

<div id="portrait-blocker"><h1>KTM AVIONICS</h1><p>PAYSAGE REQUIS</p></div>

<div id="search-area">
    <div class="search-container">
        <input type="text" id="dest-input" class="input-dark" placeholder="DESTINATION...">
        <button id="btn-stop" class="btn-clear" onclick="stopNav()">×</button>
    </div>
    <button class="btn-ktm" onclick="runSearch()">GO</button>
</div>

<div id="right-ui">
    <select id="fuel-select" class="input-dark" style="border-left:none; border-right:3px solid var(--ktm); background:#111; width:120px; font-weight:bold;">
        <option value="gazole_prix">GAZOLE</option>
        <option value="sp95_prix">SP95</option>
        <option value="sp98_prix">SP98</option>
    </select>
    <button class="btn-ktm" onclick="scanFuel()">⛽ SCAN</button>
</div>

<div id="station-list">
    <div style="background:#000; color:var(--ktm); padding:5px; font-size:0.6rem; text-align:center; font-family:'Orbitron';" onclick="this.parentElement.style.display='none'">FERMER [X]</div>
    <div id="fuel-results"></div>
</div>

<div id="hud-container">
    <div id="compass-frame">
        <div id="azimuth-ring"></div>
        <div id="artificial-horizon"></div>
        <div id="map-zoom"></div>
        <div id="moto-marker"></div>
    </div>
</div>

<div id="map-main"></div>

<div id="dash-bottom">
    <div class="widget"><div class="stat-label">Altitude</div><div id="v-alt" class="stat-value">---</div></div>
    <div class="widget"><div class="stat-label">Angle</div><div id="v-lean" class="stat-value">0°</div></div>
    <div class="widget" style="flex:1.4"><div id="v-speed" class="stat-value" style="font-size:2.5rem; line-height:1">00</div><div class="stat-label">KM/H</div></div>
    <div class="widget"><div class="stat-label">Cap</div><div id="v-cap" class="stat-value">---</div></div>
    <div class="widget"><div class="stat-label">Trip</div><div id="v-dist" class="stat-value">0.0</div></div>
</div>

<script>
let mainMap, zoomMap, fuelLayer, routeLayerMain, routeLayerZoom;
let userPos = [41.9, 8.7], lastPos = null, tripDist = 0;

function init() {
    mainMap = L.map('map-main', { zoomControl: false, attributionControl: false }).setView(userPos, 13);
    L.tileLayer(CONFIG.MAP_STYLE).addTo(mainMap);

    zoomMap = L.map('map-zoom', { zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false, touchZoom: false }).setView(userPos, 15);
    L.tileLayer(CONFIG.MAP_STYLE).addTo(zoomMap);

    fuelLayer = L.layerGroup().addTo(mainMap);
    routeLayerMain = L.layerGroup().addTo(mainMap);
    routeLayerZoom = L.layerGroup().addTo(zoomMap);

    mainMap.on('move', () => {
        zoomMap.setView(mainMap.getCenter(), mainMap.getZoom() + 2, { animate: false });
    });

    startGPS();
    window.addEventListener('deviceorientation', handleSensors);
}

function startGPS() {
    navigator.geolocation.watchPosition(p => {
        userPos = [p.coords.latitude, p.coords.longitude];
        mainMap.panTo(userPos);
        
        document.getElementById('v-speed').innerText = p.coords.speed ? Math.round(p.coords.speed * 3.6) : "00";
        if(p.coords.altitude) document.getElementById('v-alt').innerText = Math.round(p.coords.altitude) + "m";
        if(p.coords.heading) {
            const h = Math.round(p.coords.heading);
            document.getElementById('v-cap').innerText = h + "°";
            document.getElementById('moto-marker').style.transform = `translate(-50%, -50%) rotate(${h}deg)`;
        }
        if(lastPos) tripDist += (mainMap.distance(lastPos, userPos) / 1000);
        document.getElementById('v-dist').innerText = tripDist.toFixed(1);
        lastPos = userPos;
    }, null, { enableHighAccuracy: true });
}

function handleSensors(e) {
    let lean = Math.round(e.gamma);
    document.getElementById('artificial-horizon').style.transform = `translateY(-50%) rotate(${-lean}deg)`;
    document.getElementById('v-lean').innerText = Math.abs(lean) + "°";
    const frame = document.getElementById('compass-frame');
    frame.style.borderColor = Math.abs(lean) > 25 ? CONFIG.DANGER_RED : "rgba(255,102,0,0.3)";
}

async function runSearch() {
    const q = document.getElementById('dest-input').value;
    if(!q) return;
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
    const data = await res.json();
    if(data[0]) {
        drawNav([data[0].lat, data[0].lon]);
        document.getElementById('btn-stop').style.display = 'block';
    }
}

function stopNav() {
    routeLayerMain.clearLayers();
    routeLayerZoom.clearLayers();
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('dest-input').value = "";
}

async function drawNav(target) {
    const url = `${CONFIG.OSRM_API}${userPos[1]},${userPos[0]};${target[1]},${target[0]}?overview=full&geometries=geojson`;
    const res = await fetch(url);
    const data = await res.json();
    routeLayerMain.clearLayers(); routeLayerZoom.clearLayers();
    if(data.routes[0]) {
        const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
        L.polyline(coords, { color: CONFIG.KTM_ORANGE, weight: 5, opacity: 0.8 }).addTo(routeLayerMain);
        L.polyline(coords, { color: CONFIG.KTM_ORANGE, weight: 8, opacity: 1 }).addTo(routeLayerZoom);
        mainMap.fitBounds(L.polyline(coords).getBounds());
    }
}

async function scanFuel() {
    const type = document.getElementById('fuel-select').value;
    const list = document.getElementById('fuel-results');
    document.getElementById('station-list').style.display = 'block';
    list.innerHTML = "<p style='padding:10px; font-size:0.7rem'>SCAN CORSE...</p>";

    try {
        const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${userPos[1]} ${userPos[0]})', ${CONFIG.SCAN_RADIUS}m)&limit=15`;
        const res = await fetch(url);
        const data = await res.json();
        fuelLayer.clearLayers(); list.innerHTML = "";

        data.results.forEach(st => {
            const price = parseFloat(st[type]);
            if(!price) return;
            const dist = (mainMap.distance(userPos, [st.geom.lat, st.geom.lon]) / 1000).toFixed(1);

            // Prix sur carte
            L.marker([st.geom.lat, st.geom.lon], {
                icon: L.divIcon({ className: '', html: `<div class="price-label">${price.toFixed(2)}</div>`, iconSize: [40, 20] })
            }).addTo(fuelLayer);

            const div = document.createElement('div');
            div.className = "fuel-card";
            div.innerHTML = `
                <div class="fuel-meta">${st.ville || 'Corse'} • ${dist} KM</div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="fuel-price">${price.toFixed(2)}€</span>
                    <button class="btn-ktm" style="padding:3px 8px; font-size:0.6rem" onclick="drawNav([${st.geom.lat}, ${st.geom.lon}])">GO</button>
                </div>
            `;
            list.appendChild(div);
        });
    } catch(e) { list.innerHTML = "Erreur API"; }
}

window.onload = init;
</script>
</body>
</html>
