<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENERGY CONCEPT - GPS MOTO 3D (Zéro API Key)</title>

    <script>
        const CONFIG_KTM = {
            COULEUR_ACCENT: "#FF6600",
            CARBURANT_PREF: "E10",       // Options: Gazole, SP95, SP98, E10, E85
            RAYON_RECHERCHE: 15,         // En kilomètres (1 à 20)
            ANGLE_ALERTE_ROUGE: 45,      // Déclenchement visuel jauge
            PITCH_3D: 60,                // Inclinaison de la caméra (Style 3D)
            ZOOM_NAV: 17                 // Zoom en mode navigation
        };
    </script>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
        :root { --ktm: #FF6600; --bg: rgba(10, 10, 10, 0.85); --glass: rgba(0, 0, 0, 0.7); }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; margin: 0; padding: 0; }
        body { background: #000; color: #fff; overflow: hidden; height: 100vh; width: 100vw; }
        
        #map { position: absolute; inset: 0; z-index: 1; }
        .pointer-auto { pointer-events: auto; }

        .ui-layer { position: absolute; inset: 0; z-index: 10; pointer-events: none; display: grid; grid-template-columns: 220px 1fr 220px; grid-template-rows: 60px 1fr 100px; padding: 15px; gap: 10px; }
        .case { background: var(--bg); border-left: 4px solid var(--ktm); padding: 10px; backdrop-filter: blur(5px); border-radius: 2px; }

        /* BARRE HAUTE */
        .top-bar { grid-column: 1 / 4; grid-row: 1; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
        .search-box { display: flex; background: #111; border: 1px solid #333; border-radius: 4px; overflow: hidden; width: 400px; }
        .search-box input { background: transparent; border: none; color: white; padding: 10px 15px; width: 100%; outline: none; }
        .btn-ktm { background: var(--ktm); color: #000; font-weight: bold; border: none; padding: 10px 20px; cursor: pointer; text-transform: uppercase; }
        
        #search-results { position: absolute; top: 65px; left: 50%; transform: translateX(-50%); width: 400px; background: rgba(0,0,0,0.95); border: 1px solid var(--ktm); z-index: 50; max-height: 250px; overflow-y: auto; display: none; }
        .search-item { padding: 12px; border-bottom: 1px solid #333; cursor: pointer; font-size: 14px; }
        .search-item:hover { background: #222; }

        /* HUD GAUCHE */
        .hud-left { grid-column: 1; grid-row: 2 / 4; display: flex; flex-direction: column; justify-content: space-between; }
        .speed-val { font-size: 5rem; font-weight: 900; color: var(--ktm); line-height: 1; text-align: center; text-shadow: 2px 2px 5px #000; }
        
        /* HUD DROIT */
        .hud-right { grid-column: 3; grid-row: 2 / 4; display: flex; flex-direction: column; justify-content: space-between; align-items: flex-end; }
        .gauge-wrap { width: 100px; height: 100px; border: 4px solid #222; border-top-color: var(--ktm); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.1s; margin: 0 auto; }
        
        /* GUIDAGE BAS */
        .nav-block { grid-column: 2; grid-row: 3; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; }
        .nav-instruction { background: var(--bg); border: 2px solid var(--ktm); border-radius: 8px; padding: 15px 30px; display: flex; align-items: center; gap: 20px; opacity: 0; transition: 0.3s; }
        .nav-instruction.active { opacity: 1; }

        /* TIROIRS */
        .drawer { position: fixed; background: #050505; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px; border: 1px solid #333; }
        #settings-drawer { top: 0; right: -320px; width: 300px; height: 100%; border-left: 4px solid var(--ktm); }
        #settings-drawer.open { right: 0; }
        #fuel-drawer { bottom: -50%; left: 240px; right: 240px; height: 45%; border-top: 4px solid var(--ktm); border-radius: 10px 10px 0 0; overflow-y: auto; }
        #fuel-drawer.open { bottom: 0; }

        select, input[type="range"] { width: 100%; background: #111; color: #fff; border: 1px solid #444; padding: 10px; margin-top: 5px; }
        .station-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #222; }
        #btn-rec { background: #111; border: 2px solid #444; color: #fff; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .rec-active { border-color: red !important; color: red !important; box-shadow: 0 0 10px red; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-layer">
        <div class="top-bar">
            <div class="search-box pointer-auto">
                <input type="text" id="search-input" placeholder="Où allons-nous ?" onkeyup="MOTO_LOGIC.searchLocation(this.value)">
            </div>
            <div id="search-results" class="pointer-auto"></div>
            <div style="display: flex; gap: 15px;" class="pointer-auto">
                <button id="btn-rec" onclick="UI.toggleREC()">REC</button>
                <button class="btn-ktm" onclick="MOTO_LOGIC.scanFuel()">⛽ CARBURANT</button>
                <div style="color: var(--ktm); font-size: 35px; cursor: pointer; padding: 0 10px;" onclick="UI.toggleSettings()">⋮</div>
            </div>
        </div>

        <div class="hud-left pointer-auto">
            <div class="case" style="width: 160px; text-align: center;">
                <div class="speed-val" id="speed-val">0</div>
                <div style="color: #888; font-size: 14px; font-weight: bold;">KM/H</div>
                <div id="alt-val" style="border-top: 1px solid #333; margin-top: 10px; padding-top: 5px; font-size: 12px;">ALT: -- m</div>
            </div>
            <div class="case" style="width: 160px; cursor: pointer;" onclick="window.open('https://meteofrance.com/', '_blank')">
                <div style="color: var(--ktm); font-weight: bold; font-size: 12px;">MÉTÉO LOCALE</div>
                <div id="temp-val" style="font-size: 24px; font-weight: bold;">--°C</div>
                <div id="wind-val" style="font-size: 12px; color: #888;">Vent: -- km/h</div>
            </div>
        </div>

        <div class="nav-block pointer-auto">
            <div class="nav-instruction" id="nav-instruction">
                <div style="font-size: 35px; color: var(--ktm);">➔</div>
                <div>
                    <div id="nav-dist" style="font-size: 24px; font-weight: bold;">-- km</div>
                    <div id="nav-text" style="color: #aaa; font-size: 14px;">En attente...</div>
                </div>
                <button onclick="MOTO_LOGIC.stopNav()" style="background: none; border: 1px solid #555; color: white; padding: 5px 10px; border-radius: 4px; margin-left: 20px; cursor: pointer;">STOP</button>
            </div>
        </div>

        <div class="hud-right pointer-auto">
            <div class="case" style="width: 160px; text-align: center;">
                <div style="font-size: 10px; color: #888; letter-spacing: 2px;">INCLINAISON</div>
                <div class="gauge-wrap" id="gauge-visual">
                    <span id="angle-val" style="font-size: 32px; font-weight: bold;">0°</span>
                </div>
                <button onclick="MOTO_LOGIC.setZero()" style="background: transparent; border: 1px solid #555; color: white; padding: 4px 15px; margin-top: 15px; font-size: 10px; border-radius: 4px; cursor: pointer;">ZÉRO</button>
            </div>
        </div>
    </div>

    <div id="settings-drawer" class="drawer pointer-auto">
        <h3 style="color: var(--ktm); margin-bottom: 20px;">RÉGLAGES GPS</h3>
        <label style="font-size: 12px; color: #888;">CARBURANT</label>
        <select onchange="CONFIG_KTM.CARBURANT_PREF = this.value">
            <option value="Gazole">Gazole</option>
            <option value="E10">E10</option>
            <option value="SP95">SP95</option>
            <option value="SP98">SP98</option>
            <option value="E85">E85</option>
        </select>
        <label style="font-size: 12px; color: #888; margin-top: 15px; display: block;">RAYON : <span id="rad-disp">15</span> km</label>
        <input type="range" min="1" max="20" value="15" oninput="document.getElementById('rad-disp').innerText=this.value; CONFIG_KTM.RAYON_RECHERCHE=this.value">
        <button class="btn-ktm" style="width: 100%; margin-top: 30px;" onclick="UI.toggleSettings()">FERMER</button>
    </div>

    <div id="fuel-drawer" class="drawer pointer-auto">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;">
            <h3 style="color: var(--ktm);">STATIONS PROCHES</h3>
            <button onclick="UI.toggleFuelDrawer()" style="background: none; border: none; color: white; cursor: pointer;">[ X ]</button>
        </div>
        <div id="fuel-list-content"></div>
    </div>

    <script>
        let map, userMarker;
        let userPos = { lat: 43.761, lng: 1.990 }; 
        let angleOffset = 0, isRecording = false, searchTimeout = null;

        const MOTO_LOGIC = {
            initSystem() {
                // Moteur MapLibre (Sans API KEY) avec fond sombre gratuit CartoDB
                map = new maplibregl.Map({
                    container: 'map',
                    style: {
                        version: 8,
                        sources: {
                            'carto-dark': {
                                type: 'raster',
                                tiles: [
                                    'https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
                                    'https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'
                                ],
                                tileSize: 256
                            }
                        },
                        layers: [{
                            id: 'carto-dark-layer',
                            type: 'raster',
                            source: 'carto-dark',
                            minzoom: 0,
                            maxzoom: 22
                        }]
                    },
                    center: [userPos.lng, userPos.lat],
                    zoom: 15,
                    pitch: CONFIG_KTM.PITCH_3D, // Vue 3D activée
                    antialias: true
                });

                const el = document.createElement('div');
                el.style.width = '24px'; el.style.height = '24px'; el.style.background = '#00ccff'; el.style.borderRadius = '50%'; el.style.border = '3px solid white'; el.style.boxShadow = '0 0 15px #00ccff';
                userMarker = new maplibregl.Marker(el).setLngLat([userPos.lng, userPos.lat]).addTo(map);

                this.startSensors();
            },

            startSensors() {
                navigator.geolocation.watchPosition(p => {
                    userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                    document.getElementById('speed-val').innerText = Math.round(p.coords.speed * 3.6) || 0;
                    document.getElementById('alt-val').innerText = "ALT: " + (Math.round(p.coords.altitude) || 0) + " m";
                    
                    userMarker.setLngLat([userPos.lng, userPos.lat]);
                    
                    if(document.getElementById('nav-instruction').classList.contains('active')) {
                        // Rotation 3D active
                        map.easeTo({ center: [userPos.lng, userPos.lat], bearing: p.coords.heading || 0, pitch: CONFIG_KTM.PITCH_3D, zoom: CONFIG_KTM.ZOOM_NAV });
                    } else {
                        map.panTo([userPos.lng, userPos.lat]);
                    }
                    this.updateWeather(userPos.lat, userPos.lng);
                }, e => console.log("GPS Err"), { enableHighAccuracy: true });

                window.addEventListener('deviceorientation', e => {
                    if(e.beta === null) return;
                    let lean = Math.abs(e.beta - angleOffset);
                    lean = Math.min(60, Math.round(lean));
                    document.getElementById('angle-val').innerText = lean + "°";
                    document.getElementById('gauge-visual').style.transform = `rotate(${e.beta > angleOffset ? lean : -lean}deg)`;
                    document.getElementById('gauge-visual').style.borderTopColor = (lean >= CONFIG_KTM.ANGLE_ALERTE_ROUGE) ? "red" : "var(--ktm)";
                });
            },

            // RECHERCHE PRÉDICTIVE (API Publique Gratuite)
            searchLocation(query) {
                clearTimeout(searchTimeout);
                if(query.length < 3) { document.getElementById('search-results').style.display = 'none'; return; }
                
                searchTimeout = setTimeout(async () => {
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${query}&format=json&limit=5`);
                        const data = await res.json();
                        const box = document.getElementById('search-results');
                        box.style.display = 'block';
                        
                        box.innerHTML = data.map(place => {
                            let cleanName = place.display_name.split(',')[0].replace(/['"]/g, " ");
                            return `<div class="search-item" onclick="MOTO_LOGIC.startRouting(${place.lat}, ${place.lon}, '${cleanName}')">📍 ${place.display_name}</div>`;
                        }).join('');
                    } catch(e) { console.error(e); }
                }, 500);
            },

            // CALCUL D'ITINÉRAIRE (API OSRM 100% Gratuite)
            async startRouting(destLat, destLon, destName) {
                document.getElementById('search-results').style.display = 'none';
                document.getElementById('search-input').value = "";
                if(document.getElementById('fuel-drawer').classList.contains('open')) UI.toggleFuelDrawer();

                destLat = parseFloat(destLat);
                destLon = parseFloat(destLon);

                try {
                    const urlOSRM = `https://router.project-osrm.org/route/v1/driving/${userPos.lng},${userPos.lat};${destLon},${destLat}?overview=full&geometries=geojson`;
                    const resOSRM = await fetch(urlOSRM);
                    const dataOSRM = await resOSRM.json();
                    
                    if (dataOSRM.code !== 'Ok') throw new Error("OSRM Refusé");

                    const routeGeoJSON = dataOSRM.routes[0].geometry;
                    const routeDistanceKm = (dataOSRM.routes[0].distance / 1000).toFixed(1);

                    // Tracé sur la carte
                    if (map.getSource('route')) {
                        map.removeLayer('route-layer');
                        map.removeSource('route');
                    }
                    
                    map.addSource('route', { type: 'geojson', data: routeGeoJSON });
                    map.addLayer({
                        id: 'route-layer', type: 'line', source: 'route',
                        layout: { 'line-join': 'round', 'line-cap': 'round' },
                        paint: { 'line-color': CONFIG_KTM.COULEUR_ACCENT, 'line-width': 8, 'line-opacity': 0.8 }
                    });

                    document.getElementById('nav-instruction').classList.add('active');
                    document.getElementById('nav-text').innerText = `Vers: ${destName}`;
                    document.getElementById('nav-dist').innerText = routeDistanceKm + " km";
                    map.easeTo({ center: [userPos.lng, userPos.lat], pitch: CONFIG_KTM.PITCH_3D, zoom: CONFIG_KTM.ZOOM_NAV });

                } catch (e) {
                    alert("ALERTE : Connexion au serveur de routage public échouée. Veuillez réessayer.");
                }
            },

            stopNav() {
                document.getElementById('nav-instruction').classList.remove('active');
                if (map.getSource('route')) { map.removeLayer('route-layer'); map.removeSource('route'); }
                map.easeTo({ pitch: 0, zoom: 15 });
            },

            // RECHERCHE CARBURANT (API Gouvernement, gratuite)
            async scanFuel() {
                UI.toggleFuelDrawer();
                document.getElementById('fuel-list-content').innerHTML = "<div style='padding:20px;'>Recherche en cours...</div>";
                
                const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?where=within_distance(geom%2C%20geom'POINT(${userPos.lng}%20${userPos.lat})'%2C%20${CONFIG_KTM.RAYON_RECHERCHE}km)&limit=20`;
                
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    if(!data.results || data.results.length === 0) {
                        document.getElementById('fuel-list-content').innerHTML = "<div style='padding:20px;'>Aucune station trouvée.</div>";
                        return;
                    }
                    document.getElementById('fuel-list-content').innerHTML = data.results.map(s => {
                        if(!s.geom) return ''; 
                        const prixRaw = s[CONFIG_KTM.CARBURANT_PREF.toLowerCase() + "_prix"];
                        const prixAffiche = prixRaw ? prixRaw + ' €' : '<span style="color:var(--ktm)">N.C</span>';
                        let cleanName = s.ville ? s.ville.replace(/['"]/g, " ") : "Station";
                        
                        return `
                            <div class="station-item">
                                <div><div style="font-weight:bold">${s.ville || 'Station'}</div><div style="font-size:12px; color:#888">${s.adresse || ''}</div></div>
                                <div style="font-size:18px; font-weight:bold; margin-right:15px;">${prixAffiche}</div>
                                <button class="btn-ktm" style="padding: 8px 15px;" onclick="MOTO_LOGIC.startRouting(${s.geom.lat}, ${s.geom.lon}, 'Station ${cleanName}')">GO</button>
                            </div>
                        `;
                    }).join('');
                } catch(e) { document.getElementById('fuel-list-content').innerHTML = "<div style='padding:20px; color:red;'>Erreur Serveur Carburants.</div>"; }
            },

            // METEO (API Publique Gratuite)
            async updateWeather(lat, lon) {
                try {
                    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                    const d = await r.json();
                    document.getElementById('temp-val').innerText = Math.round(d.current_weather.temperature) + "°C";
                    document.getElementById('wind-val').innerText = "Vent: " + Math.round(d.current_weather.windspeed) + " km/h";
                } catch(e) {}
            },
            setZero() { angleOffset = 0; }
        };

        const UI = {
            toggleSettings() { document.getElementById('settings-drawer').classList.toggle('open'); },
            toggleFuelDrawer() { document.getElementById('fuel-drawer').classList.toggle('open'); },
            toggleREC() {
                isRecording = !isRecording;
                const btn = document.getElementById('btn-rec');
                btn.classList.toggle('rec-active');
                if(isRecording) { alert("C'est parti !"); btn.innerText = "REC 🔴"; } 
                else { confirm("Voulez-vous enregistrer votre course ?"); btn.innerText = "REC"; }
            }
        };

        window.onload = () => MOTO_LOGIC.initSystem();
    </script>
</body>
</html>
