<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM COCKPIT V48 - COMMANDER</title>
    
    <script>
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            SAFE_GREEN: '#2ecc71',
            DANGER_RED: '#ff4757',
            RADIUS_METER: 15000, 
            MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records'
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        
        #portrait-warning { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #FF6600; }
        @media (orientation: portrait) { #portrait-warning { display: flex; } }

        #map { position: absolute; inset: 0; z-index: 1; filter: brightness(0.4) contrast(1.2); }

        /* --- SIDEBAR FUEL AVEC BOUTON NAV --- */
        #fuel-sidebar {
            position: absolute; right: 10px; top: 75px; bottom: 100px; width: 260px;
            background: rgba(0,0,0,0.9); border-left: 3px solid #FF6600;
            z-index: 150; display: none; flex-direction: column; overflow-y: auto;
            backdrop-filter: blur(10px);
        }
        .fuel-item { padding: 12px 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .fuel-info { flex-grow: 1; cursor: pointer; }
        .fuel-item .name { font-size: 0.7rem; color: #FF6600; font-weight: 900; text-transform: uppercase; }
        .fuel-item .address { font-size: 0.6rem; color: #888; font-family: sans-serif; margin-bottom: 4px; }
        .fuel-item .price { font-size: 1.5rem; font-family: 'Barlow Condensed'; color: #FFF; font-weight: 900; }
        .btn-go { background: #FF6600; color: #000; border: none; padding: 10px; border-radius: 4px; font-weight: 900; font-size: 0.8rem; cursor: pointer; margin-left: 10px; }

        /* --- HUD & SPEED --- */
        #hud-container { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 280px; z-index: 60; pointer-events: none; }
        #aim-sphere { position: absolute; width: 100%; height: 100%; border: 2px solid rgba(255,255,255,0.1); border-radius: 50%; }
        #horizon-gyro { position: absolute; top: 50%; width: 140%; left: -20%; height: 2px; box-shadow: 0 0 15px currentColor; transition: transform 0.05s linear; }
        #lean-display { position: absolute; width: 100%; top: 50%; transform: translateY(-50%); text-align: center; font-size: 4rem; font-weight: 900; }

        #speed-block { position: absolute; bottom: 115px; left: 5%; z-index: 80; pointer-events: none; }
        #speed-val { font-family: 'Barlow Condensed'; font-size: 5.5rem; font-weight: 900; line-height: 0.8; }

        /* --- UI HAUTE --- */
        #top-ui { position: absolute; top: 10px; width: 96%; left: 2%; z-index: 200; display: flex; gap: 8px; }
        #search-input { flex-grow: 1; background: rgba(0,0,0,0.8); border: 1px solid #FF6600; color: white; padding: 12px; border-radius: 4px; font-family: sans-serif; }
        .btn-ktm { background: #FF6600; color: #000; border: none; padding: 10px 15px; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        #dashboard { position: absolute; bottom: 0; width: 100%; z-index: 90; display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(0,0,0,0.95); border-top: 3px solid #FF6600; }
        .widget { padding: 12px 5px; text-align: center; border-right: 1px solid #333; }
        .label { font-size: 0.6rem; color: #FF6600; font-weight: bold; }
        .value { font-family: 'Barlow Condensed'; font-size: 2.1rem; font-weight: 900; }

        .fuel-marker { background: #FF6600; color: #000; padding: 4px 6px; border-radius: 4px; font-weight: 900; border: 1.5px solid white; font-size: 14px; }
    </style>
</head>
<body>

    <div id="portrait-warning">
        <h1 style="font-size: 3.5rem; margin: 0;">⚠</h1>
        <h2 style="letter-spacing: 3px;">MODE PAYSAGE REQUIS</h2>
    </div>

    <div id="top-ui">
        <input type="text" id="search-input" placeholder="VILLE OU ADRESSE...">
        <button class="btn-ktm" onclick="navToDest()">NAV</button>
        <button class="btn-ktm" style="background:#222; color:#FF6600;" onclick="findFuel()">FUEL</button>
        <button class="btn-ktm" style="background:#444; color:#fff;" onclick="calibrate()">ZERO</button>
    </div>

    <div id="fuel-sidebar">
        <div id="fuel-list-container"></div>
    </div>

    <div id="hud-container">
        <div id="lean-display">0°</div>
        <div id="aim-sphere"></div>
        <div id="horizon-gyro"></div>
    </div>

    <div id="speed-block">
        <div id="speed-val">000</div>
        <div style="font-size:1.2rem; color:#FF6600; font-weight:900;">KM/H</div>
    </div>

    <div id="map"></div>

    <div id="dashboard">
        <div class="widget"><div class="label">ALTITUDE</div><div id="alt" class="value">--</div></div>
        <div class="widget"><div class="label">CAP</div><div id="cap" class="value">---</div></div>
        <div class="widget"><div class="label">TRIP</div><div id="dist" class="value">0.0</div></div>
        <div class="widget"><div class="label">ANGLE</div><div id="lean-alt" class="value">0°</div></div>
    </div>

    <script>
        let map, userMarker, totalDist = 0, offset = 0, lastRaw = 0, smoothedLean = 0, lastCoord = null;
        let fuelLayer = L.layerGroup();
        let stationsMarkers = {};

        function updateHUD(angle) {
            const a = Math.abs(angle);
            const color = a < 25 ? CONFIG.SAFE_GREEN : (a < 40 ? CONFIG.KTM_ORANGE : CONFIG.DANGER_RED);
            document.getElementById('aim-sphere').style.borderColor = color;
            document.getElementById('horizon-gyro').style.backgroundColor = color;
            document.getElementById('lean-display').style.color = color;
            document.getElementById('lean-display').innerText = Math.round(a) + "°";
            document.getElementById('lean-alt').innerText = Math.round(a) + "°";
        }

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.76, 1.98], 14);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(map);
            fuelLayer.addTo(map);
            userMarker = L.circleMarker([0,0], { radius: 10, color: '#fff', fillColor: '#FF6600', fillOpacity: 1, weight: 3 }).addTo(map);

            window.addEventListener('deviceorientation', e => {
                let raw = (Math.abs(window.orientation) === 90) ? e.beta : e.gamma;
                lastRaw = raw;
                smoothedLean = (smoothedLean * 0.90) + ((raw - offset) * 0.10);
                document.getElementById('horizon-gyro').style.transform = `rotate(${smoothedLean}deg)`;
                updateHUD(smoothedLean);
            }, true);

            navigator.geolocation.watchPosition(u => {
                const p = [u.coords.latitude, u.coords.longitude];
                userMarker.setLatLng(p);
                map.panTo(p);
                document.getElementById('speed-val').innerText = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0).toString().padStart(3, '0');
                if (u.coords.altitude) document.getElementById('alt').innerText = Math.round(u.coords.altitude) + "m";
                if (u.coords.heading) document.getElementById('cap').innerText = Math.round(u.coords.heading) + "°";
                if (lastCoord) totalDist += map.distance(lastCoord, p) / 1000;
                lastCoord = p;
                document.getElementById('dist').innerText = totalDist.toFixed(1);
            }, null, { enableHighAccuracy: true });
        }

        // LANCE LA NAVIGATION EXTERNE (Google Maps App)
        function launchNav(dest) {
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(dest)}&travelmode=driving`, '_blank');
        }

        function navToDest() {
            const dest = document.getElementById('search-input').value;
            if (dest) launchNav(dest);
        }

        function focusStation(id) {
            const marker = stationsMarkers[id];
            if (marker) {
                map.setView(marker.getLatLng(), 16);
                marker.openPopup();
            }
        }

        async function findFuel() {
            const c = map.getCenter();
            const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${c.lng} ${c.lat})', ${CONFIG.RADIUS_METER}m)&limit=15`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                fuelLayer.clearLayers();
                stationsMarkers = {};
                const listContainer = document.getElementById('fuel-list-container');
                listContainer.innerHTML = '';
                document.getElementById('fuel-sidebar').style.display = 'flex';
                
                if (data.results && data.results.length > 0) {
                    const stations = data.results.map(st => {
                        let p = 0;
                        try {
                            const pArr = JSON.parse(st.prix.replace(/'/g, '"'));
                            const item = pArr.find(x => x["@nom"].includes("95")) || pArr[0];
                            p = parseFloat(item["@valeur"]);
                        } catch(e) { p = parseFloat(st.sp95_prix) || 0; }
                        return { ...st, calculatedPrice: p };
                    }).sort((a, b) => a.calculatedPrice - b.calculatedPrice);

                    stations.forEach((st, idx) => {
                        const m = L.marker([st.geom.lat, st.geom.lon], {
                            icon: L.divIcon({ html: `<div class="fuel-marker">${st.calculatedPrice.toFixed(2)}</div>`, iconSize: [50, 25] })
                        }).bindPopup(`<b>${st.adresse}</b>`);
                        
                        m.addTo(fuelLayer);
                        stationsMarkers[idx] = m;

                        const item = document.createElement('div');
                        item.className = 'fuel-item';
                        item.innerHTML = `
                            <div class="fuel-info" onclick="focusStation(${idx})">
                                <div class="name">${(st.nom || st.adresse).substring(0, 20)}</div>
                                <div class="address">${st.ville}</div>
                                <div class="price">${st.calculatedPrice.toFixed(2)}€</div>
                            </div>
                            <button class="btn-go" onclick="launchNav('${st.adresse}, ${st.ville}')">GO</button>
                        `;
                        listContainer.appendChild(item);
                    });
                }
            } catch(e) { console.error("Fuel Error"); }
        }

        function calibrate() { offset = lastRaw; smoothedLean = 0; updateHUD(0); }
        window.onload = init;
    </script>
</body>
</html>
