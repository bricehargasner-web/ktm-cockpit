<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KTM COCKPIT V14.7 - FINAL</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --ktm: #FF6600; --bg: rgba(10, 10, 15, 0.98); --brd: rgba(255,255,255,0.1); }
        body, html { margin: 0; padding: 0; height: 100dvh; width: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        /* SÉCURITÉ PORTRAIT */
        @media screen and (orientation: portrait) { #lock-screen { display: flex !important; } }
        #lock-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; }

        /* MOTEUR CARTE */
        #viewport { position: absolute; inset: 0; z-index: 1; height: 100dvh; }
        #map-rotate { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; transform: rotateX(45deg); }
        #map { width: 100%; height: 100%; filter: contrast(1.1) brightness(0.85); }

        /* HUD SLIM (OPERA FULLSCREEN COMPATIBLE) */
        #hud { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            height: 72px; display: grid; grid-template-columns: repeat(4, 1fr); 
            z-index: 1000; pointer-events: none; background: var(--bg);
            border-top: 1px solid var(--brd);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .pane { border-right: 1px solid var(--brd); position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        .pane-label { position: absolute; top: 2px; left: 5px; font-size: 0.5rem; color: #666; font-weight: bold; text-transform: uppercase; }

        /* MÉTÉO ANCRÉE SUR MINI-MAP */
        #weather-line { position: absolute; bottom: 2px; width: 100%; font-size: 0.65rem; display: flex; justify-content: space-around; z-index: 2000; color: var(--ktm); font-weight: bold; background: rgba(0,0,0,0.5); padding: 2px 0; }

        /* MENU DRAWER */
        #menu-btn { position: fixed; top: 12px; left: 12px; z-index: 1500; background: var(--bg); border: 1px solid var(--ktm); color: white; padding: 8px 12px; border-radius: 4px; cursor: pointer; pointer-events: auto; font-size: 0.8rem; }
        #drawer { position: fixed; top: 0; left: -320px; width: 300px; height: 100dvh; background: #111; z-index: 3000; transition: 0.3s; padding: 15px; border-right: 2px solid var(--ktm); overflow-y: auto; pointer-events: auto; box-sizing: border-box; }
        #drawer.open { left: 0; }
        
        .btn-act { background: var(--ktm); color: white; border: none; padding: 12px; border-radius: 4px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 8px; font-size: 0.8rem; }
        input, select { background: #000; border: 1px solid #333; color: white; padding: 12px; width: 100%; border-radius: 4px; margin-bottom: 8px; font-size: 0.9rem; display: block; }

        /* INDICATEURS */
        #speed-val { font-size: 2.2rem; font-weight: 900; line-height: 1; }
        #needle { position: absolute; bottom: 5px; left: 50%; width: 3px; height: 32px; background: var(--ktm); transform-origin: bottom center; }
        #user-arrow { width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 18px solid var(--ktm); }
        #recenter { position: absolute; top: 3px; right: 3px; background: var(--ktm); color: #000; padding: 2px 5px; border-radius: 2px; font-size: 0.6rem; cursor: pointer; pointer-events: auto; font-weight: 900; }
    </style>
</head>
<body>

    <div id="lock-screen"><h1>🔄</h1><p>PIVOTER EN PAYSAGE</p></div>
    <div id="menu-btn" onclick="APP.toggleMenu()">☰ MENU</div>

    <div id="drawer">
        <h3 style="color:var(--ktm); margin:0 0 15px 0; border-bottom:1px solid #333; padding-bottom:10px;">CONFIG COCKPIT</h3>
        
        <button class="btn-act" onclick="APP.toggleStyle()">JOUR / NUIT</button>
        <button class="btn-act" onclick="APP.calibrate()">📐 ZERO ANGLE</button>
        
        <label style="font-size:0.7rem; color:#888;">📍 DESTINATION</label>
        <input type="text" id="target" placeholder="Ex: Le Sequestre Albi...">
        <button class="btn-act" onclick="APP.findTarget()">LANCER GUIDAGE</button>

        <label style="font-size:0.7rem; color:#888; margin-top:10px; display:block;">⛽ RECHERCHE STATIONS</label>
        <select id="gas-type">
            <option value="SP98">Sans Plomb 98</option>
            <option value="SP95">Sans Plomb 95</option>
            <option value="E10">E10 (SP95-E10)</option>
            <option value="Gazole">Gazole / Diesel</option>
        </select>
        
        <div style="margin: 10px 0;">
            <label style="font-size:0.8rem;">Rayon : <span id="rad-val" style="color:var(--ktm)">10</span> km</label>
            <input type="range" id="radius-slider" min="1" max="25" value="10" oninput="document.getElementById('rad-val').innerText = this.value" style="width:100%; accent-color:var(--ktm);">
        </div>
        
        <button class="btn-act" onclick="APP.scanGas()">SCANNER LA ZONE</button>
        <div id="gas-list" style="margin-top:10px;"></div>
        
        <button class="btn-act" style="background:#333; margin-top:25px;" onclick="APP.toggleMenu()">RETOUR CARTE</button>
    </div>

    <div id="viewport"><div id="map-rotate"><div id="map"></div></div></div>

    <div id="hud">
        <div class="pane">
            <div class="pane-label">GPX</div>
            <div id="chrono" style="font-size: 1rem; font-family: monospace;">00:00.0</div>
            <button onclick="APP.toggleRec()" id="btn-rec" style="background:var(--ktm); border:none; color:white; padding:2px 6px; border-radius:2px; font-weight:bold; font-size:0.6rem; margin-top:2px; cursor:pointer;">REC</button>
        </div>
        <div class="pane">
            <div class="pane-label">Angle</div>
            <div style="width:60%; height:25px; border-bottom:1px solid #444; position:relative;"><div id="needle"></div></div>
            <div id="angle-ui" style="font-size:1.1rem; font-weight:bold;">0°</div>
        </div>
        <div class="pane">
            <div class="pane-label">Vitesse</div>
            <div id="speed-val">0</div>
            <div style="font-size:0.5rem; color:#666;">KM/H</div>
        </div>
        <div class="pane" style="padding:0;">
            <div id="recenter" onclick="APP.recenter()">🎯</div>
            <div id="mini" style="width:100%; height:100%;"></div>
            <div id="weather-line">
                <span id="w-t">--°C</span>
                <span id="w-i">☀️</span>
                <span id="w-w">--km/h</span>
            </div>
        </div>
    </div>

    <script>
        const APP = {
            map: null, mini: null, lastPos: null, isRec: false, startT: null,
            gOffset: 0, rawG: 0, userM: null, track: [], maxV: 0, maxA: 0, route: null,
            styles: { night: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', day: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png' },

            init() {
                this.map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.61, 2.15], 17);
                this.tiles = L.tileLayer(this.styles.night).addTo(this.map);
                const icon = L.divIcon({ className: 'u-pos', html: '<div id="user-arrow"></div>', iconSize: [30, 30], iconAnchor: [15, 15] });
                this.userM = L.marker([43.61, 2.15], {icon: icon, zIndexOffset: 1000}).addTo(this.map);
                this.mini = L.map('mini', { zoomControl: false, attributionControl: false, dragging: false }).setView([43.61, 2.15], 13);
                L.tileLayer(this.styles.night).addTo(this.mini);
                this.bind(); this.getWeather();
            },

            toggleMenu() { document.getElementById('drawer').classList.toggle('open'); },
            recenter() { if(this.lastPos) this.map.setView(this.lastPos, 17, {animate: true}); },
            toggleStyle() { this.tiles.setUrl(this.tiles._url === this.styles.night ? this.styles.day : this.styles.night); },
            calibrate() { this.gOffset = this.rawG; this.toggleMenu(); },

            bind() {
                navigator.geolocation.watchPosition(p => {
                    const { latitude, longitude, speed, heading } = p.coords;
                    this.lastPos = [latitude, longitude];
                    const v = Math.round((speed || 0) * 3.6);
                    document.getElementById('speed-val').innerText = v;
                    this.userM.setLatLng(this.lastPos);
                    this.map.panTo(this.lastPos, {animate: false});
                    if (heading !== null) document.getElementById('user-arrow').style.transform = `rotate(${heading}deg)`;
                    if(this.isRec) {
                        if(v > this.maxV) this.maxV = v;
                        let a = Math.abs(Math.round(this.rawG - this.gOffset));
                        if(a > this.maxA) this.maxA = a;
                        this.track.push({lat: latitude, lon: longitude, spd: v, ang: a, t: new Date().toISOString()});
                    }
                }, null, { enableHighAccuracy: true });

                window.addEventListener('deviceorientation', e => {
                    this.rawG = e.beta || 0;
                    let v = Math.round(this.rawG - this.gOffset);
                    document.getElementById('angle-ui').innerText = Math.abs(v) + "°";
                    document.getElementById('needle').style.transform = `rotate(${Math.max(-45, Math.min(45, v))}deg)`;
                });
                setInterval(() => { if(this.isRec && this.startT) { let d = new Date(Date.now() - this.startT); document.getElementById('chrono').innerText = `${String(d.getUTCMinutes()).padStart(2,'0')}:${String(d.getUTCSeconds()).padStart(2,'0')}.${Math.floor(d.getUTCMilliseconds()/100)}`; } }, 100);
            },

            async findTarget() {
                const q = document.getElementById('target').value;
                if(q.length < 3) return;
                try {
                    const r = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=1&lang=fr`);
                    const d = await r.json();
                    if(d.features[0]) {
                        const c = d.features[0].geometry.coordinates;
                        this.startNav(c[1], c[0], d.features[0].properties.name);
                    }
                } catch(e) { alert("Recherche indisponible."); }
            },

            async startNav(lat, lng, name) {
                if(!this.lastPos) return;
                try {
                    const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${this.lastPos[1]},${this.lastPos[0]};${lng},${lat}?overview=full&geometries=geojson`);
                    const d = await r.json();
                    if(this.route) this.map.removeLayer(this.route);
                    this.route = L.geoJSON(d.routes[0].geometry, { style: { color: '#FF6600', weight: 8, opacity: 0.8 } }).addTo(this.map);
                    this.recenter(); 
                    if(document.getElementById('drawer').classList.contains('open')) this.toggleMenu();
                } catch(e) { console.error("Erreur Nav"); }
            },

            async scanGas() {
                if(!this.lastPos) return;
                const list = document.getElementById('gas-list');
                const fuelType = document.getElementById('gas-type').value;
                const rad = document.getElementById('radius-slider').value;
                list.innerHTML = "<div style='color:var(--ktm)'>Recherche " + fuelType + "...</div>";
                try {
                    const res = await fetch(`https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?where=within_distance(geom%2C%20geom'POINT(${this.lastPos[1]}%20${this.lastPos[0]})'%2C%20${rad}km)&limit=15`);
                    const d = await res.json();
                    list.innerHTML = "";
                    d.results.forEach(s => {
                        let pArr = JSON.parse(s.prix || "[]");
                        let pInfo = pArr.find(x => x['@nom'] === fuelType);
                        if(pInfo) {
                            const dist = (this.map.distance(this.lastPos, [s.geom.lat, s.geom.lon])/1000).toFixed(1);
                            list.innerHTML += `
                            <div style="background:#222; padding:8px; margin-top:5px; border-left:3px solid #FF6600; display:flex; justify-content:space-between; align-items:center;">
                                <div style="font-size:0.75rem; line-height:1.2">
                                    <b>${s.ville.toUpperCase()}</b><br>
                                    Dist: ${dist} km | <span style="color:#FF6600; font-weight:bold;">${pInfo['@valeur']}€</span>
                                </div>
                                <button onclick="APP.startNav(${s.geom.lat},${s.geom.lon},'${s.ville}')" style="background:#FF6600; border:none; padding:6px 12px; color:white; border-radius:3px; font-weight:bold; cursor:pointer; font-size:0.7rem;">GO</button>
                            </div>`;
                        }
                    });
                    if(list.innerHTML === "") list.innerHTML = "<div style='font-size:0.7rem'>Aucune station trouvée.</div>";
                } catch(e) { list.innerHTML = "<div style='color:red'>Erreur Radar.</div>"; }
            },

            async getWeather() {
                if(!this.lastPos) { setTimeout(() => this.getWeather(), 3000); return; }
                try {
                    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${this.lastPos[0]}&longitude=${this.lastPos[1]}&current_weather=true`);
                    const d = await r.json();
                    const w = d.current_weather;
                    document.getElementById('w-t').innerText = Math.round(w.temperature) + "°C";
                    document.getElementById('w-w').innerText = Math.round(w.windspeed) + "km/h";
                    document.getElementById('w-i').innerText = w.weathercode < 3 ? "☀️" : "☁️";
                } catch(e) {}
            },

            toggleRec() {
                this.isRec = !this.isRec;
                const btn = document.getElementById('btn-rec');
                if(this.isRec) { this.startT = Date.now(); this.maxV = 0; this.maxA = 0; this.track = []; btn.innerText = "SAVE"; btn.style.background = "red"; }
                else { this.saveGPX(); btn.innerText = "REC"; btn.style.background = "#FF6600"; }
            },

            saveGPX() {
                if(this.track.length < 2) return;
                const now = new Date();
                const ts = now.getHours() + "h" + now.getMinutes();
                const fn = `KTM_${ts}_V${this.maxV}_A${this.maxA}.gpx`;
                let g = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="KTM Cockpit"><trk><trkseg>`;
                this.track.forEach(p => g += `<trkpt lat="${p.lat}" lon="${p.lon}"><time>${p.time}</time><extensions><speed>${p.spd}</speed><angle>${p.ang}</angle></extensions></trkpt>`);
                g += `</trkseg></trk></gpx>`;
                const b = new Blob([g], {type: 'application/gpx+xml'});
                const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = fn; a.click();
            }
        };
        window.onload = () => APP.init();
    </script>
</body>
</html>
