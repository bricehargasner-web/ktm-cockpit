<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM HUD V78 - MASTER MASK</title>
    
    <script>
        /* --- PANNEAU DE CONTRÔLE ENERGY CONCEPT (BRICE CARDONA) --- */
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            SAFE_GREEN: '#2ecc71',
            DANGER_RED: '#ff4757',
            REFRESH_RATE: 30 // Images par seconde du HUD
        };
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Barlow+Condensed:wght@900&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: #fff; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        /* INTERFACE DE PRÉPARATION */
        #ui-layer { text-align: center; z-index: 10; padding: 20px; width: 100%; }
        .btn-launch { background: #FF6600; color: #000; border: none; padding: 25px; font-weight: 900; font-size: 1.4rem; border-radius: 12px; cursor: pointer; width: 80%; max-width: 400px; text-transform: uppercase; margin-bottom: 20px; }
        .btn-nav { background: #34a853; color: #fff; border: none; padding: 15px; font-weight: 900; border-radius: 8px; cursor: pointer; width: 80%; max-width: 400px; text-transform: uppercase; }

        /* PRÉVISUALISATION DU MASQUE */
        #pipVideo { width: 90%; max-width: 600px; border: 2px solid #333; border-radius: 10px; background: #111; margin: 20px 0; }
        
        /* MOTEUR GRAPHIQUE CACHÉ */
        #hudCanvas { display: none; }
        
        .alert { color: #FF6600; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1 style="color:#FF6600; font-size: 2rem; margin-bottom: 5px;">KTM MASTER MASK</h1>
        <p style="color:#666; margin-bottom: 20px;">Visière de plongée pour Google Maps</p>

        <button class="btn-launch" onclick="startVisiere()">1. Activer la Visière</button>
        
        <button class="btn-nav" onclick="launchGoogleMaps()">2. Ouvrir Google Maps</button>

        <video id="pipVideo" autoplay playsinline muted></video>

        <div style="display: flex; justify-content: center; gap: 10px;">
            <button onclick="calibrate()" style="background:#222; color:#fff; border:1px solid #444; padding:10px; border-radius:5px;">ZERO ANGLE</button>
        </div>
        
        <div class="alert" id="status">En attente des capteurs...</div>
    </div>

    <canvas id="hudCanvas" width="600" height="300"></canvas>

    <script>
        const canvas = document.getElementById('hudCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('pipVideo');
        let speed = "000", lean = 0, offset = 0, lastRaw = 0;

        // --- LOGIQUE CLINIQUE : GÉNÉRATION DU COCKPIT ---
        function runHudEngine() {
            const stream = canvas.captureStream(CONFIG.REFRESH_RATE);
            video.srcObject = stream;

            function draw() {
                // Fond Noir
                ctx.fillStyle = "black";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // --- VITESSE (CENTRE) ---
                ctx.textAlign = "center";
                ctx.fillStyle = "#FFFFFF";
                ctx.font = "900 160px 'Barlow Condensed'";
                ctx.fillText(speed, canvas.width/2, canvas.height/2 + 40);
                
                ctx.fillStyle = CONFIG.KTM_ORANGE;
                ctx.font = "900 30px 'Orbitron'";
                ctx.fillText("KM/H", canvas.width/2, canvas.height/2 + 90);

                // --- INCLINAISON (DROITE) ---
                let color = CONFIG.SAFE_GREEN;
                let absLean = Math.abs(lean);
                if(absLean > 20) color = CONFIG.KTM_ORANGE;
                if(absLean > 42) color = CONFIG.DANGER_RED;

                ctx.fillStyle = color;
                ctx.font = "900 80px 'Barlow Condensed'";
                ctx.textAlign = "right";
                ctx.fillText(absLean + "°", canvas.width - 30, canvas.height/2 + 30);

                // --- CADRE MASQUE (Visière) ---
                ctx.strokeStyle = CONFIG.KTM_ORANGE;
                ctx.lineWidth = 4;
                ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);

                requestAnimationFrame(draw);
            }
            draw();
        }

        // --- GESTION DES CAPTEURS (GPS & GYRO) ---
        function initSensors() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(u => {
                    speed = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0).toString().padStart(3, '0');
                    document.getElementById('status').innerText = "GPS Fixé - Prêt pour le Tarn";
                }, () => {
                    document.getElementById('status').innerText = "Erreur GPS : Activez la localisation";
                }, { enableHighAccuracy: true });
            }

            window.addEventListener('deviceorientation', (e) => {
                let screenAngle = window.orientation || 0;
                let raw = (Math.abs(screenAngle) === 90) ? e.beta : e.gamma;
                if (screenAngle === -90) raw = -raw;
                lastRaw = raw;
                lean = Math.round(raw - offset);
            });
        }

        // --- LA MAGIE : MODE FLOTTANT (Picture-in-Picture) ---
        async function startVisiere() {
            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                } else {
                    await video.requestPictureInPicture();
                }
            } catch (error) {
                alert("Mode Visière non supporté sur ce navigateur ou cette version d'Android.");
            }
        }

        function launchGoogleMaps() {
            // Ouvre l'application Google Maps directement
            window.location.href = "google.navigation:q=Graulhet";
        }

        function calibrate() { offset = lastRaw; }

        window.onload = () => {
            runHudEngine();
            initSensors();
        };
    </script>
</body>
</html>
