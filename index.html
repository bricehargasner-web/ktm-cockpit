<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ENERGY CONCEPT - RACING COCKPIT V2</title>
    
    <script>
        /* ============================================================
           PANNEAU DE CONTRÔLE (MODIFIABLE)
           ============================================================ */
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records',
            SEARCH_API: 'https://nominatim.openstreetmap.org/search?format=json&q=',
            DEFAULT_RADIUS: 15, // km
            PERSPECTIVE: "rotateX(45deg)"
        };
        /* ============================================================ */
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* VISUEL & STRUCTURE GÉNÉRALE */
        :root { --accent: #FF6600; --bg: rgba(10, 10, 15, 0.95); --border: rgba(255,255,255,0.1); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* VERROUILLAGE PAYSAGE FORCE */
        @media screen and (orientation: portrait) {
            #landscape-lock { display: flex !important; }
        }
        #landscape-lock {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        /* VUE CARTE */
        #viewport { position: absolute; inset: 0; perspective: 1000px; z-index: 1; }
        #map-container { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; transform: var(--perspective); }
        #map { width: 100%; height: 100%; filter: brightness(0.6); }

        /* HUD - LES 4 PAVÉS */
        #hud-container {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            width: 98%; height: 160px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; z-index: 100; pointer-events: none;
        }
        .pane { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 10px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pane-label { position: absolute; top: 5px; left: 8px; font-size: 0.65rem; color: #888; font-weight: bold; text-transform: uppercase; }

        /* MENU TIROIR (SETTINGS) */
        #menu-trigger {
            position: fixed; top: 20px; left: 20px; z-index: 500; background: var(--bg);
            border: 1px solid var(--accent); color: white; padding: 12px; border-radius: 50%; cursor: pointer; pointer-events: auto;
        }
        #side-menu {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%; background: var(--bg);
            z-index: 1000; transition: 0.4s; padding: 20px; border-right: 2px solid var(--accent); overflow-y: auto;
        }
        #side-menu.active { left: 0; }
        .menu-section { margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .menu-section h3 { color: var(--accent); font-size: 0.9rem; margin-top: 0; }

        /* INPUTS & RECHERCHE */
        input, select { background: #1a1a1a; border: 1px solid #444; color: white; padding: 8px; width: 100%; border-radius: 4px; box-sizing: border-box; }
        #search-results { background: #1a1a1a; border-radius: 4px; margin-top: 5px; max-height: 150px; overflow-y: auto; }
        .search-item { padding: 8px; border-bottom: 1px solid #333; cursor: pointer; font-size: 0.85rem; }
        
        /* ÉLÉMENTS HUD SPECIFIQUES */
        #speed-val { font-size: 3.5rem; font-weight: 900; color: white; }
        #lean-deg { font-size: 2.2rem; font-weight: bold; }
        #lean-ui { width: 100%; height: 60px; border-bottom: 2px solid #333; position: relative; }
        #lean-cursor { position: absolute; bottom: 0; left: 50%; width: 3px; height: 50px; background: var(--accent); transform-origin: bottom center; }
        .rec-btn { pointer-events: auto; background: var(--accent); border: none; padding: 8px 20px; color: white; font-weight: bold; border-radius: 4px; margin-top: 10px; }
        #mini-map-view { width: 100%; height: 100%; border-radius: 3px; overflow: hidden; }
    </style>
</head>
<body>

    <div id="landscape-lock">
        <div style="font-size: 50px;">🔄</div>
        <h2>Veuillez pivoter votre appareil</h2>
        <p>L'interface Cockpit nécessite le mode Paysage.</p>
    </div>

    <div id="menu-trigger" onclick="UI.toggleMenu()">☰</div>

    <div id="side-menu" id="drawer">
        <div class="menu-section">
            <h3>📍 DESTINATION (Auto-complétion)</h3>
            <input type="text" id="addr-input" placeholder="Saisir adresse..." oninput="CORE.searchAddress(this.value)">
            <div id="search-results"></div>
        </div>

        <div class="menu-section">
            <h3>⛽ STATIONS SERVICE</h3>
            <label>Carburant :</label>
            <select id="fuel-type">
                <option value="Gazole">Gazole</option>
                <option value="SP95">SP95</option>
                <option value="SP98">SP98</option>
                <option value="E10">E10 / SP95-E10</option>
                <option value="E85">Superéthanol E85</option>
            </select>
            <br><br>
            <label>Rayon : <span id="radius-val">15</span> km</label>
            <input type="range" min="1" max="50" value="15" oninput="UI.updateRadius(this.value)">
            <button class="rec-btn" style="width: 100%;" onclick="CORE.findGas()">SCANNER LA ZONE</button>
        </div>

        <button class="rec-btn" style="background: #333; width: 100%;" onclick="UI.toggleMenu()">FERMER LE MENU</button>
    </div>

    <div id="viewport">
        <div id="map-container" id="m-cont">
            <div id="map"></div>
        </div>
    </div>

    <div id="hud-container">
        <div class="pane">
            <div class="pane-label">Tracking</div>
            <div id="chrono-val" style="font-family: monospace; font-size: 1.5rem;">00:00.00</div>
            <div id="dist-val" style="color: var(--accent);">0.00 km</div>
            <button class="rec-btn" id="btn-rec" onclick="CORE.toggleRec()">START REC</button>
        </div>
        <div class="pane">
            <div class="pane-label">Inclinaison</div>
            <div id="lean-ui"><div id="lean-cursor"></div></div>
            <div id="lean-deg">0°</div>
        </div>
        <div class="pane">
            <div class="pane-label">Vitesse</div>
            <div id="speed-val">0</div>
            <div style="font-size: 0.8rem; color: #666;">KM/H</div>
        </div>
        <div class="pane" style="padding: 2px;">
            <div id="mini-map-view"></div>
        </div>
    </div>

    <script>
        const UI = {
            toggleMenu: () => document.getElementById('side-menu').classList.toggle('active'),
            updateRadius: (v) => document.getElementById('radius-val').innerText = v
        };

        const CORE = {
            map: null, miniMap: null, isRecording: false, startTime: null, totalDist: 0, 
            lastPos: null, path: [], gasLayer: L.layerGroup(),

            init() {
                this.map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.60, 1.97], 15);
                L.tileLayer(CONFIG.MAP_STYLE).addTo(this.map);
                this.gasLayer.addTo(this.map);

                this.miniMap = L.map('mini-map-view', { zoomControl: false, attributionControl: false }).setView([43.60, 1.97], 14);
                L.tileLayer(CONFIG.MAP_STYLE).addTo(this.miniMap);
                this.trace = L.polyline([], {color: CONFIG.KTM_ORANGE, weight: 4}).addTo(this.miniMap);

                this.bindSensors();
                this.startClock();
            },

            bindSensors() {
                navigator.geolocation.watchPosition(pos => {
                    const { latitude, longitude, speed, heading } = pos.coords;
                    const cPos = [latitude, longitude];
                    
                    document.getElementById('speed-val').innerText = Math.round((speed || 0) * 3.6);
                    this.map.setView(cPos, 16, {animate: false});
                    
                    if (heading !== null) {
                        document.getElementById('m-cont').style.transform = `${CONFIG.PERSPECTIVE} rotateZ(${-heading}deg)`;
                    }

                    if (this.isRecording && this.lastPos) {
                        this.totalDist += this.map.distance(this.lastPos, cPos);
                        document.getElementById('dist-val').innerText = (this.totalDist/1000).toFixed(2) + " km";
                        this.path.push(cPos);
                        this.trace.setLatLngs(this.path);
                        this.miniMap.setView(cPos, 14);
                    }
                    this.lastPos = cPos;
                }, null, { enableHighAccuracy: true });

                window.addEventListener('deviceorientation', e => {
                    let angle = Math.round(e.gamma || 0); // Gamma = inclinaison latérale en mode paysage
                    document.getElementById('lean-deg').innerText = Math.abs(angle) + "°";
                    document.getElementById('lean-cursor').style.transform = `rotate(${angle}deg)`;
                });
            },

            searchAddress(q) {
                if(q.length < 4) return;
                fetch(CONFIG.SEARCH_API + encodeURIComponent(q))
                    .then(r => r.json())
                    .then(data => {
                        const resDiv = document.getElementById('search-results');
                        resDiv.innerHTML = '';
                        data.forEach(item => {
                            let div = document.createElement('div');
                            div.className = 'search-item';
                            div.innerText = item.display_name;
                            div.onclick = () => {
                                const target = [item.lat, item.lon];
                                this.map.setView(target, 16);
                                L.marker(target).addTo(this.map).bindPopup("Destination").openPopup();
                                UI.toggleMenu();
                                resDiv.innerHTML = '';
                            };
                            resDiv.appendChild(div);
                        });
                    });
            },

            async findGas() {
                if(!this.lastPos) return;
                this.gasLayer.clearLayers();
                const fuel = document.getElementById('fuel-type').value;
                const rad = document.getElementById('radius-val').innerText;
                
                try {
                    const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${this.lastPos[1]} ${this.lastPos[0]})', ${rad}km)&limit=20`;
                    const res = await fetch(url);
                    const data = await res.json();
                    
                    data.results.forEach(st => {
                        const prix = JSON.parse(st.prix || "[]");
                        const infoPrix = prix.find(p => p['@nom'] === fuel);
                        if(infoPrix) {
                            L.circleMarker([st.geom.lat, st.geom.lon], {color: 'green', radius: 8})
                             .addTo(this.gasLayer)
                             .bindPopup(`<b>${st.adresse}</b><br>${fuel}: ${infoPrix['@valeur']}€`);
                        }
                    });
                    UI.toggleMenu();
                } catch(e) { alert("Erreur scan carburant"); }
            },

            toggleRec() {
                this.isRecording = !this.isRecording;
                if(this.isRecording) { this.startTime = Date.now(); this.totalDist = 0; this.path = []; }
                document.getElementById('btn-rec').innerText = this.isRecording ? "STOP" : "START REC";
                document.getElementById('btn-rec').style.background = this.isRecording ? "red" : CONFIG.KTM_ORANGE;
            },

            startClock() {
                setInterval(() => {
                    if (this.isRecording && this.startTime) {
                        const d = new Date(Date.now() - this.startTime);
                        document.getElementById('chrono-val').innerText = `${String(d.getUTCMinutes()).padStart(2,'0')}:${String(d.getUTCSeconds()).padStart(2,'0')}.${String(Math.floor(d.getUTCMilliseconds()/10)).padStart(2,'0')}`;
                    }
                }, 50);
            }
        };

        window.onload = () => CORE.init();
    </script>
</body>
</html>
