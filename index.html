<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Energy Concept- KTM V35</title>
    
    <script>
        // CONFIGURATION CLINIQUE
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            SAFE_GREEN: '#2ecc71',
            DANGER_RED: '#ff4757',
            RADIUS: 20000, // 20km
            MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records'
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        
        /* CARTE DE FOND */
        #map { position: absolute; inset: 0; z-index: 1; filter: brightness(0.4) contrast(1.2); }
        
        /* NAVIGATION GOOGLE MAPS (FONDS DYNAMIQUE) */
        #nav-frame { position: absolute; inset: 0; z-index: 2; border: none; display: none; filter: brightness(0.6); }

        /* HUD CENTRAL */
        #hud-container {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; height: 320px; z-index: 60; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }
        #aim-sphere { position: absolute; width: 100%; height: 100%; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; transition: all 0.3s ease; }
        #horizon-gyro { position: absolute; top: 50%; width: 140%; left: -20%; height: 3px; box-shadow: 0 0 15px currentColor; transition: transform 0.05s linear; }
        #lean-display { position: absolute; width: 100%; top: 50%; transform: translateY(-50%); text-align: center; font-size: 4.5rem; font-weight: 900; text-shadow: 0 0 20px #000; }

        /* INTERFACE HAUTE */
        #top-ui { position: absolute; top: 10px; width: 96%; left: 2%; z-index: 100; display: flex; gap: 8px; }
        #search-input { flex-grow: 1; background: rgba(0,0,0,0.8); border: 1px solid #FF6600; color: white; padding: 12px; border-radius: 4px; font-family: sans-serif; font-size: 1rem; }
        .btn-ktm { background: #FF6600; color: #000; border: none; padding: 10px 15px; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        /* DASHBOARD BAS */
        #dashboard { position: absolute; bottom: 0; width: 100%; z-index: 90; display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(0,0,0,0.9); border-top: 2px solid #FF6600; }
        .widget { padding: 10px; text-align: center; border-right: 1px solid #333; }
        .label { font-size: 0.6rem; color: #FF6600; }
        .value { font-family: 'Barlow Condensed'; font-size: 2rem; font-weight: 900; }

        /* VITESSE */
        #speed-main { position: absolute; bottom: 120px; left: 5%; z-index: 85; font-family: 'Barlow Condensed'; font-size: 8rem; font-weight: 900; text-shadow: 0 0 30px #000; pointer-events: none; }

        /* DEBUG CONSOLE */
        #debug-log { position: absolute; bottom: 60px; left: 10px; z-index: 200; font-family: monospace; font-size: 10px; color: #aaa; pointer-events: none; }

        /* MARKER FUEL */
        .fuel-marker { background: #FF6600; color: #fff; padding: 4px 8px; border-radius: 5px; font-weight: 900; border: 1.5px solid white; font-size: 14px; box-shadow: 0 0 10px #000; text-align: center; }
    </style>
</head>
<body>

    <div id="top-ui">
        <input type="text" id="search-input" placeholder="DESTINATION (CALVI, BASTIA...)">
        <button class="btn-ktm" onclick="toggleNav()">NAV</button>
        <button class="btn-ktm" style="background:#222; color:#FF6600;" onclick="findFuel()">FUEL</button>
        <button class="btn-ktm" style="background:#444; color:#fff;" onclick="calibrate()">ZERO</button>
    </div>

    <iframe id="nav-frame"></iframe>

    <div id="hud-container">
        <div id="lean-display">0°</div>
        <div id="aim-sphere"></div>
        <div id="horizon-gyro"></div>
    </div>

    <div id="speed-main">000</div>
    <div id="map"></div>
    <div id="debug-log">Système prêt.</div>

    <div id="dashboard">
        <div class="widget"><div class="label">ALTITUDE</div><div id="alt" class="value">--</div></div>
        <div class="widget"><div class="label">CAP</div><div id="cap" class="value">---</div></div>
        <div class="widget"><div class="label">TRIP</div><div id="dist" class="value">0.0</div></div>
        <div class="widget"><div class="label">PITCH</div><div id="pitch" class="value">0°</div></div>
    </div>

    <script>
        let map, userMarker, totalDist = 0, offset = 0, lastRaw = 0, smoothedLean = 0, lastCoord = null;
        let fuelLayer = L.layerGroup();

        function log(msg) { document.getElementById('debug-log').innerText = msg; console.log(msg); }

        function updateHUD(angle) {
            const a = Math.abs(angle);
            const sphere = document.getElementById('aim-sphere');
            const gyro = document.getElementById('horizon-gyro');
            const display = document.getElementById('lean-display');
            
            let color = CONFIG.SAFE_GREEN;
            let weight = 2;

            if (a >= 25 && a < 40) { color = CONFIG.KTM_ORANGE; weight = 5; }
            else if (a >= 40) { color = CONFIG.DANGER_RED; weight = 10; }

            sphere.style.borderColor = color;
            sphere.style.borderWidth = weight + "px";
            gyro.style.backgroundColor = color;
            display.style.color = color;
            display.innerText = Math.round(a) + "°";
        }

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.76, 1.98], 13);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(map);
            fuelLayer.addTo(map);
            userMarker = L.circleMarker([0,0], { radius: 10, color: '#fff', fillColor: '#FF6600', fillOpacity: 1, weight: 3 }).addTo(map);

            window.addEventListener('deviceorientation', e => {
                let raw = (Math.abs(window.orientation) === 90) ? e.beta : e.gamma;
                lastRaw = raw;
                smoothedLean = (smoothedLean * 0.90) + ((raw - offset) * 0.10);
                document.getElementById('horizon-gyro').style.transform = `rotate(${smoothedLean}deg)`;
                updateHUD(smoothedLean);
                document.getElementById('pitch').innerText = Math.round(e.beta) + "°";
            }, true);

            navigator.geolocation.watchPosition(u => {
                const p = [u.coords.latitude, u.coords.longitude];
                userMarker.setLatLng(p);
                map.panTo(p);
                if (u.coords.heading !== null && u.coords.speed > 2) map.setBearing(u.coords.heading);
                const s = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0);
                document.getElementById('speed-main').innerText = s.toString().padStart(3, '0');
                if (u.coords.altitude) document.getElementById('alt').innerText = Math.round(u.coords.altitude) + "m";
                if (u.coords.heading) document.getElementById('cap').innerText = Math.round(u.coords.heading) + "°";
                if (lastCoord) totalDist += map.distance(lastCoord, p) / 1000;
                lastCoord = p;
                document.getElementById('dist').innerText = totalDist.toFixed(1);
            }, e => log("GPS Error: " + e.message), { enableHighAccuracy: true });
        }

        function toggleNav() {
            const dest = document.getElementById('search-input').value;
            const frame = document.getElementById('nav-frame');
            if (frame.style.display === 'block') {
                frame.style.display = 'none';
                frame.src = '';
            } else if (dest) {
                frame.src = `https://www.google.com/maps/embed/v1/directions?key=VOTRE_CLE_ICI&origin=Graulhet&destination=${encodeURIComponent(dest)}&mode=driving`;
                // Note : Sans clé API, on utilise le fallback direct
                frame.src = `https://www.google.com/maps?q=${encodeURIComponent(dest)}&output=embed`;
                frame.style.display = 'block';
            }
        }

        async function findFuel() {
            const c = map.getCenter();
            log(`Recherche Fuel à ${c.lat.toFixed(4)}, ${c.lng.toFixed(4)}...`);
            
            // SYNTAXE V2.1 BLINDÉE : distance(geom, geom'POINT(lon lat)') < dist
            const url = `${CONFIG.FUEL_API}?where=distance(geom, geom'POINT(${c.lng} ${c.lat})') < ${CONFIG.RADIUS}&limit=50`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                fuelLayer.clearLayers();
                
                if (!data.results || data.results.length === 0) {
                    log("Aucune station trouvée à 20km.");
                    return;
                }

                log(`${data.results.length} stations détectées.`);

                data.results.forEach(st => {
                    let prix = "?.??";
                    try {
                        // Extraction intelligente : sp95_prix, e10_prix ou dans le bloc 'prix'
                        prix = st.sp95_prix || st.e10_prix || st.gazole_prix;
                        if (!prix && st.prix) {
                            const pArr = JSON.parse(st.prix.replace(/'/g, '"'));
                            prix = pArr[0]["@valeur"];
                        }
                    } catch(e) {}

                    // Extraction des coordonnées du marker (geom ou lat/lon)
                    const lat = st.geom ? st.geom.lat : st.lat;
                    const lon = st.geom ? st.geom.lon : st.lon;

                    if (lat && lon) {
                        L.marker([lat, lon], {
                            icon: L.divIcon({ 
                                html: `<div class="fuel-marker">${parseFloat(prix).toFixed(2)}€</div>`, 
                                iconSize: [50, 25] 
                            })
                        }).addTo(fuelLayer);
                    }
                });
            } catch(e) { 
                log("Erreur API Fuel.");
                console.error(e);
            }
        }

        function calibrate() { offset = lastRaw; smoothedLean = 0; updateHUD(0); log("Calibrage OK."); }
        window.onload = init;
    </script>
</body>
</html>
