<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM COCKPIT V3.5 - MISSION CONTROL</title>
    <script>
    /* --- PANNEAU DE CONTRÔLE ENERGY CONCEPT --- */
    const CONFIG = {
        USER: "Brice CARDONA",
        KTM_ORANGE: '#FF6600',
        DANGER_RED: '#FF0000',
        MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}{r}.png',
        OSRM_API: 'https://router.project-osrm.org/route/v1/driving/'
    };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --ktm: #FF6600; --glass: rgba(10, 10, 10, 0.9); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Barlow Condensed', sans-serif; background: #000; overflow: hidden; color: white; }
        
        /* HUD LOUPE AGRANDI & GRADUATIONS */
        #hud-container { 
            position: absolute; top: 46%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; height: 320px; z-index: 100; pointer-events: none;
        }
        #lens-frame {
            width: 100%; height: 100%; border-radius: 50%; 
            border: 1px solid rgba(255, 102, 0, 0.4); overflow: hidden; position: relative;
            background: #000; box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }
        /* Graduations dynamiques */
        #lens-frame::after {
            content: ''; position: absolute; inset: 0; border-radius: 50%;
            background: repeating-conic-gradient(from 0deg, transparent 0deg 1deg, rgba(255,102,0,0.4) 1deg 1.5deg, transparent 1.5deg 30deg);
            z-index: 110; pointer-events: none;
        }
        #compass-ring {
            position: absolute; inset: -10px; border: 2px solid var(--ktm); border-radius: 50%;
            transition: all 0.15s ease; opacity: 0.8;
        }
        #map-zoom { width: 100%; height: 100%; filter: saturate(1.5) contrast(1.2); }
        #map-main { position: absolute; width: 100%; height: 100%; z-index: 1; filter: brightness(0.6); }

        /* DASHBOARD - ONGLETS BRILLANTS */
        #dash-bottom {
            position: absolute; bottom: 0; width: 100%; height: 75px;
            z-index: 500; display: flex; justify-content: center; gap: 4px; padding: 0 10px 5px 10px; box-sizing: border-box;
        }
        .widget {
            background: linear-gradient(180deg, rgba(45,45,45,0.9) 0%, rgba(10,10,10,0.95) 100%);
            border-top: 1px solid var(--ktm); position: relative; padding: 10px 5px; flex: 1; text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 75%, 92% 100%, 0 100%);
        }
        /* Effet surbrillance blanc léger */
        .widget::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 40%;
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 100%);
        }
        .stat-label { font-size: 0.6rem; color: #999; text-transform: uppercase; font-family: 'Orbitron'; letter-spacing: 1px; }
        .stat-value { font-size: 1.6rem; font-weight: 900; color: #fff; }
        .widget.speed { flex: 1.5; border-top: 2px solid var(--ktm); }
        .widget.speed .stat-value { font-size: 3.2rem; line-height: 1; }

        /* INTERFACE COMMANDE */
        #left-ui { position: absolute; top: 20px; left: 20px; z-index: 600; width: 280px; }
        #right-ui { position: absolute; top: 20px; right: 20px; z-index: 600; text-align: right; }
        
        .btn-mission {
            background: var(--ktm); color: #000; border: none; padding: 10px 20px;
            font-family: 'Orbitron'; font-weight: 900; font-size: 0.8rem; cursor: pointer;
            clip-path: polygon(0 0, 95% 0, 100% 25%, 100% 100%, 5% 100%, 0 75%);
        }
        .input-mission {
            background: rgba(0,0,0,0.8); border: 1px solid #333; border-left: 4px solid var(--ktm);
            padding: 10px; color: #fff; font-size: 1.1rem; width: 100%; margin-bottom: 5px; box-sizing: border-box;
        }

        #station-panel {
            position: absolute; right: 20px; top: 120px; width: 250px; max-height: 50vh;
            background: var(--glass); border-right: 3px solid var(--ktm); display: none; overflow-y: auto; z-index: 700;
        }
        .marker-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 200; width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 18px solid var(--ktm); filter: drop-shadow(0 0 5px #000); }
    </style>
</head>
<body>

<div id="left-ui">
    <input type="text" id="dest-search" class="input-mission" placeholder="DESTINATION CORSE...">
    <button class="btn-mission" onclick="findRoute()">LANCER NAVIGATION</button>
</div>

<div id="right-ui">
    <select id="fuel-type" class="input-mission" style="width: auto; border-left: none; border-right: 4px solid var(--ktm);">
        <option value="sp95_prix">SP95</option>
        <option value="gazole_prix">GAZOLE</option>
        <option value="sp98_prix">SP98</option>
    </select><br>
    <button class="btn-mission" style="margin-top:5px;" onclick="scanFuel()">⛽ SCAN STATIONS</button>
</div>

<div id="station-panel">
    <div style="background:#222; color:#fff; font-size:0.6rem; padding:5px; text-align:center" onclick="this.parentElement.style.display='none'">FERMER [X]</div>
    <div id="station-content"></div>
</div>

<div id="hud-container">
    <div id="compass-ring"></div>
    <div id="lens-frame">
        <div id="map-zoom"></div>
        <div class="marker-center" id="bike-arrow"></div>
    </div>
</div>

<div id="map-main"></div>

<div id="dash-bottom">
    <div class="widget"><div class="stat-label">Altitude</div><div id="v-alt" class="stat-value">---</div></div>
    <div class="widget"><div class="stat-label">Inclinaison</div><div id="v-lean" class="stat-value">0°</div></div>
    <div class="widget speed"><div id="v-speed" class="stat-value">00</div><div class="stat-label">KM/H</div></div>
    <div class="widget"><div class="stat-label">Cap</div><div id="v-cap" class="stat-value">---</div></div>
    <div class="widget"><div class="stat-label">Trip</div><div id="v-dist" class="stat-value">0.0</div></div>
</div>

<script>
let mainMap, zoomMap, routeMain, routeZoom, fuelLayer;
let userPos = [42.0, 9.0], lastPos = null, totalDist = 0;

function init() {
    // Carte Principale
    mainMap = L.map('map-main', { zoomControl: false, attributionControl: false }).setView(userPos, 12);
    L.tileLayer(CONFIG.MAP_STYLE).addTo(mainMap);

    // Carte Loupe (Zoom +2)
    zoomMap = L.map('map-zoom', { zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false, touchZoom: false }).setView(userPos, 14);
    L.tileLayer(CONFIG.MAP_STYLE).addTo(zoomMap);

    fuelLayer = L.layerGroup().addTo(mainMap);
    routeMain = L.layerGroup().addTo(mainMap);
    routeZoom = L.layerGroup().addTo(zoomMap);

    // Synchronisation totale
    mainMap.on('move', () => {
        zoomMap.setView(mainMap.getCenter(), mainMap.getZoom() + 2, { animate: false });
    });

    startTracking();
    window.addEventListener('deviceorientation', handleLean);
}

function startTracking() {
    navigator.geolocation.watchPosition(p => {
        userPos = [p.coords.latitude, p.coords.longitude];
        mainMap.panTo(userPos);
        
        document.getElementById('v-speed').innerText = p.coords.speed ? Math.round(p.coords.speed * 3.6) : "00";
        if(p.coords.altitude) document.getElementById('v-alt').innerText = Math.round(p.coords.altitude) + "m";
        if(p.coords.heading) {
            document.getElementById('v-cap').innerText = Math.round(p.coords.heading) + "°";
            document.getElementById('bike-arrow').style.transform = `translate(-50%,-50%) rotate(${p.coords.heading}deg)`;
        }

        if(lastPos) totalDist += mainMap.distance(lastPos, userPos) / 1000;
        document.getElementById('v-dist').innerText = totalDist.toFixed(1);
        lastPos = userPos;
    }, null, { enableHighAccuracy: true });
}

async function findRoute() {
    const query = document.getElementById('dest-search').value;
    if(!query) return;
    try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
        const data = await res.json();
        if(data[0]) calculateAndDraw([data[0].lat, data[0].lon]);
    } catch(e) { alert("Erreur recherche."); }
}

async function calculateAndDraw(target) {
    const url = `${CONFIG.OSRM_API}${userPos[1]},${userPos[0]};${target[1]},${target[0]}?overview=full&geometries=geojson`;
    try {
        const res = await fetch(url);
        const data = await res.json();
        routeMain.clearLayers();
        routeZoom.clearLayers();

        if(data.routes && data.routes[0]) {
            const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
            
            // On ajoute le tracé aux DEUX cartes
            L.polyline(coords, { color: CONFIG.KTM_ORANGE, weight: 6, opacity: 0.8 }).addTo(routeMain);
            L.polyline(coords, { color: CONFIG.KTM_ORANGE, weight: 12, opacity: 1.0 }).addTo(routeZoom);
            
            mainMap.fitBounds(L.polyline(coords).getBounds());
        }
    } catch(e) { alert("Erreur itinéraire."); }
}

async function scanFuel() {
    const type = document.getElementById('fuel-type').value;
    const panel = document.getElementById('station-panel');
    const content = document.getElementById('station-content');
    panel.style.display = 'block';
    content.innerHTML = "<div style='padding:15px; font-size:0.7rem'>SCAN CORSE...</div>";

    try {
        const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${userPos[1]} ${userPos[0]})', 30000m)&limit=15`;
        const res = await fetch(url);
        const data = await res.json();
        fuelLayer.clearLayers();
        content.innerHTML = "";

        data.results.forEach(st => {
            const val = st[type] || "?";
            if(val === "?") return;
            
            L.marker([st.geom.lat, st.geom.lon], {
                icon: L.divIcon({ html: `<div style="background:white; color:black; font-weight:900; padding:2px; border:1px solid ${CONFIG.KTM_ORANGE}; font-size:9px;">${val.toFixed(2)}</div>` })
            }).addTo(fuelLayer);

            const div = document.createElement('div');
            div.style.padding = "10px"; div.style.borderBottom = "1px solid #333";
            div.innerHTML = `
                <div style="font-size:0.6rem; color:#888">${st.nom || st.adresse}</div>
                <div style="color:var(--ktm); font-size:1.2rem; font-weight:900">${val.toFixed(2)}€ 
                <button class="btn-mission" style="padding:2px 8px; font-size:0.6rem; float:right" onclick="calculateAndDraw([${st.geom.lat}, ${st.geom.lon}])">GO</button></div>
            `;
            content.appendChild(div);
        });
    } catch(e) { content.innerHTML = "Données indisponibles."; }
}

function handleLean(e) {
    let lean = Math.abs(Math.round(e.gamma));
    const ring = document.getElementById('compass-ring');
    const val = document.getElementById('v-lean');
    val.innerText = lean + "°";

    if(lean > 25) {
        ring.style.borderColor = CONFIG.DANGER_RED;
        ring.style.borderWidth = (2 + (lean-25)/2) + "px";
        val.style.color = CONFIG.DANGER_RED;
    } else {
        ring.style.borderColor = CONFIG.KTM_ORANGE;
        ring.style.borderWidth = "2px";
        val.style.color = "#fff";
    }
}

window.onload = init;
</script>
</body>
</html>
