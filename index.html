<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>KTM RACING HUD - V117</title>
    
    <script>
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            DANGER_RED: '#FF0000',
            MAP_NIGHT: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
            MAP_DAY: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
            DEFAULT_ZOOM: 16,
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records',
            ROUTING_API: 'https://router.project-osrm.org/route/v1/driving/',
            WEATHER_API: 'https://api.open-meteo.com/v1/forecast'
        };
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --ktm: #FF6600; --carbon: #0a0a0a; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: white; font-family: 'Saira Condensed', sans-serif; overflow: hidden; }
        
        #map { position: fixed; inset: 0; z-index: 1; filter: brightness(0.65); }

        /* BOUTONS NAVIGATION DISCRETS */
        .ui-btn { position: fixed; width: 55px; height: 55px; z-index: 2000; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); border-radius: 50%; border: 1.5px solid rgba(255,102,0,0.4); color: white; cursor: pointer; pointer-events: auto; }
        #btn-lock { top: 15px; left: 15px; }
        #btn-lock.active { background: var(--ktm); color: black; border-color: white; }
        #btn-menu { top: 15px; right: 15px; border-color: var(--ktm); }

        /* HUD RACING CENTRAL */
        #hud-container { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 650px; height: 220px; z-index: 100; pointer-events: none; }
        .arc-svg { width: 100%; height: 100%; }
        .arc-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 8; }
        .arc-val { fill: none; stroke: var(--ktm); stroke-width: 12; stroke-linecap: round; transition: 0.3s; }

        #speed-main { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); text-align: center; }
        .speed-val { font-size: 7rem; font-weight: 900; line-height: 0.8; }
        .speed-unit { font-size: 1.2rem; font-weight: 800; color: var(--ktm); letter-spacing: 3px; }

        #angle-side { position: absolute; left: 35px; bottom: 50px; text-align: center; }
        .angle-val { font-size: 3rem; font-weight: 900; color: var(--ktm); line-height: 0.8; }

        /* TIROIR PLEIN ÉCRAN */
        #drawer { position: fixed; inset: 0; background: var(--carbon); z-index: 3000; transform: translateY(100%); transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); padding: 25px; box-sizing: border-box; }
        #drawer.open { transform: translateY(0); }
        .close-drawer { position: absolute; top: 20px; right: 20px; font-size: 2.5rem; color: var(--ktm); z-index: 3100; }

        /* DASHBOARD BAS */
        #dash-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: linear-gradient(to top, #000, transparent); display: grid; grid-template-columns: repeat(4, 1fr); z-index: 500; border-top: 1px solid rgba(255,102,0,0.2); }
        .dash-item { display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        .dash-v { font-size: 1.4rem; font-weight: 900; }
        .dash-l { font-size: 0.7rem; color: #777; font-weight: 800; }

        /* GLOVES OPTIMIZED INPUTS */
        .btn-full { width: 100%; padding: 22px; background: var(--ktm); border: none; border-radius: 12px; font-weight: 900; font-size: 1.3rem; font-family: inherit; margin-bottom: 15px; color: black; }
        input, select { width: 100%; padding: 22px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 12px; font-size: 1.2rem; font-family: inherit; box-sizing: border-box; margin-bottom: 15px; }

        .station-card { background: #1a1a1a; padding: 15px; border-radius: 12px; border-left: 6px solid var(--ktm); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }

        #tbt-hud { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); border: 1.5px solid var(--ktm); border-radius: 15px; padding: 10px 30px; display: none; z-index: 1500; align-items: center; gap: 20px; }
        #tech-log { position: fixed; top: 18px; left: 80px; font-size: 0.7rem; color: var(--ktm); letter-spacing: 1px; z-index: 2000; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="tech-log">> KTM_HUD V117</div>

    <div id="btn-lock" class="ui-btn active" onclick="APP.toggleLock()">🔒</div>
    <div id="btn-menu" class="ui-btn" onclick="APP.toggleDrawer()">☰</div>

    <div id="tbt-hud">
        <span style="font-size: 3rem; color:var(--ktm);">⬆️</span>
        <span id="tbt-dist" style="font-size: 2.5rem; font-weight: 900;">---</span>
    </div>

    <div id="hud-container">
        <svg class="arc-svg" viewBox="0 0 400 200">
            <path class="arc-bg" d="M 50 180 A 150 150 0 0 1 350 180" />
            <path id="speed-arc" class="arc-val" d="M 50 180 A 150 150 0 0 1 350 180" stroke-dasharray="471" stroke-dashoffset="471" />
            
            <path class="arc-bg" d="M 40 160 A 100 100 0 0 1 40 40" />
            <path id="angle-arc" class="arc-val" d="M 40 160 A 100 100 0 0 1 40 40" stroke-dasharray="188" stroke-dashoffset="188" />
        </svg>

        <div id="angle-side">
            <div class="angle-val"><span id="val-angle">0</span>°</div>
            <div style="font-size:0.7rem; font-weight:900; color:#666;">LEAN</div>
        </div>

        <div id="speed-main">
            <div class="speed-val" id="val-speed">000</div>
            <div class="speed-unit">KM/H</div>
        </div>
    </div>

    <div id="dash-bar">
        <div class="dash-item" onclick="APP.toggleRec()">
            <div class="dash-v" id="rec-icon" style="color:red;">🔴</div>
            <div class="dash-l" id="rec-count">GPX REC</div>
        </div>
        <div class="dash-item"><div class="dash-v" id="alt-val">---</div><div class="dash-l">ALTITUDE</div></div>
        <div class="dash-item"><div class="dash-v" id="weather-temp">--°</div><div class="dash-l" id="weather-wind">MÉTÉO</div></div>
        <div class="dash-item" onclick="APP.recenter()"><div class="dash-v">🎯</div><div class="dash-label">RECENTER</div></div>
    </div>

    <div id="drawer">
        <div class="close-drawer" onclick="APP.toggleDrawer()">✕</div>
        <h1 style="color:var(--ktm); border-bottom: 2px solid var(--ktm); padding-bottom: 10px;">MISSION CONTROL</h1>
        
        <div style="display:flex; gap:10px; margin-top:20px; margin-bottom:30px;">
            <button class="btn-full" style="flex:1" onclick="APP.showTab('t-fuel')">⛽ FUEL</button>
            <button class="btn-full" style="flex:1" onclick="APP.showTab('t-gps')">📍 GPS</button>
            <button class="btn-full" style="flex:1" onclick="APP.showTab('t-sys')">⚙️ SYS</button>
        </div>

        <div id="t-fuel">
            <select id="fuel-type">
                <option value="sp95_prix">SP 95</option>
                <option value="e10_prix">SP 95-E10</option>
                <option value="sp98_prix">SP 98</option>
                <option value="gazole_prix">GAZOLE</option>
            </select>
            <button class="btn-full" onclick="APP.scanFuel()">LANCER LE RADAR</button>
            <div id="station-list" style="max-height: 40vh; overflow-y: auto;"></div>
        </div>

        <div id="t-gps" style="display:none;">
            <input type="text" id="city-in" placeholder="Ex: Albi, Castres...">
            <button class="btn-full" onclick="APP.searchCity()">NAVIGUER</button>
            <button class="btn-full" style="background:#333; color:white;" onclick="APP.clearNav()">STOP NAV</button>
        </div>

        <div id="t-sys" style="display:none;">
            <button class="btn-full" onclick="APP.toggleTheme()">🌓 JOUR / NUIT</button>
            <button class="btn-full" onclick="APP.resetGyro()">📐 CALIBRER ANGLE (ZÉRO)</button>
            <label style="font-weight:900;">RAYON SCAN : <span id="val-radius">10</span> KM</label>
            <input type="range" min="5" max="50" value="10" oninput="APP.radius = this.value*1000; document.getElementById('val-radius').innerText=this.value;">
        </div>
    </div>

    <script>
        const APP = {
            map: null, userMarker: null, fuelLayer: null, navLine: null, tiles: null,
            isNight: true, isLocked: true, lastLat: 43.76, lastLng: 1.99,
            radius: 10000, offset: 0, lastRaw: 0, isRecording: false, track: [],

            init: function() {
                this.map = L.map('map', { zoomControl: false, attributionControl: false }).setView([this.lastLat, this.lastLng], CONFIG.DEFAULT_ZOOM);
                this.tiles = L.tileLayer(CONFIG.MAP_NIGHT).addTo(this.map);
                this.fuelLayer = L.layerGroup().addTo(this.map);
                this.userMarker = L.circleMarker([0,0], {radius: 12, color: '#fff', fillColor: CONFIG.KTM_ORANGE, fillOpacity: 1, weight:3}).addTo(this.map);
                this.startSensors();
                this.fetchWeather();
            },

            toggleDrawer: function() { document.getElementById('drawer').classList.toggle('open'); },
            showTab: function(id) { document.querySelectorAll('[id^="t-"]').forEach(t => t.style.display='none'); document.getElementById(id).style.display='block'; },

            updateHUD: function(speed, angle) {
                const sPct = Math.min(speed / 180, 1);
                document.getElementById('speed-arc').style.strokeDashoffset = 471 - (471 * sPct);
                const aPct = Math.min(Math.abs(angle) / 55, 1);
                document.getElementById('angle-arc').style.strokeDashoffset = 188 - (188 * aPct);
                document.getElementById('val-speed').innerText = speed.toString().padStart(3, '0');
                document.getElementById('val-angle').innerText = Math.abs(angle);
            },

            toggleTheme: function() {
                this.isNight = !this.isNight;
                this.map.removeLayer(this.tiles);
                this.tiles = L.tileLayer(this.isNight ? CONFIG.MAP_NIGHT : CONFIG.MAP_DAY).addTo(this.map);
            },

            toggleLock: function() {
                this.isLocked = !this.isLocked;
                document.getElementById('btn-lock').classList.toggle('active', this.isLocked);
            },

            startSensors: function() {
                navigator.geolocation.watchPosition(p => {
                    this.lastLat = p.coords.latitude; this.lastLng = p.coords.longitude;
                    this.userMarker.setLatLng([this.lastLat, this.lastLng]);
                    if(this.isLocked) this.map.panTo([this.lastLat, this.lastLng]);
                    
                    const spd = p.coords.speed ? Math.round(p.coords.speed * 3.6) : 0;
                    this.updateHUD(spd, Math.round(this.lastRaw - this.offset));
                    document.getElementById('alt-val').innerText = Math.round(p.coords.altitude || 0) + 'm';
                    if(this.isRecording) {
                        this.track.push({lat:this.lastLat, lng:this.lastLng, t:new Date().toISOString()});
                        document.getElementById('rec-count').innerText = "POINTS: " + this.track.length;
                    }
                }, null, { enableHighAccuracy: true });

                window.addEventListener('deviceorientation', e => {
                    this.lastRaw = (window.orientation || 0) === 90 ? e.beta : e.gamma;
                });
            },

            scanFuel: async function() {
                const list = document.getElementById('station-list');
                list.innerHTML = "<div class='station-card'>SCAN EN COURS...</div>";
                const type = document.getElementById('fuel-type').value;
                const filter = `within_distance(geom, geom'POINT(${this.lastLng} ${this.lastLat})', ${this.radius}m)`;
                const url = `${CONFIG.FUEL_API}?where=${encodeURIComponent(filter)}&limit=40`;

                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    list.innerHTML = ""; this.fuelLayer.clearLayers();

                    data.results.forEach(st => {
                        const pr = st[type];
                        const dist = (this.map.distance([this.lastLat, this.lastLng], [st.geom.lat, st.geom.lon]) / 1000).toFixed(1);
                        const card = document.createElement('div');
                        card.className = "station-card";
                        card.innerHTML = `
                            <div>
                                <div style="font-size:1.8rem; font-weight:900; color:${pr?'var(--ktm)':'#555'}">${pr ? pr.toFixed(2)+'€' : 'NC'}</div>
                                <div style="font-size:0.8rem; opacity:0.6; max-width:160px;">${st.nom || st.adresse}</div>
                            </div>
                            <div style="text-align:right">
                                <div style="font-weight:900; font-size:1.3rem;">${dist} KM</div>
                                <button class="btn-full" style="padding:10px 15px; width:auto; font-size:0.9rem; margin:0;" onclick="APP.startNav(${st.geom.lat}, ${st.geom.lon})">GO</button>
                            </div>`;
                        list.appendChild(card);
                        L.marker([st.geom.lat, st.geom.lon], { icon: L.divIcon({ html: `<div style="background:${pr ? 'var(--ktm)' : '#444'}; color:white; padding:2px 6px; border-radius:5px; font-weight:900; border:1px solid white;">${pr ? pr.toFixed(2) : '?'}</div>`, className:'' })}).addTo(this.fuelLayer);
                    });
                } catch(e) { console.error(e); }
            },

            fetchWeather: async function() {
                try {
                    const res = await fetch(`${CONFIG.WEATHER_API}?latitude=${this.lastLat}&longitude=${this.lastLng}&current_weather=true`);
                    const data = await res.json();
                    document.getElementById('weather-temp').innerText = Math.round(data.current_weather.temperature) + "°";
                    document.getElementById('weather-wind').innerText = Math.round(data.current_weather.windspeed) + " KM/H";
                } catch(e) {}
            },

            startNav: async function(lat, lng) {
                const url = `${CONFIG.ROUTING_API}${this.lastLng},${this.lastLat};${lng},${lat}?overview=full&geometries=geojson&steps=true`;
                try {
                    const res = await fetch(url); const data = await res.json();
                    if(this.navLine) this.map.removeLayer(this.navLine);
                    this.navLine = L.geoJSON(data.routes[0].geometry, {style:{color:CONFIG.KTM_ORANGE, weight:8, opacity:0.8}}).addTo(this.map);
                    this.map.fitBounds(this.navLine.getBounds(), {padding:[50,50]});
                    this.toggleDrawer();
                    document.getElementById('tbt-hud').style.display = 'flex';
                    document.getElementById('tbt-dist').innerText = (data.routes[0].distance / 1000).toFixed(1) + " KM";
                } catch(e) {}
            },

            clearNav: function() { if(this.navLine) this.map.removeLayer(this.navLine); document.getElementById('tbt-hud').style.display = 'none'; this.toggleDrawer(); },

            toggleRec: function() {
                this.isRecording = !this.isRecording;
                document.getElementById('rec-icon').innerText = this.isRecording ? "⏹️" : "🔴";
                if(!this.isRecording && this.track.length > 0) {
                    let gpx = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="KTM_HUD"><trk><trkseg>`;
                    this.track.forEach(p => gpx += `<trkpt lat="${p.lat}" lon="${p.lng}"><time>${p.t}</time></trkpt>`);
                    gpx += `</trkseg></trk></gpx>`;
                    const blob = new Blob([gpx], {type:'application/gpx+xml'});
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `KTM_TRIP_${Date.now()}.gpx`; a.click();
                }
            },

            searchCity: async function() {
                const q = document.getElementById('city-in').value;
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`);
                const data = await res.json();
                if(data.length) this.startNav(data[0].lat, data[0].lon);
            },
            recenter: function() { this.isLocked = true; this.map.panTo([this.lastLat, this.lastLng]); },
            resetGyro: function() { this.offset = this.lastRaw; }
        };

        window.onload = () => APP.init();
    </script>
</body>
</html>
