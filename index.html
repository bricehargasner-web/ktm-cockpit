<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENERGY CONCEPT - KTM COCKPIT V6.4</title>
    <script>
    /* --- PANNEAU DE CONTRÔLE ENERGY CONCEPT --- */
    const CONFIG = {
        USER: "Brice CARDONA",
        KTM_ORANGE: '#FF6600',
        DANGER_RED: '#FF0000',
        NEUTRAL_WHITE: '#FFFFFF',
        SCAN_RADIUS: 25000, 
        MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}{r}.png',
        FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records',
        OSRM_API: 'https://router.project-osrm.org/route/v1/driving/'
    };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --ktm: #FF6600; --glass: rgba(15, 15, 15, 0.7); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Barlow Condensed', sans-serif; background: #000; overflow: hidden; color: white; }
        
        #portrait-blocker { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; color: var(--ktm); font-family: 'Orbitron'; }
        @media (orientation: portrait) { #portrait-blocker { display: flex; } }

        #map-main { position: absolute; width: 100%; height: 100%; z-index: 1; filter: brightness(0.5) saturate(1.2); }
        
        /* HUD CENTRAL & BOUSSOLE EXTERNE */
        #hud-container { 
            position: absolute; top: 46%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; height: 320px; z-index: 100; pointer-events: none;
        }
        #compass-frame {
            width: 100%; height: 100%; border-radius: 50%; border: 1.5px solid rgba(255,102,0,0.2);
            position: relative; background: #000; box-shadow: 0 0 50px #000; overflow: hidden;
        }
        #cardinal-ring {
            position: absolute; width: 400px; height: 400px; top: 50%; left: 50%;
            transform: translate(-50%, -50%); z-index: 110; transition: transform 0.4s ease-out;
        }
        .cardinal {
            position: absolute; font-family: 'Orbitron'; font-weight: 900; 
            font-size: 18px; color: var(--ktm); text-shadow: 0 0 10px #000;
        }
        #n { top: 0; left: 50%; transform: translateX(-50%); }
        #e { right: 0; top: 50%; transform: translateY(-50%); }
        #s { bottom: 0; left: 50%; transform: translateX(-50%); }
        #w { left: 0; top: 50%; transform: translateY(-50%); }

        #azimuth-bar {
            position: absolute; top: 50%; left: 10%; right: 10%; height: 2px;
            background: #fff; z-index: 120; transform-origin: center center;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }
        #map-zoom { width: 100%; height: 100%; }
        #moto-marker {
            position: absolute; top: 50%; left: 50%; width: 18px; height: 26px;
            transform: translate(-50%, -50%); z-index: 130;
            background: #fff; clip-path: polygon(50% 0%, 100% 100%, 50% 80%, 0% 100%);
        }

        /* UI ELEMENTS - LOOK TRANSPARENT DOSSIER */
        .btn-stealth {
            background: var(--glass); color: #fff; border: 1px solid rgba(255,102,0,0.3);
            font-family: 'Orbitron'; font-weight: 900; font-size: 0.7rem; cursor: pointer;
            backdrop-filter: blur(8px);
            clip-path: polygon(0 0, 85% 0, 100% 30%, 100% 100%, 0 100%);
            transition: all 0.2s;
        }
        .btn-stealth:active { background: var(--ktm); color: #000; }
        
        .input-stealth {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-left: 3px solid var(--ktm);
            color: #fff; padding: 10px; font-family: 'Barlow Condensed'; font-size: 0.9rem; outline: none;
            backdrop-filter: blur(8px);
        }

        #search-area { position: absolute; top: 15px; left: 15px; z-index: 700; width: 220px; display: flex; gap: 8px; }
        #right-ui { position: absolute; top: 15px; right: 15px; z-index: 700; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        
        /* OUTILS CARTE */
        #map-tools { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); z-index: 800; display: flex; flex-direction: column; gap: 10px; }
        .btn-map-tool {
            width: 42px; height: 42px; background: var(--glass); border: 1px solid var(--ktm);
            color: var(--ktm); border-radius: 4px; font-weight: 900; cursor: pointer; backdrop-filter: blur(5px);
        }

        /* BRIEFING */
        #station-list { position: absolute; right: 15px; top: 110px; width: 230px; max-height: 45vh; background: var(--glass); border-right: 3px solid var(--ktm); display: none; z-index: 900; flex-direction: column; }
        .briefing-header { background: rgba(0,0,0,0.8); color: var(--ktm); padding: 8px; font-size: 0.6rem; text-align: center; font-family: 'Orbitron'; border-bottom: 1px solid #333; }

        /* DASHBOARD - STYLE DOSSIER */
        #dash-bottom {
            position: absolute; bottom: 0; width: 100%; height: 75px;
            z-index: 500; display: flex; justify-content: center; gap: 4px; padding: 0 5px 5px 5px; box-sizing: border-box;
        }
        .widget {
            background: var(--glass); border-top: 2px solid var(--ktm);
            flex: 1; text-align: center; padding: 8px; position: relative;
            clip-path: polygon(0 0, 88% 0, 100% 25%, 100% 100%, 0 100%);
            backdrop-filter: blur(10px);
        }
        .stat-label { font-size: 0.6rem; color: #888; font-family: 'Orbitron'; letter-spacing: 1px; }
        .stat-value { font-size: 1.6rem; font-weight: 700; transition: color 0.3s; }
    </style>
</head>
<body>

<div id="portrait-blocker"><h1>KTM AVIONICS</h1><p>ORIENTATION PAYSAGE</p></div>

<div id="search-area">
    <input type="text" id="dest-input" class="input-stealth" style="flex:1" placeholder="DESTINATION...">
    <button class="btn-stealth" style="padding: 10px 15px;" onclick="runSearch()">NAV</button>
</div>

<div id="map-tools">
    <button class="btn-map-tool" onclick="mapZoom(1)">+</button>
    <button class="btn-map-tool" onclick="mapZoom(-1)">-</button>
    <button class="btn-map-tool" onclick="recenterMap()" title="Recentrer">🎯</button>
</div>

<div id="right-ui">
    <select id="fuel-select" class="input-stealth" style="background:#111; width:120px; font-weight:bold; border-left:none; border-right:3px solid var(--ktm);">
        <option value="gazole_prix">GAZOLE</option>
        <option value="sp95_prix">SP95</option>
    </select>
    <button class="btn-stealth" style="padding: 10px 20px; width: 100%;" onclick="scanFuel()">⛽ SCAN</button>
</div>

<div id="station-list">
    <div class="briefing-header" onclick="this.parentElement.style.display='none'">CLOSE BRIEFING [X]</div>
    <div id="fuel-results" style="overflow-y:auto; flex:1"></div>
</div>

<div id="hud-container">
    <div id="cardinal-ring">
        <div class="cardinal" id="n">N</div>
        <div class="cardinal" id="e">E</div>
        <div class="cardinal" id="s">S</div>
        <div class="cardinal" id="w">W</div>
    </div>
    <div id="compass-frame">
        <div id="azimuth-bar"></div>
        <div id="map-zoom"></div>
        <div id="moto-marker"></div>
    </div>
</div>

<div id="map-main"></div>

<div id="dash-bottom">
    <div class="widget"><div class="stat-label">Altitude</div><div id="v-alt" class="stat-value">---</div></div>
    <div class="widget"><div class="stat-label">Inclinaison</div><div id="v-lean" class="stat-value">0°</div></div>
    <div class="widget" style="flex:1.5"><div id="v-speed" class="stat-value" style="font-size:2.8rem; line-height:1">00</div><div class="stat-label">KM/H</div></div>
    <div class="widget"><div class="stat-label">Cap</div><div id="v-cap" class="stat-value">---</div></div>
    <div class="widget"><div class="stat-label">Trip</div><div id="v-dist" class="stat-value">0.0</div></div>
</div>

<script>
let mainMap, zoomMap, fuelLayer, routeLayerMain, routeLayerZoom;
let userPos = [41.9, 8.7], lastPos = null, tripDist = 0;
let isFollowMode = true;

function init() {
    mainMap = L.map('map-main', { zoomControl: false, attributionControl: false }).setView(userPos, 13);
    L.tileLayer(CONFIG.MAP_STYLE).addTo(mainMap);
    zoomMap = L.map('map-zoom', { zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false, touchZoom: false }).setView(userPos, 15);
    L.tileLayer(CONFIG.MAP_STYLE).addTo(zoomMap);
    
    fuelLayer = L.layerGroup().addTo(mainMap);
    routeLayerMain = L.layerGroup().addTo(mainMap);
    routeLayerZoom = L.layerGroup().addTo(zoomMap);

    mainMap.on('move', () => { zoomMap.setView(mainMap.getCenter(), mainMap.getZoom() + 2, { animate: false }); });
    mainMap.on('dragstart', () => { isFollowMode = false; });

    startGPS();
    window.addEventListener('deviceorientation', handleOrientation);
}

function startGPS() {
    navigator.geolocation.watchPosition(p => {
        userPos = [p.coords.latitude, p.coords.longitude];
        if(isFollowMode) mainMap.panTo(userPos);
        
        document.getElementById('v-speed').innerText = p.coords.speed ? Math.round(p.coords.speed * 3.6) : "00";
        if(p.coords.altitude) document.getElementById('v-alt').innerText = Math.round(p.coords.altitude) + "m";
        
        const h = p.coords.heading || 0;
        document.getElementById('v-cap').innerText = Math.round(h) + "°";
        document.getElementById('cardinal-ring').style.transform = `translate(-50%, -50%) rotate(${-h}deg)`;
        document.getElementById('moto-marker').style.transform = `translate(-50%, -50%) rotate(${h}deg)`;

        if(lastPos) tripDist += (mainMap.distance(lastPos, userPos) / 1000);
        document.getElementById('v-dist').innerText = tripDist.toFixed(1);
        lastPos = userPos;
    }, null, { enableHighAccuracy: true });
}

function handleOrientation(e) {
    // CORRECTION CAPTEUR PAYSAGE : 
    // En paysage, 'beta' devient le Roll (Inclinaison latérale)
    let lean = Math.round(e.beta); 
    if (window.orientation === -90) lean = -lean;

    const absLean = Math.abs(lean);
    const bar = document.getElementById('azimuth-bar');
    const display = document.getElementById('v-lean');
    
    bar.style.transform = `translateY(-50%) rotate(${-lean}deg)`;
    display.innerText = absLean + "°";

    let color = CONFIG.NEUTRAL_WHITE;
    if(absLean > 12) color = CONFIG.KTM_ORANGE;
    if(absLean > 30) color = CONFIG.DANGER_RED;
    
    display.style.color = color;
    bar.style.backgroundColor = color;
    bar.style.boxShadow = `0 0 15px ${color}`;
}

function mapZoom(delta) { mainMap.setZoom(mainMap.getZoom() + delta); }
function recenterMap() { isFollowMode = true; mainMap.panTo(userPos); }

async function runSearch() {
    const q = document.getElementById('dest-input').value;
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
    const data = await res.json();
    if(data[0]) {
        drawNav([data[0].lat, data[0].lon]);
        isFollowMode = false;
    }
}

async function drawNav(target) {
    const url = `${CONFIG.OSRM_API}${userPos[1]},${userPos[0]};${target[1]},${target[0]}?overview=full&geometries=geojson`;
    const res = await fetch(url);
    const data = await res.json();
    routeLayerMain.clearLayers(); routeLayerZoom.clearLayers();
    if(data.routes[0]) {
        const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
        L.polyline(coords, { color: CONFIG.KTM_ORANGE, weight: 6 }).addTo(routeLayerMain);
        L.polyline(coords, { color: CONFIG.KTM_ORANGE, weight: 10 }).addTo(routeLayerZoom);
        mainMap.fitBounds(L.polyline(coords).getBounds());
    }
}

async function scanFuel() {
    const type = document.getElementById('fuel-select').value;
    const results = document.getElementById('fuel-results');
    document.getElementById('station-list').style.display = 'flex';
    results.innerHTML = "<p style='padding:15px; font-size:0.7rem;'>SCAN CORSE...</p>";

    const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${userPos[1]} ${userPos[0]})', ${CONFIG.SCAN_RADIUS}m)&limit=15`;
    const res = await fetch(url);
    const data = await res.json();
    
    fuelLayer.clearLayers();
    results.innerHTML = "";

    data.results.forEach(st => {
        const price = parseFloat(st[type]);
        if(price) {
            const dist = (mainMap.distance(userPos, [st.geom.lat, st.geom.lon]) / 1000).toFixed(1);
            L.marker([st.geom.lat, st.geom.lon], {
                icon: L.divIcon({ className: '', html: `<div style="background:#fff; color:#000; border:2px solid var(--ktm); font-weight:900; font-size:12px; padding:2px 4px; border-radius:3px; box-shadow:0 0 10px #000;">${price.toFixed(2)}</div>`, iconSize: [45, 22] })
            }).addTo(fuelLayer);

            const div = document.createElement('div');
            div.style.padding = "10px";
            div.style.borderBottom = "1px solid #333";
            div.innerHTML = `
                <div style="font-size:0.6rem; color:#888;">${st.ville || 'CORSE'} • ${dist} KM</div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="color:var(--ktm); font-size:1.2rem; font-weight:900;">${price.toFixed(2)}€</span>
                    <button class="btn-stealth" style="padding:4px 8px; font-size:0.6rem;" onclick="drawNav([${st.geom.lat}, ${st.geom.lon}])">GO</button>
                </div>`;
            results.appendChild(div);
        }
    });
}

window.onload = init;
</script>
</body>
</html>
