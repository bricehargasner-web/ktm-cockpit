<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIAGNOSTIC COMPLET - SYSTÈME NAVIGATION</title>
    <style>
        :root { --accent: #FF6600; --bg: #000; --panel: #111; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: #eee; padding: 15px; font-size: 12px; }
        .tiroir { border: 1px solid #333; margin-bottom: 15px; padding: 10px; border-left: 4px solid #666; }
        .tiroir.active { border-left-color: var(--accent); }
        .status { font-weight: bold; padding: 5px; margin-top: 5px; display: block; }
        .log-box { background: #050505; color: #00ff00; padding: 10px; height: 120px; overflow-y: auto; border: 1px solid #222; font-size: 11px; margin-top: 10px; white-space: pre-wrap; }
        button { background: #222; color: #fff; border: 1px solid #444; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:active { background: var(--accent); }
        .success { color: #00ff00; }
        .fail { color: #ff0000; }
        #final-report { background: #fff; color: #000; padding: 15px; display: none; margin-top: 20px; }
    </style>
</head>
<body>

    <h2 style="color:var(--accent)">LOGICIEL DE DIAGNOSTIC V1.0</h2>

    <div class="tiroir active" id="tiroir-gps">
        <strong>[1] ÉTAT DES CAPTEURS</strong>
        <div id="gps-info">GPS : En attente d'autorisation...</div>
        <div id="angle-info">ANGLE : En attente...</div>
        <button onclick="activerCapteurs()">ACTIVER GPS & ANGLE</button>
    </div>

    <div class="tiroir active" id="tiroir-api">
        <strong>[2] TEST SERVEUR CARBURANTS (API GOV)</strong>
        <div style="margin: 10px 0;">
            Type testé : <select id="fuel-type" style="background:#000; color:#fff; border:1px solid #444;">
                <option value="Gazole">Gazole</option>
                <option value="SP98">SP98</option>
            </select>
        </div>
        <button onclick="lancerDiagnosticAPI()">LANCER LE TEST API</button>
        <div class="log-box" id="log-api">Console API prête...</div>
    </div>

    <div class="tiroir active">
        <strong>[3] TEST ÉCRITURE GPX</strong>
        <button onclick="testerGPX()">VÉRIFIER MÉMOIRE GPX</button>
        <div class="log-box" id="log-gpx">Console GPX prête...</div>
    </div>

    <div id="final-report">
        <h3>📋 RAPPORT FINAL À TRANSMETTRE</h3>
        <textarea id="report-text" style="width:100%; height:200px; font-family:monospace;"></textarea>
        <p><em>Copie ce texte et envoie-le moi.</em></p>
    </div>

    <script>
        let debug = {
            gps: "NON_TESTE",
            angle: "NON_TESTE",
            api_status: "NON_TESTE",
            api_raw: "",
            gpx: "NON_TESTE"
        };

        const logger = (id, msg) => {
            const el = document.getElementById(id);
            el.innerHTML += `> ${msg}\n`;
            el.scrollTop = el.scrollHeight;
        };

        /* --- DIAGNOSTIC CAPTEURS --- */
        function activerCapteurs() {
            logger('log-api', "Demande d'accès GPS...");
            navigator.geolocation.getCurrentPosition(
                (p) => {
                    debug.gps = "OK";
                    document.getElementById('gps-info').innerHTML = `<span class="success">✅ GPS FIX : ${p.coords.latitude.toFixed(4)} / ${p.coords.longitude.toFixed(4)}</span>`;
                    window.userLat = p.coords.latitude;
                    window.userLon = p.coords.longitude;
                },
                (e) => {
                    debug.gps = "FAIL: " + e.message;
                    document.getElementById('gps-info').innerHTML = `<span class="fail">❌ GPS ERREUR : ${e.message}</span>`;
                }
            );

            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (e) => {
                    debug.angle = "OK";
                    document.getElementById('angle-info').innerHTML = `<span class="success">✅ ANGLE ACTIF</span>`;
                }, {once: true});
            }
        }

        /* --- DIAGNOSTIC API (Cœur du problème) --- */
        async function lancerDiagnosticAPI() {
            const logId = 'log-api';
            const fuel = document.getElementById('fuel-type').value;
            logger(logId, "Début du diagnostic API...");

            if (!window.userLat) {
                logger(logId, "ERREUR : Fix GPS requis avant test API.");
                return;
            }

            // Test de l'URL V2.1 (La plus stable actuellement)
            const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-carburants-fichier-instantane-test-public-copy/records?where=within_distance(geom%2C%20geom'POINT(${window.userLon}%20${window.userLat})'%2C%2010km)&limit=5`;
            
            logger(logId, `Tentative d'appel sur : ${url}`);

            try {
                const debut = Date.now();
                const response = await fetch(url);
                const fin = Date.now();
                
                debug.api_status = response.status;
                logger(logId, `Réponse reçue en ${fin - debut}ms (Code: ${response.status})`);

                if (!response.ok) {
                    throw new Error(`Le serveur a répondu avec l'erreur ${response.status}`);
                }

                const data = await response.json();
                debug.api_raw = JSON.stringify(data).substring(0, 200) + "...";
                
                if (data.results) {
                    logger(logId, `SUCCÈS : ${data.results.length} stations trouvées.`);
                } else {
                    logger(logId, "ALERTE : Données reçues mais format inconnu.");
                }

            } catch (err) {
                debug.api_status = "FETCH_ERROR";
                debug.api_raw = err.message;
                logger(logId, `❌ ÉCHEC : ${err.message}`);
                logger(logId, "CONSEIL : Si l'erreur est 'Failed to fetch', c'est un blocage CORS du navigateur.");
            }

            genererRapport();
        }

        /* --- DIAGNOSTIC GPX --- */
        function testerGPX() {
            try {
                const testData = [{lat: 43.76, lon: 1.98, t: Date.now()}];
                localStorage.setItem('diag_gpx_test', JSON.stringify(testData));
                debug.gpx = "OK (LocalStorage)";
                logger('log-gpx', "✅ Écriture mémoire réussie.");
            } catch (e) {
                debug.gpx = "FAIL: " + e.message;
                logger('log-gpx', "❌ Échec mémoire : " + e.message);
            }
            genererRapport();
        }

        /* --- GÉNÉRATION DU RAPPORT --- */
        function genererRapport() {
            const report = `--- DIAGNOSTIC ENERGY CONCEPT ---
Date: ${new Date().toLocaleString()}
GPS: ${debug.gps}
Angle: ${debug.angle}
API_Status: ${debug.api_status}
API_Error_Raw: ${debug.api_raw}
GPX_Storage: ${debug.gpx}
UA: ${navigator.userAgent}
---------------------------------`;
            document.getElementById('report-text').value = report;
            document.getElementById('final-report').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
