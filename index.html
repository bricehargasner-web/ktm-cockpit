<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ENERGY CONCEPT - COCKPIT PRO</title>
    
    <script>
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            MAP_NIGHT: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
            MAP_DAY: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records',
            SEARCH_API: 'https://nominatim.openstreetmap.org/search?format=json&countrycodes=fr&addressdetails=1&q='
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --accent: #FF6600; --bg: rgba(10, 10, 15, 0.95); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        /* HUD & CARTE */
        #viewport { position: absolute; inset: 0; z-index: 1; }
        #map { width: 100%; height: 100%; }

        /* PAVÉS HUD */
        #hud-bottom {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            width: 98%; height: 130px; display: grid; grid-template-columns: 1fr 1fr 1fr 1.2fr; gap: 8px; z-index: 100; pointer-events: none;
        }
        .pane { background: var(--bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 5px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pane-label { position: absolute; top: 5px; left: 8px; font-size: 0.6rem; color: #888; font-weight: bold; }

        /* MENU & INPUTS */
        #menu-btn { position: fixed; top: 15px; left: 15px; z-index: 500; background: var(--bg); border: 1px solid var(--accent); color: white; padding: 12px; border-radius: 5px; cursor: pointer; pointer-events: auto; }
        #side-menu { position: fixed; top: 0; left: -320px; width: 300px; height: 100%; background: var(--bg); z-index: 1000; transition: 0.3s; padding: 20px; border-right: 2px solid var(--accent); pointer-events: auto; overflow-y: auto; }
        #side-menu.open { left: 0; }

        input, select { background: #111; border: 1px solid #333; color: white; padding: 12px; width: 100%; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; }
        .suggest-item { padding: 10px; border-bottom: 1px solid #222; font-size: 0.8rem; cursor: pointer; }

        /* INFOS STATIONS */
        .fuel-popup { color: #000; font-family: sans-serif; min-width: 150px; }
        .go-btn { background: #28a745; color: white; border: none; padding: 8px; width: 100%; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 5px; text-decoration: none; display: block; text-align: center; }

        /* COMPTEURS */
        #speed-val { font-size: 3.5rem; font-weight: bold; }
        #lean-needle { position: absolute; bottom: 0; left: 50%; width: 4px; height: 40px; background: var(--accent); transform-origin: bottom center; }
        
        @media screen and (orientation: portrait) { #lock { display: flex; } }
        #lock { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="lock"><h2>🔄 PIVOTER EN PAYSAGE</h2></div>
    <div id="menu-btn" onclick="UI.toggleMenu()">☰ MENU</div>

    <div id="side-menu">
        <h3 style="color:var(--accent)">PARAMÈTRES</h3>
        
        <label>MODE CARTE</label>
        <button class="go-btn" style="background:#444; margin-bottom:20px;" onclick="CORE.toggleMapMode()">INVERSER JOUR/NUIT</button>

        <label>📍 DESTINATION</label>
        <input type="text" id="addr-in" placeholder="Ex: Vanteaux Sequestre..." oninput="CORE.searchAddress(this.value)">
        <div id="search-results"></div>

        <label>⛽ CARBURANT</label>
        <select id="fuel-type">
            <option value="Gazole">Gazole</option>
            <option value="SP95">SP95</option>
            <option value="E10">E10</option>
        </select>
        <button class="go-btn" onclick="CORE.findFuel()">SCANNER PROXIMITÉ</button>
        
        <button class="go-btn" style="background:#333; margin-top:30px;" onclick="UI.toggleMenu()">FERMER</button>
    </div>

    <div id="viewport"><div id="map"></div></div>

    <div id="hud-bottom">
        <div class="pane">
            <div class="pane-label">SESSION</div>
            <div id="chrono-val" style="font-size:1.5rem;">00:00</div>
            <div id="dist-val" style="color:var(--accent)">0.0 km</div>
            <button class="go-btn" style="font-size:0.7rem; padding:4px;" onclick="CORE.toggleRec()" id="btn-rec">REC</button>
        </div>
        <div class="pane">
            <div class="pane-label">ANGLE</div>
            <div style="width:60px; height:40px; position:relative; border-bottom:2px solid #333;">
                <div id="lean-needle"></div>
            </div>
            <div id="lean-deg" style="font-size:1.5rem;">0°</div>
        </div>
        <div class="pane">
            <div class="pane-label">VITESSE</div>
            <div id="speed-val">0</div>
            <div style="font-size:0.6rem;">KM/H</div>
        </div>
        <div class="pane" id="mini-map-container" style="overflow:hidden; padding:0;">
             <div id="mini-map" style="width:100%; height:100%;"></div>
        </div>
    </div>

    <script>
        const UI = {
            toggleMenu: () => document.getElementById('side-menu').classList.toggle('open')
        };

        const CORE = {
            map: null, miniMap: null, isRec: false, startTime: null, lastPos: null,
            totalDist: 0, fuelLayer: L.layerGroup(), isNight: true,

            init() {
                const hour = new Date().getHours();
                this.isNight = (hour < 7 || hour > 19);

                this.map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.60, 1.97], 15);
                this.tileLayer = L.tileLayer(this.isNight ? CONFIG.MAP_NIGHT : CONFIG.MAP_DAY).addTo(this.map);
                this.fuelLayer.addTo(this.map);

                this.miniMap = L.map('mini-map', { zoomControl: false, attributionControl: false }).setView([43.60, 1.97], 13);
                L.tileLayer(CONFIG.MAP_NIGHT).addTo(this.miniMap);
                this.trace = L.polyline([], {color: CONFIG.KTM_ORANGE}).addTo(this.miniMap);

                this.bindSensors();
            },

            toggleMapMode() {
                this.isNight = !this.isNight;
                this.tileLayer.setUrl(this.isNight ? CONFIG.MAP_NIGHT : CONFIG.MAP_DAY);
            },

            bindSensors() {
                navigator.geolocation.watchPosition(p => {
                    const { latitude, longitude, speed } = p.coords;
                    const pos = [latitude, longitude];
                    this.lastPos = pos;
                    
                    document.getElementById('speed-val').innerText = Math.round((speed || 0) * 3.6);
                    this.map.panTo(pos);

                    if(this.isRec) {
                        if(this.pathStart) this.totalDist += this.map.distance(this.pathStart, pos);
                        document.getElementById('dist-val').innerText = (this.totalDist/1000).toFixed(1) + " km";
                        this.trace.addLatLng(pos);
                        this.miniMap.setView(pos, 13);
                        this.pathStart = pos;
                    }
                }, null, { enableHighAccuracy: true });

                window.addEventListener('deviceorientation', e => {
                    let angle = Math.round(e.gamma || 0); // Utilise l'inclinaison latérale
                    document.getElementById('lean-deg').innerText = Math.abs(angle) + "°";
                    document.getElementById('lean-needle').style.transform = `rotate(${angle}deg)`;
                });
            },

            searchAddress(q) {
                if(q.length < 4) return;
                fetch(CONFIG.SEARCH_API + encodeURIComponent(q))
                    .then(r => r.json())
                    .then(data => {
                        const res = document.getElementById('search-results');
                        res.innerHTML = '';
                        data.slice(0, 3).forEach(d => {
                            let div = document.createElement('div');
                            div.className = 'suggest-item';
                            div.innerText = d.display_name;
                            div.onclick = () => {
                                const latlng = [d.lat, d.lon];
                                this.map.setView(latlng, 16);
                                L.marker(latlng).addTo(this.map).bindPopup("Destination").openPopup();
                                UI.toggleMenu();
                            };
                            res.appendChild(div);
                        });
                    });
            },

            async findFuel() {
                if(!this.lastPos) return;
                this.fuelLayer.clearLayers();
                const fuel = document.getElementById('fuel-type').value;
                
                const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${this.lastPos[1]} ${this.lastPos[0]})', 20km)&limit=20`;
                const res = await fetch(url);
                const data = await res.json();
                
                data.results.forEach(s => {
                    const p = JSON.parse(s.prix || "[]").find(x => x['@nom'] === fuel);
                    if(p) {
                        const dist = (this.map.distance(this.lastPos, [s.geom.lat, s.geom.lon]) / 1000).toFixed(1);
                        const googleMapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${s.geom.lat},${s.geom.lon}`;
                        
                        L.marker([s.geom.lat, s.geom.lon])
                         .addTo(this.fuelLayer)
                         .bindPopup(`
                            <div class="fuel-popup">
                                <b>${s.ville.toUpperCase()}</b> (${dist} km)<br>
                                <small>${s.adresse}</small><br>
                                <h2 style="margin:5px 0; color:green">${p['@valeur']}€</h2>
                                <a href="${googleMapsUrl}" target="_blank" class="go-btn">GO (GPS)</a>
                            </div>
                         `);
                    }
                });
                UI.toggleMenu();
            },

            toggleRec() {
                this.isRec = !this.isRec;
                document.getElementById('btn-rec').style.background = this.isRec ? "red" : "#28a745";
                if(this.isRec) { this.startTime = Date.now(); this.totalDist = 0; this.trace.setLatLngs([]); }
            }
        };

        window.onload = () => CORE.init();
    </script>
</body>
</html>
