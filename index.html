<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM HUD V57 - LENS SYSTEM</title>
    
    <script>
        /* --- PANNEAU DE CONTRÔLE (MODIFIABLE) --- */
        const CONFIG = {
            NAME: "CARDONA",
            KTM_ORANGE: '#FF6600',
            ZOOM_LENS: 1.5, // Puissance de la loupe
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records',
            MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png'
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        
        /* BLOQUEUR PORTRAIT */
        #portrait-blocker { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; color: #FF6600; text-align: center; }
        @media (orientation: portrait) { #portrait-blocker { display: flex; } }

        /* CARTES */
        #map { position: absolute; width: 100%; height: 100%; z-index: 1; filter: brightness(0.6) contrast(1.1); }
        
        /* LA LOUPE CENTRALE */
        #lens-container {
            position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%);
            width: 280px; height: 280px; z-index: 60; border-radius: 50%;
            border: 3px solid #FF6600; box-shadow: 0 0 30px rgba(255,102,0,0.4);
            overflow: hidden; pointer-events: none;
        }
        #lens-map { width: 100%; height: 100%; filter: brightness(1.1) contrast(1.2); }

        /* HUD ELEMENTS */
        #horizon-line { position: absolute; top: 50%; width: 140%; left: -20%; height: 2px; background: #FFF; box-shadow: 0 0 15px #FFF; z-index: 65; transition: transform 0.1s linear; }
        #fixed-aim { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 20px; height: 20px; border: 2px solid #FF6600; border-radius: 50%; z-index: 70; }

        /* VITESSE */
        #speed-block { position: absolute; bottom: 85px; left: 30px; z-index: 80; }
        #speed-val { font-family: 'Barlow Condensed'; font-size: 6.5rem; font-weight: 900; line-height: 0.8; color: #FFF; text-shadow: 0 0 20px #000; }

        /* INTERFACE HAUTE */
        #top-ui { position: absolute; top: 10px; width: 96%; left: 2%; z-index: 100; display: flex; gap: 8px; align-items: center; }
        #search-input { flex-grow: 1; background: rgba(0,0,0,0.7); border: 1px solid #444; color: white; padding: 10px; border-radius: 4px; font-family: sans-serif; }
        .fuel-select { background: #111; color: #FF6600; border: 1px solid #FF6600; padding: 9px; border-radius: 4px; font-weight: bold; }
        .btn-ktm { background: #FF6600; color: #000; border: none; padding: 10px 15px; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        /* DASHBOARD BAS */
        #dashboard { position: absolute; bottom: 0; width: 100%; z-index: 90; display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(0,0,0,0.85); border-top: 2px solid #FF6600; }
        .widget { padding: 8px; text-align: center; border-right: 1px solid rgba(255,255,255,0.1); position: relative; }
        .label { font-size: 0.55rem; color: #888; text-transform: uppercase; }
        .value { font-family: 'Barlow Condensed'; font-size: 1.8rem; font-weight: 900; }

        #btn-zero { position: absolute; bottom: 4px; right: 4px; background: #222; color: #666; font-size: 8px; padding: 3px; border: 1px solid #444; border-radius: 2px; cursor: pointer; }
        
        /* BOUSSOLE TACTIQUE */
        #compass-disk { width: 50px; height: 50px; border: 1px solid #FF6600; border-radius: 50%; margin: 0 auto; position: relative; transition: transform 0.2s linear; }
        #dir-txt { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 14px; font-weight: 900; }

        .fuel-marker { background: #FF6600; color: white; padding: 2px 5px; border: 1px solid white; font-weight: bold; font-size: 11px; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="portrait-blocker">
        <h1 style="font-size: 3rem; margin: 0;">KTM</h1>
        <p>REPASSEZ EN PAYSAGE Brice</p>
    </div>

    <div id="top-ui">
        <input type="text" id="search-input" placeholder="DESTINATION...">
        <button class="btn-ktm" onclick="startNav()">NAV</button>
        <select id="fuel-type" class="fuel-select">
            <option value="sp95_prix">SP95</option>
            <option value="sp98_prix">SP98</option>
            <option value="gazole_prix">GAZ</option>
            <option value="e10_prix">E10</option>
        </select>
        <button class="btn-ktm" onclick="findFuel()">⛽ SCAN</button>
    </div>

    <div id="lens-container">
        <div id="lens-map"></div>
        <div id="horizon-line"></div>
        <div id="fixed-aim"></div>
    </div>

    <div id="speed-block">
        <div id="speed-val">000</div>
        <div style="font-size:1rem; color:#FF6600; font-weight:900;">KM/H</div>
    </div>

    <div id="map"></div>

    <div id="dashboard">
        <div class="widget"><div class="label">Altitude</div><div id="alt" class="value">--</div></div>
        <div class="widget">
            <div class="label">CAP</div>
            <div id="compass-disk"><div id="dir-txt">N</div></div>
        </div>
        <div class="widget"><div class="label">Trip</div><div id="dist" class="value">0.0</div></div>
        <div class="widget">
            <div class="label">Angle</div>
            <div id="lean-val" class="value">0°</div>
            <button id="btn-zero" onclick="calibrate()">ZERO</button>
        </div>
    </div>

    <script>
        let map, lensMap, userMarker, lensMarker, totalDist = 0, offset = 0, lastRaw = 0, smoothedLean = 0, lastCoord = null;
        let fuelLayer = L.layerGroup();

        function init() {
            // Carte Principale
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([42.15, 9.1], 14);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(map);
            fuelLayer.addTo(map);
            
            // Carte Loupe (Zoomée)
            lensMap = L.map('lens-map', { zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false, touchZoom: false }).setView([42.15, 9.1], 15.5);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(lensMap);

            userMarker = L.circleMarker([0,0], { radius: 8, color: '#fff', fillColor: '#FF6600', fillOpacity: 1, weight: 2 }).addTo(map);
            lensMarker = L.circleMarker([0,0], { radius: 10, color: '#fff', fillColor: '#FF6600', fillOpacity: 1, weight: 3 }).addTo(lensMap);

            window.addEventListener('deviceorientation', handleOrientation);
            startTracking();
        }

        function handleOrientation(e) {
            let screenAngle = window.orientation || 0;
            let raw = (Math.abs(screenAngle) === 90) ? e.beta : e.gamma;
            if (screenAngle === -90) raw = -raw;

            lastRaw = raw;
            let currentLean = raw - offset;
            smoothedLean = (smoothedLean * 0.85) + (currentLean * 0.15);
            let angle = Math.abs(Math.round(smoothedLean));

            document.getElementById('horizon-line').style.transform = `translateY(-50%) rotate(${smoothedLean}deg)`;
            document.getElementById('lean-val').innerText = angle + "°";
        }

        function startTracking() {
            navigator.geolocation.watchPosition(u => {
                const p = [u.coords.latitude, u.coords.longitude];
                
                // Sync Cartes
                map.panTo(p);
                lensMap.setView(p, map.getZoom() + CONFIG.ZOOM_LENS);
                
                userMarker.setLatLng(p);
                lensMarker.setLatLng(p);

                // Boussole / Cap
                if (u.coords.heading !== null) {
                    const h = Math.round(u.coords.heading);
                    document.getElementById('compass-disk').style.transform = `rotate(${-h}deg)`;
                    const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
                    document.getElementById('dir-txt').innerText = dirs[Math.round(h / 45) % 8];
                }

                // Vitesse & Altitude
                const s = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0);
                document.getElementById('speed-val').innerText = s.toString().padStart(3, '0');
                if (u.coords.altitude) document.getElementById('alt').innerText = Math.round(u.coords.altitude) + "m";
                
                // Trip
                if (lastCoord) totalDist += map.distance(lastCoord, p) / 1000;
                lastCoord = p;
                document.getElementById('dist').innerText = totalDist.toFixed(1);
            }, null, { enableHighAccuracy: true });
        }

        async function findFuel() {
            const c = map.getCenter();
            const fuelType = document.getElementById('fuel-type').value;
            // Retour méthode V27 : utilisation des champs directs sp95_prix, gazole_prix...
            const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${c.lng} ${c.lat})', 30000)&limit=40`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                fuelLayer.clearLayers();
                
                data.results.forEach(st => {
                    let price = st[fuelType]; // V27 Logic
                    if (price) {
                        L.marker([st.geom.lat, st.geom.lon], {
                            icon: L.divIcon({ 
                                html: `<div class="fuel-marker">${price.toFixed(2)}</div>`,
                                iconSize: [40, 20]
                            })
                        }).addTo(fuelLayer);
                    }
                });
            } catch(e) { console.error("Erreur Scan"); }
        }

        function startNav() {
            const dest = document.getElementById('search-input').value;
            if (dest) window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(dest)}&travelmode=driving`, '_blank');
        }

        function calibrate() { offset = lastRaw; }
        window.onload = init;
    </script>
</body>
</html>
