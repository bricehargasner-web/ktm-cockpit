<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENERGY CONCEPT - KTM COCKPIT FINAL</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        /* --- PANNEAU DE CONTRÔLE ENERGY CONCEPT --- */
        const CONFIG_KTM = {
            COULEUR: "#FF6600",
            CARBURANT: "Gazole",       // Gazole, SP95, SP98, E10, E85
            RAYON: 12,                 // 1-20km
            TIMEOUT_UI: 5000,          // Temps avant masquage interface (ms)
            ANGLE_ALERTE: 45           // Passage au rouge de la jauge
        };
    </script>

    <style>
        :root { --ktm: #FF6600; --bg: rgba(10, 10, 10, 0.8); --glass: rgba(0, 0, 0, 0.7); }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #map { position: absolute; inset: 0; z-index: 1; }

        /* HUD DYNAMIQUE */
        .overlay { position: absolute; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; transition: opacity 0.5s; }
        .ui-hidden { opacity: 0; }
        .pointer-auto { pointer-events: auto; }

        /* SECTIONS HUD */
        .hud-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .hud-bottom { display: flex; flex-direction: column; gap: 10px; }

        .case { background: var(--bg); border-left: 4px solid var(--ktm); padding: 12px; backdrop-filter: blur(10px); }

        /* VITESSE & ANGLE */
        .speed-box { text-align: center; min-width: 140px; }
        .speed-val { font-size: 4.5rem; font-weight: 900; color: var(--ktm); line-height: 1; }
        
        .angle-box { text-align: center; }
        .gauge-wrap { width: 100px; height: 100px; border: 4px solid #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; transition: 0.1s; }
        .btn-zero { width: 30px; height: 6px; background: var(--ktm); margin: 10px auto; cursor: pointer; border: none; }

        /* TIROIR STATIONS (REMONTANT) */
        #fuel-drawer { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 45%; 
            background: rgba(5, 5, 5, 0.98); border-top: 3px solid var(--ktm);
            transform: translateY(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100; padding: 20px; overflow-y: auto;
        }
        #fuel-drawer.open { transform: translateY(0); }

        /* LISTE */
        .station-card { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #222; }
        .btn-go { background: var(--ktm); border: none; color: #fff; padding: 10px 20px; font-weight: bold; border-radius: 2px; }

        /* MOUCHARD */
        #mouchard { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        
        /* RÉGLAGES (DROITE) */
        #settings-pane { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: #050505; border-left: 4px solid var(--ktm); transition: 0.3s; z-index: 2000; padding: 20px; }
        #settings-pane.open { right: 0; }
        select, input[type="range"] { width: 100%; background: #111; color: #fff; border: 1px solid #333; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body onclick="SYSTEM.wakeUI()">

    <div id="map"></div>
    <div id="mouchard">SYSTEM READY - ENERGY CONCEPT</div>

    <div class="overlay" id="hud">
        <div class="hud-top">
            <div class="case pointer-auto" style="width: 200px;">
                <div id="nav-target" style="font-weight: bold; font-size: 1.1rem;">EN ATTENTE</div>
                <div id="nav-dist" style="color: var(--ktm); font-size: 0.9rem;">-- km</div>
            </div>
            <div class="pointer-auto" onclick="SYSTEM.toggleSettings(event)" style="font-size: 30px; color: var(--ktm); font-weight: bold; cursor: pointer;">⋮</div>
        </div>

        <div class="hud-bottom">
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div class="case pointer-auto" onclick="MOTO_LOGIC.openWeather()">
                    <div id="temp-val" style="font-size: 1.5rem; font-weight: bold;">--°C</div>
                    <div id="wind-val" style="font-size: 0.8rem; color: var(--ktm);">-- km/h</div>
                </div>

                <div class="speed-box">
                    <div class="speed-val" id="speed-display">0</div>
                    <div style="font-size: 0.8rem; letter-spacing: 3px; color: #666;">KM/H</div>
                </div>

                <div class="case angle-box pointer-auto">
                    <div class="gauge-wrap" id="gauge">
                        <span id="angle-display" style="font-size: 1.8rem; font-weight: bold;">0°</span>
                    </div>
                    <button class="btn-zero" onclick="MOTO_LOGIC.setZero()"></button>
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <button class="case pointer-auto btn-ktm" style="flex-grow: 1; color: white; border: none; font-weight: bold;" onclick="MOTO_LOGIC.scanFuel()">⛽ RECHERCHER CARBURANT</button>
                <button class="case pointer-auto" id="btn-rec" style="color: white; border: none; font-weight: bold;" onclick="MOTO_LOGIC.toggleREC()">REC</button>
            </div>
        </div>
    </div>

    <div id="fuel-drawer" class="pointer-auto">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="color: var(--ktm); margin: 0;">STATIONS PROCHES</h2>
            <button onclick="SYSTEM.toggleFuelDrawer()" style="background: none; border: 1px solid #444; color: white; padding: 5px 15px;">FERMER</button>
        </div>
        <div id="fuel-list"></div>
    </div>

    <div id="settings-pane" class="pointer-auto">
        <h3 style="color: var(--ktm);">RÉGLAGES</h3>
        <label>TYPE CARBURANT</label>
        <select id="fuel-type" onchange="CONFIG_KTM.CARBURANT = this.value">
            <option value="Gazole">Gazole</option>
            <option value="SP95">Sans Plomb 95</option>
            <option value="E10">E10</option>
            <option value="SP98">Sans Plomb 98</option>
        </select>
        <label>RAYON DE SCAN (KM) : <span id="radius-val">12</span></label>
        <input type="range" min="1" max="20" value="12" oninput="document.getElementById('radius-val').innerText=this.value; CONFIG_KTM.RAYON=this.value">
        <button class="case" style="width: 100%; margin-top: 30px; color: white;" onclick="SYSTEM.toggleSettings()">VALIDER</button>
    </div>

    <script>
        let map, userMarker, angleOffset = 0, uiTimer, isRecording = false;
        let userPos = { lat: 43.76, lng: 1.99 }; // Défaut Graulhet

        const SYSTEM = {
            init() {
                map = L.map('map', { zoomControl: false, attributionControl: false }).setView([userPos.lat, userPos.lng], 15);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                
                userMarker = L.circleMarker([userPos.lat, userPos.lng], { color: CONFIG_KTM.COULEUR, radius: 10, fillOpacity: 1 }).addTo(map);

                this.startTracking();
                this.initSensors();
                this.wakeUI();
            },

            startTracking() {
                navigator.geolocation.watchPosition(p => {
                    userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                    const speed = Math.round(p.coords.speed * 3.6) || 0;
                    
                    document.getElementById('speed-display').innerText = speed;
                    userMarker.setLngLat([userPos.lng, userPos.lat]);
                    map.panTo([userPos.lat, userPos.lng]);
                    MOTO_LOGIC.updateWeather(userPos.lat, userPos.lng);
                }, null, { enableHighAccuracy: true });
            },

            initSensors() {
                window.addEventListener('deviceorientation', e => {
                    let lean = Math.abs(e.beta - angleOffset);
                    lean = Math.min(60, Math.round(lean));
                    
                    document.getElementById('angle-display').innerText = lean + "°";
                    document.getElementById('gauge').style.transform = `rotate(${e.beta > angleOffset ? lean : -lean}deg)`;
                    document.getElementById('gauge').style.borderColor = (lean > CONFIG_KTM.ANGLE_ALERTE) ? "red" : "var(--ktm)";
                });
            },

            wakeUI() {
                document.getElementById('hud').classList.remove('ui-hidden');
                clearTimeout(uiTimer);
                uiTimer = setTimeout(() => {
                    document.getElementById('hud').classList.add('ui-hidden');
                }, CONFIG_KTM.TIMEOUT_UI);
            },

            toggleSettings(e) { if(e) e.stopPropagation(); document.getElementById('settings-pane').classList.toggle('open'); },
            toggleFuelDrawer() { document.getElementById('fuel-drawer').classList.toggle('open'); }
        };

        const MOTO_LOGIC = {
            async scanFuel() {
                SYSTEM.toggleFuelDrawer();
                document.getElementById('fuel-list').innerHTML = "RECHERCHE EN COURS...";
                
                const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?where=within_distance(geom%2C%20geom'POINT(${userPos.lng}%20${userPos.lat})'%2C%20${CONFIG_KTM.RAYON}km)&limit=15`;
                
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    
                    document.getElementById('fuel-list').innerHTML = data.results.map(s => {
                        const prix = s[CONFIG_KTM.CARBURANT.toLowerCase() + "_prix"];
                        return `
                            <div class="station-card">
                                <div>
                                    <div style="font-weight:bold">${s.ville} (${s.adresse})</div>
                                    <div style="font-size:0.8rem; color:#888">${CONFIG_KTM.CARBURANT} : ${prix ? prix+'€' : '<span style="color:var(--ktm)">N.C</span>'}</div>
                                </div>
                                <button class="btn-go" onclick="MOTO_LOGIC.go(${s.geom.lat}, ${s.geom.lon}, '${s.ville}')">GO</button>
                            </div>`;
                    }).join('');
                } catch(e) { document.getElementById('fuel-list').innerHTML = "ERREUR API CARBURANTS"; }
            },

            go(lat, lon, name) {
                SYSTEM.toggleFuelDrawer();
                document.getElementById('nav-target').innerText = name.toUpperCase();
                L.polyline([[userPos.lat, userPos.lng], [lat, lon]], {color: CONFIG_KTM.COULEUR, dashArray: '10, 10'}).addTo(map);
                map.fitBounds([[userPos.lat, userPos.lng], [lat, lon]], {padding: [50, 50]});
            },

            setZero() { angleOffset = 0; }, // À recalibrer selon l'assiette réelle

            toggleREC() {
                isRecording = !isRecording;
                document.getElementById('btn-rec').style.color = isRecording ? "red" : "white";
                if(isRecording) alert("C'est parti !");
                else confirm("Voulez-vous enregistrer votre course ?");
            },

            async updateWeather(lat, lon) {
                const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const d = await r.json();
                document.getElementById('temp-val').innerText = Math.round(d.current_weather.temperature) + "°C";
                document.getElementById('wind-val').innerText = Math.round(d.current_weather.windspeed) + " km/h";
            },

            openWeather() { window.open("https://meteofrance.com/", "_blank"); }
        };

        window.onload = () => SYSTEM.init();
    </script>
</body>
</html>
