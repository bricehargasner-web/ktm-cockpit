<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM HUD V81 - STABLE FINAL</title>
    
    <script>
        /* --- PANNEAU DE CONTRÔLE (BRICE CARDONA - ENERGY CONCEPT) --- */
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            SAFE_GREEN: '#2ecc71',
            DANGER_RED: '#ff4757',
            OPACITY_PANELS: 0.6,     // Transparence des widgets (0 à 1)
            MAP_BRIGHTNESS: 0.8,     // Visibilité du fond de carte
            SCAN_RADIUS: 25000,      // Rayon de recherche (mètres)
            USER_NAME: "Brice CARDONA"
        };
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Barlow+Condensed:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* BASE & TRANSPARENCE */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        
        /* LA CARTE (L'OCÉAN) */
        #map { position: absolute; inset: 0; z-index: 1; filter: brightness(0.8); }

        /* LE CADRE "LUNETTE DE PLONGÉE" (FIXE) */
        #cockpit-overlay {
            position: absolute; inset: 0; z-index: 100;
            border: 20px solid rgba(0,0,0,0.4);
            box-shadow: inset 0 0 100px #000;
            pointer-events: none;
        }

        /* WIDGET CENTRAL (VITESSE - STYLE KTM MY RIDE) */
        #speed-gauge {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 150;
        }
        #speed-val { font-family: 'Barlow Condensed'; font-size: 10rem; font-weight: 900; line-height: 0.8; text-shadow: 0 0 20px #000; }
        #speed-unit { font-size: 1.2rem; color: #FF6600; letter-spacing: 5px; }

        /* WIDGETS LATÉRAUX (FIXES) */
        .widget {
            position: absolute; bottom: 40px; padding: 15px;
            background: rgba(0,0,0,0.6); border: 1px solid #333;
            z-index: 200; pointer-events: auto;
        }
        #left-widget { left: 40px; border-left: 5px solid #FF6600; }
        #right-widget { right: 40px; border-right: 5px solid #FF6600; text-align: right; }

        .label { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .val { font-family: 'Barlow Condensed'; font-size: 4rem; font-weight: 900; line-height: 1; }

        /* BARRE DE SCAN (DISCRÈTE - HAUT) */
        #top-radar {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 300; display: flex; gap: 10px; background: rgba(0,0,0,0.8);
            padding: 10px; border-radius: 4px; border: 1px solid #333;
        }
        .btn-action { background: #FF6600; color: #000; border: none; padding: 10px 20px; font-weight: 900; cursor: pointer; border-radius: 2px; }

        /* LISTE RADAR (SCROLLABLE) */
        #radar-results {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            width: 300px; max-height: 40%; background: rgba(0,0,0,0.9);
            border: 1px solid #333; display: none; overflow-y: auto; z-index: 400;
        }
        .station-card { padding: 10px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }

        /* LIGNE D'HORIZON (AVIONIQUE) */
        #horizon { position: absolute; top: 50%; left: 50%; width: 40%; height: 1px; background: rgba(255,255,255,0.3); transform: translate(-50%, -50%); z-index: 50; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="cockpit-overlay"></div>
    <div id="horizon"></div>

    <div id="top-radar">
        <select id="fuel-choice" style="background:#000; color:#FF6600; border:none; font-weight:900;">
            <option value="gazole_prix">GAZOLE</option>
            <option value="sp95_prix">SP95</option>
        </select>
        <button class="btn-action" onclick="runRadar()">⛽ SCAN</button>
        <button class="btn-action" style="background:#444; color:#fff;" onclick="calibrate()">ZERO</button>
    </div>

    <div id="radar-results"></div>

    <div id="speed-gauge">
        <div id="speed-val">000</div>
        <div id="speed-unit">KM/H</div>
    </div>

    <div id="left-widget" class="widget">
        <div class="label">Altitude (M)</div>
        <div id="alt-val" class="val">---</div>
    </div>

    <div id="right-widget" class="widget">
        <div id="lean-val" class="val" style="color:#2ecc71;">0°</div>
        <div class="label">Lean Angle</div>
    </div>

    <script>
        let map, fuelLayer, offset = 0, lastRaw = 0, smoothedLean = 0;

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.6, 1.9], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            fuelLayer = L.layerGroup().addTo(map);
            
            startSensors();
        }

        function startSensors() {
            // GPS : Vitesse et Altitude
            navigator.geolocation.watchPosition(u => {
                const s = u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0;
                document.getElementById('speed-val').innerText = s.toString().padStart(3, '0');
                if (u.coords.altitude) document.getElementById('alt-val').innerText = Math.round(u.coords.altitude);
                map.panTo([u.coords.latitude, u.coords.longitude]);
            }, null, { enableHighAccuracy: true });

            // GYRO : Inclinaison
            window.addEventListener('deviceorientation', (e) => {
                let screenAngle = window.orientation || 0;
                let raw = (Math.abs(screenAngle) === 90) ? e.beta : e.gamma;
                if (screenAngle === -90) raw = -raw;
                lastRaw = raw;
                smoothedLean = (smoothedLean * 0.8) + ((raw - offset) * 0.2);
                let angle = Math.abs(Math.round(smoothedLean));

                const lTxt = document.getElementById('lean-val');
                lTxt.innerText = angle + "°";
                document.getElementById('horizon').style.transform = `translate(-50%, -50%) rotate(${smoothedLean}deg)`;
                
                if (angle < 20) lTxt.style.color = CONFIG.SAFE_GREEN;
                else if (angle < 42) lTxt.style.color = CONFIG.KTM_ORANGE;
                else lTxt.style.color = CONFIG.DANGER_RED;
            });
        }

        async function runRadar() {
            const center = map.getCenter();
            const fuel = document.getElementById('fuel-choice').value;
            const resDiv = document.getElementById('radar-results');
            const api = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?where=within_distance(geom, geom'POINT(${center.lng} ${center.lat})', ${CONFIG.SCAN_RADIUS}m)&limit=10`;
            
            try {
                const r = await fetch(api);
                const d = await r.json();
                resDiv.innerHTML = "";
                resDiv.style.display = "block";
                
                d.results.forEach(st => {
                    const price = st[fuel];
                    if (!price) return;
                    const card = document.createElement('div');
                    card.className = "station-card";
                    card.innerHTML = `<span>${price.toFixed(2)}€</span><button class="btn-action" style="padding:5px 10px;" onclick="go('${st.geom.lat}','${st.geom.lon}')">GO</button>`;
                    resDiv.appendChild(card);
                });
            } catch(e) { alert("Erreur Radar"); }
        }

        function go(lat, lon) {
            // Lien stable vers application externe
            window.location.href = `geo:${lat},${lon}?q=${lat},${lon}`;
        }

        function calibrate() { offset = lastRaw; }
        window.onload = init;
    </script>
</body>
</html>
