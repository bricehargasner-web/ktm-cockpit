<!DOCTYPE html>
<html lang="fr">
<!-- 1. CONFIGURATION (LIGNES 1-20) -->
<script>
    const CONFIG = {
        carburantCible: 'SP98',          
        rayonRechercheKm: 20,            
        axeInclinaison: 'beta',          
        angleSmoothing: 0.1,             
        deltaMaxAngle: 15,               
        limiteAngle: 85,                 
        urlMeteo: 'https://www.meteoetradar.com/carte-meteo',
        refreshRate: 300,                
        apiStations: 'https://data.economie.gouv.fr/api/records/1.0/search/?dataset=prix-des-carburants-en-france-flux-instantane-v2'
    };
</script>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Energy Concept - Dash V16.1</title>
    <style>
        :root {
            --bg-color: #000; --panel-bg: #111; --sub-bg: #080808;
            --ktm-orange: #FF6600; --text-main: #fff; --text-dim: #888;
        }
        body.day-mode {
            --bg-color: #fff; --panel-bg: #f5f5f5; --sub-bg: #e0e0e0; --text-main: #000; --text-dim: #555;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 5px; transition: 0.5s; overflow: hidden; }
        .impact { font-family: 'Impact', sans-serif; letter-spacing: 1px; }
        #dashboard { display: flex; flex-direction: column; gap: 6px; }
        .panel { background-color: var(--panel-bg); border-radius: 2px; padding: 10px; position: relative; border-top: 2px solid #333; }
        .accent-orange { border-top-color: var(--ktm-orange); }
        .title { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; font-weight: bold; }
        .val-container { display: flex; justify-content: center; align-items: baseline; width: 100%; }
        .val-main { font-size: 4rem; text-align: center; min-width: 120px; }
        .val-unit { font-size: 1.2rem; color: var(--ktm-orange); margin-left: 5px; }
        .val-sub { display: flex; justify-content: space-between; font-size: 0.8rem; background: var(--sub-bg); padding: 5px; margin-top: 5px; }
        button { background: #222; color: #fff; border: 1px solid #444; padding: 10px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .btn-reset { position: absolute; top: 8px; right: 8px; border-color: var(--ktm-orange); color: var(--ktm-orange); background: transparent; font-size: 0.6rem; padding: 4px; }
        .gpx-large { font-size: 1.8rem; font-weight: bold; color: var(--ktm-orange); }
        #stations-list { margin-top: 5px; max-height: 200px; overflow-y: auto; }
        .station-item { background: #0a0a0a; border-left: 3px solid var(--ktm-orange); padding: 8px; margin-bottom: 4px; }
        #settings-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; padding: 20px; flex-direction: column; overflow-y: auto; }
        .rec-active { background: #ff0000 !important; animation: blink 1s infinite; }
        .diag-line { font-family: monospace; font-size: 0.7rem; color: #0f0; margin-bottom: 2px; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>

<body>
    <div id="dashboard">
        <!-- VITESSE -->
        <div class="panel accent-orange">
            <button class="btn-reset" onclick="UI.resetSpeed()">RESET</button>
            <div class="title">Vitesse GPS</div>
            <div class="val-container">
                <span id="speed-val" class="val-main impact">0</span>
                <span class="val-unit impact">KM/H</span>
            </div>
            <div class="val-sub">
                <span>MOY: <strong id="speed-moy">0</strong></span>
                <span>MAX: <strong id="speed-max">0</strong></span>
            </div>
        </div>

        <!-- ANGLE -->
        <div class="panel">
            <button class="btn-reset" onclick="CORE.calibrateGyro()">CALIBRER</button>
            <div class="title">Inclinaison (Filtrée)</div>
            <div class="val-container">
                <span id="angle-val" class="val-main impact">0</span>
                <span class="val-unit impact">°</span>
            </div>
            <div class="val-sub">
                <span>MOY: <strong id="angle-moy">0</strong></span>
                <span>MAX: <strong id="angle-max">0</strong></span>
            </div>
        </div>

        <!-- METEO & GPX -->
        <div class="panel" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div onclick="CORE.openWeather()" style="cursor:pointer">
                <div class="title">Météo</div>
                <div style="font-size:1.2rem"><span id="weather-temp">--</span>°C</div>
                <div id="weather-wind" style="font-size:0.7rem; color:var(--text-dim)">-- km/h</div>
            </div>
            <div style="text-align:right">
                <div class="title">Distance GPX</div>
                <div id="gpx-dist" class="gpx-large">0.0 <span style="font-size:0.8rem">KM</span></div>
                <button id="btn-rec" onclick="CORE.toggleRecording()" style="font-size:0.6rem; width:80px;">REC</button>
            </div>
        </div>

        <!-- STATIONS -->
        <div class="panel">
            <div class="title">Stations <span id="ui-fuel"></span> (<span id="ui-radius"></span>km)</div>
            <button onclick="CORE.fetchStations()" style="width:100%; margin: 8px 0; border-color: var(--ktm-orange);">SCAN STATIONS</button>
            <div id="stations-list"></div>
            <button onclick="UI.openSettings()" style="width:100%; margin-top:5px; background:#333; font-size:0.6rem;">PARAMÈTRES / DIAG</button>
        </div>
    </div>

    <!-- MODAL RÉGLAGES & MOUCHARD -->
    <div id="settings-modal">
        <button onclick="UI.closeSettings()" style="margin-bottom:20px; padding:15px; background:var(--ktm-orange); color:#000; border:none;">RETOUR</button>
        
        <div style="background:#111; padding:15px; border:1px solid var(--ktm-orange); margin-bottom:15px;">
            <label class="title">Type Carburant</label>
            <select id="cfg-fuel" onchange="UI.saveSettings()" style="width:100%; padding:10px; margin:10px 0; background:#222; color:#fff;">
                <option value="SP98">SP98</option><option value="SP95">SP95</option>
                <option value="E10">E10</option><option value="Gazole">Gazole</option><option value="E85">E85</option>
            </select>
            <label class="title">Rayon (km) : <span id="cfg-radius-val"></span></label>
            <input type="range" id="cfg-radius" min="5" max="50" step="5" oninput="UI.saveSettings()" style="width:100%;">
        </div>

        <div style="background:#000; padding:15px; border:1px solid #333;">
            <div class="title" style="margin-bottom:10px; color:#0f0;">Mouchard Système</div>
            <div id="diag-light" class="diag-line">Luminosité : Initialisation...</div>
            <div id="diag-gps" class="diag-line">GPS : En attente...</div>
        </div>
    </div>

    <script>
        const STATE = {
            gps: { lat: null, lon: null, speed: 0, max: 0, sum: 0, count: 0 },
            angle: { current: 0, smoothed: 0, max: 0, sum: 0, count: 0, offset: 0, lastValid: 0 },
            gpx: { active: false, points: [], distance: 0, prev: null },
            stations: []
        };

        const CORE = {
            processAngle: (raw) => {
                STATE.angle.smoothed = (CONFIG.angleSmoothing * raw) + ((1 - CONFIG.angleSmoothing) * STATE.angle.smoothed);
                let val = Math.abs(STATE.angle.smoothed - STATE.angle.offset);
                if (Math.abs(val - STATE.angle.lastValid) > CONFIG.deltaMaxAngle) {
                    val = STATE.angle.lastValid + (Math.sign(val - STATE.angle.lastValid) * 2);
                }
                STATE.angle.lastValid = val;
                return Math.min(Math.round(val), CONFIG.limiteAngle);
            },

            calibrateGyro: () => {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().then(s => { if(s==='granted') CORE.bind(); });
                } else { CORE.bind(); }
                STATE.angle.offset = STATE.angle.smoothed;
                STATE.angle.max = 0; STATE.angle.sum = 0; STATE.angle.count = 0;
            },

            bind: () => { window.addEventListener('deviceorientation', (e) => {
                let raw = (CONFIG.axeInclinaison === 'beta') ? e.beta : e.gamma;
                STATE.angle.current = CORE.processAngle(raw);
                if(STATE.angle.current > 3) {
                    if(STATE.angle.current > STATE.angle.max) STATE.angle.max = STATE.angle.current;
                    STATE.angle.sum += STATE.angle.current; STATE.angle.count++;
                }
            });},

            toggleRecording: () => {
                STATE.gpx.active = !STATE.gpx.active;
                document.getElementById('btn-rec').classList.toggle('rec-active', STATE.gpx.active);
                if(!STATE.gpx.active && STATE.gpx.points.length > 0) CORE.saveGPX();
            },

            saveGPX: () => {
                let xml = `<?xml version="1.1"?><gpx creator="KTM_Brice"><trk><trkseg>`;
                STATE.gpx.points.forEach(p => xml += `<trkpt lat="${p.lat}" lon="${p.lon}"><ele>${p.ele}</ele><time>${p.time}</time></trkpt>`);
                xml += `</trkseg></trk></gpx>`;
                const blob = new Blob([xml], {type: 'application/gpx+xml'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `Trace_KTM_${new Date().getTime()}.gpx`;
                a.click();
            },

            fetchStations: () => {
                const url = `${CONFIG.apiStations}&geofilter.distance=${STATE.gps.lat},${STATE.gps.lon},${CONFIG.rayonRechercheKm * 1000}`;
                fetch(url).then(r => r.json()).then(data => {
                    const fuelKey = CONFIG.carburantCible.toLowerCase() + '_prix';
                    STATE.stations = data.records.map(r => ({
                        nom: r.fields.ville, prix: r.fields[fuelKey],
                        lat: r.geometry.coordinates[1], lon: r.geometry.coordinates[0],
                        dist: UI.calcDist(STATE.gps.lat, STATE.gps.lon, r.geometry.coordinates[1], r.geometry.coordinates[0])
                    })).sort((a,b) => a.prix - b.prix);
                    UI.renderStations();
                });
            },

            openWeather: () => { window.open(`${CONFIG.urlMeteo}?lat=${STATE.gps.lat}&lon=${STATE.gps.lon}`); }
        };

        const UI = {
            calcDist: (l1, n1, l2, n2) => {
                const R = 6371;
                const dLat = (l2-l1)*Math.PI/180; const dLon = (n2-n1)*Math.PI/180;
                const a = Math.sin(dLat/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dLon/2)**2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            },

            update: () => {
                document.getElementById('speed-val').innerText = STATE.gps.speed;
                document.getElementById('speed-max').innerText = STATE.gps.max;
                document.getElementById('speed-moy').innerText = STATE.gps.count > 0 ? Math.round(STATE.gps.sum / STATE.gps.count) : 0;
                document.getElementById('angle-val').innerText = STATE.angle.current;
                document.getElementById('angle-max').innerText = STATE.angle.max;
                document.getElementById('angle-moy').innerText = STATE.angle.count > 0 ? Math.round(STATE.angle.sum / STATE.angle.count) : 0;
                document.getElementById('gpx-dist').innerHTML = `${STATE.gpx.distance.toFixed(1)} <span style="font-size:0.8rem">KM</span>`;
                document.getElementById('ui-fuel').innerText = CONFIG.carburantCible;
                document.getElementById('ui-radius').innerText = CONFIG.rayonRechercheKm;
            },

            renderStations: () => {
                document.getElementById('stations-list').innerHTML = STATE.stations.map(s => `
                    <div class="station-item">
                        <div style="display:flex; justify-content:space-between"><strong>${s.nom}</strong> <span style="color:var(--ktm-orange)">${s.prix ? s.prix.toFixed(3)+'€' : 'N.C'}</span></div>
                        <div style="font-size:0.6rem; color:#888;">${s.dist.toFixed(1)} km</div>
                        <div style="display:flex; gap:5px; margin-top:5px;">
                            <button onclick="window.location.href='waze://?ll=${s.lat},${s.lon}&navigate=yes'" style="flex:1; font-size:0.6rem;">WAZE</button>
                            <button onclick="window.location.href='intent:geo:${s.lat},${s.lon}?q=${s.lat},${s.lon}#Intent;package=net.osmand.plus;end;'" style="flex:1; font-size:0.6rem;">OSM+</button>
                        </div>
                    </div>
                `).join('');
            },

            openSettings: () => { 
                document.getElementById('cfg-radius-val').innerText = CONFIG.rayonRechercheKm;
                document.getElementById('settings-modal').style.display = 'flex'; 
            },
            closeSettings: () => { document.getElementById('settings-modal').style.display = 'none'; },
            saveSettings: () => {
                CONFIG.carburantCible = document.getElementById('cfg-fuel').value;
                CONFIG.rayonRechercheKm = document.getElementById('cfg-radius').value;
                document.getElementById('cfg-radius-val').innerText = CONFIG.rayonRechercheKm;
            },
            resetSpeed: () => { STATE.gps.max = 0; STATE.gps.sum = 0; STATE.gps.count = 0; },
            
            setTheme: (isDay, source, val) => {
                document.body.classList.toggle('day-mode', isDay);
                document.getElementById('diag-light').innerText = `Luminosité : ${isDay?'JOUR':'NUIT'} (${source} : ${val})`;
            }
        };

        // GESTION LUMIÈRE AVEC MOUCHARD
        const nightQuery = window.matchMedia('(prefers-color-scheme: dark)');
        UI.setTheme(!nightQuery.matches, "Système", "Auto");

        if ('AmbientLightSensor' in window) {
            try {
                const sensor = new AmbientLightSensor();
                sensor.onreading = () => UI.setTheme(sensor.illuminance > 40, "Capteur Lux", Math.round(sensor.illuminance));
                sensor.onerror = (e) => UI.setTheme(!nightQuery.matches, "Erreur Capteur", e.error.name);
                sensor.start();
            } catch (e) {
                UI.setTheme(!nightQuery.matches, "Navigateur", "Bloqué");
            }
        }

        // GPS
        navigator.geolocation.watchPosition(pos => {
            STATE.gps.lat = pos.coords.latitude; STATE.gps.lon = pos.coords.longitude;
            let kmh = Math.round((pos.coords.speed || 0) * 3.6);
            STATE.gps.speed = kmh;
            if(kmh > STATE.gps.max) STATE.gps.max = kmh;
            if(kmh > 2) { STATE.gps.sum += kmh; STATE.gps.count++; }
            
            document.getElementById('diag-gps').innerText = `GPS : Fix OK (${STATE.gps.lat.toFixed(3)}, ${STATE.gps.lon.toFixed(3)})`;

            if(STATE.gpx.active) {
                const pt = { lat: STATE.gps.lat, lon: STATE.gps.lon, ele: pos.coords.altitude || 0, time: new Date().toISOString() };
                STATE.gpx.points.push(pt);
                if(STATE.gpx.prev) STATE.gpx.distance += UI.calcDist(STATE.gpx.prev.lat, STATE.gpx.prev.lon, pt.lat, pt.lon);
                STATE.gpx.prev = pt;
            }
            
            if(STATE.gps.count === 1) {
                fetch(`https://api.open-meteo.com/v1/forecast?latitude=${STATE.gps.lat}&longitude=${STATE.gps.lon}&current_weather=true`)
                .then(r=>r.json()).then(d=>{
                    document.getElementById('weather-temp').innerText = Math.round(d.current_weather.temperature);
                    document.getElementById('weather-wind').innerText = Math.round(d.current_weather.windspeed);
                });
            }
            UI.update();
        }, (e) => {
            document.getElementById('diag-gps').innerText = `GPS : Erreur (${e.message})`;
        }, { enableHighAccuracy: true });

        setInterval(UI.update, CONFIG.refreshRate);
    </script>
</body>
</html>
