<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENERGY CONCEPT - KTM GPS V7</title>

    <script>
        const CONFIG_KTM = {
            ORANGE: "#FF6600",
            RAYON_DEFAUT: 10, 
            CARBURANT: "Gazole",
            MODE_TRI: "prix", // 'prix' ou 'distance'
            THEME: "nuit", 
            API_FUEL_V2: "https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records"
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* [TIROIR VISUAL-KTM] - DESIGN COMPACT & CLINIQUE */
        :root { --ktm: #FF6600; --bg: #050505; --panel: rgba(12,12,12,0.92); }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #map { position: absolute; inset: 0; z-index: 1; transition: 0.3s; }
        .nuit #map { filter: invert(1) hue-rotate(180deg) brightness(0.5) contrast(1.2); }

        /* Verrouillage Paysage [cite: 10] */
        #lock-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        @media (orientation: portrait) { #lock-screen { display: flex; } }

        .overlay { position: absolute; inset: 0; z-index: 10; pointer-events: none; padding: 10px; display: grid; grid-template-columns: 210px 1fr 210px; grid-template-rows: auto 1fr auto; gap: 10px; }
        .overlay * { pointer-events: auto; }

        .case { background: var(--panel); border: 1px solid #333; border-left: 4px solid var(--ktm); border-radius: 2px; padding: 8px; }
        
        /* MINIATURISATION RECHERCHE (Correction 1000015167.jpg) */
        .search-zone { grid-column: 2; display: flex; justify-content: center; align-items: flex-start; }
        .search-wrap { display: flex; background: #111; border: 1px solid #444; border-radius: 20px; overflow: hidden; width: 220px; }
        #search-input { background: none; border: none; color: #fff; padding: 6px 12px; width: 140px; outline: none; font-size: 0.8rem; }
        .btn-go { background: var(--ktm); border: none; color: #fff; padding: 6px 15px; font-weight: bold; cursor: pointer; font-size: 0.75rem; width: 60px; }

        /* TIROIR RÉGLAGES ANDROID (Trois points)  */
        .dots-btn { position: absolute; top: 12px; right: 12px; cursor: pointer; font-size: 24px; color: var(--ktm); z-index: 1001; }
        #settings-drawer { position: fixed; top: 0; right: -280px; width: 260px; height: 100%; background: var(--panel); z-index: 1000; transition: 0.3s; border-left: 2px solid var(--ktm); padding: 20px; box-sizing: border-box; }
        #settings-drawer.open { right: 0; }

        /* TÉLÉMÉTRIE & ANGLE [cite: 7, 8, 10] */
        .vitesse-val { font-size: 2.8rem; font-weight: bold; line-height: 0.9; }
        .gauge-angle { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #222; display: inline-flex; align-items: center; justify-content: center; border-top-color: var(--ktm); }
        #zero-btn { width: 16px; height: 3px; background: var(--ktm); margin: 4px auto 0; cursor: pointer; opacity: 0.6; }

        /* BOUTON REC  */
        #rec-btn { position: absolute; bottom: 20px; right: 20px; width: 42px; height: 42px; border-radius: 50%; background: var(--panel); border: 1px solid #444; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; }
        .rec-dot { width: 12px; height: 12px; background: #444; border-radius: 50%; }
        .rec-active { background: #ff0000; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }

        input[type=range] { width: 100%; accent-color: var(--ktm); }
        .btn-ktm { background: #222; color: #fff; border: 1px solid #444; padding: 6px; font-size: 0.7rem; cursor: pointer; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h1 style="color:var(--ktm)">LOCK KTM</h1>
        <p>PASSER EN MODE PAYSAGE</p>
    </div>

    <div id="map"></div>

    <div class="dots-btn" onclick="toggleSettings()">⋮</div>
    <div id="settings-drawer">
        <h3 style="color:var(--ktm); border-bottom: 1px solid #333; padding-bottom: 10px;">RÉGLAGES</h3>
        
        <label style="font-size:0.75rem;">TYPE CARBURANT :</label>
        <select id="fuel-select" style="width:100%; background:#111; color:#fff; border:1px solid #444; margin-bottom:15px;">
            <option value="Gazole">Gazole</option>
            <option value="SP98">SP98</option>
            <option value="SP95">SP95</option>
            <option value="E10">E10</option>
        </select>

        <label style="font-size:0.75rem;">RAYON RECHERCHE : <span id="radius-val">10</span> km</label>
        <input type="range" min="1" max="20" value="10" oninput="updateRadius(this.value)">

        <div style="margin-top:15px;">
            <label style="font-size:0.75rem;">AFFICHAGE :</label>
            <div style="display:flex; gap:4px;">
                <button class="btn-ktm" onclick="setTheme('jour')">JOUR</button>
                <button class="btn-ktm" onclick="setTheme('nuit')">NUIT</button>
            </div>
        </div>

        <button class="btn-ktm" style="background:var(--ktm); margin-top:25px; font-weight:bold;" onclick="initSensors()">ACTIVER CAPTEURS</button>
    </div>

    <div id="rec-btn" onclick="toggleREC()">
        <div class="rec-dot" id="rec-status"></div>
    </div>

    <div class="overlay">
        <div style="grid-column: 1; display:flex; flex-direction:column; gap:8px;">
            <div class="case">
                <div style="color:var(--ktm); font-size:0.6rem; font-weight:bold;">NAVIGATION</div>
                <div id="nav-target" style="font-size:0.9rem; font-weight:bold; margin-top:4px;">PRÊT</div>
                <div id="nav-info" style="font-size:0.7rem; color:var(--ktm);">-- m</div>
            </div>

            <div class="case" style="flex-grow:1; display:flex; flex-direction:column;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="color:var(--ktm); font-size:0.6rem; font-weight:bold;">STATIONS (CORSE OK)</span>
                    <button class="btn-ktm" style="width:auto; margin:0; padding:2px 8px;" onclick="searchFuel()">SCAN</button>
                </div>
                <div id="fuel-list" style="overflow-y:auto; margin-top:6px; flex-grow:1; font-size:0.7rem;"></div>
            </div>
        </div>

        <div class="search-zone">
            <div class="search-wrap">
                <input type="text" id="search-input" placeholder="Destination...">
                <button class="btn-go" onclick="startNav()">GO</button>
            </div>
        </div>

        <div style="grid-column: 3; text-align: right; display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
            <div class="case" style="width:130px;">
                <div class="vitesse-val" id="speed-val">0</div>
                <div style="color:var(--ktm); font-size:0.6rem; margin-top:-2px;">KM/H</div>
                <div id="alt-val" style="font-size:0.75rem; border-top:1px solid #333; margin-top:6px; padding-top:4px;">Alt: -- m</div>
            </div>

            <div class="case" style="width:130px; text-align:center;">
                <div class="gauge-angle" id="gauge-visual">
                    <span id="angle-txt" style="font-size:1.2rem; font-weight:bold;">0°</span>
                </div>
                <div id="zero-btn" onclick="calibrateZero()"></div>
                <div style="font-size:0.6rem; color:var(--ktm);">MAX Session: <span id="max-angle">0</span>°</div>
            </div>

            <div class="case" style="width:130px; cursor:pointer;" onclick="window.open('https://meteofrance.com/','_blank')">
                <div id="temp-txt" style="font-size:1.1rem; font-weight:bold;">--°C</div>
                <div id="wind-txt" style="font-size:0.65rem; color:var(--ktm);">Vent: -- km/h</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        /* [TIROIR LOGIQUE & SYSTEM] */
        let map = L.map('map', { zoomControl: false }).setView([43.7632, 1.9990], 14); // Position Graulhet par défaut
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let angleOffset = 0;
        let sessionMax = 0;
        let isREC = false;
        let rawOrientation = 0;

        function setTheme(m) { document.body.className = (m === 'nuit') ? 'nuit' : ''; toggleSettings(); }
        function toggleSettings() { document.getElementById('settings-drawer').classList.toggle('open'); }
        function updateRadius(v) { document.getElementById('radius-val').innerText = v; CONFIG_KTM.RAYON_DEFAUT = v; }

        /* [MOTO-SENSORS] - AXE TRANCHE GAUCHE [cite: 10] */
        function initSensors() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(r => { if(r==='granted') window.addEventListener('deviceorientation', handleAngle); });
            } else { window.addEventListener('deviceorientation', handleAngle); }
            toggleSettings();
        }

        function handleAngle(e) {
            rawOrientation = e.beta; // Axe longitudinal en paysage
            let angle = Math.abs(rawOrientation - angleOffset);
            angle = Math.min(60, Math.round(angle));
            document.getElementById('angle-txt').innerText = angle + "°";
            if(angle > sessionMax) { sessionMax = angle; document.getElementById('max-angle').innerText = sessionMax; }
            document.getElementById('gauge-visual').style.transform = `rotate(${rawOrientation > angleOffset ? angle : -angle}deg)`;
        }
        function calibrateZero() { angleOffset = rawOrientation; }

        /* [FUEL-ENGINE] - CORRECTION 404 & AFFICHAGE "N.C"  */
        async function searchFuel() {
            const list = document.getElementById('fuel-list');
            list.innerHTML = "Recherche en cours...";
            const url = `${CONFIG_KTM.API_FUEL_V2}?where=within_distance(geom%2C%20geom'POINT(${map.getCenter().lng}%20${map.getCenter().lat})'%2C%20${CONFIG_KTM.RAYON_DEFAUT}km)&limit=15`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                const fuelKey = document.getElementById('fuel-select').value.toLowerCase() + "_prix";
                
                list.innerHTML = data.results.map(s => `
                    <div style="border-bottom:1px solid #222; padding:4px 0; display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <b>${s.ville || 'Station'}</b><br>
                            Prix: <span style="color:${s[fuelKey] ? '#fff' : 'var(--ktm)'}">${s[fuelKey] ? s[fuelKey]+'€' : 'N.C'}</span>
                        </div>
                        <button class="btn-ktm" style="width:auto; margin:0; padding:2px 6px;" onclick="startNav('${s.adresse}')">GO</button>
                    </div>
                `).join('');
            } catch(e) { list.innerHTML = "ERREUR SERVEUR (Vérifiez Internet)"; }
        }

        /* [NAV & REC] [cite: 1, 11] */
        function startNav(dest) {
            const target = dest || document.getElementById('search-input').value;
            if(!target) return;
            document.getElementById('nav-target').innerText = target.substring(0, 15).toUpperCase();
            document.getElementById('nav-info').innerText = "CALCUL ITINÉRAIRE...";
        }

        function toggleREC() {
            isREC = !isREC;
            if(isREC) alert("C'est parti !"); // 
            document.getElementById('rec-status').classList.toggle('rec-active');
        }

        navigator.geolocation.watchPosition(p => {
            document.getElementById('speed-val').innerText = Math.round(p.coords.speed * 3.6) || 0;
            document.getElementById('alt-val').innerText = "Alt: " + (Math.round(p.coords.altitude) || 0) + " m";
        }, null, { enableHighAccuracy: true });
    </script>
</body>
</html>
