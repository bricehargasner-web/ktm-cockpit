<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM MY RIDE - V9 NAVIGATION</title>

    <script>
        const CONFIG_KTM = {
            ORANGE: "#FF6600",
            RAYON: 10,
            FUEL: "Gazole",
            ADRESSE_MÉTÉO: "https://www.meteociel.fr/previsions-arome/", 
            API_NAV: "https://router.project-osrm.org/route/v1/driving/",
            GEOCODER: "https://nominatim.openstreetmap.org/search"
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* [TIROIR VISUAL-KTM] */
        :root { --ktm: #FF6600; --bg: #050505; --panel: rgba(12,12,12,0.96); }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; }
        
        #lock-msg { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        @media (orientation: portrait) { #lock-msg { display: flex; } }

        #map { position: absolute; inset: 0; z-index: 1; }
        .nuit #map { filter: invert(1) hue-rotate(180deg) brightness(0.5) contrast(1.2); }

        .overlay { position: absolute; inset: 0; z-index: 10; pointer-events: none; padding: 10px; display: grid; grid-template-columns: 220px 1fr 220px; grid-template-rows: auto 1fr auto; gap: 8px; }
        .overlay * { pointer-events: auto; }

        .case { background: var(--panel); border: 1px solid #333; border-left: 4px solid var(--ktm); padding: 8px; }
        
        /* [TIROIR SETTINGS] */
        .dots-btn { position: absolute; top: 12px; right: 12px; cursor: pointer; font-size: 24px; color: var(--ktm); z-index: 1001; }
        #settings-drawer { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: var(--panel); z-index: 1000; transition: 0.3s; border-left: 2px solid var(--ktm); padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #settings-drawer.open { right: 0; }

        /* INSTRUMENTATION */
        .vitesse-val { font-size: 3rem; font-weight: bold; line-height: 0.9; }
        .gauge-angle { width: 60px; height: 60px; border-radius: 50%; border: 4px solid #222; border-top-color: var(--ktm); display: inline-flex; align-items: center; justify-content: center; transition: transform 0.1s; }
        #zero-btn { width: 18px; height: 4px; background: var(--ktm); margin: 4px auto 0; cursor: pointer; opacity: 0.5; }
        
        .btn-ktm { background: #222; color: #fff; border: 1px solid #444; padding: 8px; font-size: 0.7rem; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
        
        #rec-btn { position: absolute; bottom: 20px; left: 20px; width: 45px; height: 45px; border-radius: 50%; background: var(--panel); border: 1px solid #444; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; }
        .rec-dot { width: 14px; height: 14px; background: #444; border-radius: 50%; }
        .rec-active { background: #f00; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div id="lock-msg"><h1 style="color:var(--ktm)">LOCK KTM</h1><p>BASCULER EN PAYSAGE</p></div>
    <div id="map"></div>

    <div class="dots-btn" onclick="toggleSettings()">⋮</div>
    <div id="settings-drawer">
        <h3 style="color:var(--ktm)">RÉGLAGES</h3>
        <button class="btn-ktm" style="background:var(--ktm)" onclick="initSensors()">1. ACTIVER CAPTEURS</button>
        
        <div style="margin-top:15px;">
            <label style="font-size:0.7rem">TYPE CARBURANT</label>
            <select id="fuel-select" onchange="CONFIG_KTM.FUEL = this.value" style="width:100%; background:#111; color:white; border:1px solid #333; padding:5px;">
                <option value="Gazole">Gazole</option>
                <option value="SP98">SP98</option>
                <option value="E10">E10</option>
            </select>
        </div>

        <h3 style="color:var(--ktm); font-size: 0.9rem; margin-top:30px;">🛠 CONSOLE DIAG</h3>
        <div id="console-output" style="background:#000; color:#0f0; font-family:monospace; font-size:10px; padding:8px; height:120px; overflow-y:auto; border:1px solid #444;">
            Système prêt...
        </div>
        <button class="btn-ktm" onclick="runCheck()">LANCER LE CHECK</button>
    </div>

    <div id="rec-btn" onclick="toggleREC()"><div class="rec-dot" id="rec-status"></div></div>

    <div class="overlay">
        <div style="grid-column:1; display:flex; flex-direction:column; gap:8px;">
            <div class="case">
                <div style="color:var(--ktm); font-size:0.6rem; font-weight:bold;">GUIDAGE</div>
                <div id="nav-instr" style="font-size:0.85rem; font-weight:bold;">Attente destination...</div>
                <div id="nav-dist" style="font-size:0.75rem; color:var(--ktm);">-- m</div>
            </div>
            <div class="case" style="flex-grow:1; display:flex; flex-direction:column; overflow:hidden;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                    <span style="color:var(--ktm); font-size:0.6rem; font-weight:bold;">STATIONS</span>
                    <button onclick="searchFuel()" style="font-size:0.55rem; background:#222; border:1px solid #444; color:#fff; padding:2px 5px;">SCAN</button>
                </div>
                <div id="fuel-list" style="overflow-y:auto; font-size:0.7rem;"></div>
            </div>
        </div>

        <div class="search-zone" style="grid-column: 2; display: flex; justify-content: center;">
            <input type="text" id="search-in" placeholder="Ex: Albi, Toulouse..." style="background:#111; border:1px solid #444; color:#fff; padding:6px 15px; border-radius:20px; width:160px; font-size:0.8rem; pointer-events:auto;">
            <button class="btn-go" style="background:var(--ktm); border:none; color:#fff; padding:6px 15px; border-radius:20px; font-weight:bold; cursor:pointer; font-size:0.7rem; pointer-events:auto; margin-left:5px;" onclick="startNavigation()">GO</button>
        </div>

        <div style="grid-column:3; display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
            <div class="case" style="width:130px; text-align:right;">
                <div class="vitesse-val" id="ui-speed">0</div>
                <div style="color:var(--ktm); font-size:0.6rem; margin-top:-5px;">KM/H</div>
                <div id="ui-alt" style="font-size:0.7rem; border-top:1px solid #333; margin-top:5px; padding-top:2px;">Alt: -- m</div>
            </div>
            <div class="case" style="width:130px; text-align:center;">
                <div class="gauge-angle" id="gauge-ui"><span id="ui-angle" style="font-size:1.2rem; font-weight:bold;">0°</span></div>
                <div id="zero-btn" onclick="calibrate()"></div>
                <div style="font-size:0.6rem; color:var(--ktm);">MAX: <span id="ui-max">0</span>°</div>
            </div>
            <div class="case" style="width:130px; text-align:right; cursor:pointer;" onclick="openWeather()">
                <div id="ui-temp" style="font-size:1rem; font-weight:bold;">--°C</div>
                <div id="ui-wind" style="font-size:0.6rem; color:var(--ktm);">Vent: -- km/h</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        /* [TIROIR SYSTÈME] */
        let map = L.map('map', { zoomControl: false }).setView([43.76, 1.98], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let routeLayer = null;

        let coords = {lat:0, lon:0}, angleOffset = 0, sessionMax = 0, rawBeta = 0;

        // [SENSORS] GPS & Vitesse
        navigator.geolocation.watchPosition(p => {
            coords = {lat: p.coords.latitude, lon: p.coords.longitude};
            document.getElementById('ui-speed').innerText = Math.round(p.coords.speed * 3.6) || 0;
            document.getElementById('ui-alt').innerText = "Alt: " + (Math.round(p.coords.altitude) || 0) + " m";
            updateWeatherInfo();
        }, null, {enableHighAccuracy: true});

        // [NAV-ENGINE] Géocodage et Calcul de route réelle
        async function startNavigation() {
            const query = document.getElementById('search-in').value;
            if(!query) return;
            logDiag("Recherche de : " + query);

            try {
                const geoRes = await fetch(`${CONFIG_KTM.GEOCODER}?format=json&q=${query}`);
                const geoData = await geoRes.json();
                if(geoData.length === 0) throw new Error("Lieu introuvable");

                const target = {lat: geoData[0].lat, lon: geoData[0].lon};
                logDiag("Lieu trouvé. Calcul itinéraire...");

                const routeRes = await fetch(`${CONFIG_KTM.API_URL}${coords.lon},${coords.lat};${target.lon},${target.lat}?overview=full&geometries=geojson`);
                const routeData = await routeRes.json();

                if(routeLayer) map.removeLayer(routeLayer);
                routeLayer = L.geoJSON(routeData.routes[0].geometry, {style: {color: CONFIG_KTM.ORANGE, weight: 5}}).addTo(map);
                map.fitBounds(routeLayer.getBounds());

                document.getElementById('nav-instr').innerText = "VERS: " + query.toUpperCase();
                document.getElementById('nav-dist').innerText = (routeData.routes[0].distance / 1000).toFixed(1) + " KM";

            } catch(e) { logDiag("ERREUR NAV: " + e.message); }
        }

        // [WEATHER-TIROIR] Météo localisée
        function openWeather() {
            // Lien dynamique vers Météociel basé sur les coordonnées exactes
            const url = `https://www.meteociel.fr/previsions-arome/60/tarn.htm?lat=${coords.lat}&lon=${coords.lon}`;
            window.open(url, '_blank');
        }

        /* [BANC DE TEST] */
        function logDiag(msg) {
            const out = document.getElementById('console-output');
            out.innerHTML += `<br>> ${msg}`;
            out.scrollTop = out.scrollHeight;
        }

        function runCheck() {
            logDiag("--- SCAN COMPLET ---");
            logDiag("GPS: " + (coords.lat !== 0 ? "FIX OK" : "ATTENTE..."));
            logDiag("ANGLE RAW (Beta): " + rawBeta.toFixed(2));
            fetch("https://api.open-meteo.com/v1/forecast?latitude=43&longitude=1&current_weather=true")
                .then(() => logDiag("API RÉSEAU: OK")).catch(() => logDiag("API RÉSEAU: FAIL"));
        }

        /* UI & AUTRES TIROIRS */
        function toggleSettings() { document.getElementById('settings-drawer').classList.toggle('open'); }
        function calibrate() { angleOffset = rawBeta; logDiag("Zéro angle fixé"); }
        function initSensors() {
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (e) => {
                    rawBeta = e.beta;
                    let ang = Math.abs(rawBeta - angleOffset);
                    ang = Math.min(60, Math.round(ang));
                    document.getElementById('ui-angle').innerText = ang + "°";
                    if(ang > sessionMax) { sessionMax = ang; document.getElementById('ui-max').innerText = sessionMax; }
                    document.getElementById('gauge-ui').style.transform = `rotate(${rawBeta > angleOffset ? ang : -ang}deg)`;
                });
                logDiag("Capteurs activés.");
            }
            toggleSettings();
        }

        async function updateWeatherInfo() {
            try {
                const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&current_weather=true`);
                const d = await r.json();
                document.getElementById('ui-temp').innerText = Math.round(d.current_weather.temperature) + "°C";
                document.getElementById('ui-wind').innerText = "Vent: " + Math.round(d.current_weather.windspeed) + " km/h";
            } catch(e) {}
        }

        function toggleREC() { document.getElementById('rec-status').classList.toggle('rec-active'); if(document.getElementById('rec-status').classList.contains('rec-active')) alert("C'est parti !"); }
    </script>
</body>
</html>
