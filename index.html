<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GPS MOTO COCKPIT - V11 PRO</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --ktm: #FF6600; --bg: rgba(10, 10, 15, 0.98); --brd: rgba(255,255,255,0.1); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        #viewport { position: absolute; inset: 0; z-index: 1; perspective: 1000px; }
        #map-box { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; transform: rotateX(45deg); }
        #map { width: 100%; height: 100%; filter: contrast(1.1) brightness(0.9); }

        #menu-trigger { position: fixed; top: 15px; left: 15px; z-index: 1000; background: var(--bg); border: 1px solid var(--ktm); color: white; padding: 10px; border-radius: 4px; cursor: pointer; pointer-events: auto; font-size: 1.2rem; }
        #nav-info { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); background: var(--bg); border: 2px solid var(--ktm); border-radius: 8px; padding: 10px; z-index: 1100; display: none; width: 60%; text-align: center; pointer-events: auto; }

        #hud { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); width: 98%; height: 140px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; z-index: 100; pointer-events: none; }
        .pane { background: var(--bg); border: 1px solid var(--brd); border-radius: 4px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .pane-label { position: absolute; top: 5px; left: 8px; font-size: 0.6rem; color: #777; font-weight: bold; text-transform: uppercase; }

        #recenter { position: absolute; top: 5px; right: 5px; background: var(--ktm); color: #000; padding: 5px; border-radius: 3px; font-size: 0.8rem; cursor: pointer; pointer-events: auto; z-index: 50; font-weight: 900; visibility: hidden; }
        #recenter.visible { visibility: visible; }
        #weather { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); font-size: 0.65rem; padding: 3px 0; display: flex; justify-content: space-around; z-index: 40; }

        #drawer { position: fixed; top: 0; left: -350px; width: 340px; height: 100%; background: #111; z-index: 2000; transition: 0.3s; padding: 20px; border-right: 2px solid var(--ktm); overflow-y: auto; box-sizing: border-box; pointer-events: auto; }
        #drawer.open { left: 0; }
        input, select { background: #000; border: 1px solid #333; color: white; padding: 14px; width: 100%; border-radius: 4px; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; }
        .btn-act { background: var(--ktm); color: white; border: none; padding: 14px; border-radius: 4px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 5px; }

        #speed { font-size: 3.5rem; font-weight: 900; line-height: 1; }
        #needle { position: absolute; bottom: 0; left: 50%; width: 4px; height: 40px; background: var(--ktm); transform-origin: bottom center; transition: transform 0.1s linear; }
        #user-arrow { width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-bottom: 25px solid var(--ktm); filter: drop-shadow(0 0 5px black); }

        @media screen and (orientation: portrait) { #lock { display: flex; } }
        #lock { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="lock"><h2>🔄 MODE PAYSAGE REQUIS</h2></div>
    <div id="menu-trigger" onclick="APP.toggleMenu()">☰</div>

    <div id="nav-info">
        <div id="n-dist" style="font-size: 1.5rem; font-weight: 900;">0.0 KM</div>
        <div id="n-dest" style="font-size: 0.7rem; color: #888;">Dest</div>
        <button onclick="APP.stopNav()" style="background:red; color:white; border:none; padding:4px 10px; border-radius:3px; font-weight:bold; margin-top:5px; cursor:pointer;">STOP NAV</button>
    </div>

    <div id="drawer">
        <h3 style="color:var(--ktm)">COCKPIT KTM PRO</h3>
        <input type="text" id="target" placeholder="Destination...">
        <button class="btn-act" onclick="APP.findTarget()">GUIDER</button>
        <button class="btn-act" onclick="APP.scanGas()">SCAN CARBURANT</button>
        <button class="btn-act" style="background:#222; margin-top:10px;" onclick="APP.calibrate()">📐 ZÉRO ANGLE</button>
        <button class="btn-act" style="background:#333; margin-top:20px;" onclick="APP.toggleMenu()">RETOUR</button>
    </div>

    <div id="viewport"><div id="map-box"><div id="map"></div></div></div>

    <div id="hud">
        <div class="pane">
            <div class="pane-label">Enregistrement GPX</div>
            <div id="chrono" style="font-size: 1.5rem; font-family: monospace;">00:00.0</div>
            <div id="dist-rec" style="color:var(--ktm); font-weight:bold;">0.0 km</div>
            <button onclick="APP.toggleRec()" id="btn-rec" style="background:var(--ktm); border:none; color:white; padding:4px 10px; border-radius:3px; font-weight:bold; pointer-events:auto; cursor:pointer;">REC</button>
        </div>
        <div class="pane">
            <div class="pane-label">Inclinaison</div>
            <div style="width:80%; height:40px; border-bottom:2px solid #333; position:relative;"><div id="needle"></div></div>
            <div id="angle-ui" style="font-size:1.8rem; font-weight:bold;">0°</div>
        </div>
        <div class="pane">
            <div class="pane-label">Vitesse</div>
            <div id="speed">0</div><div style="font-size:0.7rem; color:#666; font-weight:bold;">KM/H</div>
        </div>
        <div class="pane" style="padding:0;">
            <div id="recenter" onclick="APP.recenter()">🎯 CENTER</div>
            <div id="mini" style="width:100%; height:100%;"></div>
            <div id="weather">
                <span id="w-t">--°C</span>
                <span id="w-i">☀️</span>
                <span id="w-w">--km/h</span>
            </div>
        </div>
    </div>

    <script>
        const APP = {
            map: null, mini: null, lastPos: null, isRec: false, startT: null, totalD: 0,
            gOffset: 0, rawG: 0, route: null, userM: null, isAutoCenter: true,
            trackData: [], maxSpeed: 0, maxAngle: 0,

            init() {
                this.map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.6, 2.1], 17);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(this.map);
                
                this.map.on('movestart', (e) => { if (!e.hard) { this.isAutoCenter = false; document.getElementById('recenter').classList.add('visible'); } });

                const icon = L.divIcon({ className: 'u-pos', html: '<div id="user-arrow"></div>', iconSize: [40, 40], iconAnchor: [20, 20] });
                this.userM = L.marker([43.6, 2.1], {icon: icon, zIndexOffset: 1000}).addTo(this.map);

                this.mini = L.map('mini', { zoomControl: false, attributionControl: false, dragging: false }).setView([43.6, 2.1], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(this.mini);
                this.trace = L.polyline([], {color: '#FF6600', weight: 3}).addTo(this.mini);

                this.bind();
                this.fetchWeather();
            },

            recenter() { this.isAutoCenter = true; document.getElementById('recenter').classList.remove('visible'); if(this.lastPos) this.map.setView(this.lastPos, 17); },
            toggleMenu() { document.getElementById('drawer').classList.toggle('open'); },
            calibrate() { this.gOffset = this.rawG; this.toggleMenu(); },

            bind() {
                navigator.geolocation.watchPosition(p => {
                    const { latitude, longitude, speed, heading } = p.coords;
                    this.lastPos = [latitude, longitude];
                    const currentSpeed = Math.round((speed || 0) * 3.6);
                    document.getElementById('speed').innerText = currentSpeed;
                    
                    this.userM.setLatLng(this.lastPos);
                    if(this.isAutoCenter) this.map.setView(this.lastPos, this.map.getZoom(), {animate: false, hard: true});
                    if (heading !== null) document.getElementById('user-arrow').style.transform = `rotate(${heading}deg)`;

                    if(this.isRec) {
                        if(currentSpeed > this.maxSpeed) this.maxSpeed = currentSpeed;
                        const angle = Math.abs(Math.round(this.rawG - this.gOffset));
                        if(angle > this.maxAngle) this.maxAngle = angle;

                        this.trackData.push({ lat: latitude, lon: longitude, alt: p.coords.altitude, spd: currentSpeed, ang: angle, time: new Date().toISOString() });
                        
                        if(this.pPrev) this.totalD += this.map.distance(this.pPrev, this.lastPos);
                        document.getElementById('dist-rec').innerText = (this.totalD/1000).toFixed(1) + " km";
                        this.trace.addLatLng(this.lastPos);
                        this.mini.setView(this.lastPos, 13);
                    }
                    this.pPrev = this.lastPos;
                }, null, { enableHighAccuracy: true });

                window.addEventListener('deviceorientation', e => {
                    this.rawG = e.beta || 0;
                    let v = Math.round(this.rawG - this.gOffset);
                    document.getElementById('angle-ui').innerText = Math.abs(v) + "°";
                    document.getElementById('needle').style.transform = `rotate(${Math.max(-45, Math.min(45, v))}deg)`;
                });

                setInterval(() => {
                    if(this.isRec && this.startT) {
                        let d = new Date(Date.now() - this.startT);
                        document.getElementById('chrono').innerText = `${String(d.getUTCMinutes()).padStart(2,'0')}:${String(d.getUTCSeconds()).padStart(2,'0')}.${Math.floor(d.getUTCMilliseconds()/100)}`;
                    }
                }, 100);
            },

            toggleRec() {
                this.isRec = !this.isRec;
                const btn = document.getElementById('btn-rec');
                if(this.isRec) {
                    this.startT = Date.now(); this.totalD = 0; this.maxSpeed = 0; this.maxAngle = 0; this.trackData = []; this.trace.setLatLngs([]);
                    btn.innerText = "STOP & SAVE"; btn.style.background = "red";
                } else {
                    this.saveGPX();
                    btn.innerText = "REC"; btn.style.background = "#FF6600";
                }
            },

            saveGPX() {
                if(this.trackData.length < 2) return;
                const now = new Date();
                const timestamp = now.toLocaleDateString().replace(/\//g, '-') + "_" + now.getHours() + "h" + now.getMinutes();
                const filename = `KTM_${timestamp}_Vmax${this.maxSpeed}_Ang${this.maxAngle}.gpx`;

                let g = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="KTM Cockpit" xmlns="http://www.topografix.com/GPX/1/1">
<trk><name>Sortie KTM ${timestamp}</name><trkseg>`;
                
                this.trackData.forEach(p => {
                    g += `<trkpt lat="${p.lat}" lon="${p.lon}">
<ele>${p.alt || 0}</ele>
<time>${p.time}</time>
<extensions>
<speed>${p.spd}</speed>
<angle>${p.ang}</angle>
</extensions>
</trkpt>`;
                });

                g += `</trkseg></trk></gpx>`;
                
                const blob = new Blob([g], {type: 'application/gpx+xml'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                // Déclenche la demande d'enregistrement du téléphone
                a.click();
            },

            async findTarget() {
                const q = document.getElementById('target').value;
                if(q.length < 3) return;
                const r = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=1&lang=fr`);
                const data = await r.json();
                if(data.features && data.features.length > 0) {
                    const c = data.features[0].geometry.coordinates;
                    this.startNav(c[1], c[0], data.features[0].properties.name);
                }
            },

            async startNav(lat, lng, name) {
                if(!this.lastPos) return;
                const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${this.lastPos[1]},${this.lastPos[0]};${lng},${lat}?overview=full&geometries=geojson`);
                const data = await r.json();
                if(this.route) this.map.removeLayer(this.route);
                this.route = L.geoJSON(data.routes[0].geometry, { style: { color: '#FF6600', weight: 8, opacity: 0.8 } }).addTo(this.map);
                document.getElementById('n-dist').innerText = (data.routes[0].distance/1000).toFixed(1) + " KM";
                document.getElementById('n-dest').innerText = name;
                document.getElementById('nav-info').style.display = 'block';
                this.recenter(); this.toggleMenu();
            },

            stopNav() { if(this.route) this.map.removeLayer(this.route); document.getElementById('nav-info').style.display = 'none'; },

            async fetchWeather() {
                if(!this.lastPos) { setTimeout(() => this.fetchWeather(), 3000); return; }
                const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${this.lastPos[0]}&longitude=${this.lastPos[1]}&current_weather=true`);
                const data = await r.json();
                const w = data.current_weather;
                document.getElementById('w-t').innerText = Math.round(w.temperature) + "°C";
                document.getElementById('w-w').innerText = Math.round(w.windspeed) + "km/h";
                document.getElementById('w-i').innerText = w.weathercode < 3 ? "☀️" : (w.weathercode < 50 ? "☁️" : "🌧️");
            }
        };
        window.onload = () => APP.init();
    </script>
</body>
</html>
