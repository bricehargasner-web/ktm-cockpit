<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM 890 - V26 PRECISION</title>
    
    <script>
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}{r}.png' // Carte sombre pour look Kawa/KTM
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        #map { position: absolute; width: 100%; height: 100%; z-index: 1; filter: contrast(1.2); }

        /* HUD CENTRAL TYPE Z900 */
        #hud-container {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; height: 320px; z-index: 60; pointer-events: none;
        }
        #aim-sphere { position: absolute; width: 100%; height: 100%; border: 1px solid rgba(255,102,0,0.3); border-radius: 50%; 
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="49" fill="none" stroke="rgba(255,102,0,0.1)" stroke-width="0.5"/><path d="M50 5 L50 15 M50 85 L50 95 M5 50 L15 50 M85 50 L95 50" stroke="rgba(255,102,0,0.5)" stroke-width="1"/></svg>');
        }
        #horizon-gyro { position: absolute; top: 50%; width: 120%; left: -10%; height: 2px; background: #FF6600; box-shadow: 0 0 15px #FF6600; transition: transform 0.1s linear; }
        #lean-display { position: absolute; width: 100%; top: 10px; text-align: center; font-size: 2.8rem; font-weight: 900; color: #FF6600; text-shadow: 0 0 10px #000; }

        /* VITESSE BAS GAUCHE */
        #speed-block { position: absolute; bottom: 65px; left: 20px; z-index: 80; text-align: left; pointer-events: none; }
        #speed-val { font-family: 'Barlow Condensed'; font-size: 5.5rem; font-weight: 900; line-height: 0.8; color: #FFF; text-shadow: 0 0 20px #000; }
        .unit { font-size: 1rem; color: #FF6600; font-weight: 900; margin-left: 5px; }

        /* COMMANDES HAUTES */
        #top-ui { position: absolute; top: 8px; width: 96%; left: 2%; z-index: 100; display: flex; gap: 8px; }
        #search-input { flex-grow: 1; background: rgba(0,0,0,0.6); border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; backdrop-filter: blur(5px); }
        .btn-ktm { background: #FF6600; color: #000; border: none; padding: 8px 12px; border-radius: 4px; font-weight: 900; font-size: 0.7rem; cursor: pointer; }

        /* WIDGETS BAS */
        #dashboard { position: absolute; bottom: 0; width: 100%; z-index: 90; display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(0,0,0,0.8); border-top: 1px solid #FF6600; }
        .widget { padding: 5px; text-align: center; border-right: 1px solid rgba(255,102,0,0.2); }
        .label { font-size: 0.55rem; color: #FF6600; text-transform: uppercase; }
        .value { font-family: 'Barlow Condensed'; font-size: 1.6rem; font-weight: 900; }
    </style>
</head>
<body>

    <div id="top-ui">
        <input type="text" id="search-input" placeholder="DESTINATION...">
        <button class="btn-ktm" onclick="startNav()">NAV</button>
        <button class="btn-ktm" style="background:#222; color:#FF6600;" onclick="findFuel()">⛽ SCAN</button>
        <button class="btn-ktm" style="background:#333; color:#fff;" onclick="calibrate()">ZERO</button>
    </div>

    <div id="hud-container">
        <div id="lean-display">0°</div>
        <div id="aim-sphere"></div>
        <div id="horizon-gyro"></div>
    </div>

    <div id="speed-block">
        <div id="speed-val">000</div>
        <div class="unit">KM/H</div>
    </div>

    <div id="map"></div>

    <div id="dashboard">
        <div class="widget"><div class="label">Altitude</div><div id="alt" class="value">--</div></div>
        <div class="widget"><div class="label">Cap</div><div id="cap" class="value">---</div></div>
        <div class="widget"><div class="label">Trip</div><div id="dist" class="value">0.0</div></div>
        <div class="widget"><div class="label">Mission</div><div class="value" style="color:#FF6600; font-size:1rem;">READY</div></div>
    </div>

    <script>
        let map, userMarker, totalDist = 0, offset = 0, lastG = 0, smoothedLean = 0, lastCoord = null;
        let fuelLayer = L.layerGroup();

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.6, 1.8], 13);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(map);
            fuelLayer.addTo(map);
            userMarker = L.circleMarker([0,0], { radius: 8, color: '#fff', fillColor: '#FF6600', fillOpacity: 1, weight: 2 }).addTo(map);

            window.addEventListener('deviceorientation', e => {
                lastG = e.gamma;
                let raw = e.gamma - offset;
                // FILTRE EXTRÊME : On ne garde que 5% du mouvement brusque
                smoothedLean = (smoothedLean * 0.95) + (raw * 0.05);
                document.getElementById('horizon-gyro').style.transform = `rotate(${smoothedLean}deg)`;
                document.getElementById('lean-display').innerText = Math.abs(Math.round(smoothedLean)) + "°";
            });

            navigator.geolocation.watchPosition(u => {
                const p = [u.coords.latitude, u.coords.longitude];
                userMarker.setLatLng(p);
                map.panTo(p);
                if (u.coords.heading) document.getElementById('cap').innerText = Math.round(u.coords.heading) + "°";
                document.getElementById('speed-val').innerText = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0).toString().padStart(3, '0');
                if (u.coords.altitude) document.getElementById('alt').innerText = Math.round(u.coords.altitude) + "m";
                if (lastCoord) totalDist += map.distance(lastCoord, p) / 1000;
                lastCoord = p;
                document.getElementById('dist').innerText = totalDist.toFixed(1);
            }, null, { enableHighAccuracy: true });
        }

        async function findFuel() {
            const c = map.getCenter();
            const res = await fetch(`https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?where=within_distance(geom, geom'POINT(${c.lng} ${c.lat})', 30000)&limit=15`);
            const data = await res.json();
            fuelLayer.clearLayers();
            data.results.forEach(st => {
                let p = st.sp95_prix || st.e10_prix;
                if (p) L.marker([st.geom.lat, st.geom.lon], { icon: L.divIcon({ html: `<div style="background:#FF6600; color:white; padding:2px; border:1px solid white; font-weight:bold; font-size:12px;">${p.toFixed(2)}</div>` }) }).addTo(fuelLayer);
            });
        }

        function calibrate() { offset = lastG; }
        function startNav() { window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(document.getElementById('search-input').value)}`, '_blank'); }
        window.onload = init;
    </script>
</body>
</html>
