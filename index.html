<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartBite Pro - Energy Concept</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ==========================================================
           1. CONFIGURATION DESIGN (Clinique & Moderne)
           ========================================================== */
        :root {
            --neon: #00ff88;
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --danger: #ff4d4d;
            --header-h: 70px;
        }

        body { 
            margin: 0; font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); color: var(--text);
        }

        /* HEADER FIXE */
        .fixed-header { 
            position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
            background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(12px);
            border-bottom: 1px solid #30363d; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; box-sizing: border-box;
        }

        .content { margin-top: calc(var(--header-h) + 10px); padding: 12px; }

        /* GRAPHIQUE STYLE SONAR */
        .chart-box {
            background: #000; border-radius: 12px; padding: 10px;
            border: 1px solid #30363d; margin-bottom: 15px;
            box-shadow: inset 0 0 30px rgba(0, 255, 136, 0.05);
        }

        .status-hero {
            border-radius: 8px; padding: 12px; text-align: center;
            font-weight: 800; font-size: 0.9rem; text-transform: uppercase;
            background: #21262d; border: 1px solid #30363d; margin-bottom: 12px;
            transition: 0.3s;
        }
        .active-scan { border-color: var(--neon); color: var(--neon); }
        .hit { background: var(--danger) !important; color: white !important; }

        /* BOUTONS */
        .btn { 
            border: none; border-radius: 6px; padding: 10px 14px; font-weight: bold; 
            cursor: pointer; text-transform: uppercase; font-size: 0.75rem;
        }
        .btn-start { background: var(--neon); color: #000; }
        .btn-stop { background: var(--danger); color: #fff; }
        .btn-gear { background: #30363d; color: #fff; }
        .btn-link { background: #58a6ff; color: white; width: 100%; margin-top: 5px; }

        /* PARAMÈTRES */
        #settingsPanel {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--card);
            border-radius: 16px 16px 0 0; transform: translateY(100%);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px; z-index: 1100;
            border-top: 1px solid var(--neon);
        }
        #settingsPanel.open { transform: translateY(0); }

        .group { margin-bottom: 18px; }
        input[type=range] { width: 100%; accent-color: var(--neon); }

        /* MÉTÉO - Correction du Widget */
        .weather-box {
            width: 100%; height: 350px; border-radius: 12px;
            overflow: hidden; border: 1px solid #30363d; background: #161b22;
            position: relative;
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="fixed-header">
    <div>
        <span style="color: var(--neon); font-weight: 900; font-size: 1.1rem;">SMARTBITE</span><br>
        <small style="font-size: 0.55rem; opacity: 0.5; letter-spacing: 1px;">ENERGY CONCEPT</small>
    </div>
    <div style="display: flex; gap: 6px;">
        <button id="startBtn" class="btn btn-start" onclick="startSystem()">Start</button>
        <button id="stopBtn" class="btn btn-stop" style="display:none" onclick="stopSystem()">Stop</button>
        <button class="btn btn-gear" onclick="toggleSettings()">⚙️</button>
    </div>
</div>

<div class="content">
    <div id="hero" class="status-hero">SYSTÈME EN PAUSE</div>
    
    <div class="chart-box">
        <canvas id="liveChart" style="height: 180px;"></canvas>
    </div>

    <div class="weather-box">
        <!-- Lien de secours si l'iframe bloque -->
        <iframe id="windyFrame" src="https://www.windy.com/multicast?43.604,2.243,9" allowfullscreen></iframe>
    </div>
    <button class="btn btn-link" onclick="window.open('https://www.windy.com/43.604/2.243?43.604,2.243,9', '_blank')">Ouvrir Windy Plein Écran ↗</button>
</div>

<div id="settingsPanel">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <h3 style="margin:0; color:var(--neon)">CONFIGURATION</h3>
        <button class="btn btn-gear" onclick="toggleSettings()">OK</button>
    </div>

    <div class="group">
        <label>SENSIBILITÉ : <b id="lblSens" style="color:var(--neon)">0.3</b></label>
        <input type="range" id="rngSens" min="0.1" max="1.5" step="0.05" value="0.3">
    </div>

    <div class="group">
        <label>VOLUME : <b id="lblVol" style="color:var(--neon)">75</b>%</label>
        <input type="range" id="rngVol" min="0" max="100" step="5" value="75">
    </div>

    <div class="group">
        <label>VUE TEMPORELLE : <b id="lblZoom" style="color:var(--neon)">50</b></label>
        <input type="range" id="rngZoom" min="20" max="150" step="10" value="50">
    </div>
</div>

<script>
/* ==========================================================
   2. LOGIQUE TECHNIQUE (SEGMENTATION FONCTIONNELLE)
   ========================================================== */
let audioCtx = null, isRunning = false, isAlerting = false;
let threshold = 0.3, volume = 0.75, zoom = 50;
let lastAcc = { x: 0, y: 0, z: 0 };

// Graphique
const ctx = document.getElementById('liveChart').getContext('2d');
const gradient = ctx.createLinearGradient(0, 0, 0, 180);
gradient.addColorStop(0, 'rgba(0, 255, 136, 0.3)');
gradient.addColorStop(1, 'rgba(0, 255, 136, 0)');

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: Array(zoom).fill(''),
        datasets: [{
            borderColor: '#00ff88',
            borderWidth: 2,
            data: Array(zoom).fill(0),
            fill: true,
            backgroundColor: gradient,
            pointRadius: 0,
            tension: 0.4
        }]
    },
    options: {
        responsive: true, maintainAspectRatio: false,
        scales: { 
            y: { min: 0, max: 1.5, grid: { color: '#1c2128' }, ticks: { display: false } },
            x: { display: false }
        },
        plugins: { legend: { display: false } },
        animation: false
    }
});

function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('open'); }

function startSystem() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    isRunning = true;
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'block';
    const hero = document.getElementById('hero');
    hero.innerText = "SCAN ACTIF";
    hero.classList.add('active-scan');
    
    // Permission Capteurs
    if (typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission().then(res => { if(res === 'granted') listen(); });
    } else { listen(); }
}

function stopSystem() {
    isRunning = false;
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('stopBtn').style.display = 'none';
    const hero = document.getElementById('hero');
    hero.innerText = "SYSTÈME EN PAUSE";
    hero.classList.remove('active-scan');
}

function listen() {
    window.addEventListener('devicemotion', (e) => {
        if (!isRunning || isAlerting) return;
        const acc = e.acceleration;
        if (!acc || acc.x === null) return;

        const delta = Math.abs(acc.x - lastAcc.x) + Math.abs(acc.y - lastAcc.y) + Math.abs(acc.z - lastAcc.z);
        lastAcc = { x: acc.x, y: acc.y, z: acc.z };

        chart.data.datasets[0].data.push(delta);
        if (chart.data.datasets[0].data.length > zoom) chart.data.datasets[0].data.shift();
        chart.update();

        if (delta > threshold) triggerBip();
    });
}

function triggerBip() {
    isAlerting = true;
    const hero = document.getElementById('hero');
    hero.classList.add('hit');
    hero.innerText = "!!! TOC !!!";

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(1100, audioCtx.currentTime);
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.25);

    setTimeout(() => {
        isAlerting = false;
        hero.classList.remove('hit');
        hero.innerText = "SCAN ACTIF";
    }, 900);
}

// Sliders
document.getElementById('rngSens').oninput = function() { threshold = this.value; document.getElementById('lblSens').innerText = this.value; };
document.getElementById('rngVol').oninput = function() { volume = this.value/100; document.getElementById('lblVol').innerText = this.value; };
document.getElementById('rngZoom').oninput = function() { 
    zoom = parseInt(this.value); 
    document.getElementById('lblZoom').innerText = this.value;
    chart.data.datasets[0].data = Array(zoom).fill(0);
};
</script>
</body>
</html>
