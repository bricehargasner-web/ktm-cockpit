<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Energy Concept - KTM GPS V7</title>

    <script>
        const CONFIG_KTM = {
            ORANGE: "#FF6600",
            RAYON_DEFAUT: 10,
            CARBURANT: "Gazole",
            THEME: "auto",
            API_URL: "https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records"
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* [TIROIR VISUAL-KTM] - DESIGN CLINIQUE [cite: 16] */
        :root { --ktm: #FF6600; --bg: #050505; --panel: rgba(12,12,12,0.95); --border: #333; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* LOCK KTM - PAYSAGE OBLIGATOIRE  */
        #lock-msg { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #lock-msg h1 { color: var(--ktm); font-size: 2.5rem; margin: 0; }
        @media (orientation: portrait) { #lock-msg { display: flex; } }

        #map { position: absolute; inset: 0; z-index: 1; }
        .nuit #map { filter: invert(1) hue-rotate(180deg) brightness(0.5) contrast(1.2); }

        .overlay { position: absolute; inset: 0; z-index: 10; pointer-events: none; padding: 12px; display: grid; grid-template-columns: 210px 1fr 210px; grid-template-rows: auto 1fr auto; gap: 10px; }
        .overlay * { pointer-events: auto; }

        .case { background: var(--panel); border: 1px solid var(--border); border-left: 4px solid var(--ktm); border-radius: 2px; padding: 8px; }
        
        /* RECHERCHE MINI [cite: 2] */
        .search-zone { grid-column: 2; display: flex; justify-content: center; align-items: flex-start; gap: 6px; }
        #search-input { width: 180px; background: #111; border: 1px solid #444; color: #fff; padding: 7px 15px; border-radius: 20px; font-size: 0.8rem; }
        .btn-go { background: var(--ktm); border: none; color: #fff; padding: 7px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }

        /* TIROIR REGLAGES [cite: 17] */
        .dots-btn { position: absolute; top: 12px; right: 12px; cursor: pointer; font-size: 24px; color: var(--ktm); z-index: 1001; }
        #settings-drawer { position: fixed; top: 0; right: -280px; width: 260px; height: 100%; background: var(--panel); z-index: 1000; transition: 0.3s; border-left: 2px solid var(--ktm); padding: 20px; box-sizing: border-box; }
        #settings-drawer.open { right: 0; }

        /* INSTRUMENTATION [cite: 9] */
        .vitesse-val { font-size: 3rem; font-weight: bold; line-height: 0.9; }
        .gauge-angle { width: 65px; height: 65px; border-radius: 50%; border: 4px solid #222; display: inline-flex; align-items: center; justify-content: center; border-top-color: var(--ktm); }
        #zero-btn { width: 15px; height: 3px; background: var(--ktm); margin: 5px auto 0; cursor: pointer; opacity: 0.6; } /*  */

        /* REC BUTTON [cite: 14] */
        #rec-btn { position: absolute; bottom: 20px; left: 20px; width: 45px; height: 45px; border-radius: 50%; background: var(--panel); border: 1px solid #444; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; }
        .rec-dot { width: 14px; height: 14px; background: #444; border-radius: 50%; }
        .rec-active { background: #ff0000; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }

        .station-item { border-bottom: 1px solid #222; padding: 5px 0; font-size: 0.75rem; }
    </style>
</head>
<body>

    <div id="lock-msg"><h1>LOCK KTM</h1><p>PAYSAGE REQUIS</p></div>
    <div id="map"></div>

    <div class="dots-btn" onclick="toggleSettings()">⋮</div>
    <div id="settings-drawer">
        <h3 style="color:var(--ktm)">REGLAGES</h3>
        <label style="font-size:0.7rem">CARBURANT :</label>
        <select id="fuel-type" onchange="updateFuel(this.value)" style="width:100%; background:#111; color:white; border:1px solid #444; padding:5px; margin-bottom:15px;">
            <option value="Gazole">Gazole</option>
            <option value="SP95">SP95</option>
            <option value="SP98">SP98</option>
            <option value="E10">E10</option>
            <option value="E85">E85</option>
            <option value="AdBlue">AdBlue (Service)</option>
        </select>
        <label style="font-size:0.7rem">RAYON : <span id="rad-val">10</span>km</label>
        <input type="range" min="1" max="20" value="10" style="width:100%; accent-color:var(--ktm);" oninput="updateRad(this.value)">
        <button onclick="initSensors()" style="width:100%; background:var(--ktm); border:none; color:white; padding:10px; margin-top:20px; font-weight:bold;">ACTIVER CAPTEURS</button>
    </div>

    <div id="rec-btn" onclick="toggleREC()"><div class="rec-dot" id="rec-status"></div></div>

    <div class="overlay">
        <div style="grid-column: 1; display:flex; flex-direction:column; gap:8px;">
            <div class="case">
                <div style="color:var(--ktm); font-size:0.6rem; font-weight:bold;">NAVIGATION</div>
                <div id="nav-instr" style="font-size:0.9rem; font-weight:bold;">Pret</div>
                <div id="nav-dist" style="font-size:0.7rem; color:var(--ktm);">-- m</div>
            </div>
            <div class="case" style="flex-grow:1; display:flex; flex-direction:column;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="color:var(--ktm); font-size:0.6rem; font-weight:bold;">STATIONS</span>
                    <button onclick="searchFuel()" style="font-size:0.55rem; background:#222; color:white; border:1px solid #444; padding:2px 5px;">CHERCHER</button>
                </div>
                <div id="fuel-list" style="overflow-y:auto; margin-top:5px; flex-grow:1;"></div>
            </div>
        </div>

        <div class="search-zone">
            <input type="text" id="search-input" placeholder="Où aller ?">
            <button class="btn-go" onclick="startNav()">GO</button>
        </div>

        <div style="grid-column: 3; text-align: right; display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
            <div class="case" style="width:130px;">
                <div class="vitesse-val" id="speed-val">0</div>
                <div style="color:var(--ktm); font-size:0.6rem; margin-top:-5px;">KM/H</div>
                <div id="alt-val" style="font-size:0.75rem; border-top:1px solid #333; margin-top:5px; padding-top:3px;">Alt: -- m</div>
            </div>
            <div class="case" style="width:130px; text-align:center;">
                <div class="gauge-angle" id="gauge-visual"><span id="angle-txt" style="font-size:1.2rem; font-weight:bold;">0°</span></div>
                <div id="zero-btn" onclick="setZero()"></div> <div style="font-size:0.6rem; color:var(--ktm);">MAX: <span id="max-angle">0</span>°</div>
            </div>
            <div class="case" style="width:130px; cursor:pointer;" onclick="window.open('https://meteofrance.com/','_blank')"> <div id="temp-txt" style="font-size:1rem; font-weight:bold;">--°C</div>
                <div id="wind-txt" style="font-size:0.6rem; color:var(--ktm);">Vent: -- km/h</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        /* TIROIR LOGIQUE ET GPS */
        let map = L.map('map', { zoomControl: false }).setView([43.76, 1.98], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let angleOffset = 0, maxAng = 0, isREC = false, rawBeta = 0, coords = {lat:0, lon:0};

        navigator.geolocation.watchPosition(p => {
            coords = {lat: p.coords.latitude, lon: p.coords.longitude};
            document.getElementById('speed-val').innerText = Math.round(p.coords.speed * 3.6) || 0;
            document.getElementById('alt-val').innerText = "Alt: " + (Math.round(p.coords.altitude) || 0) + " m";
            updateWeather(coords.lat, coords.lon);
        }, null, {enableHighAccuracy: true});

        function handleMotion(e) {
            rawBeta = e.beta; 
            let ang = Math.abs(rawBeta - angleOffset);
            ang = Math.min(60, Math.round(ang));
            document.getElementById('angle-txt').innerText = ang + "°";
            if(ang > maxAng) { maxAng = ang; document.getElementById('max-angle').innerText = maxAng; }
            document.getElementById('gauge-visual').style.transform = `rotate(${rawBeta > angleOffset ? ang : -ang}deg)`;
        }

        async function searchFuel() {
            const list = document.getElementById('fuel-list');
            const type = document.getElementById('fuel-type').value;
            list.innerHTML = "Recherche...";
            const url = `${CONFIG_KTM.API_URL}?where=within_distance(geom%2C%20geom'POINT(${coords.lon}%20${coords.lat})'%2C%20${document.getElementById('rad-val').innerText}km)&limit=15`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                list.innerHTML = data.results.map(s => {
                    let prix = s[type.toLowerCase() + "_prix"];
                    if (type === "AdBlue") prix = s.services?.includes("AdBlue") ? "DISPO" : "N.C"; // 
                    else prix = prix ? prix + "€" : "N.C"; // 
                    return `<div class="station-item"><b>${s.ville}</b><br>Prix ${type}: <span style="color:${prix==='N.C'?'var(--ktm)':'white'}">${prix}</span> <button style="float:right; background:var(--ktm); border:none; color:white; font-size:8px;" onclick="startNav('${s.ville}')">GO</button></div>`;
                }).join('');
            } catch(e) { list.innerHTML = "Erreur API"; }
        }

        /* ACTIONS UI */
        function toggleSettings() { document.getElementById('settings-drawer').classList.toggle('open'); }
        function setZero() { angleOffset = rawBeta; }
        function updateRad(v) { document.getElementById('rad-val').innerText = v; }
        function toggleREC() { 
            isREC = !isREC; 
            if(isREC) alert("C'est parti !"); // [cite: 15]
            document.getElementById('rec-status').classList.toggle('rec-active'); 
        }
        function startNav(d) { document.getElementById('nav-instr').innerText = d || document.getElementById('search-input').value; }
        async function updateWeather(la, lo) {
            const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${la}&longitude=${lo}&current_weather=true`);
            const d = await r.json();
            document.getElementById('temp-txt').innerText = Math.round(d.current_weather.temperature) + "°C";
            document.getElementById('wind-txt').innerText = "Vent: " + Math.round(d.current_weather.windspeed) + " km/h";
        }
        function initSensors() { if (window.DeviceOrientationEvent) window.addEventListener('deviceorientation', handleMotion); toggleSettings(); }
    </script>
</body>
</html>
