<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM HUD V75 - GOGGLE CLEAR</title>
    
    <script>
        /* --- PANNEAU DE CONTRÔLE ENERGY CONCEPT (BRICE CARDONA) --- */
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            SAFE_GREEN: '#2ecc71',
            DANGER_RED: '#ff4757',
            SCAN_RADIUS: 25000, 
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records',
            // Carte plus claire pour OsmAnd
            MAP_STYLE: 'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png'
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Barlow+Condensed:wght@900&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        
        /* FOND DE L'OCÉAN (Luminosité augmentée à 0.6) */
        #map { position: absolute; inset: 0; z-index: 1; filter: brightness(0.6) saturate(1.1) contrast(1.1); }

        /* CADRE DU MASQUE DE PLONGÉE (Plus fin pour l'écran partagé) */
        #goggle-vision {
            position: absolute; inset: 0; z-index: 100;
            border: 15px solid rgba(0,0,0,0.7);
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
        }

        /* HUD VITESSE */
        #speed-block { position: absolute; bottom: 15%; left: 10%; z-index: 200; pointer-events: auto; }
        #speed-val { font-family: 'Barlow Condensed'; font-size: clamp(4rem, 15vw, 9rem); font-weight: 900; line-height: 0.7; text-shadow: 2px 2px 10px #000; }

        /* HUD ANGLE */
        #lean-block { position: absolute; bottom: 15%; right: 10%; z-index: 200; text-align: right; pointer-events: auto; }
        #lean-val { font-family: 'Barlow Condensed'; font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: #2ecc71; text-shadow: 2px 2px 10px #000; }

        /* INTERFACE SCAN */
        #top-ui { position: absolute; top: 20px; width: 90%; left: 5%; z-index: 300; display: flex; gap: 10px; }
        .btn-scan { background: #FF6600; color: #000; border: none; padding: 12px 20px; font-weight: 900; border-radius: 4px; cursor: pointer; }

        /* LISTE STATIONS */
        #station-list {
            position: absolute; top: 80px; left: 5%; width: 280px; max-height: 50%;
            background: rgba(0,0,0,0.9); border-left: 5px solid #FF6600;
            overflow-y: auto; display: none; z-index: 250;
        }
        .st-item { padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .btn-go { background: #FFF; color: #000; border: none; padding: 10px 15px; border-radius: 4px; font-weight: 900; text-decoration: none; font-size: 0.8rem; }

        #horizon { position: absolute; top: 50%; left: 50%; width: 30%; height: 2px; background: rgba(255,255,255,0.4); transform: translate(-50%, -50%); z-index: 50; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="goggle-vision"></div>
    <div id="horizon"></div>

    <div id="top-ui">
        <select id="fuel-type" style="background:#000; color:#FF6600; border:1px solid #FF6600; font-weight:900;">
            <option value="gazole_prix">GAZOLE</option>
            <option value="sp95_prix">SP95</option>
            <option value="e10_prix">E10</option>
        </select>
        <button class="btn-scan" onclick="findFuel()">⛽ SCAN</button>
    </div>

    <div id="station-list"></div>

    <div id="speed-block">
        <div id="speed-val">000</div>
        <div style="color:#FF6600; font-weight:900; font-size: 0.8rem;">KM/H</div>
    </div>

    <div id="lean-block">
        <div id="lean-val">0°</div>
        <div id="alt-val" style="color:#aaa; font-size: 1rem;">--- M</div>
        <button onclick="calibrate()" style="background:#222; color:#777; border:none; font-size:10px; margin-top:5px; padding:2px 5px;">ZERO</button>
    </div>

    <script>
        let map, userMarker, fuelLayer, offset = 0, lastRaw = 0, smoothedLean = 0;

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.6, 1.9], 13);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(map);
            fuelLayer = L.layerGroup().addTo(map);
            userMarker = L.circleMarker([0,0], { radius: 8, color: '#fff', fillColor: CONFIG.KTM_ORANGE, fillOpacity: 1, weight: 3 }).addTo(map);
            window.addEventListener('deviceorientation', handleOrientation);
            startTracking();
        }

        function handleOrientation(e) {
            let screenAngle = window.orientation || 0;
            let raw = (Math.abs(screenAngle) === 90) ? e.beta : e.gamma;
            if (screenAngle === -90) raw = -raw;
            lastRaw = raw;
            let currentLean = raw - offset;
            smoothedLean = (smoothedLean * 0.8) + (currentLean * 0.2);
            let angle = Math.abs(Math.round(smoothedLean));
            document.getElementById('lean-val').innerText = angle + "°";
            document.getElementById('horizon').style.transform = `translate(-50%, -50%) rotate(${smoothedLean}deg)`;
            document.getElementById('lean-val').style.color = angle < 20 ? CONFIG.SAFE_GREEN : (angle < 42 ? CONFIG.KTM_ORANGE : CONFIG.DANGER_RED);
        }

        function startTracking() {
            navigator.geolocation.watchPosition(u => {
                const p = [u.coords.latitude, u.coords.longitude];
                userMarker.setLatLng(p);
                map.panTo(p);
                document.getElementById('speed-val').innerText = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0).toString().padStart(3, '0');
                if (u.coords.altitude) document.getElementById('alt-val').innerText = Math.round(u.coords.altitude) + " M";
            }, null, { enableHighAccuracy: true });
        }

        async function findFuel() {
            const center = map.getCenter();
            const fuelType = document.getElementById('fuel-type').value;
            const list = document.getElementById('station-list');
            const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${center.lng} ${center.lat})', ${CONFIG.SCAN_RADIUS}m)&limit=10`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                fuelLayer.clearLayers();
                list.innerHTML = "";
                list.style.display = "block";

                if (data.results) {
                    data.results.forEach(st => {
                        const price = st[fuelType];
                        if (!price) return;
                        const lat = st.geom.lat.toFixed(6); const lon = st.geom.lon.toFixed(6);

                        L.marker([lat, lon], {
                            icon: L.divIcon({ html: `<div style="background:#FF6600; color:white; padding:2px; border-radius:3px; font-weight:bold; border:1px solid white; font-size:10px;">${price.toFixed(2)}</div>`, iconSize: [40, 18] })
                        }).addTo(fuelLayer);

                        const card = document.createElement('div');
                        card.className = 'st-item';
                        // Format OsmAnd universel
                        const navUrl = `https://osmand.net/go?lat=${lat}&lon=${lon}&z=16`;
                        
                        card.innerHTML = `
                            <div>
                                <div style="font-size:0.6rem; color:#888;">${(st.nom || st.adresse).substring(0,15)}</div>
                                <div style="font-size:1.4rem; font-weight:900;">${price.toFixed(2)}€</div>
                            </div>
                            <a href="${navUrl}" target="_blank" class="btn-go">GO</a>
                        `;
                        list.appendChild(card);
                    });
                }
            } catch(e) { console.error(e); }
        }

        function calibrate() { offset = lastRaw; }
        window.onload = init;
    </script>
</body>
</html>
