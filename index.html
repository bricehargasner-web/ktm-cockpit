<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM COCKPIT V13 - ENERGY CONCEPT</title>

    <script>
        const CONFIG_KTM = {
            ORANGE: "#FF6600",
            THEME: "auto",
            RAYON: 10,
            API_FUEL: "https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records",
            API_NAV: "https://router.project-osrm.org/route/v1/driving/",
            SUIVI_ACTIF: true // Mode Point Fixe / Carte tournante
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* [TIROIR-VISUEL] - STRUCTURE ÉTANCHE & FIGÉE */
        :root { --ktm: #FF6600; --bg: #000; --panel: rgba(10,10,10,0.95); --text: #fff; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #map { position: absolute; inset: 0; z-index: 1; }
        .nuit #map { filter: invert(1) hue-rotate(180deg) brightness(0.4) contrast(1.5); }

        .overlay { position: absolute; inset: 0; z-index: 10; pointer-events: none; padding: 10px; display: grid; grid-template-columns: 220px 1fr 220px; grid-template-rows: auto 1fr 80px; gap: 8px; }
        .overlay * { pointer-events: auto; }

        .case { background: var(--panel); border: 2px solid #222; border-left: 5px solid var(--ktm); border-radius: 2px; padding: 8px; }

        /* [TIROIR-BARRE-HAUTE] */
        .header-center { grid-column: 2; display: flex; justify-content: center; align-items: flex-start; gap: 10px; }
        .search-wrap { display: flex; background: #111; border: 2px solid #444; border-radius: 4px; height: 38px; width: 220px; overflow: hidden; }
        #search-input { background: none; border: none; color: #fff; padding: 0 10px; flex-grow: 1; outline: none; font-size: 0.9rem; }
        .btn-go { background: var(--ktm); border: none; color: #fff; padding: 0 15px; font-weight: bold; cursor: pointer; }
        #btn-rec { background: #111; border: 2px solid #444; color: #fff; height: 38px; padding: 0 15px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .rec-active { border-color: red !important; color: red !important; box-shadow: 0 0 10px red; }

        /* [TIROIR-REGLAGES] - ACCÈS PRIORITAIRE */
        #settings-trigger { position: absolute; top: 12px; right: 12px; z-index: 1000; color: var(--ktm); font-size: 35px; cursor: pointer; font-weight: bold; }
        #settings-pane { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: var(--panel); z-index: 2000; transition: 0.3s; border-left: 3px solid var(--ktm); padding: 20px; box-sizing: border-box; }
        #settings-pane.open { right: 0; }

        /* [TIROIR-MOUCHARD] - VISIBLE */
        #mouchard { grid-column: 2; grid-row: 3; background: rgba(0,0,0,0.8); border: 1px solid #333; color: #0f0; font-family: monospace; font-size: 9px; padding: 5px; overflow-y: auto; pointer-events: auto; }

        /* [TIROIR-SENSORS] */
        .vitesse-box { text-align: right; }
        .vitesse-val { font-size: 3.5rem; font-weight: bold; line-height: 1; }
        .gauge-angle { width: 70px; height: 70px; border-radius: 50%; border: 4px solid #222; border-top-color: var(--ktm); display: inline-flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div id="settings-trigger" onclick="toggleSettings()">⋮</div>

    <div id="settings-pane">
        <h3 style="color:var(--ktm)">RÉGLAGES</h3>
        <label>RAYON : <span id="rad-ui">10</span> km</label>
        <input type="range" min="1" max="20" value="10" style="width:100%; accent-color:var(--ktm);" oninput="updateRad(this.value)">
        <button onclick="setTheme('jour')" style="width:100%; margin-bottom:5px;">JOUR</button>
        <button onclick="setTheme('nuit')" style="width:100%; margin-bottom:5px;">NUIT</button>
        <button onclick="activateSystem()" style="background:var(--ktm); color:white; width:100%; padding:10px; font-weight:bold; margin-top:20px;">DÉMARRER SYSTÈME</button>
    </div>

    <div class="overlay">
        <div style="grid-column: 1; display:flex; flex-direction:column; gap:10px;">
            <div class="case">
                <div style="color:var(--ktm); font-size:0.7rem; font-weight:bold;">NAVIGATION</div>
                <div id="nav-target" style="font-size:1.1rem; font-weight:bold;">PRÊT</div>
                <div id="nav-info" style="font-size:0.8rem; color:var(--ktm);">-- m</div>
            </div>
            <div class="case" style="flex-grow:1; overflow-y:auto;">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span style="color:var(--ktm); font-weight:bold;">STATIONS</span>
                    <span onclick="searchFuel()" style="text-decoration:underline; cursor:pointer; font-size:0.7rem;">SCAN</span>
                </div>
                <div id="fuel-list" style="font-size:0.8rem;"></div>
            </div>
        </div>

        <div class="header-center">
            <div class="search-wrap">
                <input type="text" id="search-input" placeholder="Destination...">
                <button class="btn-go" onclick="launchNav()">GO</button>
            </div>
            <button id="btn-rec" onclick="toggleREC()">REC</button>
        </div>

        <div id="mouchard">LOGS : Système en attente d'activation...</div>

        <div style="grid-column: 3; text-align: right; display:flex; flex-direction:column; align-items:flex-end; gap:10px;">
            <div class="case" style="width:150px;">
                <div class="vitesse-val" id="speed">0</div>
                <div style="color:var(--ktm); font-size:0.7rem;">KM/H</div>
                <div id="alt" style="font-size:0.9rem; border-top:1px solid #333; margin-top:5px; padding-top:3px;">Alt: -- m</div>
            </div>
            <div class="case" style="width:150px; text-align:center;">
                <div class="gauge-angle" id="gauge"><span id="angle" style="font-size:1.5rem; font-weight:bold;">0°</span></div>
                <div id="zero-btn" style="width:20px; height:4px; background:var(--ktm); margin:5px auto; cursor:pointer;" onclick="calibrate()"></div>
                <div style="font-size:0.6rem; color:var(--ktm);">MAX: <span id="max-angle">0</span>°</div>
            </div>
            <div class="case" style="width:150px;">
                <div id="temp" style="font-size:1.2rem; font-weight:bold;">--°C</div>
                <div id="wind" style="font-size:0.8rem; color:var(--ktm);">Vent: -- km/h</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map', { zoomControl: false }).setView([43.76, 1.99], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const mouchard = (msg) => {
            const el = document.getElementById('mouchard');
            el.innerHTML += `> [${new Date().toLocaleTimeString()}] ${msg}<br>`;
            el.scrollTop = el.scrollHeight;
        };

        let userPos = null, angleOffset = 0, maxA = 0, isREC = false, routeLine = null;

        /* [TIROIR-NAV] GUIDAGE DYNAMIQUE */
        async function launchNav(targetCoords) {
            if(!userPos) return mouchard("GPS requis pour naviguer.");
            const target = targetCoords || [43.92, 2.14]; // Albi par défaut pour test
            
            try {
                const res = await fetch(`${CONFIG_KTM.API_NAV}${userPos.lng},${userPos.lat};${target[1]},${target[0]}?overview=full&geometries=geojson`);
                const data = await res.json();
                if(routeLine) map.removeLayer(routeLine);
                routeLine = L.geoJSON(data.routes[0].geometry, {style: {color: '#00ccff', weight: 6}}).addTo(map);
                map.fitBounds(routeLine.getBounds());
                document.getElementById('nav-target').innerText = "GUIDAGE ACTIF";
                document.getElementById('nav-info').innerText = (data.routes[0].distance/1000).toFixed(1) + " KM";
                mouchard("Navigation lancée.");
            } catch(e) { mouchard("Erreur Navigation."); }
        }

        /* [TIROIR-SENSORS] */
        function activateSystem() {
            mouchard("Initialisation Capteurs...");
            navigator.geolocation.watchPosition(p => {
                userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                document.getElementById('speed').innerText = Math.round(p.coords.speed * 3.6) || 0;
                document.getElementById('alt').innerText = "Alt: " + (Math.round(p.coords.altitude) || 0) + " m";
                
                // EFFET "POINT FIXE" (La carte suit le pilote)
                if(CONFIG_KTM.SUIVI_ACTIF) {
                    map.setView([userPos.lat, userPos.lng], 16);
                }
            }, null, {enableHighAccuracy: true});

            if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(r => {
                    if(r==='granted') window.addEventListener('deviceorientation', handleAngle);
                });
            } else { window.addEventListener('deviceorientation', handleAngle); }
            toggleSettings();
        }

        function handleAngle(e) {
            let val = Math.abs(e.beta - angleOffset); 
            val = Math.min(60, Math.round(val));
            document.getElementById('angle').innerText = val + "°";
            if(val > maxA) { maxA = val; document.getElementById('max-angle').innerText = maxA; }
            document.getElementById('gauge').style.transform = `rotate(${e.beta > angleOffset ? val : -val}deg)`;
        }

        /* [TIROIR-FUEL] */
        async function searchFuel() {
            if(!userPos) return mouchard("Scan impossible sans GPS.");
            mouchard(`Scan stations (${CONFIG_KTM.RAYON}km)...`);
            const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?where=within_distance(geom%2C%20geom'POINT(${userPos.lng}%20${userPos.lat})'%2C%20${CONFIG_KTM.RAYON}km)&limit=15`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                document.getElementById('fuel-list').innerHTML = data.results.map(s => `
                    <div style="border-bottom:1px solid #333; padding:5px 0; display:flex; justify-content:space-between; align-items:center;">
                        <div><b>${s.ville}</b><br>${s.gazole_prix ? s.gazole_prix+'€' : '<span style="color:var(--ktm)">N.C</span>'}</div>
                        <button onclick="launchNav([${s.geom.lat}, ${s.geom.lon}])" style="background:var(--ktm); border:none; color:white; font-size:0.6rem; padding:4px 8px;">GO</button>
                    </div>
                `).join('');
                mouchard(`${data.results.length} stations trouvées.`);
            } catch(e) { mouchard("Erreur API Fuel."); }
        }

        /* [UI] */
        function toggleSettings() { document.getElementById('settings-pane').classList.toggle('open'); }
        function updateRad(v) { document.getElementById('rad-ui').innerText = v; CONFIG_KTM.RAYON = v; }
        function toggleREC() {
            isREC = !isREC;
            document.getElementById('btn-rec').className = isREC ? 'rec-active' : '';
            if(isREC) alert("C'est parti !"); else confirm("Enregistrer le trajet ?");
        }
        function calibrate() { angleOffset = 0; mouchard("Angle Reset."); }
    </script>
</body>
</html>
