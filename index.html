<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM V80 - CRYSTAL COCKPIT</title>
    
    <script>
        /* --- PANNEAU DE CONTRÔLE ENERGY CONCEPT (BRICE CARDONA) --- */
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            SAFE_GREEN: '#2ecc71',
            DANGER_RED: '#ff4757',
            STROKE_WIDTH: 3,
            FONT_MAIN: '"Barlow Condensed", sans-serif',
            FONT_TECH: '"Orbitron", sans-serif'
        };
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

    <style>
        /* FOND NOIR PUR : Indispensable pour la transparence système */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: white; overflow: hidden; font-family: 'Orbitron', sans-serif; }

        /* STRUCTURE GLOBALE (L'ESPRIT MASQUE DE PLONGÉE) */
        #hud-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 20px; box-sizing: border-box;
            border: 10px solid rgba(255,102,0,0.2); /* Bordure visière légère */
        }

        /* COMPTEUR CENTRAL (AUDI VIRTUAL COCKPIT STYLE) */
        #central-gauge {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; width: 100%;
        }
        #speed-val { font-family: 'Barlow Condensed'; font-size: 15rem; font-weight: 900; line-height: 0.8; text-shadow: 0 0 30px #FF6600; }
        #speed-unit { font-size: 1.5rem; color: #FF6600; letter-spacing: 5px; font-weight: 900; }

        /* PANNEAUX LATERAUX (INSTRUMENTS DE VOL) */
        .side-panel { display: flex; flex-direction: column; justify-content: center; }
        
        #left-data { position: absolute; left: 40px; bottom: 60px; text-align: left; }
        #right-data { position: absolute; right: 40px; bottom: 60px; text-align: right; }

        .label { font-size: 0.8rem; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .value { font-family: 'Barlow Condensed'; font-size: 5rem; font-weight: 900; line-height: 1; }

        /* LIGNE D'HORIZON (AVIONIQUE) */
        #horizon-line {
            position: absolute; top: 50%; left: 50%; width: 60%; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            transform: translate(-50%, -50%); z-index: -1;
        }

        /* BOUTON DE CALIBRAGE (DISCRET) */
        #btn-calibrate {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255,102,0,0.1); border: 1px solid #FF6600;
            color: #FF6600; padding: 10px; font-size: 0.7rem; border-radius: 4px; cursor: pointer;
        }

        /* ALERTES D'ANGLE */
        .lean-indicator { width: 100px; height: 4px; background: #333; margin-top: 10px; position: relative; }
        #lean-bar { height: 100%; width: 0%; background: #FF6600; transition: width 0.1s; }
    </style>
</head>
<body>

    <div id="hud-container">
        <div id="horizon-line"></div>

        <button id="btn-calibrate" onclick="calibrate()">RESET ZERO</button>

        <div id="central-gauge">
            <div id="speed-val">000</div>
            <div id="speed-unit">KM/H</div>
        </div>

        <div id="left-data" class="side-panel">
            <div class="label">Altitude</div>
            <div id="alt-val" class="value">---</div>
            <div style="font-size: 1.5rem; color: #888;">METRES</div>
        </div>

        <div id="right-data" class="side-panel">
            <div class="label">Lean Angle</div>
            <div id="lean-val" class="value">0°</div>
            <div class="lean-indicator"><div id="lean-bar"></div></div>
        </div>
    </div>

    <script>
        let offset = 0, lastRaw = 0, smoothedLean = 0;

        function updateHUD() {
            // GPS : Vitesse et Altitude
            navigator.geolocation.watchPosition(u => {
                const s = u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0;
                document.getElementById('speed-val').innerText = s.toString().padStart(3, '0');
                if (u.coords.altitude) {
                    document.getElementById('alt-val').innerText = Math.round(u.coords.altitude);
                }
            }, null, { enableHighAccuracy: true });

            // GYRO : Inclinaison
            window.addEventListener('deviceorientation', (e) => {
                let screenAngle = window.orientation || 0;
                let raw = (Math.abs(screenAngle) === 90) ? e.beta : e.gamma;
                if (screenAngle === -90) raw = -raw;
                
                lastRaw = raw;
                let currentLean = raw - offset;
                smoothedLean = (smoothedLean * 0.8) + (currentLean * 0.2);
                let angle = Math.abs(Math.round(smoothedLean));

                const leanTxt = document.getElementById('lean-val');
                const leanBar = document.getElementById('lean-bar');
                const horizon = document.getElementById('horizon-line');

                leanTxt.innerText = angle + "°";
                leanBar.style.width = Math.min(angle * 2, 100) + "%";
                horizon.style.transform = `translate(-50%, -50%) rotate(${smoothedLean}deg)`;

                // Couleurs dynamiques
                if (angle < 20) { leanTxt.style.color = CONFIG.SAFE_GREEN; leanBar.style.background = CONFIG.SAFE_GREEN; }
                else if (angle < 42) { leanTxt.style.color = CONFIG.KTM_ORANGE; leanBar.style.background = CONFIG.KTM_ORANGE; }
                else { leanTxt.style.color = CONFIG.DANGER_RED; leanBar.style.background = CONFIG.DANGER_RED; }
            });
        }

        function calibrate() { offset = lastRaw; }

        window.onload = updateHUD;
    </script>
</body>
</html>
