<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM V11 - Energy Concept</title>
    
    <style>
        :root { --ktm: #ff6600; --bg: #000; --txt: #fff; --ok: #2ecc71; --err: #e74c3c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; }
        
        body { 
            background: var(--bg); color: var(--txt); 
            height: 100vh; width: 100vw; 
            overflow: hidden; display: flex; flex-direction: column;
            border-left: 6px solid var(--ktm);
        }

        /* --- DASHBOARD ULTRA-PLAT (Format Ruban) --- */
        .dash-ribbon { 
            display: grid; 
            grid-template-columns: 1.2fr 1fr 0.8fr; 
            height: 85px; /* Hauteur fixe réduite */
            background: linear-gradient(180deg, #151515, #000);
            border-bottom: 2px solid var(--ktm);
            align-items: center;
            flex-shrink: 0;
            padding: 0 5px;
        }

        /* Vitesse (Gauche) */
        .v-zone { text-align: center; border-right: 1px solid #333; }
        .v-val { font-size: 3.5rem; line-height: 1; font-style: italic; }
        .v-u { font-size: 0.7rem; color: var(--ktm); display: block; margin-top: -5px; }

        /* Angle (Centre) */
        .a-zone { text-align: center; border-right: 1px solid #333; height: 100%; display: flex; flex-direction: column; justify-content: center; }
        .a-val { font-size: 1.8rem; line-height: 1; }
        .a-track { 
            width: 80%; height: 12px; background: #222; margin: 5px auto 0; 
            position: relative; border-radius: 2px; overflow: hidden;
        }
        #a-bar-L { position: absolute; right: 50%; height: 100%; width: 0%; background: var(--ktm); }
        #a-bar-R { position: absolute; left: 50%; height: 100%; width: 0%; background: var(--ktm); }

        /* Infos / Météo (Droite) */
        .i-zone { padding-left: 5px; font-size: 0.75rem; line-height: 1.3; }
        .i-item b { color: var(--ktm); }
        .leds { display: flex; gap: 5px; margin-top: 5px; }
        .led { width: 7px; height: 7px; border-radius: 50%; background: var(--err); }
        .led.active { background: var(--ok); box-shadow: 0 0 5px var(--ok); }

        /* --- ZONE DE RECHERCHE --- */
        .search-strip { 
            display: flex; gap: 4px; padding: 6px; 
            background: #080808; border-bottom: 1px solid #222;
        }
        select, .btn-scan { background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .btn-scan { background: var(--ktm); color: #000; flex: 1.5; border: none; }

        /* --- LISTE STATIONS (MAXIMISÉE) --- */
        .results-scroll { 
            flex: 1; 
            overflow-y: auto; 
            background: #000; 
            padding: 6px;
            -webkit-overflow-scrolling: touch;
        }
        .card { 
            background: #111; margin-bottom: 8px; padding: 12px; 
            border-radius: 6px; border-left: 5px solid var(--ktm);
            display: flex; flex-direction: column; gap: 5px;
        }
        .card-top { display: flex; justify-content: space-between; align-items: center; }
        .st-name { font-size: 0.85rem; font-weight: bold; color: #fff; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 65%; }
        .st-price { color: var(--ktm); font-size: 1.4rem; font-weight: 900; }
        .card-bot { display: flex; justify-content: space-between; align-items: center; }
        .st-dist { font-size: 0.8rem; color: #777; }
        .btn-go { background: #222; color: #fff; padding: 8px 15px; border-radius: 4px; text-decoration: none; font-size: 0.75rem; border: 1px solid var(--ktm); font-weight: bold; }

        /* REC Floating Button */
        #btn-rec { position: fixed; bottom: 15px; right: 15px; width: 50px; height: 50px; border-radius: 50%; background: #1a1a1a; border: 2px solid #444; color: #fff; font-size: 0.6rem; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        #btn-rec.on { background: #900; border-color: #f00; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
    </style>
</head>
<body onclick="MOTO.init()">

    <div class="dash-ribbon">
        <div class="v-zone">
            <div id="speed" class="v-val">0</div>
            <span class="v-u">KM/H</span>
        </div>

        <div class="a-zone">
            <div id="a-txt" class="a-val">0°</div>
            <div class="a-track">
                <div id="a-bar-L"></div>
                <div id="a-bar-R"></div>
            </div>
            <div id="a-max" style="font-size: 0.5rem; color: #555; margin-top: 2px;">MAX: 0°</div>
        </div>

        <div class="i-zone">
            <div><b id="m-t">--°</b> | <b id="alt">--m</b></div>
            <div id="m-w">💨 --k/h</div>
            <div class="leds">
                <div id="l-gps" class="led"></div>
                <div id="l-gyro" class="led"></div>
            </div>
        </div>
    </div>

    <div class="search-strip">
        <select id="fuel"><option value="Gazole">GAZ</option><option value="SP98">98</option><option value="SP95">95</option><option value="E10">E10</option><option value="E85">85</option></select>
        <select id="sort"><option value="price">€</option><option value="dist">KM</option></select>
        <button class="btn-scan" onclick="event.stopPropagation(); MOTO.scan()">SCANNER</button>
    </div>

    <div class="results-scroll" id="results">
        <div style="text-align:center; padding:30px; color:#444; font-size:0.8rem;">RECHERCHE STATIONS ESSENCE...</div>
    </div>

    <div id="btn-rec" onclick="event.stopPropagation(); REC.toggle()">REC</div>

    <script>
        let userPos = { lat: 0, lon: 0 };
        let track = [], isRecording = false, maxLean = 0;

        const MOTO = {
            init() {
                navigator.geolocation.watchPosition(p => {
                    userPos = { lat: p.coords.latitude, lon: p.coords.longitude };
                    document.getElementById('speed').innerText = Math.round((p.coords.speed || 0) * 3.6);
                    document.getElementById('alt').innerText = (p.coords.altitude ? Math.round(p.coords.altitude) : "--") + "m";
                    document.getElementById('l-gps').classList.add('active');
                    if(isRecording) track.push({ lat: userPos.lat, lon: userPos.lon });
                    this.updateWeather();
                }, null, { enableHighAccuracy: true });
            },

            async updateWeather() {
                try {
                    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${userPos.lat}&longitude=${userPos.lon}&current_weather=true`);
                    const d = await r.json();
                    document.getElementById('m-t').innerText = Math.round(d.current_weather.temperature) + "°";
                    document.getElementById('m-w').innerText = "💨 " + Math.round(d.current_weather.windspeed) + "k/h";
                } catch(e) {}
            },

            async scan() {
                if(!userPos.lat) return;
                const fuel = document.getElementById('fuel').value;
                const resZone = document.getElementById('results');
                resZone.innerHTML = "<div style='color:var(--ktm); text-align:center; padding:20px;'>SCAN...</div>";
                try {
                    const r = await fetch(`https://data.economie.gouv.fr/api/records/1.0/search/?dataset=prix-des-carburants-en-france-flux-instantane-v2&geofilter.distance=${userPos.lat},${userPos.lon},20000&rows=40`);
                    const data = await r.json();
                    let st = [];
                    data.records.forEach(i => {
                        const prix = this.extract(i.fields, fuel);
                        if(prix) st.push({ nom: i.fields.nom || i.fields.ville, prix: prix, dist: this.dist(userPos.lat, userPos.lon, i.fields.geom[0], i.fields.geom[1]), lat: i.fields.geom[0], lon: i.fields.geom[1] });
                    });
                    st.sort((a,b) => document.getElementById('sort').value === 'price' ? a.prix-b.prix : a.dist-b.dist);
                    resZone.innerHTML = st.map(s => `
                        <div class="card">
                            <div class="card-top"><span class="st-name">${s.nom}</span><span class="st-price">${s.prix.toFixed(3)}€</span></div>
                            <div class="card-bot"><span class="st-dist">${s.dist.toFixed(1)} KM</span><a class="btn-go" href="waze://?ll=${s.lat},${s.lon}&navigate=yes">GO</a></div>
                        </div>`).join('');
                } catch(e) {}
            },

            extract(f, t) {
                const map = {"Gazole":"gazole_prix","SP98":"sp98_prix","SP95":"sp95_prix","E10":"e10_prix","E85":"e85_prix"};
                return f[map[t]] ? parseFloat(f[map[t]]) : null;
            },

            dist(la1, lo1, la2, lo2) {
                const p = 0.01745;
                const a = 0.5 - Math.cos((la2-la1)*p)/2 + Math.cos(la1*p)*Math.cos(la2*p)*(1-Math.cos((lo2-lo1)*p))/2;
                return 12742 * Math.asin(Math.sqrt(a));
            }
        };

        const REC = {
            toggle() {
                isRecording = !isRecording;
                const btn = document.getElementById('btn-rec');
                btn.classList.toggle('on', isRecording);
                btn.innerText = isRecording ? "STOP" : "REC";
                if(!isRecording && track.length > 5) {
                    const gpx = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1"><trk><trkseg>${track.map(p => `<trkpt lat="${p.lat}" lon="${p.lon}"></trkpt>`).join('')}</trkseg></trk></gpx>`;
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(new Blob([gpx], {type:'application/gpx+xml'}));
                    a.download = `Balade_${Date.now()}.gpx`; a.click();
                }
            }
        };

        window.addEventListener("deviceorientation", (e) => {
            if(e.beta === null) return;
            document.getElementById('l-gyro').classList.add('active');
            let lean = Math.round(e.beta || 0) * -1; // Orientation USB GAUCHE
            let absLean = Math.abs(lean);
            document.getElementById('a-txt').innerText = absLean + "°";
            const barL = document.getElementById('a-bar-L');
            const barR = document.getElementById('a-bar-R');
            if (lean < 0) { barL.style.width = Math.min(50, absLean * 1.5) + "%"; barR.style.width = "0%"; }
            else { barR.style.width = Math.min(50, absLean * 1.5) + "%"; barL.style.width = "0%"; }
            if(absLean > maxLean) { maxLean = absLean; document.getElementById('a-max').innerText = "MAX: " + maxLean + "°"; }
        });
    </script>
</body>
</html>
