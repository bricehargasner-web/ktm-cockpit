<!DOCTYPE html>
<html lang="fr">
<!-- 1. CONFIGURATION (LIGNES 1-20) -->
<script>
    const CONFIG = {
        carburantCible: 'SP98',          
        rayonRechercheKm: 20,            
        axeInclinaison: 'beta',          
        angleSmoothing: 0.1,             
        deltaMaxAngle: 15,               
        limiteAngle: 85,                 
        urlMeteoBase: 'https://www.meteoetradar.com/carte-meteo', 
        refreshRate: 300,                
        apiStations: 'https://data.economie.gouv.fr/api/records/1.0/search/?dataset=prix-des-carburants-en-france-flux-instantane-v2'
    };
</script>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM Dash V17.4 - Energy Concept</title>
    <style>
        :root {
            --bg-color: #000; --panel-bg: #111; --sub-bg: #080808;
            --ktm-orange: #FF6600; --text-main: #fff; --text-dim: #888;
        }
        body.day-mode {
            --bg-color: #ffffff; --panel-bg: #f2f2f2; --sub-bg: #e6e6e6; --text-main: #000000; --text-dim: #444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-main); padding: 5px; transition: 0.3s; overflow-y: auto; min-height: 100vh; }
        
        .impact { font-family: 'Impact', sans-serif; letter-spacing: 1px; }
        #dashboard { display: flex; flex-direction: column; gap: 4px; }
        .panel { background-color: var(--panel-bg); border-radius: 2px; padding: 6px 10px; position: relative; border-top: 2px solid #333; }
        .accent-orange { border-top-color: var(--ktm-orange); }
        .title { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: bold; }
        
        /* ALIGNEMENT STRICT */
        .val-container { display: flex; justify-content: center; align-items: center; width: 100%; height: 60px; }
        .val-main { font-size: 4rem; text-align: center; width: 130px; line-height: 1; margin: 0; padding: 0; }
        .val-unit { font-size: 1.1rem; color: var(--ktm-orange); width: 60px; text-align: left; margin-left: 5px; }
        
        .val-sub { display: flex; justify-content: space-between; font-size: 0.75rem; background: var(--sub-bg); padding: 4px; margin-top: 4px; border: 1px solid #333; }
        button { background: #222; color: #fff; border: 1px solid #444; padding: 8px; cursor: pointer; text-transform: uppercase; font-weight: bold; font-size: 0.7rem; }
        
        .btn-reset { position: absolute; top: 6px; right: 8px; border-color: var(--ktm-orange); color: var(--ktm-orange); background: transparent; font-size: 0.55rem; padding: 2px 5px; }
        
        .gpx-large { font-size: 1.6rem; font-weight: bold; color: var(--ktm-orange); line-height: 1; }
        
        .station-item { background: #0a0a0a; border-left: 3px solid var(--ktm-orange); padding: 8px; margin-bottom: 6px; }
        .st-name { font-weight: 900; font-size: 0.9rem; color: var(--ktm-orange); text-transform: uppercase; }
        
        #settings-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; flex-direction: column; overflow-y: auto; }
        .rec-active { background: #ff0000 !important; animation: blink 1s infinite; color: #fff !important; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>

<body>
    <div id="dashboard">
        <!-- VITESSE -->
        <div class="panel accent-orange">
            <button class="btn-reset" onclick="UI.resetSpeed()">RESET</button>
            <div class="title">Vitesse GPS</div>
            <div class="val-container">
                <span id="speed-val" class="val-main impact">0</span>
                <span class="val-unit impact">KM/H</span>
            </div>
            <div class="val-sub">
                <span>MOY: <strong id="speed-moy">0</strong></span>
                <span>MAX: <strong id="speed-max">0</strong></span>
            </div>
        </div>

        <!-- ANGLE -->
        <div class="panel">
            <button class="btn-reset" onclick="CORE.calibrateGyro()">CALIBRER</button>
            <div class="title">Inclinaison</div>
            <div class="val-container">
                <span id="angle-val" class="val-main impact">0</span>
                <span class="val-unit impact">°</span>
            </div>
            <div class="val-sub">
                <span>MOY: <strong id="angle-moy">0</strong></span>
                <span>MAX: <strong id="angle-max">0</strong></span>
            </div>
        </div>

        <!-- GPX & METEO -->
        <div class="panel" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; padding: 6px 10px;">
            <div onclick="CORE.openDynamicWeather()" style="cursor:pointer">
                <div class="title">Météo Radar</div>
                <div style="font-size:1.1rem; font-weight:bold;"><span id="weather-temp">--</span>°C</div>
                <div id="weather-wind" style="font-size:0.65rem; color:var(--text-dim)">-- km/h</div>
            </div>
            <div style="text-align:right">
                <div class="title">Distance GPX</div>
                <div id="gpx-dist" class="gpx-large">0.0 <span style="font-size:0.7rem">KM</span></div>
                <button id="btn-rec" onclick="CORE.toggleRecording()" style="font-size:0.65rem; width:100%; height: 24px; margin-top: 4px;">REC</button>
            </div>
        </div>

        <!-- STATIONS -->
        <div class="panel">
            <div class="title">Stations <span id="ui-fuel"></span></div>
            <button onclick="UI.openSettings()" style="width:100%; margin-top:8px; background:#333; font-size:0.65rem; border:1px solid #555;">⚙️ RÉGLAGES & DIAG</button>
            <button onclick="CORE.fetchStations()" style="width:100%; margin: 6px 0; border-color: var(--ktm-orange); font-size:0.85rem;" class="impact">SCANNER CARBURANT</button>
            <div id="stations-list"></div>
        </div>
    </div>

    <!-- MODAL RÉGLAGES -->
    <div id="settings-modal">
        <button onclick="UI.closeSettings()" style="margin-bottom:20px; padding:15px; background:var(--ktm-orange); color:#000; border:none; font-weight:bold;">RETOUR</button>
        <div style="background:#111; padding:15px; border:1px solid var(--ktm-orange); margin-bottom:15px;">
            <button onclick="UI.manualToggleTheme()" style="width:100%; margin-bottom:10px; background:#444;">FORCER MODE JOUR/NUIT</button>
            <label class="title">Carburant</label>
            <select id="cfg-fuel" onchange="UI.saveSettings()" style="width:100%; padding:10px; background:#222; color:#fff; border:1px solid #444; margin-top:5px;">
                <option value="SP98">SP98</option><option value="SP95">SP95</option>
                <option value="E10">E10</option><option value="Gazole">Gazole</option><option value="E85">E85</option>
            </select>
        </div>
        <div id="diag-light" style="color:#0f0; font-family:monospace; font-size:0.7rem;"></div>
        <div id="diag-gps" style="color:#0f0; font-family:monospace; font-size:0.7rem;"></div>
    </div>

    <script>
        const STATE = {
            gps: { lat: null, lon: null, speed: 0, max: 0, sum: 0, count: 0 },
            angle: { current: 0, smoothed: 0, max: 0, sum: 0, count: 0, offset: 0, lastValid: 0 },
            gpx: { active: false, points: [], distance: 0, prev: null },
            stations: []
        };

        const CORE = {
            processAngle: (raw) => {
                STATE.angle.smoothed = (CONFIG.angleSmoothing * raw) + ((1 - CONFIG.angleSmoothing) * STATE.angle.smoothed);
                let val = Math.abs(STATE.angle.smoothed - STATE.angle.offset);
                if (Math.abs(val - STATE.angle.lastValid) > CONFIG.deltaMaxAngle) {
                    val = STATE.angle.lastValid + (Math.sign(val - STATE.angle.lastValid) * 2);
                }
                STATE.angle.lastValid = val;
                return Math.min(Math.round(val), CONFIG.limiteAngle);
            },

            calibrateGyro: () => {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().then(s => { if(s==='granted') CORE.bind(); });
                } else { CORE.bind(); }
                STATE.angle.offset = STATE.angle.smoothed;
                STATE.angle.max = 0; STATE.angle.sum = 0; STATE.angle.count = 0;
            },

            bind: () => { window.addEventListener('deviceorientation', (e) => {
                let raw = (CONFIG.axeInclinaison === 'beta') ? e.beta : e.gamma;
                STATE.angle.current = CORE.processAngle(raw);
                if(STATE.angle.current > 3) {
                    if(STATE.angle.current > STATE.angle.max) STATE.angle.max = STATE.angle.current;
                    STATE.angle.sum += STATE.angle.current; STATE.angle.count++;
                }
            });},

            toggleRecording: () => {
                STATE.gpx.active = !STATE.gpx.active;
                const btn = document.getElementById('btn-rec');
                btn.classList.toggle('rec-active', STATE.gpx.active);
                btn.innerText = STATE.gpx.active ? "STOP" : "REC";
                if(!STATE.gpx.active && STATE.gpx.points.length > 0) CORE.saveGPX();
            },

            saveGPX: () => {
                let xml = `<?xml version="1.1"?><gpx creator="KTM_Brice"><trk><trkseg>`;
                STATE.gpx.points.forEach(p => xml += `<trkpt lat="${p.lat}" lon="${p.lon}"><ele>${p.ele}</ele><time>${p.time}</time></trkpt>`);
                xml += `</trkseg></trk></gpx>`;
                const blob = new Blob([xml], {type: 'application/gpx+xml'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `Trace_KTM_${new Date().getTime()}.gpx`;
                a.click();
            },

            fetchStations: () => {
                if(!STATE.gps.lat) return;
                const url = `${CONFIG.apiStations}&geofilter.distance=${STATE.gps.lat},${STATE.gps.lon},${CONFIG.rayonRechercheKm * 1000}`;
                fetch(url).then(r => r.json()).then(data => {
                    const fuelKey = CONFIG.carburantCible.toLowerCase() + '_prix';
                    STATE.stations = data.records.map(r => ({
                        nom: r.fields.nom || r.fields.ville, adresse: r.fields.adresse,
                        prix: r.fields[fuelKey], lat: r.geometry.coordinates[1], lon: r.geometry.coordinates[0],
                        dist: UI.calcDist(STATE.gps.lat, STATE.gps.lon, r.geometry.coordinates[1], r.geometry.coordinates[0])
                    }));
                    UI.renderStations();
                });
            },

            openDynamicWeather: () => {
                const url = STATE.gps.lat ? `${CONFIG.urlMeteoBase}?lat=${STATE.gps.lat}&lon=${STATE.gps.lon}` : CONFIG.urlMeteoBase;
                window.open(url, '_blank');
            }
        };

        const UI = {
            calcDist: (l1, n1, l2, n2) => {
                const R = 6371;
                const dLat = (l2-l1)*Math.PI/180; const dLon = (n2-n1)*Math.PI/180;
                const a = Math.sin(dLat/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dLon/2)**2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            },

            update: () => {
                document.getElementById('speed-val').innerText = STATE.gps.speed;
                document.getElementById('speed-max').innerText = STATE.gps.max;
                document.getElementById('speed-moy').innerText = STATE.gps.count > 0 ? Math.round(STATE.gps.sum / STATE.gps.count) : 0;
                document.getElementById('angle-val').innerText = STATE.angle.current;
                document.getElementById('angle-max').innerText = STATE.angle.max;
                document.getElementById('angle-moy').innerText = STATE.angle.count > 0 ? Math.round(STATE.angle.sum / STATE.angle.count) : 0;
                document.getElementById('gpx-dist').innerHTML = `${STATE.gpx.distance.toFixed(1)} <span style="font-size:0.7rem">KM</span>`;
            },

            renderStations: () => {
                const list = document.getElementById('stations-list');
                list.innerHTML = STATE.stations.sort((a,b)=>(a.prix||9)-(b.prix||9)).map(s => `
                    <div class="station-item">
                        <div class="st-name">${s.nom} - ${s.prix ? s.prix.toFixed(3)+'€' : 'N.C'}</div>
                        <div style="font-size:0.6rem; color:#888;">${s.dist.toFixed(1)} km - ${s.adresse}</div>
                        <button onclick="window.location.href='waze://?ll=${s.lat},${s.lon}&navigate=yes'" style="padding:4px; margin-top:5px; font-size:0.6rem;">WAZE</button>
                    </div>
                `).join('');
            },

            openSettings: () => { document.getElementById('settings-modal').style.display = 'flex'; },
            closeSettings: () => { document.getElementById('settings-modal').style.display = 'none'; },
            saveSettings: () => { CONFIG.carburantCible = document.getElementById('cfg-fuel').value; },
            resetSpeed: () => { STATE.gps.max = 0; STATE.gps.sum = 0; STATE.gps.count = 0; UI.update(); },
            
            // LOGIQUE JOUR/NUIT RENFORCÉE
            setTheme: (isDay, source) => {
                document.body.classList.toggle('day-mode', isDay);
                document.getElementById('diag-light').innerText = `Thème: ${isDay?'JOUR':'NUIT'} (${source})`;
            },
            
            manualToggleTheme: () => {
                const isCurrentlyDay = document.body.classList.contains('day-mode');
                UI.setTheme(!isCurrentlyDay, "Manuel");
            },

            detectTheme: () => {
                const hour = new Date().getHours();
                const isDayTime = (hour > 7 && hour < 20); // Mode Jour entre 7h et 20h[cite: 1]
                UI.setTheme(isDayTime, "Horaire");

                if ('AmbientLightSensor' in window) {
                    try {
                        const sensor = new AmbientLightSensor();
                        sensor.onreading = () => UI.setTheme(sensor.illuminance > 60, "Lux");
                        sensor.start();
                    } catch (e) {}
                }
            }
        };

        UI.detectTheme();

        // GPS
        navigator.geolocation.watchPosition(pos => {
            STATE.gps.lat = pos.coords.latitude; STATE.gps.lon = pos.coords.longitude;
            let kmh = Math.round((pos.coords.speed || 0) * 3.6);
            STATE.gps.speed = kmh;
            if(kmh > STATE.gps.max) STATE.gps.max = kmh;
            if(kmh > 2) { STATE.gps.sum += kmh; STATE.gps.count++; }
            document.getElementById('diag-gps').innerText = `GPS OK: ${STATE.gps.lat.toFixed(3)}`;
            
            if(STATE.gpx.active) {
                const pt = { lat: STATE.gps.lat, lon: STATE.gps.lon, ele: pos.coords.altitude || 0, time: new Date().toISOString() };
                STATE.gpx.points.push(pt);
                if(STATE.gpx.prev) STATE.gpx.distance += UI.calcDist(STATE.gpx.prev.lat, STATE.gpx.prev.lon, pt.lat, pt.lon);
                STATE.gpx.prev = pt;
            }
            UI.update();
        }, null, { enableHighAccuracy: true });

        setInterval(UI.update, CONFIG.refreshRate);
    </script>
</body>
</html>
