<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Energy Concept</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- PANNEAU DE CONTRÔLE (RÉGLAGES GLOBAUX) --- */
        :root {
            --primary-orange: #FF6B00;
            --bg-dark: #000000;
            --card-bg: #111111;
            --text-gray: #A0A0A0;
            --max-speed-limit: 130;
            --gauge-max-width: 110px;
            --transition-speed: 0.4s;
        }

        body { background-color: var(--bg-dark); color: white; font-family: sans-serif; overflow: hidden; margin: 0; height: 100dvh; }
        
        .dashboard-container { display: flex; flex-direction: column; height: 100%; max-width: 100%; }
        
        .gauge-wrapper { width: 100%; max-width: var(--gauge-max-width); position: relative; margin: 0 auto; }
        .gauge-svg { width: 100%; height: auto; display: block; overflow: visible; }
        .gauge-bg { fill: none; stroke: #333; stroke-width: 8; stroke-linecap: round; }
        .gauge-fill { fill: none; stroke: #ffffff; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset var(--transition-speed) ease-out, stroke var(--transition-speed) ease; }
        
        .speed-value { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); font-size: 2rem; font-weight: bold; line-height: 1; }
        
        .station-btn { background-color: #222; color: #fff; padding: 4px 8px; font-size: 10px; border-radius: 4px; border: 1px solid #444; transition: background 0.2s; cursor: pointer; text-decoration: none; display: inline-block;}
        .station-btn:hover { background-color: var(--primary-orange); border-color: var(--primary-orange); }
        
        select { outline: none; appearance: none; text-align: center; }
        
        /* Animation pour le bouton scan */
        .scan-flash { background-color: #ffffff !important; color: var(--primary-orange) !important; }
        #station-list { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="p-1">

    <div class="dashboard-container gap-1">
        
        <div class="bg-[#111] border-l-4 border-[#FF6B00] p-2 flex flex-row items-center justify-between shrink-0">
            <div class="flex flex-col items-center w-1/2 relative">
                <div class="flex justify-between w-full px-1 mb-1 items-center">
                    <span class="text-[9px] text-gray-400 font-mono"><span id="valAngle">0</span>°</span>
                    <button onclick="resetStats()" class="bg-gray-800 text-gray-300 border border-gray-600 rounded px-1.5 py-0.5 text-[8px] uppercase cursor-pointer">
                        Zéro
                    </button>
                </div>
                <div class="gauge-wrapper">
                    <svg class="gauge-svg" viewBox="0 0 100 65">
                        <path class="gauge-bg" d="M 10 50 A 40 40 0 0 1 90 50" />
                        <path id="gaugePath" class="gauge-fill" d="M 10 50 A 40 40 0 0 1 90 50" stroke-dasharray="125.6" stroke-dashoffset="125.6" />
                    </svg>
                    <div class="speed-value" id="valVitesse">0</div>
                </div>
            </div>

            <div class="w-1/2 pl-2 text-[10px] space-y-1 uppercase tracking-tighter">
                <div class="flex justify-between"><span class="text-gray-500">Alt:</span><span id="alt">207m</span></div>
                <div class="flex justify-between"><span class="text-gray-500">Moy:</span><span id="avg_speed">0</span></div>
                <div class="flex justify-between border-b border-gray-800 pb-1"><span class="text-[#FF6B00]">Max:</span><span id="max_speed" class="font-bold text-[#FF6B00]">0</span></div>
                <div class="flex justify-between pt-1"><span class="text-gray-500">Temp:</span><span>21°</span></div>
                <div class="flex justify-between"><span class="text-gray-500">Vent:</span><span>5k/h</span></div>
            </div>
        </div>

        <div class="flex items-center justify-between bg-[#111] p-1.5 gap-1.5 shrink-0 rounded-sm">
            <div class="flex gap-1">
                <select class="bg-[#222] text-gray-300 border border-gray-700 rounded text-[10px] py-1.5 px-2 cursor-pointer">
                    <option>10k</option>
                    <option>20k</option>
                    <option>50k</option>
                </select>
                <select class="bg-[#222] text-gray-300 border border-gray-700 rounded text-[10px] py-1.5 px-2 cursor-pointer">
                    <option>98</option>
                    <option>95</option>
                    <option>E10</option>
                    <option>GAZ</option>
                </select>
            </div>
            
            <button id="btnScan" onclick="triggerScan()" class="bg-[#FF6B00] text-white rounded p-1.5 flex-1 flex justify-center items-center transition-colors cursor-pointer relative z-10">
                <svg class="pointer-events-none" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 12v8"></path>
                    <path d="m8 20 8 0"></path>
                    <path d="M16 9a4 4 0 0 0-8 0"></path>
                    <path d="M19 6a7 7 0 0 0-14 0"></path>
                </svg>
            </button>

            <button class="bg-[#222] border border-gray-700 rounded p-2 flex justify-center items-center cursor-pointer hover:bg-gray-800 transition-colors">
                <div class="w-2.5 h-2.5 bg-blue-400 rounded-full shadow-[0_0_5px_rgba(96,165,250,0.8)] pointer-events-none"></div>
            </button>
        </div>

        <div id="station-list" class="flex-1 overflow-y-auto min-h-0 space-y-1 pb-4">
            </div>

    </div>

    <script>
        /* --- LOGIQUE ET DONNÉES --- */
        let maxSpeed = 0;
        let speedSum = 0;
        let speedCount = 0;

        function resetStats() {
            maxSpeed = 0;
            speedSum = 0;
            speedCount = 0;
            document.getElementById('max_speed').innerText = "0";
            document.getElementById('avg_speed').innerText = "0";
        }

        const mockStations = [
            { name: "TotalEnergies", address: "Av. de Provence, Graulhet", price: "1.890", dist: "0.5 KM" },
            { name: "Intermarché", address: "Rte de Toulouse, Graulhet", price: "1.850", dist: "2.4 KM" },
            { name: "Esso", address: "Bd de l'Europe, Graulhet", price: "1.910", dist: "4.1 KM" },
            { name: "Leclerc", address: "Zone de la Métairie, Graulhet", price: "1.840", dist: "5.2 KM" }
        ];

        // Action de scan avec retour visuel
        function triggerScan() {
            const btn = document.getElementById('btnScan');
            const list = document.getElementById('station-list');
            
            // Effet visuel sur le bouton
            btn.classList.add('scan-flash');
            list.style.opacity = '0.3';
            
            setTimeout(() => {
                btn.classList.remove('scan-flash');
                renderStations(); // Recharge la liste
                list.style.opacity = '1';
            }, 300);
        }

        function updateDashboard(speed) {
            if (speed === undefined || speed === null) return;
            
            const speedVal = Math.round(speed);
            const path = document.getElementById('gaugePath');
            const display = document.getElementById('valVitesse');
            
            const maxLimit = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--max-speed-limit').trim()) || 130;
            const percentage = Math.min(speedVal / maxLimit, 1);
            
            const offset = 125.6 - (percentage * 125.6);
            path.style.strokeDashoffset = offset;
            display.innerText = speedVal;

            let color;
            if (percentage < 0.5) {
                let p = percentage * 2; 
                let g = Math.round(255 - (255 - 107) * p);
                let b = Math.round(255 - (255 - 0) * p);
                color = `rgb(255, ${g}, ${b})`;
            } else {
                let p = (percentage - 0.5) * 2; 
                let g = Math.round(107 - (107 * p));
                color = `rgb(255, ${g}, 0)`;
            }
            path.style.stroke = color;

            if (speedVal > maxSpeed) maxSpeed = speedVal;
            speedSum += speedVal;
            speedCount++;
            
            document.getElementById('max_speed').innerText = maxSpeed;
            document.getElementById('avg_speed').innerText = Math.round(speedSum / speedCount);
        }

        // --- GESTION DE L'INCLINAISON OPTIMISÉE POUR PAYSAGE ---
        window.addEventListener('deviceorientation', function(event) {
            let isLandscape = window.innerWidth > window.innerHeight;
            let rawAngle = 0;
            
            if (isLandscape) {
                // En paysage, l'axe d'inclinaison est 'gamma'. On utilise Math.abs pour éviter les valeurs négatives inutiles.
                rawAngle = Math.abs(event.gamma || 0);
            } else {
                // En portrait, c'est l'axe 'beta'
                rawAngle = Math.abs(event.beta || 0);
            }
            
            document.getElementById('valAngle').innerText = Math.round(rawAngle);
        });

        // Navigation GPS
        function openNav(app, name, address) {
            const query = encodeURIComponent(`${name} ${address}`);
            if (app === 'waze') {
                // Forcer l'ouverture de l'application native Waze avec le protocole waze://
                window.open(`waze://?q=${query}&navigate=yes`, '_blank');
            } else if (app === 'gmaps') {
                // Laissé intact selon vos instructions (fonctionne bien)
                window.open(`http://googleusercontent.com/maps.google.com/5${query}`, '_blank');
            }
        }

        function renderStations() {
            const container = document.getElementById('station-list');
            if (!mockStations || mockStations.length === 0) return;

            container.innerHTML = mockStations.map(s => `
                <div class="bg-[#111] p-2 flex justify-between items-center border-b border-gray-900">
                    <div class="flex flex-col w-2/3 pr-2">
                        <span class="text-[#FF6B00] font-bold text-sm leading-tight truncate">${s.name}</span>
                        <span class="text-gray-500 text-[9px] uppercase truncate">${s.address}</span>
                        <span class="text-gray-400 text-[10px] mt-0.5 italic">${s.dist}</span>
                    </div>
                    <div class="flex flex-col items-end w-1/3">
                        <span class="text-[#FF6B00] text-lg font-mono font-bold leading-none">${s.price}€</span>
                        <div class="flex gap-1 mt-1.5">
                            <button onclick="openNav('waze', '${s.name.replace(/'/g, "\\'")}', '${s.address.replace(/'/g, "\\'")}')" class="station-btn">WZ</button>
                            <button onclick="openNav('gmaps', '${s.name.replace(/'/g, "\\'")}', '${s.address.replace(/'/g, "\\'")}')" class="station-btn">GM</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        setInterval(() => { updateDashboard(Math.floor(Math.random() * 130)); }, 3000);
        renderStations();
    </script>
</body>
</html>
