<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIAGNOSTIC FUEL - ENERGY CONCEPT</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; color: #333; }
        .box { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ccc; }
        .error { color: red; font-weight: bold; background: #ffdada; padding: 10px; border-radius: 5px; margin: 10px 0; }
        .station { border-bottom: 1px solid #eee; padding: 10px 0; }
        .nc { color: #888; font-style: italic; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; }
        select, input { width: 100%; padding: 10px; margin: 5px 0 15px 0; box-sizing: border-box; }
        label { font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>

    <h2>🛠 Diagnostic Stations-Service</h2>

    <div class="box">
        <strong>1. Statut GPS :</strong>
        <div id="gps-status">Recherche de votre position...</div>
    </div>

    <div class="box">
        <label>Type de Carburant :</label>
        <select id="fuel-type">
            <option value="Gazole">Gazole</option>
            <option value="SP95">SP95</option>
            <option value="SP98">SP98</option>
            <option value="E10">E10 (SP95-E10)</option>
            <option value="E85">E85</option>
            <option value="GPLc">GPLc</option>
        </select>

        <label>Rayon (1 à 20 km) :</label>
        <input type="range" id="radius" min="1" max="20" value="10" oninput="this.nextElementSibling.value = this.value + ' km'">
        <output>10 km</output>

        <label style="display:block; margin-top:15px;">Trier par :</label>
        <select id="sort-by">
            <option value="dist">Distance (Le plus proche)</option>
            <option value="prix">Prix (Le moins cher)</option>
        </select>

        <button onclick="fetchStations()">LANCER LA RECHERCHE</button>
    </div>

    <div id="error-log"></div>
    <div class="box">
        <strong>2. Résultats de l'API :</strong>
        <div id="results-count">0 station(s) trouvée(s)</div>
        <div id="results-list"></div>
    </div>

    <script>
        let userLat = null;
        let userLon = null;

        // Récupération automatique du GPS au chargement
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (pos) => {
                    userLat = pos.coords.latitude;
                    userLon = pos.coords.longitude;
                    document.getElementById('gps-status').innerHTML = 
                        `✅ Position fixée : ${userLat.toFixed(4)}, ${userLon.toFixed(4)}`;
                },
                (err) => {
                    document.getElementById('gps-status').innerHTML = 
                        `❌ Erreur GPS : ${err.message}. Vérifiez que la localisation est activée.`;
                },
                { enableHighAccuracy: true }
            );
        }

        async function fetchStations() {
            const listDiv = document.getElementById('results-list');
            const errorDiv = document.getElementById('error-log');
            const countDiv = document.getElementById('results-count');
            const fuel = document.getElementById('fuel-type').value;
            const radius = document.getElementById('radius').value;
            const sortBy = document.getElementById('sort-by').value;

            listDiv.innerHTML = "Chargement des données...";
            errorDiv.innerHTML = "";
            
            if (!userLat || !userLon) {
                errorDiv.innerHTML = `<div class="error">ERREUR : Impossible de chercher sans position GPS fixe.</div>`;
                return;
            }

            // API Gouvernementale (OpenData Economie)
            // Utilisation de la version 2.1 de l'API pour plus de stabilité
            const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-carburants-fichier-instantane-test-public-copy/records?where=within_distance(geom%2C%20geom'POINT(${userLon}%20${userLat})'%2C%20${radius}km)&limit=50`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`Serveur indisponible (Code ${response.status})`);
                
                const data = await response.json();
                const records = data.results || [];

                countDiv.innerHTML = `${records.length} station(s) dans un rayon de ${radius}km.`;

                if (records.length === 0) {
                    listDiv.innerHTML = "Aucune station trouvée dans ce périmètre.";
                    return;
                }

                // Formatage des données
                let results = records.map(reg => {
                    // On cherche le prix correspondant au carburant choisi
                    // Les noms de champs dans l'API sont par ex: gazole_prix
                    const fieldName = fuel.toLowerCase() + "_prix";
                    const prixRaw = reg[fieldName];
                    
                    return {
                        nom: reg.adresse || "Station sans nom",
                        ville: reg.ville || "Ville inconnue",
                        prix: prixRaw ? parseFloat(prixRaw).toFixed(3) + " €" : "N.C",
                        prixValue: prixRaw ? parseFloat(prixRaw) : 999, // Pour le tri
                        distance: calculateDistance(userLat, userLon, reg.geom.lat, reg.geom.lon)
                    };
                });

                // Tri
                if (sortBy === 'prix') {
                    results.sort((a, b) => a.prixValue - b.prixValue);
                } else {
                    results.sort((a, b) => a.distance - b.distance);
                }

                // Affichage
                listDiv.innerHTML = results.map(s => `
                    <div class="station">
                        <strong>${s.nom.toUpperCase()}</strong> (${s.ville})<br>
                        Distance : <b>${s.distance.toFixed(2)} km</b><br>
                        Prix ${fuel} : <b style="color:${s.prix === 'N.C' ? 'red' : 'green'}">${s.prix}</b>
                    </div>
                `).join('');

            } catch (err) {
                errorDiv.innerHTML = `<div class="error">ERREUR API : ${err.message}</div>`;
                listDiv.innerHTML = "Échec de la récupération.";
            }
        }

        // Calcul de distance à vol d'oiseau (Formule Haversine)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }
    </script>
</body>
</html>
