<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Tableau de bord KTM avec suivi GPS, carburant et météo">
    <title>KTM Dash V22.20 - Energy Concept</title>
    <style>
        :root {
            --bg-color: #000;
            --panel-bg: #111;
            --sub-bg: #080808;
            --ktm-orange: #FF6600;
            --text-main: #fff;
            --text-dim: #888;
            --bar-off: #222;
            --contrast-ratio: 4.5;
        }
        body.day-mode {
            --bg-color: #fff;
            --panel-bg: #f2f2f2;
            --sub-bg: #e6e6e6;
            --text-main: #000;
            --text-dim: #444;
            --bar-off: #ddd;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 5px;
            transition: background-color 0.3s, color 0.3s;
            overflow: auto;
            min-height: 100vh;
        }
        /* Accessibilité - Contraste amélioré */
        .panel, .tool-item, .station-item {
            border: 1px solid var(--bar-off);
        }
        body.day-mode .station-item {
            border: 1px solid #ddd;
        }
        /* Amélioration des barres graphiques */
        .bargraph-svg {
            filter: drop-shadow(0 0 2px rgba(255, 102, 0, 0.5));
        }
        .bar.active {
            filter: drop-shadow(0 0 3px var(--ktm-orange));
        }
        /* Accessibilité - Focus visible */
        button:focus, input:focus, select:focus {
            outline: 2px solid var(--ktm-orange);
            outline-offset: 2px;
        }
        /* Amélioration des boutons */
        button {
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        #start-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        #btn-start {
            background: var(--ktm-orange);
            color: #000;
            padding: 20px 40px;
            font-family: 'Impact', sans-serif;
            font-size: 1.5rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
        .panel {
            background-color: var(--panel-bg);
            border-radius: 2px;
            padding: 8px 12px;
            position: relative;
            border-top: 2px solid #333;
            margin-bottom: 5px;
            min-height: 110px;
        }
        .accent-orange {
            border-top-color: var(--ktm-orange);
        }
        .impact {
            font-family: 'Impact', sans-serif;
            letter-spacing: 1px;
        }
        .title {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .main-display {
            display: grid;
            grid-template-columns: 80px 1fr 60px;
            align-items: center;
            height: 65px;
            position: relative;
        }
        .bargraph-svg {
            width: 75px;
            height: 50px;
        }
        .bar {
            fill: var(--bar-off);
            transition: fill 0.1s ease, filter 0.1s ease;
        }
        .bar.active {
            fill: var(--ktm-orange);
        }
        .val-main {
            font-size: 4.2rem;
            line-height: 1;
            text-align: center;
            font-family: 'Impact', sans-serif;
        }
        .unit {
            font-size: 1rem;
            color: var(--ktm-orange);
            margin-left: 5px;
            font-weight: bold;
            align-self: flex-end;
            padding-bottom: 10px;
        }
        .val-sub {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            background: var(--sub-bg);
            padding: 4px 8px;
            border: 1px solid var(--bar-off);
        }
        .btn-action {
            position: absolute;
            top: -5px;
            right: 0;
            height: 24px;
            min-width: 50px;
            border: 0.5px solid var(--ktm-orange);
            color: var(--ktm-orange);
            background: rgba(0,0,0,0.3);
            font-size: 0.55rem;
            text-transform: uppercase;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 2px;
        }
        .tool-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr 0.5fr;
            gap: 8px;
            align-items: center;
        }
        .tool-item {
            background: var(--sub-bg);
            padding: 5px;
            border-radius: 2px;
            border: 1px solid var(--bar-off);
            height: 55px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }
        #btn-rec {
            font-size: 0.5rem;
            height: 18px;
            width: 100%;
            border: 0.5px solid var(--ktm-orange);
            background: #222;
            color: #fff;
            cursor: pointer;
            margin-top: 2px;
            border-radius: 2px;
        }
        .station-item {
            background: #0a0a0a;
            border-left: 3px solid var(--ktm-orange);
            padding: 10px;
            margin-bottom: 8px;
        }
        body.day-mode .station-item {
            background: #fff;
            border: 1px solid #ddd;
            border-left: 3px solid var(--ktm-orange);
        }
        .st-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 5px;
        }
        .st-name {
            font-weight: bold;
            font-size: 0.85rem;
            color: var(--text-main);
            text-transform: uppercase;
        }
        .st-city {
            font-size: 0.65rem;
            color: var(--text-dim);
        }
        .st-price {
            color: var(--ktm-orange);
            font-family: 'Impact';
            font-size: 1.2rem;
        }
        .st-dist {
            font-size: 0.7rem;
            font-weight: bold;
        }
        .st-nav {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 5px;
            margin-top: 8px;
        }
        .btn-nav {
            font-size: 0.55rem;
            padding: 6px 0;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            cursor: pointer;
            text-align: center;
            border-radius: 2px;
        }
        #settings-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 1000;
            padding: 20px;
            flex-direction: column;
            overflow-y: auto;
        }
        .cfg-row {
            background: #111;
            padding: 15px;
            border: 1px solid var(--ktm-orange);
            margin-top: 10px;
            border-radius: 4px;
        }
        select, input[type="range"] {
            width: 100%;
            padding: 10px;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            margin: 8px 0;
            border-radius: 4px;
        }
        .diag-line {
            font-family: monospace;
            font-size: 0.65rem;
            color: #0f0;
            margin-bottom: 3px;
            border-bottom: 1px solid #222;
            padding-bottom: 3px;
        }
        .sort-btn {
            cursor: pointer;
            text-decoration: underline;
            color: var(--ktm-orange);
        }
        .sort-btn:hover {
            color: #ff8833;
        }
        /* ARIA labels pour accessibilité */
        [aria-label] {
            position: relative;
        }
        [aria-label]:after {
            content: attr(aria-label);
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 100;
        }
        [aria-label]:hover:after {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="start-overlay" role="alert" aria-live="assertive">
        <button id="btn-start" onclick="CORE.unlockAll()" aria-label="Démarrer le tableau de bord">READY TO RACE</button>
    </div>

    <div id="dashboard" style="display: none;">
        <!-- VITESSE -->
        <div class="panel accent-orange">
            <div class="title">Vitesse GPS</div>
            <div class="main-display">
                <svg class="bargraph-svg" viewBox="0 0 100 60" role="img" aria-label="Barres graphiques de vitesse">
                    <rect class="bar b1" x="0" y="40" width="15" height="20" aria-hidden="true" /><rect class="bar b2" x="20" y="30" width="15" height="30" aria-hidden="true" /><rect class="bar b3" x="40" y="20" width="15" height="40" aria-hidden="true" /><rect class="bar b4" x="60" y="10" width="15" height="50" aria-hidden="true" /><rect class="bar b5" x="80" y="0" width="15" height="60" aria-hidden="true" />
                </svg>
                <div style="display:flex; justify-content: flex-end; width: 100%;">
                    <span id="speed-val" class="val-main" role="status" aria-live="polite">0</span>
                    <span class="unit">KM/H</span>
                </div>
                <button class="btn-action" onclick="CORE.resetSpeed()" aria-label="Réinitialiser les statistiques de vitesse">RESET</button>
            </div>
            <div class="val-sub">
                <span>MOY: <strong id="speed-moy">0</strong></span>
                <span>MAX: <strong id="speed-max">0</strong></span>
            </div>
        </div>

        <!-- ANGLE -->
        <div class="panel">
            <div class="title">Inclinaison</div>
            <div class="main-display">
                <svg class="bargraph-svg" viewBox="0 0 100 60" role="img" aria-label="Barres graphiques d'inclinaison">
                    <rect class="bar a1" x="0" y="10" width="15" height="50" aria-hidden="true" /><rect class="bar a2" x="20" y="25" width="15" height="35" aria-hidden="true" /><rect class="bar a3" x="40" y="35" width="15" height="25" aria-hidden="true" /><rect class="bar a4" x="60" y="25" width="15" height="35" aria-hidden="true" /><rect class="bar a5" x="80" y="10" width="15" height="50" aria-hidden="true" />
                </svg>
                <div style="display:flex; justify-content: flex-end; width: 100%;">
                    <span id="angle-val" class="val-main" role="status" aria-live="polite">0</span>
                    <span class="unit">°</span>
                </div>
                <button class="btn-action" onclick="CORE.calibrateGyro()" aria-label="Calibrer le gyroscope">CALIB</button>
            </div>
            <div class="val-sub">
                <span>MOY: <strong id="angle-moy">0</strong></span>
                <span>MAX: <strong id="angle-max">0</strong></span>
            </div>
        </div>

        <!-- OUTILS -->
        <div class="panel tool-grid">
            <div class="tool-item" onclick="CORE.openDynamicWeather()" style="cursor:pointer" aria-label="Ouvrir la météo pour la position actuelle">
                <div class="title" style="font-size:0.5rem">Météo</div>
                <div id="weather-temp" style="font-size:1rem; font-weight:bold;">--°C</div>
            </div>
            <div class="tool-item" style="text-align:center" aria-label="Gestion des traces GPX">
                <div class="title" style="font-size:0.5rem">Trace GPX</div>
                <div id="gpx-dist" style="font-size:0.9rem; font-weight:bold; color:var(--ktm-orange);">0.0 KM</div>
                <button id="btn-rec" onclick="CORE.toggleRecording()" aria-label="Démarrer/arrêter l'enregistrement GPX">REC</button>
            </div>
            <div class="tool-item" onclick="UI.openSettings()" style="cursor:pointer; display:flex; align-items:center; justify-content:center;" aria-label="Ouvrir les paramètres">
                <span style="font-size:1.6rem;">🔧</span>
            </div>
        </div>

        <!-- STATIONS -->
        <div class="panel">
            <div class="title" style="display:flex; justify-content:space-between;">
                <span>STATIONS [<span id="ui-info-fuel">--</span>]</span>
                <span>RAYON: <span id="ui-info-radius">--</span>KM</span>
            </div>
            <button onclick="CORE.fetchStations()" style="width:100%; margin: 8px 0; border: 1px solid var(--ktm-orange); color:var(--ktm-orange); background:transparent; padding:8px;" class="impact" aria-label="Scanner les stations de carburant">
                SCANNER CARBURANT
            </button>
            
            <div id="stations-labels" style="display:none; justify-content:space-between; font-size:0.55rem; color:var(--text-dim); margin-bottom:5px; text-transform:uppercase; font-weight:bold;">
                <span class="sort-btn" onclick="UI.sortStations('dist')" aria-label="Trier les stations par distance">Tri par Distance</span>
                <span class="sort-btn" onclick="UI.sortStations('prix')" aria-label="Trier les stations par prix">Tri par Prix</span>
            </div>
            <div id="stations-list"></div>
        </div>
    </div>

    <!-- REGLAGES + DIAGNOSTIC -->
    <div id="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <button onclick="UI.closeSettings()" style="width:100%; padding:15px; background:var(--ktm-orange); color:#000; border:none; font-weight:bold;" aria-label="Fermer les paramètres">RETOUR</button>
        <div class="cfg-row">
            <label class="title">Carburant</label>
            <select id="cfg-fuel" onchange="UI.saveSettings()" aria-label="Sélectionner le type de carburant">
                <option value="SP98">SP98</option>
                <option value="SP95">SP95</option>
                <option value="E10">E10</option>
                <option value="Gazole">Gazole</option>
                <option value="E85">E85</option>
            </select>
            <label class="title">Rayon: <span id="radius-val">--</span> km</label>
            <input type="range" id="input-radius" min="5" max="50" step="5" oninput="UI.updateRadius(this.value)" aria-label="Ajuster le rayon de recherche des stations">
            <button onclick="UI.manualToggleTheme()" style="width:100%; padding:12px; background:#222; color:#fff; border:1px solid #444; font-weight:bold; margin-top:10px;" aria-label="Basculer entre mode jour et nuit">
                JOUR/NUIT MANUEL
            </button>
        </div>
        <div style="background:#000; padding:15px; border:1px solid #333; margin-top:10px;">
            <div class="title" style="color:var(--ktm-orange);">Diagnostic V22.20</div>
            <div id="diag-meteo" class="diag-line">Météo : --</div>
            <div id="diag-gps" class="diag-line">GPS : --</div>
            <div id="diag-light" class="diag-line">Lux : --</div>
            <div id="diag-logs" class="diag-line" style="max-height: 100px; overflow-y: auto; font-size: 0.6rem;"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const CONFIG = {
            version: "22.20-Full-Control-Enhanced",
            carburantCible: 'SP98',
            rayonRechercheKm: 10,
            vitesseMaxGraph: 150,
            angleMaxGraph: 60,
            angleSeuilPalier: 15,
            rejectionTangage: 85,
            axeInclinaison: 'beta',
            angleSmoothing: 0.15,
            deltaMaxAngle: 8,
            seuilLuxJour: 60,
            urlMeteoBase: 'https://www.meteoetradar.com/carte-meteo',
            refreshRate: 300,
            apiStations: 'https://data.economie.gouv.fr/api/records/1.0/search/?dataset=prix-des-carburants-en-france-flux-instantane-v2',
            cacheDuration: 600000, // 10 minutes
            gpxMaxPoints: 1000
        };

        // --- STATE ---
        const STATE = {
            gps: { lat: null, lon: null, speed: 0, max: 0, sum: 0, count: 0 },
            angle: { current: 0, smoothed: 0, offset: 0, max: 0, sum: 0, count: 0 },
            lux: 0, weatherInit: false, gpx: { active: false, points: [], distance: 0, prev: null },
            stations: [],
            logs: []
        };

        // --- UTILITIES ---
        const UTILS = {
            escapeHtml: (text) => {
                if (!text) return '';
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return String(text).replace(/[&<>"']/g, (m) => map[m]);
            },
            log: (message, type = 'info') => {
                const logEntry = {
                    timestamp: new Date().toISOString(),
                    message: String(message).substring(0, 200),
                    type: type
                };
                STATE.logs.push(logEntry);
                if (STATE.logs.length > 100) STATE.logs.shift();
                
                // Afficher dans le diagnostic
                const logsDiv = document.getElementById('diag-logs');
                if (logsDiv) {
                    const logElement = document.createElement('div');
                    logElement.textContent = `[${new Date().toLocaleTimeString()}] [${type.toUpperCase()}] ${message}`;
                    logElement.style.color = type === 'error' ? '#ff5555' : type === 'warn' ? '#ffaa55' : '#00ff55';
                    logsDiv.prepend(logElement);
                    if (logsDiv.children.length > 20) logsDiv.removeChild(logsDiv.lastChild);
                }
                
                console[type](`[KTM Dash] ${message}`);
            },
            sanitizeStationName: (name) => {
                return UTILS.escapeHtml(name || 'Station inconnue');
            }
        };

        // --- CORE FUNCTIONS ---
        const CORE = {
            unlockAll: () => {
                document.getElementById('start-overlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                UI.syncConfig();
                CORE.initGyro();
                CORE.initLight();
                CORE.initGPS();
                setInterval(CORE.checkWeatherQueue, 10000);
                UTILS.log("Tableau de bord démarré");
            },
            initLight: () => {
                if ('AmbientLightSensor' in window) {
                    try {
                        const sensor = new AmbientLightSensor();
                        sensor.onreading = () => {
                            STATE.lux = Math.round(sensor.illuminance);
                            UI.setTheme(STATE.lux > CONFIG.seuilLuxJour);
                            document.getElementById('diag-light').textContent = `Lux : ${STATE.lux} (${STATE.lux > CONFIG.seuilLuxJour ? 'Jour' : 'Nuit'})`;
                        };
                        sensor.onerror = (e) => {
                            UTILS.log("Capteur de lumière non disponible: " + e.message, 'warn');
                            UI.setTheme(false);
                        };
                        sensor.start();
                    } catch (e) {
                        UTILS.log("Erreur capteur lumière: " + e.message, 'warn');
                        UI.setTheme(false);
                    }
                } else {
                    UTILS.log("Capteur de lumière non supporté", 'warn');
                    UI.setTheme(false);
                }
            },
            initGyro: () => {
                if (!window.DeviceOrientationEvent) {
                    UTILS.log("Gyroscope non supporté sur ce appareil", 'warn');
                    return;
                }
                
                window.addEventListener('deviceorientation', (e) => {
                    try {
                        let rawBeta = e.beta;
                        let rawGamma = Math.abs(e.gamma);

                        if (rawBeta !== null) {
                            if (rawGamma > CONFIG.rejectionTangage) {
                                STATE.angle.current = 0;
                                UI.updateBars('angle', 0);
                                return;
                            }
                            STATE.angle.smoothed = (CONFIG.angleSmoothing * rawBeta) + ((1 - CONFIG.angleSmoothing) * (STATE.angle.smoothed || rawBeta));
                            let valPure = STATE.angle.smoothed - STATE.angle.offset;
                            STATE.angle.current = Math.abs(valPure) < 2 ? 0 : Math.min(Math.round(Math.abs(valPure)), 85);
                            
                            if (STATE.angle.current > 0) {
                                STATE.angle.sum += STATE.angle.current;
                                STATE.angle.count++;
                            }
                            if(STATE.angle.current > STATE.angle.max) STATE.angle.max = STATE.angle.current;
                            UI.updateBars('angle', valPure);
                        }
                    } catch (error) {
                        UTILS.log("Erreur gyroscope: " + error.message, 'error');
                    }
                });
            },
            calibrateGyro: () => {
                STATE.angle.offset = STATE.angle.smoothed || 0;
                STATE.angle.max = 0;
                STATE.angle.sum = 0;
                STATE.angle.count = 0;
                UTILS.log("Gyroscope calibré");
            },
            initGPS: () => {
                if (!navigator.geolocation) {
                    UTILS.log("Géolocalisation non supportée", 'error');
                    document.getElementById('diag-gps').textContent = 'GPS : Non supporté';
                    return;
                }
                
                const options = {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                };
                
                navigator.geolocation.watchPosition(
                    (pos) => {
                        try {
                            STATE.gps.lat = pos.coords.latitude;
                            STATE.gps.lon = pos.coords.longitude;
                            STATE.gps.speed = Math.round((pos.coords.speed || 0) * 3.6);
                            
                            if (STATE.gps.speed > 2) {
                                STATE.gps.sum += STATE.gps.speed;
                                STATE.gps.count++;
                            }
                            if(STATE.gps.speed > STATE.gps.max) STATE.gps.max = STATE.gps.speed;
                            UI.updateBars('speed', STATE.gps.speed);
                            
                            document.getElementById('diag-gps').textContent = `GPS : FIX (${STATE.gps.lat.toFixed(4)}, ${STATE.gps.lon.toFixed(4)})`;
                            
                            if(STATE.gpx.active && STATE.gps.lat) {
                                const pt = {
                                    lat: STATE.gps.lat,
                                    lon: STATE.gps.lon,
                                    ele: pos.coords.altitude || 0,
                                    time: new Date().toISOString()
                                };
                                STATE.gpx.points.push(pt);
                                if(STATE.gpx.points.length > CONFIG.gpxMaxPoints) {
                                    STATE.gpx.points.shift();
                                    UTILS.log("Limite de points GPX atteinte, suppression des plus anciens", 'warn');
                                }
                                if(STATE.gpx.prev) {
                                    STATE.gpx.distance += CORE.calcDist(
                                        STATE.gpx.prev.lat, STATE.gpx.prev.lon, 
                                        pt.lat, pt.lon
                                    );
                                }
                                STATE.gpx.prev = pt;
                            }
                        } catch (error) {
                            UTILS.log("Erreur GPS: " + error.message, 'error');
                        }
                    },
                    (error) => {
                        let errorMsg = 'GPS : ';
                        switch(error.code) {
                            case error.PERMISSION_DENIED:
                                errorMsg += 'Permission refusée';
                                break;
                            case error.POSITION_UNAVAILABLE:
                                errorMsg += 'Position indisponible';
                                break;
                            case error.TIMEOUT:
                                errorMsg += 'Timeout';
                                break;
                            default:
                                errorMsg += 'Erreur inconnue';
                        }
                        document.getElementById('diag-gps').textContent = errorMsg;
                        UTILS.log("Erreur GPS: " + errorMsg, 'error');
                    },
                    options
                );
            },
            calcDist: (l1, n1, l2, n2) => {
                try {
                    const R = 6371;
                    const dLat = (l2-l1)*Math.PI/180;
                    const dLon = (n2-n1)*Math.PI/180;
                    const a = Math.sin(dLat/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dLon/2)**2;
                    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                } catch (error) {
                    UTILS.log("Erreur calcul distance: " + error.message, 'error');
                    return 0;
                }
            },
            fetchStations: () => {
                if(!STATE.gps.lat) {
                    alert("Signal GPS requis pour scanner les stations");
                    UTILS.log("Tentative de scan stations sans GPS", 'warn');
                    return;
                }
                
                // Vérifier le cache
                const cacheKey = `stations_${STATE.gps.lat}_${STATE.gps.lon}_${CONFIG.rayonRechercheKm}`;
                const cached = localStorage.getItem(cacheKey);
                if (cached) {
                    try {
                        const data = JSON.parse(cached);
                        if (Date.now() - data.timestamp < CONFIG.cacheDuration) {
                            STATE.stations = data.records;
                            UI.sortStations('prix');
                            document.getElementById('stations-labels').style.display = 'flex';
                            UTILS.log("Données stations chargées depuis le cache");
                            return;
                        }
                    } catch (e) {
                        UTILS.log("Erreur de cache stations: " + e.message, 'error');
                    }
                }
                
                // Appel API avec timeout et gestion d'erreurs
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                fetch(`${CONFIG.apiStations}&geofilter.distance=${STATE.gps.lat},${STATE.gps.lon},${CONFIG.rayonRechercheKm * 1000}`, {
                    signal: controller.signal
                })
                .then(async r => {
                    clearTimeout(timeoutId);
                    if (!r.ok) {
                        throw new Error(`HTTP ${r.status}: ${r.statusText}`);
                    }
                    return r.json();
                })
                .then(data => {
                    const f = CONFIG.carburantCible.toLowerCase() + '_prix';
                    STATE.stations = data.records.map(r => ({
                        nom: UTILS.sanitizeStationName(r.fields.nom),
                        ville: UTILS.sanitizeStationName(r.fields.ville),
                        prix: r.fields[f],
                        lat: r.geometry.coordinates[1],
                        lon: r.geometry.coordinates[0],
                        dist: CORE.calcDist(STATE.gps.lat, STATE.gps.lon, r.geometry.coordinates[1], r.geometry.coordinates[0])
                    }));
                    
                    // Mise en cache
                    localStorage.setItem(cacheKey, JSON.stringify({
                        timestamp: Date.now(),
                        records: STATE.stations
                    }));
                    
                    UI.sortStations('prix');
                    document.getElementById('stations-labels').style.display = 'flex';
                    UTILS.log(`Stations trouvées: ${STATE.stations.length}`);
                })
                .catch(error => {
                    clearTimeout(timeoutId);
                    UTILS.log("Erreur fetch stations: " + error.message, 'error');
                    alert("Échec du chargement des stations. Veuillez vérifier votre connexion internet.");
                });
            },
            toggleRecording: () => {
                STATE.gpx.active = !STATE.gpx.active;
                const btn = document.getElementById('btn-rec');
                btn.innerText = STATE.gpx.active ? "STOP" : "REC";
                btn.style.background = STATE.gpx.active ? "#f00" : "#222";
                if (!STATE.gpx.active && STATE.gpx.points.length > 0) {
                    CORE.saveGPX();
                }
                UTILS.log(`Enregistrement GPX ${STATE.gpx.active ? 'démarré' : 'arrêté'}`);
            },
            saveGPX: () => {
                try {
                    // Limiter à CONFIG.gpxMaxPoints points
                    const pointsToSave = STATE.gpx.points.slice(-CONFIG.gpxMaxPoints);
                    
                    let xml = `<?xml version="1.1"?><gpx version="1.1" creator="KTM_Dash" xmlns="http://www.topografix.com/GPX/1/1">`;
                    xml += `<metadata><name>Trace KTM Dash - ${new Date().toISOString()}</name></metadata>`;
                    xml += `<trk><name>Trace ${new Date().toLocaleString()}</name><trkseg>`;
                    
                    pointsToSave.forEach(p => {
                        xml += `<trkpt lat="${p.lat}" lon="${p.lon}"><ele>${p.ele || 0}</ele><time>${p.time}</time></trkpt>`;
                    });
                    
                    xml += `</trkseg></trk></gpx>`;
                    
                    const blob = new Blob([xml], {type: 'application/gpx+xml'});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `KTM_Trace_${new Date().getTime()}.gpx`;
                    document.body.appendChild(a);
                    a.click();
                    setTimeout(() => {
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                    }, 100);
                    
                    UTILS.log(`GPX exporté avec ${pointsToSave.length} points`);
                } catch (error) {
                    UTILS.log("Erreur export GPX: " + error.message, 'error');
                    alert("Erreur lors de l'export du fichier GPX.");
                }
            },
            checkWeatherQueue: () => {
                if (STATE.weatherInit || !STATE.gps.lat) return;
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                fetch(`https://api.open-meteo.com/v1/forecast?latitude=${STATE.gps.lat}&longitude=${STATE.gps.lon}&current_weather=true`, {
                    signal: controller.signal
                })
                .then(async r => {
                    clearTimeout(timeoutId);
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    return r.json();
                })
                .then(d => {
                    document.getElementById('weather-temp').innerText = Math.round(d.current_weather.temperature)+"°C";
                    STATE.weatherInit = true;
                    document.getElementById('diag-meteo').textContent = `Météo : OK (${Math.round(d.current_weather.temperature)}°C, ${d.current_weather.weathercode})`;
                    UTILS.log("Données météo récupérées");
                })
                .catch(error => {
                    clearTimeout(timeoutId);
                    UTILS.log("Erreur météo: " + error.message, 'warn');
                    document.getElementById('diag-meteo').textContent = 'Météo : Échec';
                });
            },
            openDynamicWeather: () => {
                if (STATE.gps.lat) {
                    window.open(`${CONFIG.urlMeteoBase}?lat=${STATE.gps.lat}&lon=${STATE.gps.lon}`, '_blank');
                } else {
                    alert("Position GPS non disponible");
                }
            }
        };

        // --- UI FUNCTIONS ---
        const UI = {
            syncConfig: () => {
                try {
                    document.getElementById('cfg-fuel').value = CONFIG.carburantCible;
                    document.getElementById('input-radius').value = CONFIG.rayonRechercheKm;
                    document.getElementById('radius-val').innerText = CONFIG.rayonRechercheKm;
                    document.getElementById('ui-info-fuel').innerText = CONFIG.carburantCible;
                    document.getElementById('ui-info-radius').innerText = CONFIG.rayonRechercheKm;
                } catch (e) {
                    UTILS.log("Erreur sync config: " + e.message, 'error');
                }
            },
            update: () => {
                try {
                    document.getElementById('speed-val').innerText = STATE.gps.speed;
                    document.getElementById('speed-max').innerText = STATE.gps.max;
                    document.getElementById('angle-val').innerText = STATE.angle.current;
                    document.getElementById('angle-max').innerText = STATE.angle.max;
                    document.getElementById('gpx-dist').innerText = `${STATE.gpx.distance.toFixed(1)} KM`;
                    document.getElementById('speed-moy').innerText = STATE.gps.count > 0 ? Math.round(STATE.gps.sum / STATE.gps.count) : 0;
                    document.getElementById('angle-moy').innerText = STATE.angle.count > 0 ? Math.round(STATE.angle.sum / STATE.angle.count) : 0;
                } catch (e) {
                    UTILS.log("Erreur mise à jour UI: " + e.message, 'error');
                }
            },
            updateBars: (type, val) => {
                try {
                    if (type === 'speed') {
                        const p = (val / CONFIG.vitesseMaxGraph) * 100;
                        for(let i=1; i<=5; i++) {
                            document.querySelector(`.b${i}`).classList.toggle('active', p >= (i*20));
                        }
                    } else {
                        const absVal = Math.abs(val);
                        document.querySelector('.a3').classList.add('active');
                        document.querySelector('.a2').classList.toggle('active', val > 3 && absVal > CONFIG.angleSeuilPalier);
                        document.querySelector('.a1').classList.toggle('active', val > 3 && absVal > (CONFIG.angleSeuilPalier * 2));
                        document.querySelector('.a4').classList.toggle('active', val < -3 && absVal > CONFIG.angleSeuilPalier);
                        document.querySelector('.a5').classList.toggle('active', val < -3 && absVal > (CONFIG.angleSeuilPalier * 2));
                    }
                } catch (e) {
                    UTILS.log("Erreur mise à jour barres: " + e.message, 'error');
                }
            },
            sortStations: (criteria) => {
                try {
                    if (criteria === 'prix') {
                        STATE.stations.sort((a,b) => {
                            const prixA = a.prix || 9;
                            const prixB = b.prix || 9;
                            return prixA - prixB;
                        });
                    } else {
                        STATE.stations.sort((a,b) => a.dist - b.dist);
                    }
                    UI.renderStations();
                } catch (e) {
                    UTILS.log("Erreur tri stations: " + e.message, 'error');
                }
            },
            renderStations: () => {
                try {
                    const stationsContainer = document.getElementById('stations-list');
                    if (!stationsContainer) return;
                    
                    if (STATE.stations.length === 0) {
                        stationsContainer.innerHTML = '<div class="station-item"><div style="text-align:center; padding:20px;">Aucune station trouvée dans le rayon sélectionné</div></div>';
                        return;
                    }
                    
                    stationsContainer.innerHTML = STATE.stations.map(s => `
                        <div class="station-item" role="article" aria-label="Station ${UTILS.sanitizeStationName(s.nom)} à ${UTILS.sanitizeStationName(s.ville)}">
                            <div class="st-header">
                                <div>
                                    <div class="st-name" title="${UTILS.sanitizeStationName(s.nom)}">${UTILS.sanitizeStationName(s.nom)}</div>
                                    <div class="st-city" title="${UTILS.sanitizeStationName(s.ville)}">${UTILS.sanitizeStationName(s.ville)}</div>
                                </div>
                                <div style="text-align:right">
                                    <div class="st-price">${s.prix ? s.prix.toFixed(3)+'€' : 'N.C'}</div>
                                    <div class="st-dist">${s.dist.toFixed(1)}km</div>
                                </div>
                            </div>
                            <div class="st-nav">
                                <button class="btn-nav" onclick="window.location.href='waze://?ll=${s.lat},${s.lon}&navigate=yes'" aria-label="Naviguer avec Waze">WAZE</button>
                                <button class="btn-nav" onclick="window.open('https://maps.google.com/?q=${s.lat},${s.lon}', '_blank')" aria-label="Naviguer avec Google Maps">MAPS</button>
                                <button class="btn-nav" onclick="window.open('https://osmand.net/go.html?lat=${s.lat}&lon=${s.lon}', '_blank')" aria-label="Naviguer avec OsmAnd">OSM+</button>
                            </div>
                        </div>`).join('');
                } catch (e) {
                    UTILS.log("Erreur rendu stations: " + e.message, 'error');
                }
            },
            updateRadius: v => {
                CONFIG.rayonRechercheKm = parseInt(v);
                document.getElementById('radius-val').innerText = CONFIG.rayonRechercheKm;
                UI.syncConfig();
                UTILS.log(`Rayon mis à jour: ${CONFIG.rayonRechercheKm}km`);
            },
            openSettings: () => {
                document.getElementById('settings-modal').style.display = 'flex';
                UTILS.log("Paramètres ouverts");
            },
            closeSettings: () => {
                document.getElementById('settings-modal').style.display = 'none';
                UTILS.log("Paramètres fermés");
            },
            saveSettings: () => {
                CONFIG.carburantCible = document.getElementById('cfg-fuel').value;
                UI.syncConfig();
                UTILS.log(`Paramètres sauvegardés: carburant=${CONFIG.carburantCible}, rayon=${CONFIG.rayonRechercheKm}km`);
            },
            resetSpeed: () => {
                STATE.gps.max = 0;
                STATE.gps.sum = 0;
                STATE.gps.count = 0;
                UTILS.log("Statistiques de vitesse réinitialisées");
            },
            manualToggleTheme: () => {
                document.body.classList.toggle('day-mode');
                UTILS.log(`Mode ${document.body.classList.contains('day-mode') ? 'jour' : 'nuit'} activé`);
            },
            setTheme: (isDay) => {
                document.body.classList.toggle('day-mode', isDay);
            }
        };
        
        // Initialisation
        setInterval(UI.update, CONFIG.refreshRate);
        
        // Message de bienvenue
        UTILS.log("Application KTM Dash V22.20 chargée");
    </script>
</body>
</html>
