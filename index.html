<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENERGY CONCEPT - KTM AVIONICS V5.0</title>
    <script>
    /* --- PANNEAU DE CONTRÔLE ENERGY CONCEPT (MODIFIABLE) --- */
    const CONFIG = {
        USER: "Brice CARDONA",
        KTM_ORANGE: '#FF6600',
        DANGER_RED: '#FF0000',
        MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}{r}.png',
        FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records',
        OSRM_API: 'https://router.project-osrm.org/route/v1/driving/'
    };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --ktm: #FF6600; --glass: rgba(10, 10, 10, 0.95); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Barlow Condensed', sans-serif; background: #000; overflow: hidden; color: white; }
        
        #portrait-blocker { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; color: var(--ktm); font-family: 'Orbitron'; }
        @media (orientation: portrait) { #portrait-blocker { display: flex; } }

        #map-main { position: absolute; width: 100%; height: 100%; z-index: 1; filter: brightness(0.5) saturate(1.1); }
        
        /* HUD AZIMUT AVEC HORIZON ARTIFICIEL */
        #hud-container { 
            position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; height: 320px; z-index: 100; pointer-events: none;
        }
        #compass-frame {
            width: 100%; height: 100%; border-radius: 50%; border: 1px solid rgba(255,102,0,0.3);
            overflow: hidden; position: relative; background: #000; box-shadow: 0 0 60px rgba(0,0,0,1);
        }
        #azimuth-ring {
            position: absolute; inset: 0; border-radius: 50%; z-index: 105;
            background: 
                repeating-conic-gradient(from 0deg, var(--ktm) 0deg 0.5deg, transparent 0.5deg 10deg),
                repeating-conic-gradient(from 0deg, rgba(255,255,255,0.4) 0deg 0.2deg, transparent 0.2deg 2deg);
            -webkit-mask-image: radial-gradient(circle, transparent 94%, black 95%);
        }
        
        /* Ligne d'horizon artificiel */
        #artificial-horizon {
            position: absolute; top: 50%; left: -50%; width: 200%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--ktm), white, var(--ktm), transparent);
            z-index: 120; box-shadow: 0 0 10px var(--ktm); transition: transform 0.1s linear;
        }

        #map-zoom { width: 100%; height: 100%; }
        #moto-marker {
            position: absolute; top: 50%; left: 50%; width: 20px; height: 28px;
            transform: translate(-50%, -50%); z-index: 130;
            background: #fff; clip-path: polygon(50% 0%, 100% 100%, 50% 80%, 0% 100%);
        }

        /* ZOOM & CARDINAUX */
        .cardinal { position: absolute; font-family: 'Orbitron'; font-weight: 900; font-size: 14px; color: var(--ktm); z-index: 106; opacity: 0.7; }
        #n { top: 12px; left: 50%; transform: translateX(-50%); }
        #s { bottom: 12px; left: 50%; transform: translateX(-50%); }

        .zoom-ctrl { 
            position: absolute; left: calc(50% + 180px); top: 50%; transform: translateY(-50%);
            z-index: 600; display: flex; flex-direction: column; gap: 20px; pointer-events: all;
        }
        .btn-zoom { 
            background: rgba(20,20,20,0.9); border: 1px solid var(--ktm); color: #fff;
            width: 40px; height: 40px; border-radius: 4px; font-family: 'Orbitron'; cursor: pointer;
        }

        /* UI PANELS */
        .ui-panel { position: absolute; top: 20px; z-index: 700; display: flex; gap: 8px; }
        #left-ui { left: 20px; width: 320px; }
        #right-ui { right: 20px; flex-direction: column; align-items: flex-end; width: 180px; }

        .btn-ktm {
            background: var(--ktm); color: #000; border: none; padding: 10px 15px;
            font-family: 'Orbitron'; font-weight: 900; font-size: 0.7rem; cursor: pointer;
            clip-path: polygon(0 0, 92% 0, 100% 25%, 100% 100%, 8% 100%, 0 75%);
        }
        .btn-stop { background: var(--danger_red); color: white; display: none; }
        
        .input-dark {
            background: rgba(0,0,0,0.8); border: 1px solid #333; border-left: 3px solid var(--ktm);
            color: #fff; padding: 10px; font-family: 'Barlow Condensed'; font-size: 0.9rem; outline: none; width: 100%;
        }

        /* BRIEFING STATIONS */
        #station-list {
            position: absolute; right: 210px; top: 20px; width: 260px; max-height: 60vh;
            background: var(--glass); border-right: 3px solid var(--ktm); display: none; overflow-y: auto; z-index: 800;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        .fuel-card { 
            padding: 12px; border-bottom: 1px solid #222; position: relative; 
            background: linear-gradient(90deg, rgba(255,255,255,0.02), transparent);
        }
        .fuel-card b { color: var(--ktm); font-size: 1.4rem; }
        .fuel-dist { position: absolute; top: 12px; right: 12px; font-family: 'Orbitron'; font-size: 0.6rem; color: #888; }

        /* DASHBOARD */
        #dash-bottom {
            position: absolute; bottom: 0; width: 100%; height: 70px;
            z-index: 500; display: flex; justify-content: center; gap: 3px; padding: 0 5px 5px 5px; box-sizing: border-box;
        }
        .widget {
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.95) 100%);
            border-top: 1px solid var(--ktm); flex: 1; text-align: center; padding: 5px;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 95% 100%, 0 100%);
        }
        .stat-label { font-size: 0.55rem; color: #777; text-transform: uppercase; font-family: 'Orbitron'; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: #fff; }
        .widget.speed { flex: 1.5; border-top: 2px solid #fff; }
    </style>
</head>
<body>

<div id="portrait-blocker"><h1>KTM AVIONICS</h1><p>PAYSAGE REQUIS</p></div>

<div id="left-ui" class="ui-panel">
    <div style="flex-grow:1; display:flex; flex-direction:column; gap:5px;">
        <input type="text" id="dest-search" class="input-dark" placeholder="DESTINATION CORSE...">
        <div style="display:flex; gap:5px">
            <button class="btn-ktm" style="flex:2" onclick="findRoute()">LANCER GUIDAGE</button>
            <button id="btn-stop-nav" class="btn-ktm btn-stop" style="flex:1" onclick="stopNavigation()">STOP</button>
        </div>
    </div>
</div>

<div id="right-ui" class="ui-panel">
    <select id="fuel-type" class="input-dark" style="border-left:none; border-right:3px solid var(--ktm); background:#111; font-weight:bold;">
        <option value="gazole_prix">GAZOLE</option>
        <option value="sp95_prix">SP95</option>
        <option value="sp98_prix">SP98</option>
    </select>
    <button class="btn-ktm" style="width:100%" onclick="scanFuel()">⛽ SCAN</button>
</div>

<div id="station-list">
    <div style="background:#000; color:var(--ktm); padding:8px; font-size:0.7rem; text-align:center; font-family:'Orbitron'; cursor:pointer;" onclick="this.parentElement.style.display='none'">CLOSE BRIEFING [X]</div>
    <div id="fuel-results"></div>
</div>

<div id="hud-container">
    <div id="compass-frame">
        <div id="azimuth-ring"></div>
        <div id="artificial-horizon"></div>
        <div class="cardinal" id="n">N</div><div class="cardinal" id="s">S</div>
        <div id="map-zoom"></div>
        <div id="moto-marker"></div>
    </div>
</div>

<div class="zoom-ctrl">
    <button class="btn-zoom" onclick="manualZoom(1)">+</button>
    <button class="btn-zoom" onclick="manualZoom(-1)">-</button>
</div>

<div id="map-main"></div>

<div id="dash-bottom">
    <div class="widget"><div class="stat-label">Altitude</div><div id="v-alt" class="stat-value">---</div></div>
    <div class="widget"><div class="stat-label">Lean Angle</div><div id="v-lean" class="stat-value">0°</div></div>
    <div class="widget speed"><div id="v-speed" class="stat-value">00</div><div class="stat-label">KM/H</div></div>
    <div class="widget"><div class="stat-label">Cap</div><div id="v-cap" class="stat-value">---</div></div>
    <div class="widget"><div class="stat-label">Trip</div><div id="v-dist" class="stat-value">0.0</div></div>
</div>

<script>
let mainMap, zoomMap, fuelLayer, routeLayerMain, routeLayerZoom;
let userPos = [41.9, 8.7], lastCoord = null, trip = 0;

function init() {
    mainMap = L.map('map-main', { zoomControl: false, attributionControl: false }).setView(userPos, 13);
    L.tileLayer(CONFIG.MAP_STYLE).addTo(mainMap);

    zoomMap = L.map('map-zoom', { zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false, touchZoom: false }).setView(userPos, 15);
    L.tileLayer(CONFIG.MAP_STYLE).addTo(zoomMap);

    fuelLayer = L.layerGroup().addTo(mainMap);
    routeLayerMain = L.layerGroup().addTo(mainMap);
    routeLayerZoom = L.layerGroup().addTo(zoomMap);

    mainMap.on('move', () => {
        zoomMap.setView(mainMap.getCenter(), mainMap.getZoom() + 2, { animate: false });
    });

    startTracking();
    window.addEventListener('deviceorientation', handleSensors);
}

function startTracking() {
    navigator.geolocation.watchPosition(p => {
        userPos = [p.coords.latitude, p.coords.longitude];
        mainMap.panTo(userPos);
        
        document.getElementById('v-speed').innerText = p.coords.speed ? Math.round(p.coords.speed * 3.6) : "00";
        if(p.coords.altitude) document.getElementById('v-alt').innerText = Math.round(p.coords.altitude) + "m";
        
        if(p.coords.heading) {
            const h = Math.round(p.coords.heading);
            document.getElementById('v-cap').innerText = h + "°";
            document.getElementById('moto-marker').style.transform = `translate(-50%, -50%) rotate(${h}deg)`;
        }

        if(lastCoord) trip += (mainMap.distance(lastCoord, userPos) / 1000);
        document.getElementById('v-dist').innerText = trip.toFixed(1);
        lastCoord = userPos;
    }, null, { enableHighAccuracy: true });
}

function handleSensors(e) {
    // Inclinaison en mode paysage (gamma)
    let lean = Math.round(e.gamma);
    // On inverse pour que l'horizon artificiel reste "droit" par rapport au monde
    document.getElementById('artificial-horizon').style.transform = `translateY(-50%) rotate(${-lean}deg)`;
    
    const absLean = Math.abs(lean);
    const vLean = document.getElementById('v-lean');
    vLean.innerText = absLean + "°";

    const ring = document.getElementById('compass-frame');
    if(absLean > 25) {
        ring.style.borderColor = CONFIG.DANGER_RED;
        vLean.style.color = CONFIG.DANGER_RED;
    } else {
        ring.style.borderColor = "rgba(255,102,0,0.3)";
        vLean.style.color = "#fff";
    }
}

async function findRoute() {
    const q = document.getElementById('dest-search').value;
    if(!q) return;
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
    const data = await res.json();
    if(data[0]) {
        drawNavigation([data[0].lat, data[0].lon]);
        document.getElementById('btn-stop-nav').style.display = 'block';
    }
}

function stopNavigation() {
    routeLayerMain.clearLayers();
    routeLayerZoom.clearLayers();
    document.getElementById('btn-stop-nav').style.display = 'none';
}

async function drawNavigation(target) {
    const url = `${CONFIG.OSRM_API}${userPos[1]},${userPos[0]};${target[1]},${target[0]}?overview=full&geometries=geojson`;
    try {
        const res = await fetch(url);
        const data = await res.json();
        routeLayerMain.clearLayers(); routeLayerZoom.clearLayers();
        if(data.routes[0]) {
            const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
            L.polyline(coords, { color: CONFIG.KTM_ORANGE, weight: 6, opacity: 0.8 }).addTo(routeLayerMain);
            L.polyline(coords, { color: CONFIG.KTM_ORANGE, weight: 10, opacity: 1 }).addTo(routeLayerZoom);
            mainMap.fitBounds(L.polyline(coords).getBounds());
        }
    } catch(e) { console.error(e); }
}

async function scanFuel() {
    const type = document.getElementById('fuel-type').value;
    const list = document.getElementById('fuel-results');
    document.getElementById('station-list').style.display = 'block';
    list.innerHTML = "<p style='padding:15px; font-size:0.7rem; color:#888'>SCAN SECTEUR EN COURS...</p>";

    try {
        const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${userPos[1]} ${userPos[0]})', 30000m)&limit=15`;
        const res = await fetch(url);
        const data = await res.json();
        fuelLayer.clearLayers(); list.innerHTML = "";

        if(data.results && data.results.length > 0) {
            data.results.forEach(st => {
                let price = st[type] || 0;
                if(!price) return;

                // Calcul distance à vol d'oiseau
                const d = (mainMap.distance(userPos, [st.geom.lat, st.geom.lon]) / 1000).toFixed(1);
                const city = st.ville || st.adresse || "CORSE";

                L.marker([st.geom.lat, st.geom.lon], {
                    icon: L.divIcon({ html: `<div style="background:white; color:black; font-weight:900; padding:2px; border:1.5px solid ${CONFIG.KTM_ORANGE}; font-size:11px; border-radius:3px;">${price.toFixed(2)}</div>` })
                }).addTo(fuelLayer);

                const div = document.createElement('div');
                div.className = "fuel-card";
                div.innerHTML = `
                    <div class="fuel-dist">${d} KM</div>
                    <div style="font-size:0.65rem; color:#aaa; text-transform:uppercase;">${city}</div>
                    <b>${price.toFixed(2)}€</b>
                    <div style="margin-top:8px">
                        <button class="btn-ktm" style="padding:4px 10px; font-size:0.6rem" onclick="drawNavigation([${st.geom.lat}, ${st.geom.lon}])">GUIDER</button>
                    </div>
                `;
                list.appendChild(div);
            });
        } else { list.innerHTML = "<p style='padding:15px'>AUCUNE STATION</p>"; }
    } catch(e) { list.innerHTML = "<p style='padding:15px'>ERREUR RESEAU</p>"; }
}

function manualZoom(delta) {
    mainMap.setZoom(mainMap.getZoom() + delta);
}

window.onload = init;
</script>
</body>
</html>
