<!DOCTYPE html>
<html lang="fr">
<!-- 1. CONFIGURATION (LIGNES 1-25) -->
<script>
    const CONFIG = {
        version: "22.25-Full-Control",          
        carburantCible: 'SP98',          
        rayonRechercheKm: 10,            
        vitesseMaxGraph: 150,            
        angleMaxGraph: 60,               
        angleSeuilPalier: 15,            
        rejectionTangage: 85,            
        axeInclinaison: 'beta',          
        angleSmoothing: 0.15,             
        deltaMaxAngle: 8,               
        seuilLuxJour: 60,                
        urlMeteoBase: 'https://www.meteoetradar.com/carte-meteo', 
        refreshRate: 300,                
        apiStations: 'https://data.economie.gouv.fr/api/records/1.0/search/?dataset=prix-des-carburants-en-france-flux-instantane-v2',
        // PARAMETRES MOTO ENERGY CONCEPT
        consoMoy: 5.8,       
        autonomieMax: 280
    };
</script>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM Dash V22.25 - Energy Concept</title>
    <style>
        :root { --bg-color: #000; --panel-bg: #111; --sub-bg: #080808; --ktm-orange: #FF6600; --text-main: #fff; --text-dim: #888; --bar-off: #222; }
        body.day-mode { --bg-color: #fff; --panel-bg: #f2f2f2; --sub-bg: #e6e6e6; --text-main: #000; --text-dim: #444; --bar-off: #ddd; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 5px; transition: 0.3s; overflow: auto; }
        #start-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #btn-start { background: var(--ktm-orange); color: #000; padding: 20px 40px; font-family: 'Impact', sans-serif; font-size: 1.5rem; border: none; border-radius: 5px; cursor: pointer; }
        .panel { background-color: var(--panel-bg); border-radius: 2px; padding: 8px 12px; position: relative; border-top: 2px solid #333; margin-bottom: 5px; min-height: 100px; }
        .accent-orange { border-top-color: var(--ktm-orange); }
        .impact { font-family: 'Impact', sans-serif; letter-spacing: 1px; }
        .title { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: bold; margin-bottom: 4px; }
        .main-display { display: grid; grid-template-columns: 70px 1fr 50px; align-items: center; height: 60px; position: relative; }
        .bargraph-svg { width: 70px; height: 45px; }
        .bar { fill: var(--bar-off); transition: fill 0.1s ease; }
        .bar.active { fill: var(--ktm-orange); }
        .val-main { font-size: 3.8rem; line-height: 1; text-align: center; font-family: 'Impact', sans-serif; }
        .unit { font-size: 0.9rem; color: var(--ktm-orange); font-weight: bold; align-self: flex-end; padding-bottom: 8px; }
        .val-sub { display: flex; justify-content: space-between; font-size: 0.65rem; background: var(--sub-bg); padding: 4px 8px; border: 1px solid #222; }
        .btn-action { position: absolute; top: -5px; right: 0; height: 22px; min-width: 48px; border: 0.5px solid var(--ktm-orange); color: var(--ktm-orange); background: rgba(0,0,0,0.3); font-size: 0.5rem; text-transform: uppercase; z-index: 10; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .tool-grid { display: grid; grid-template-columns: 1.2fr 1fr 0.5fr; gap: 8px; align-items: center; min-height: 55px;}
        .tool-item { background: var(--sub-bg); padding: 5px; border-radius: 2px; border: 1px solid #222; height: 50px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        #btn-rec { font-size: 0.5rem; height: 18px; width: 100%; border: 0.5px solid var(--ktm-orange); background: #222; color: #fff; cursor: pointer; margin-top: 2px; }
        .station-item { background: #0a0a0a; border-left: 3px solid var(--ktm-orange); padding: 10px; margin-bottom: 8px; }
        .st-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .st-name { font-weight: bold; font-size: 0.8rem; color: var(--text-main); }
        .st-price { color: var(--ktm-orange); font-family: 'Impact'; font-size: 1.2rem; }
        .st-nav { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 8px; }
        .btn-nav { font-size: 0.55rem; padding: 6px 0; background: #222; color: #fff; border: 1px solid #444; cursor: pointer; text-align: center; }
        #settings-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; flex-direction: column; overflow-y: auto; }
        .cfg-row { background:#111; padding:15px; border:1px solid var(--ktm-orange); margin-top:10px; }
        select, input[type="range"], input[type="number"] { width: 100%; padding: 10px; background: #222; color: #fff; border: 1px solid #444; margin: 8px 0; }
        .diag-line { font-family: monospace; font-size: 0.65rem; color: #0f0; margin-bottom: 3px; border-bottom: 1px solid #222; }
    </style>
</head>

<body>
    <div id="start-overlay"><button id="btn-start" onclick="CORE.unlockAll()">READY TO RACE</button></div>

    <div id="dashboard" style="display: none;">
        <!-- VITESSE -->
        <div class="panel accent-orange">
            <div class="title">Vitesse GPS</div>
            <div class="main-display">
                <svg class="bargraph-svg" viewBox="0 0 100 60">
                    <rect class="bar b1" x="0" y="40" width="15" height="20" /><rect class="bar b2" x="20" y="30" width="15" height="30" /><rect class="bar b3" x="40" y="20" width="15" height="40" /><rect class="bar b4" x="60" y="10" width="15" height="50" /><rect class="bar b5" x="80" y="0" width="15" height="60" />
                </svg>
                <div style="display:flex; justify-content: flex-end; width: 100%;"><span id="speed-val" class="val-main">0</span><span class="unit">KM/H</span></div>
                <button class="btn-action" onclick="CORE.resetSpeed()">RESET</button>
            </div>
            <div class="val-sub"><span>MOY: <strong id="speed-moy">0</strong></span><span>MAX: <strong id="speed-max">0</strong></span></div>
        </div>

        <!-- ANGLE -->
        <div class="panel">
            <div class="title">Inclinaison</div>
            <div class="main-display">
                <svg class="bargraph-svg" viewBox="0 0 100 60">
                    <rect class="bar a1" x="0" y="10" width="15" height="50" /><rect class="bar a2" x="20" y="25" width="15" height="35" /><rect class="bar a3" x="40" y="35" width="15" height="25" /><rect class="bar a4" x="60" y="25" width="15" height="35" /><rect class="bar a5" x="80" y="10" width="15" height="50" />
                </svg>
                <div style="display:flex; justify-content: flex-end; width: 100%;"><span id="angle-val" class="val-main">0</span><span class="unit">°</span></div>
                <button class="btn-action" onclick="CORE.calibrateGyro()">CALIB</button>
            </div>
            <div class="val-sub"><span>MOY: <strong id="angle-moy">0</strong></span><span>MAX: <strong id="angle-max">0</strong></span></div>
        </div>

        <!-- ECO-RANGE -->
        <div class="panel">
            <div class="title">Autonomie & Consommation</div>
            <div style="display: grid; grid-template-columns: 1.2fr 1fr; align-items: center; padding: 5px 0;">
                <div>
                    <div id="fuel-range" class="impact" style="font-size: 2.2rem; color: var(--ktm-orange); line-height: 1;">---</div>
                    <div class="title" style="font-size: 0.5rem; margin: 0;">KM RESTANTS</div>
                </div>
                <div style="text-align: right; border-left: 1px solid #333; padding-left: 10px;">
                    <div class="title" style="font-size: 0.5rem;">BRÛLÉ : <span id="fuel-burn" style="color:#fff">0.0 L</span></div>
                    <div class="title" style="font-size: 0.5rem;">CONSO : <span style="color:#fff" id="ui-conso-moy">--</span> L/100</div>
                </div>
            </div>
        </div>

        <!-- OUTILS -->
        <div class="panel tool-grid">
            <div class="tool-item" onclick="CORE.openDynamicWeather()" style="cursor:pointer"><div class="title" style="font-size:0.5rem">Météo</div><div id="weather-temp" style="font-size:0.9rem; font-weight:bold;">--°C</div></div>
            <div class="tool-item" style="text-align:center">
                <div class="title" style="font-size:0.5rem">GPX</div>
                <div id="gpx-dist" style="font-size:0.85rem; font-weight:bold; color:var(--ktm-orange);">0.0 KM</div>
                <button id="btn-rec" onclick="CORE.toggleRecording()">REC</button>
            </div>
            <div class="tool-item" onclick="UI.openSettings()" style="cursor:pointer; display:flex; align-items:center; justify-content:center;"><span style="font-size:1.6rem;">🔧</span></div>
        </div>

        <!-- STATIONS -->
        <div class="panel">
            <div class="title" style="display:flex; justify-content:space-between;">
                <span>STATIONS [<span id="ui-info-fuel">--</span>]</span>
                <span>RAYON: <span id="ui-info-radius">--</span>KM</span>
            </div>
            <button onclick="CORE.fetchStations()" style="width:100%; margin: 8px 0; border: 1px solid var(--ktm-orange); color:var(--ktm-orange); background:transparent; padding:8px;" class="impact">SCANNER CARBURANT</button>
            <div id="stations-list"></div>
        </div>
    </div>

    <!-- REGLAGES + DIAGNOSTIC -->
    <div id="settings-modal">
        <button onclick="UI.closeSettings()" style="width:100%; padding:15px; background:var(--ktm-orange); color:#000; border:none; font-weight:bold;">RETOUR</button>
        <div class="cfg-row">
            <label class="title">Carburant cible</label>
            <select id="cfg-fuel" onchange="UI.saveSettings()">
                <option value="SP98">SP98</option><option value="SP95">SP95</option><option value="E10">E10</option><option value="Gazole">Gazole</option><option value="E85">E85</option>
            </select>
            <label class="title">Rayon de recherche: <span id="radius-val">--</span> km</label>
            <input type="range" id="input-radius" min="5" max="50" step="5" oninput="UI.updateRadius(this.value)">
            <label class="title">Conso Moyenne (L/100)</label>
            <input type="number" id="cfg-conso" step="0.1" onchange="UI.saveSettings()">
            <button onclick="UI.manualToggleTheme()" style="width:100%; padding:12px; background:#222; color:#fff; border:1px solid #444; font-weight:bold; margin-top:10px;">MODE JOUR/NUIT</button>
        </div>
        <!-- DIAGNOSTIC[cite: 1] -->
        <div style="background:#000; padding:15px; border:1px solid #333; margin-top:10px;">
            <div class="title" style="color:var(--ktm-orange);">Diagnostic Technique</div>
            <div id="diag-osmand" class="diag-line">OsmAnd+ : Lien prêt (Intent)</div>
            <div id="diag-gps" class="diag-line">Signal GPS : --</div>
            <div id="diag-data" class="diag-line">Flux Stations : --</div>
        </div>
    </div>

    <script>
        const STATE = {
            gps: { lat: null, lon: null, speed: 0, max: 0, sum: 0, count: 0 },
            angle: { current: 0, smoothed: 0, offset: 0, max: 0 },
            gpx: { active: false, points: [], distance: 0, prev: null }, stations: []
        };

        const ECO_MATHS = {
            update: () => {
                const dist = STATE.gpx.distance;
                const brule = (dist * CONFIG.consoMoy) / 100;
                const restant = CONFIG.autonomieMax - dist;
                document.getElementById('fuel-burn').innerText = brule.toFixed(1) + " L";
                const rangeElem = document.getElementById('fuel-range');
                rangeElem.innerText = Math.max(0, Math.round(restant)) + " KM";
                rangeElem.style.color = restant < 50 ? "#f00" : "var(--ktm-orange)";
            }
        };

        const CORE = {
            unlockAll: () => {
                document.getElementById('start-overlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                UI.syncConfig(); CORE.initGyro(); CORE.initGPS();
                setInterval(ECO_MATHS.update, 2000);
            },
            initGyro: () => {
                window.addEventListener('deviceorientation', (e) => {
                    let rawBeta = e.beta; 
                    if (rawBeta !== null) {
                        STATE.angle.smoothed = (0.15 * rawBeta) + (0.85 * (STATE.angle.smoothed || rawBeta));
                        let valPure = STATE.angle.smoothed - (STATE.angle.offset || 0);
                        STATE.angle.current = Math.abs(valPure) < 2 ? 0 : Math.min(Math.round(Math.abs(valPure)), 85);
                        if(STATE.angle.current > (STATE.angle.max || 0)) STATE.angle.max = STATE.angle.current;
                        UI.updateBars('angle', valPure);
                    }
                });
            },
            calibrateGyro: () => { STATE.angle.offset = STATE.angle.smoothed || 0; STATE.angle.max = 0; },
            initGPS: () => {
                navigator.geolocation.watchPosition(pos => {
                    STATE.gps.lat = pos.coords.latitude; STATE.gps.lon = pos.coords.longitude;
                    STATE.gps.speed = Math.round((pos.coords.speed || 0) * 3.6);
                    if(STATE.gps.speed > STATE.gps.max) STATE.gps.max = STATE.gps.speed;
                    UI.updateBars('speed', STATE.gps.speed);
                    document.getElementById('diag-gps').innerText = `Signal GPS : FIX (${STATE.gps.lat.toFixed(4)})`;
                    if(STATE.gpx.active && STATE.gps.lat) {
                        const pt = { lat: STATE.gps.lat, lon: STATE.gps.lon };
                        if(STATE.gpx.prev) STATE.gpx.distance += CORE.calcDist(STATE.gpx.prev.lat, STATE.gpx.prev.lon, pt.lat, pt.lon);
                        STATE.gpx.prev = pt;
                    }
                }, null, { enableHighAccuracy: true });
            },
            calcDist: (l1, n1, l2, n2) => {
                const R = 6371; const dLat = (l2-l1)*Math.PI/180; const dLon = (n2-n1)*Math.PI/180;
                const a = Math.sin(dLat/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dLon/2)**2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            },
            fetchStations: () => {
                if(!STATE.gps.lat) return alert("Signal GPS requis");
                fetch(`${CONFIG.apiStations}&geofilter.distance=${STATE.gps.lat},${STATE.gps.lon},${CONFIG.rayonRechercheKm * 1000}`)
                .then(r => r.json()).then(data => {
                    const f = CONFIG.carburantCible.toLowerCase() + '_prix';
                    STATE.stations = data.records.map(r => ({
                        nom: r.fields.nom || "Station", prix: r.fields[f], lat: r.geometry.coordinates[1], lon: r.geometry.coordinates[0],
                        dist: CORE.calcDist(STATE.gps.lat, STATE.gps.lon, r.geometry.coordinates[1], r.geometry.coordinates[0])
                    }));
                    document.getElementById('diag-data').innerText = `Flux Stations : ${STATE.stations.length} trouvées`;
                    UI.renderStations();
                });
            },
            toggleRecording: () => {
                STATE.gpx.active = !STATE.gpx.active;
                document.getElementById('btn-rec').innerText = STATE.gpx.active ? "STOP" : "REC";
                document.getElementById('btn-rec').style.background = STATE.gpx.active ? "#f00" : "#222";
            },
            openDynamicWeather: () => { window.open(`${CONFIG.urlMeteoBase}?lat=${STATE.gps.lat}&lon=${STATE.gps.lon}`, '_blank'); }
        };

        const UI = {
            syncConfig: () => {
                document.getElementById('cfg-fuel').value = CONFIG.carburantCible;
                document.getElementById('input-radius').value = CONFIG.rayonRechercheKm;
                document.getElementById('radius-val').innerText = CONFIG.rayonRechercheKm;
                document.getElementById('ui-info-fuel').innerText = CONFIG.carburantCible;
                document.getElementById('ui-info-radius').innerText = CONFIG.rayonRechercheKm;
                document.getElementById('cfg-conso').value = CONFIG.consoMoy;
                document.getElementById('ui-conso-moy').innerText = CONFIG.consoMoy;
            },
            update: () => {
                document.getElementById('speed-val').innerText = STATE.gps.speed;
                document.getElementById('speed-max').innerText = STATE.gps.max;
                document.getElementById('angle-val').innerText = STATE.angle.current;
                document.getElementById('angle-max').innerText = STATE.angle.max || 0;
                document.getElementById('gpx-dist').innerText = `${STATE.gpx.distance.toFixed(1)} KM`;
            },
            updateBars: (type, val) => {
                if (type === 'speed') {
                    const p = (val / CONFIG.vitesseMaxGraph) * 100;
                    for(let i=1; i<=5; i++) document.querySelector(`.b${i}`).classList.toggle('active', p >= (i*20));
                } else {
                    const absVal = Math.abs(val);
                    document.querySelector('.a3').classList.add('active');
                    document.querySelector('.a2').classList.toggle('active', val > 3 && absVal > CONFIG.angleSeuilPalier);
                    document.querySelector('.a1').classList.toggle('active', val > 3 && absVal > (CONFIG.angleSeuilPalier * 2));
                    document.querySelector('.a4').classList.toggle('active', val < -3 && absVal > CONFIG.angleSeuilPalier);
                    document.querySelector('.a5').classList.toggle('active', val < -3 && absVal > (CONFIG.angleSeuilPalier * 2));
                }
            },
            renderStations: () => {
                document.getElementById('stations-list').innerHTML = STATE.stations.sort((a,b)=>a.dist-b.dist).slice(0,3).map(s => `
                    <div class="station-item">
                        <div class="st-header"><div><div class="st-name">${s.nom.substring(0,18)}</div></div><div class="st-price">${s.prix ? s.prix.toFixed(3)+'€' : 'N.C'}</div></div>
                        <div class="st-nav">
                            <button class="btn-nav" onclick="window.location.href='waze://?ll=${s.lat},${s.lon}&navigate=yes'">WAZE</button>
                            <button class="btn-nav" onclick="window.location.href='google.navigation:q=${s.lat},${s.lon}'">MAPS</button>
                            <button class="btn-nav" onclick="window.location.href='intent:geo:${s.lat},${s.lon}#Intent;package=net.osmand.plus;end;'">OSM+</button>
                        </div>
                    </div>`).join('');
            },
            updateRadius: v => { CONFIG.rayonRechercheKm = v; UI.syncConfig(); },
            openSettings: () => document.getElementById('settings-modal').style.display = 'flex',
            closeSettings: () => document.getElementById('settings-modal').style.display = 'none',
            saveSettings: () => { 
                CONFIG.carburantCible = document.getElementById('cfg-fuel').value; 
                CONFIG.consoMoy = parseFloat(document.getElementById('cfg-conso').value);
                UI.syncConfig(); 
            },
            manualToggleTheme: () => document.body.classList.toggle('day-mode'),
            resetSpeed: () => { STATE.gps.max = 0; }
        };
        setInterval(UI.update, CONFIG.refreshRate);
    </script>
</body>
</html>
