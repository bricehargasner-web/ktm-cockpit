<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM MY RIDE - ENERGY CONCEPT V3</title>

    <script>
        const CONFIG_KTM = {
            COULEUR: "#FF6600",
            RAYON: 15,
            CORSE_MODE: true,
            REC_INTERVAL: 2000 // Enregistrement toutes les 2 sec
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* [TIROIR VISUAL-KTM] - MINIATURISATION */
        :root { --ktm: #FF6600; --bg: #050505; --panel: rgba(15,15,15,0.9); }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        #map { position: absolute; top:0; left:0; width:100%; height:100%; z-index:1; }

        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; z-index:10; pointer-events: none; padding: 10px; display: grid; grid-template-columns: 200px 1fr 200px; grid-template-rows: auto 1fr auto; }
        .overlay * { pointer-events: auto; }

        .case { background: var(--panel); border: 1px solid #333; border-left: 3px solid var(--ktm); border-radius: 2px; padding: 6px; margin-bottom: 4px; }

        /* RECHERCHE MINI */
        .search-zone { grid-column: 2; display: flex; justify-content: center; align-items: flex-start; gap: 4px; }
        #search-input { width: 180px; background: #111; border: 1px solid #444; color: white; padding: 6px 12px; border-radius: 15px; font-size: 0.8rem; }
        #btn-go { background: var(--ktm); border: none; color: white; padding: 6px 12px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }

        /* BOUTON REC */
        #rec-btn { width: 35px; height: 35px; border-radius: 50%; background: #222; border: 1px solid #444; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-top: 5px; }
        .rec-dot { width: 12px; height: 12px; background: #555; border-radius: 50%; }
        .rec-active { background: #ff0000; animation: blink 1s infinite; }

        /* TELÉMÉTRIE */
        .vitesse-val { font-size: 2.2rem; font-weight: bold; line-height: 1; }
        .gauge-mini { width: 50px; height: 50px; border-radius: 50%; border: 3px solid #333; display: inline-flex; align-items: center; justify-content: center; position: relative; }
        #zero-btn { width: 12px; height: 3px; background: var(--ktm); margin: 3px auto; opacity: 0.4; cursor: pointer; }

        @keyframes blink { 50% { opacity: 0.3; } }
        
        .btn-side { width: 35px; height: 35px; background: var(--panel); border: 1px solid #444; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="overlay">
        <div style="grid-column: 1;">
            <div class="case">
                <div style="color:var(--ktm); font-size:0.6rem;">NAV</div>
                <div id="nav-dist" style="font-size:1rem; font-weight:bold;">-- m</div>
            </div>
            <div class="case" id="fuel-box" style="font-size:0.7rem;">
                <div style="color:var(--ktm);">STATIONS (CORSE)</div>
                <div id="fuel-data">Recherche...</div>
            </div>
            <div class="btn-side" onclick="alert('Réglages : Rayon, Jour/Nuit, GPX')">⚙️</div>
        </div>

        <div class="search-zone">
            <input type="text" id="search-input" placeholder="Destination...">
            <button id="btn-go" onclick="startNav()">GO</button>
        </div>

        <div style="grid-column: 3; text-align: right; display: flex; flex-direction: column; align-items: flex-end;">
            <div class="case" style="width: 100px;">
                <div class="vitesse-val" id="speed">0</div>
                <div style="color:var(--ktm); font-size:0.6rem;">KM/H</div>
            </div>

            <div class="case" style="width: 100px; text-align: center;">
                <div class="gauge-mini" id="gauge-ui">
                    <span id="angle-val" style="font-size:0.9rem;">0°</span>
                </div>
                <div id="zero-btn" onclick="calibrate()"></div>
                <div style="font-size:8px; color:var(--ktm);">MAX: <span id="max-angle">0</span>°</div>
            </div>

            <div class="case" style="width: 100px;" onclick="openMeteo()">
                <div id="alt-txt" style="font-size:0.8rem;">Alt: -- m</div>
                <div id="temp-txt" style="font-size:0.8rem; color:var(--ktm);">--°C</div>
            </div>

            <div id="rec-btn" onclick="toggleRec()">
                <div class="rec-dot" id="rec-status"></div>
            </div>
        </div>
    </div>

    <script>
        /* [TIROIR SYSTEM-CORE] */
        let map = L.map('map', { zoomControl: false }).setView([43.76, 1.98], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let isRecording = false;
        let gpxData = [];

        /* [TIROIR MOTO-SENSORS] */
        navigator.geolocation.watchPosition(pos => {
            const s = Math.round(pos.coords.speed * 3.6) || 0;
            const a = Math.round(pos.coords.altitude) || 0;
            
            document.getElementById('speed').innerText = s;
            document.getElementById('alt-txt').innerText = "Alt: " + a + " m";

            if(isRecording) {
                gpxData.push({lat: pos.coords.latitude, lon: pos.coords.longitude, alt: a, speed: s});
            }
            updateWeather(pos.coords.latitude, pos.coords.longitude);
        }, err => console.log(err), { enableHighAccuracy: true });

        /* [TIROIR REC-GPX] */
        function toggleRec() {
            isRecording = !isRecording;
            const dot = document.getElementById('rec-status');
            if(isRecording) {
                dot.classList.add('rec-active');
                alert("REC : C'est parti !");
            } else {
                dot.classList.remove('rec-active');
                alert("Enregistrement terminé. Fichier prêt.");
            }
        }

        /* [TIROIR WEATHER] */
        async function updateWeather(lat, lon) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await res.json();
                document.getElementById('temp-txt').innerText = Math.round(data.current_weather.temperature) + "°C";
            } catch(e) { document.getElementById('temp-txt').innerText = "N.C"; }
        }

        function openMeteo() { window.open("https://meteofrance.com/", "_blank"); }
        function calibrate() { alert("Angle remis à zéro"); }
        function startNav() { alert("Calcul de l'itinéraire..."); }
    </script>
</body>
</html>
