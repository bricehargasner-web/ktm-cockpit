<!DOCTYPE html>
<html lang="fr">
<!-- 1. CONFIGURATION (LIGNES 1-25) -->
<script>
    const CONFIG = {
        version: "22.1-Bargraph-Sym",          
        carburantCible: 'SP98',          
        rayonRechercheKm: 10,            
        // --- PARAMETRES BARGRAPH ---
        vitesseMaxGraph: 150,            // 100% du bargraphe vitesse
        angleMaxGraph: 45,               // Angle pour allumer la dernière barre
        angleSeuilPalier: 10,            // Degrés par segment latéral
        // ---------------------------
        axeInclinaison: 'beta',          
        angleSmoothing: 0.1,             
        deltaMaxAngle: 5,               
        seuilLuxJour: 60,                
        heurePassageNuit: 20,            
        heurePassageJour: 7,             
        urlMeteoBase: 'https://www.meteoetradar.com/carte-meteo', 
        refreshRate: 300,                
        apiStations: 'https://data.economie.gouv.fr/api/records/1.0/search/?dataset=prix-des-carburants-en-france-flux-instantane-v2'
    };
</script>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM Dash V22.1 - Sym-Bargraph</title>
    <style>
        :root { --bg-color: #000; --panel-bg: #111; --sub-bg: #080808; --ktm-orange: #FF6600; --text-main: #fff; --text-dim: #888; --bar-off: #222; }
        body.day-mode { --bg-color: #fff; --panel-bg: #f2f2f2; --sub-bg: #e6e6e6; --text-main: #000; --text-dim: #444; --bar-off: #ddd; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 5px; transition: 0.3s; overflow: auto; }
        #start-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #btn-start { background: var(--ktm-orange); color: #000; padding: 20px 40px; font-family: 'Impact', sans-serif; font-size: 1.5rem; border: none; border-radius: 5px; cursor: pointer; }
        .impact { font-family: 'Impact', sans-serif; letter-spacing: 1px; }
        .panel { background-color: var(--panel-bg); border-radius: 2px; padding: 8px 12px; position: relative; border-top: 2px solid #333; margin-bottom: 5px; min-height: 110px; }
        .accent-orange { border-top-color: var(--ktm-orange); }
        .title { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: bold; margin-bottom: 4px; }
        
        /* Layout Bargraph + Valeur */
        .main-display { display: grid; grid-template-columns: 80px 1fr 60px; align-items: center; height: 65px; position: relative; }
        .bargraph-svg { width: 75px; height: 50px; }
        .bar { fill: var(--bar-off); transition: fill 0.1s ease; }
        .bar.active { fill: var(--ktm-orange); }

        .val-main { font-size: 4.2rem; line-height: 1; text-align: center; }
        .unit { font-size: 1rem; color: var(--ktm-orange); margin-left: 5px; font-weight: bold; align-self: flex-end; padding-bottom: 10px; }
        .val-sub { display: flex; justify-content: space-between; font-size: 0.7rem; background: var(--sub-bg); padding: 4px 8px; margin-top: 4px; border: 1px solid #222; }
        .btn-action { position: absolute; top: -5px; right: 0; height: 24px; min-width: 50px; border: 0.5px solid var(--ktm-orange); color: var(--ktm-orange); background: rgba(0,0,0,0.3); font-size: 0.55rem; text-transform: uppercase; z-index: 10; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .tool-grid { display: grid; grid-template-columns: 1.2fr 1fr 0.5fr; gap: 8px; align-items: center; min-height: 65px; }
        .tool-item { background: var(--sub-bg); padding: 5px; border-radius: 2px; border: 1px solid #222; height: 55px; display: flex; flex-direction: column; justify-content: center; }
        #btn-rec { font-size: 0.5rem; height: 18px; width: 100%; margin-top: 2px; border: 0.5px solid var(--ktm-orange); background: #222; color: #fff; }
        body.day-mode #btn-rec { color: #000; border-color: #ccc; background: #ddd; }
        
        .station-item { background: #0a0a0a; border-left: 3px solid var(--ktm-orange); padding: 10px; margin-bottom: 8px; }
        body.day-mode .station-item { background: #fff; border: 1px solid #ddd; border-left: 3px solid var(--ktm-orange); }
        .st-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .st-name { font-weight: bold; font-size: 0.85rem; color: var(--text-main); text-transform: uppercase; }
        .st-city { font-size: 0.65rem; color: var(--text-dim); }
        .st-price { color: var(--ktm-orange); font-family: 'Impact'; font-size: 1.2rem; }
        .st-dist { font-size: 0.7rem; font-weight: bold; }
        .st-nav { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 8px; }
        .btn-nav { font-size: 0.55rem; padding: 6px 0; background: #222; color: #fff; border: 1px solid #444; cursor: pointer; }
        body.day-mode .btn-nav { background: #eee; color: #000; border-color: #ccc; }
        #settings-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; flex-direction: column; overflow-y: auto; }
    </style>
</head>

<body>
    <div id="start-overlay"><button id="btn-start" onclick="CORE.unlockAll()">READY TO RACE</button></div>

    <div id="dashboard">
        <!-- VITESSE -->
        <div class="panel accent-orange">
            <div class="title">Vitesse GPS</div>
            <div class="main-display">
                <svg class="bargraph-svg" viewBox="0 0 100 60">
                    <rect class="bar b1" x="0" y="40" width="15" height="20" />
                    <rect class="bar b2" x="20" y="30" width="15" height="30" />
                    <rect class="bar b3" x="40" y="20" width="15" height="40" />
                    <rect class="bar b4" x="60" y="10" width="15" height="50" />
                    <rect class="bar b5" x="80" y="0" width="15" height="60" />
                </svg>
                <div style="display:flex; justify-content: flex-end; width: 100%;">
                    <span id="speed-val" class="val-main impact">0</span>
                    <span class="unit impact">KM/H</span>
                </div>
                <button id="btn-reset-vitesse" class="btn-action" onclick="UI.resetSpeed()">RESET</button>
            </div>
            <div class="val-sub"><span>MOY: <strong id="speed-moy">0</strong></span><span>MAX: <strong id="speed-max">0</strong></span></div>
        </div>

        <!-- ANGLE -->
        <div class="panel">
            <div class="title">Inclinaison</div>
            <div class="main-display">
                <svg class="bargraph-svg" viewBox="0 0 100 60">
                    <rect class="bar a1" x="0" y="10" width="15" height="50" />
                    <rect class="bar a2" x="20" y="25" width="15" height="35" />
                    <rect class="bar a3" x="40" y="35" width="15" height="25" /> <!-- Centre -->
                    <rect class="bar a4" x="60" y="25" width="15" height="35" />
                    <rect class="bar a5" x="80" y="10" width="15" height="50" />
                </svg>
                <div style="display:flex; justify-content: flex-end; width: 100%;">
                    <span id="angle-val" class="val-main impact">0</span>
                    <span class="unit impact">°</span>
                </div>
                <button id="btn-calibrer" class="btn-action" onclick="CORE.calibrateGyro()">CALIB</button>
            </div>
            <div class="val-sub"><span>MOY: <strong id="angle-moy">0</strong></span><span>MAX: <strong id="angle-max">0</strong></span></div>
        </div>

        <!-- OUTILS -->
        <div class="panel tool-grid">
            <div class="tool-item" onclick="CORE.openDynamicWeather()" style="cursor:pointer">
                <div class="title" style="font-size:0.5rem">Météo Radar</div>
                <div id="weather-temp" style="font-size:1rem; font-weight:bold;">--°C</div>
                <div id="weather-wind" style="font-size:0.55rem; color:var(--text-dim)">-- km/h</div>
            </div>
            <div class="tool-item" style="text-align:center">
                <div class="title" style="font-size:0.5rem">Trace GPX</div>
                <div id="gpx-dist" style="font-size:0.9rem; font-weight:bold; color:var(--ktm-orange);">0.0 KM</div>
                <button id="btn-rec" onclick="CORE.toggleRecording()">REC</button>
            </div>
            <div class="tool-item" onclick="UI.openSettings()" style="cursor:pointer; align-items:center; justify-content:center;">
                <span style="font-size:1.6rem;">🔧</span>
                <div class="title" style="font-size:0.4rem; margin:0">Reglages</div>
            </div>
        </div>

        <div class="panel">
            <div class="title" style="display:flex; justify-content:space-between;">
                <span>STATIONS [<span id="ui-info-fuel">--</span>]</span>
                <span>RAYON: <span id="ui-info-radius">--</span>KM</span>
            </div>
            <button id="btn-scan" onclick="CORE.fetchStations()" style="width:100%; margin: 8px 0; border: 1px solid var(--ktm-orange); color:var(--ktm-orange); background:transparent; padding:8px;" class="impact">SCANNER CARBURANT</button>
            <div id="stations-list"></div>
        </div>
    </div>

    <div id="settings-modal">
        <button onclick="UI.closeSettings()" style="width:100%; padding:15px; background:var(--ktm-orange); color:#000; border:none; font-weight:bold;">RETOUR</button>
        <div style="background:#111; padding:15px; border:1px solid var(--ktm-orange); margin-top:10px;">
            <label class="title">Carburant</label>
            <select id="cfg-fuel" onchange="UI.saveSettings()" style="width:100%; padding:10px; background:#222; color:#fff; border:1px solid #444; margin:5px 0;">
                <option value="SP98">SP98</option><option value="SP95">SP95</option><option value="E10">E10</option><option value="Gazole">Gazole</option><option value="E85">E85</option>
            </select>
            <label class="title" style="display:block; margin-top:10px;">Rayon: <span id="radius-val">--</span> km</label>
            <input type="range" id="input-radius" min="5" max="50" step="5" oninput="UI.updateRadius(this.value)" style="width:100%;">
            <button onclick="UI.manualToggleTheme()" style="width:100%; margin-top:15px;">JOUR/NUIT MANUEL</button>
        </div>
    </div>

    <script>
        const STATE = {
            gps: { lat: null, lon: null, speed: 0, max: 0, sum: 0, count: 0 },
            angle: { current: 0, smoothed: 0, offset: 0, lastValid: 0, max: 0, sum: 0, count: 0, rawVal: 0 },
            gpx: { active: false, points: [], distance: 0, prev: null },
            stations: [], lux: 0, weatherInit: false
        };

        const CORE = {
            unlockAll: () => {
                document.getElementById('start-overlay').style.display = 'none';
                UI.syncConfig(); CORE.initGyro(); CORE.initLight(); CORE.initGPS();
                setInterval(CORE.checkWeatherQueue, 10000);
            },
            initLight: () => {
                if ('AmbientLightSensor' in window) {
                    const sensor = new AmbientLightSensor();
                    sensor.onreading = () => { STATE.lux = sensor.illuminance; UI.setTheme(STATE.lux > CONFIG.seuilLuxJour); };
                    sensor.start();
                }
            },
            initGyro: () => {
                window.addEventListener('deviceorientation', (e) => {
                    let raw = e.gamma; // Utilisation de Gamma pour la direction latérale
                    if (raw !== null && !isNaN(raw)) {
                        STATE.angle.smoothed = (CONFIG.angleSmoothing * raw) + ((1 - CONFIG.angleSmoothing) * (STATE.angle.smoothed || raw));
                        let valBrute = STATE.angle.smoothed - STATE.angle.offset;
                        
                        STATE.angle.current = Math.min(Math.round(Math.abs(valBrute)), 85);
                        if(STATE.angle.current > STATE.angle.max) STATE.angle.max = STATE.angle.current;
                        if(STATE.angle.current > 3) { STATE.angle.sum += STATE.angle.current; STATE.angle.count++; }
                        
                        UI.updateBars('angle', valBrute);
                    }
                });
            },
            calibrateGyro: () => { 
                STATE.angle.offset = STATE.angle.smoothed || 0; 
                STATE.angle.max = 0; STATE.angle.sum = 0; STATE.angle.count = 0;
                UI.update();
            },
            initGPS: () => {
                navigator.geolocation.watchPosition(pos => {
                    STATE.gps.lat = pos.coords.latitude; STATE.gps.lon = pos.coords.longitude;
                    STATE.gps.speed = Math.round((pos.coords.speed || 0) * 3.6);
                    if(STATE.gps.speed > STATE.gps.max) STATE.gps.max = STATE.gps.speed;
                    if(STATE.gps.speed > 2) { STATE.gps.sum += STATE.gps.speed; STATE.gps.count++; }
                    UI.updateBars('speed', STATE.gps.speed);
                    if(STATE.gpx.active && STATE.gps.lat) {
                        const pt = { lat: STATE.gps.lat, lon: STATE.gps.lon, ele: pos.coords.altitude || 0, time: new Date().toISOString() };
                        STATE.gpx.points.push(pt);
                        if(STATE.gpx.prev) STATE.gpx.distance += UI.calcDist(STATE.gpx.prev.lat, STATE.gpx.prev.lon, pt.lat, pt.lon);
                        STATE.gpx.prev = pt;
                    }
                }, null, { enableHighAccuracy: true });
            },
            checkWeatherQueue: () => {
                if (STATE.weatherInit || !STATE.gps.lat) return;
                fetch(`https://api.open-meteo.com/v1/forecast?latitude=${STATE.gps.lat}&longitude=${STATE.gps.lon}&current_weather=true`)
                .then(r => r.json()).then(d => {
                    document.getElementById('weather-temp').innerText = Math.round(d.current_weather.temperature)+"°C";
                    document.getElementById('weather-wind').innerText = Math.round(d.current_weather.windspeed)+" km/h";
                    STATE.weatherInit = true;
                });
            },
            toggleRecording: () => {
                STATE.gpx.active = !STATE.gpx.active;
                const btn = document.getElementById('btn-rec');
                if (STATE.gpx.active) {
                    btn.innerText = "STOP"; btn.style.background = "#f00";
                    STATE.gpx.points = []; STATE.gpx.distance = 0; STATE.gpx.prev = null;
                } else {
                    btn.innerText = "REC"; btn.style.background = "#222";
                    if (STATE.gpx.points.length > 0) CORE.saveGPX();
                }
            },
            saveGPX: () => {
                let xml = `<?xml version="1.1"?><gpx creator="KTM_Dash"><trk><trkseg>`;
                STATE.gpx.points.forEach(p => { xml += `<trkpt lat="${p.lat}" lon="${p.lon}"><ele>${p.ele}</ele><time>${p.time}</time></trkpt>`; });
                xml += `</trkseg></trk></gpx>`;
                const blob = new Blob([xml], {type: 'application/gpx+xml'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `KTM_Trace_${new Date().getTime()}.gpx`;
                a.click();
            },
            fetchStations: () => {
                if(!STATE.gps.lat) return alert("Signal GPS requis");
                fetch(`${CONFIG.apiStations}&geofilter.distance=${STATE.gps.lat},${STATE.gps.lon},${CONFIG.rayonRechercheKm * 1000}`)
                .then(r => r.json()).then(data => {
                    const f = CONFIG.carburantCible.toLowerCase() + '_prix';
                    STATE.stations = data.records.map(r => ({
                        nom: r.fields.nom || "Station", ville: r.fields.ville || "--", prix: r.fields[f], 
                        lat: r.geometry.coordinates[1], lon: r.geometry.coordinates[0],
                        dist: UI.calcDist(STATE.gps.lat, STATE.gps.lon, r.geometry.coordinates[1], r.geometry.coordinates[0])
                    })).sort((a,b) => (a.prix || 9) - (b.prix || 9));
                    UI.renderStations();
                });
            },
            openDynamicWeather: () => { window.open(`${CONFIG.urlMeteoBase}?lat=${STATE.gps.lat}&lon=${STATE.gps.lon}`, '_blank'); }
        };

        const UI = {
            syncConfig: () => {
                document.getElementById('input-radius').value = CONFIG.rayonRechercheKm;
                document.getElementById('radius-val').innerText = CONFIG.rayonRechercheKm;
                document.getElementById('cfg-fuel').value = CONFIG.carburantCible;
            },
            calcDist: (l1, n1, l2, n2) => {
                const R = 6371; const dLat = (l2-l1)*Math.PI/180; const dLon = (n2-n1)*Math.PI/180;
                const a = Math.sin(dLat/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dLon/2)**2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            },
            update: () => {
                document.getElementById('speed-val').innerText = STATE.gps.speed;
                document.getElementById('speed-max').innerText = STATE.gps.max;
                document.getElementById('speed-moy').innerText = STATE.gps.count > 0 ? Math.round(STATE.gps.sum / STATE.gps.count) : 0;
                document.getElementById('angle-val').innerText = STATE.angle.current;
                document.getElementById('angle-max').innerText = STATE.angle.max;
                document.getElementById('angle-moy').innerText = STATE.angle.count > 0 ? Math.round(STATE.angle.sum / STATE.angle.count) : 0;
                document.getElementById('gpx-dist').innerText = `${STATE.gpx.distance.toFixed(1)} KM`;
                document.getElementById('ui-info-fuel').innerText = CONFIG.carburantCible;
                document.getElementById('ui-info-radius').innerText = CONFIG.rayonRechercheKm;
            },
            updateBars: (type, val) => {
                if (type === 'speed') {
                    const p = (val / CONFIG.vitesseMaxGraph) * 100;
                    for(let i=1; i<=5; i++) {
                        document.querySelector(`.b${i}`).classList.toggle('active', p >= (i*20));
                    }
                } else {
                    const absVal = Math.abs(val);
                    document.querySelector('.a3').classList.add('active'); // Centre toujours actif
                    document.querySelector('.a2').classList.toggle('active', val < -2 && absVal > CONFIG.angleSeuilPalier);
                    document.querySelector('.a1').classList.toggle('active', val < -2 && absVal > (CONFIG.angleSeuilPalier * 2));
                    document.querySelector('.a4').classList.toggle('active', val > 2 && absVal > CONFIG.angleSeuilPalier);
                    document.querySelector('.a5').classList.toggle('active', val > 2 && absVal > (CONFIG.angleSeuilPalier * 2));
                }
            },
            renderStations: () => {
                document.getElementById('stations-list').innerHTML = STATE.stations.map(s => `
                    <div class="station-item">
                        <div class="st-header">
                            <div><div class="st-name">${s.nom}</div><div class="st-city">${s.ville}</div></div>
                            <div style="text-align:right">
                                <div class="st-price">${s.prix ? s.prix.toFixed(3)+'€' : 'N.C'}</div>
                                <div class="st-dist">${s.dist.toFixed(1)} km</div>
                            </div>
                        </div>
                        <div class="st-nav">
                            <button class="btn-nav" onclick="window.location.href='waze://?ll=${s.lat},${s.lon}&navigate=yes'">WAZE</button>
                            <button class="btn-nav" onclick="window.location.href='google.navigation:q=${s.lat},${s.lon}'">MAPS</button>
                            <button class="btn-nav" onclick="window.location.href='intent:geo:${s.lat},${s.lon}?q=${s.lat},${s.lon}#Intent;package=net.osmand.plus;end;'">OSM+</button>
                        </div>
                    </div>`).join('');
            },
            openSettings: () => { document.getElementById('settings-modal').style.display = 'flex'; },
            closeSettings: () => { document.getElementById('settings-modal').style.display = 'none'; },
            saveSettings: () => { CONFIG.carburantCible = document.getElementById('cfg-fuel').value; UI.update(); },
            updateRadius: v => { CONFIG.rayonRechercheKm = v; document.getElementById('radius-val').innerText = v; UI.update(); },
            resetSpeed: () => { STATE.gps.max = 0; STATE.gps.sum = 0; STATE.gps.count = 0; UI.update(); },
            manualToggleTheme: () => document.body.classList.toggle('day-mode'),
            setTheme: (isDay) => document.body.classList.toggle('day-mode', isDay)
        };
        setInterval(UI.update, CONFIG.refreshRate);
    </script>
</body>
</html>
