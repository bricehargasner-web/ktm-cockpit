<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Energy Concept - KTM HUD V71</title>
    
    <script>
        /* --- PANNEAU DE CONTRÔLE (MODIFIABLE) --- */
        const CONFIG = {
            VERSION: "V71-2026",
            PILOTE: "Brice CARDONA",
            COULEUR_KTM: "#FF6600",
            COULEUR_ALERTE: "#FF0000",
            COULEUR_OK: "#00FF41",
            LISSAGE_INCLINAISON: 0.15, // Plus bas = plus fluide, plus haut = plus réactif
            Z_MAP: 16,
            STYLE_CARTE: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
            REFRESH_RATE: 100 //ms
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

    <style>
        /* --- VISUEL (DESIGN ÉTANCHE) --- */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        
        #landscape-lock { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        @media (orientation: portrait) { #landscape-lock { display: flex; } }

        #map { position: absolute; width: 100%; height: 100%; z-index: 1; filter: grayscale(1) brightness(0.5); }

        #hud-container {
            position: absolute; inset: 0; z-index: 100; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }

        /* COCKPIT RING */
        #cockpit-ring {
            width: 85vh; height: 85vh;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        #horizon-line {
            position: absolute; top: 50%; width: 140%; left: -20%; height: 2px;
            background: linear-gradient(90deg, transparent, #FFF, transparent);
            box-shadow: 0 0 15px #FFF;
            transition: transform 0.05s linear;
        }

        #speed-display {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 130;
        }
        #speed-val { font-family: 'Barlow Condensed'; font-size: 11rem; font-weight: 900; line-height: 0.8; letter-spacing: -6px; }
        .unit { font-size: 1.5rem; color: var(--ktm); font-weight: 900; }

        /* DASHBOARD CLINIQUE */
        #dashboard {
            position: absolute; bottom: 0; width: 100%; height: 100px;
            background: linear-gradient(to top, rgba(0,0,0,1), transparent);
            display: grid; grid-template-columns: repeat(4, 1fr);
            z-index: 200; border-top: 1px solid rgba(255,102,0,0.3);
        }
        .widget { text-align: center; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid rgba(255,255,255,0.05); }
        .label { font-size: 0.7rem; color: #FF6600; letter-spacing: 2px; font-weight: 900; }
        .value { font-family: 'Barlow Condensed'; font-size: 2.8rem; font-weight: 900; }

        /* ALERT PANEL */
        #alert-panel {
            position: absolute; top: 20px; left: 20px; z-index: 300;
            background: rgba(0,0,0,0.7); padding: 10px; border-left: 4px solid #FF6600;
            font-size: 0.8rem; max-width: 250px;
        }
        .alert-item { color: #FF6600; margin-bottom: 5px; display: none; }

        #btn-recenter {
            position: absolute; top: 20px; right: 20px;
            width: 50px; height: 50px; background: rgba(255,102,0,0.8);
            border: none; border-radius: 5px; color: #000; font-size: 1.5rem;
            cursor: pointer; z-index: 300; pointer-events: auto;
        }

        :root { --ktm: #FF6600; }
    </style>
</head>
<body>

    <div id="landscape-lock">
        <h1 style="color:var(--ktm); font-size:3rem;">PAYSAGE REQUIS</h1>
        <p>VERROUILLEZ LA ROTATION DU SMARTPHONE</p>
    </div>

    <div id="map"></div>

    <div id="alert-panel">
        <div style="font-weight: 900; margin-bottom: 8px; border-bottom: 1px solid #333;">SYSTÈME : OK</div>
        <div id="alert-gps" class="alert-item">⚠️ SIGNAL GPS FAIBLE</div>
        <div id="alert-sensor" class="alert-item">⚠️ CAPTEUR INCLINAISON BLOQUÉ</div>
    </div>

    <button id="btn-recenter" onclick="recenter()">⊕</button>

    <div id="hud-container">
        <div id="cockpit-ring">
            <div id="horizon-line"></div>
            <div id="speed-display">
                <div id="speed-val">00</div>
                <div class="unit">KM/H</div>
            </div>
        </div>
    </div>

    <div id="dashboard">
        <div class="widget"><div class="label">ALTITUDE</div><div id="alt" class="value">--</div></div>
        <div class="widget"><div class="label">TRIP KM</div><div id="dist" class="value">0.0</div></div>
        <div class="widget"><div class="label">CAP</div><div id="cap" class="value">---</div></div>
        <div class="widget"><div class="label">ANGLE</div><div id="lean-val" class="value">0°</div></div>
    </div>

    <script>
        /* --- LOGIQUE (CALCULS & GESTION) --- */
        let map, userMarker, lastCoord = null, totalDist = 0, currentLean = 0;

        function init() {
            // Initialisation Carte
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.6, 1.9], CONFIG.Z_MAP);
            L.tileLayer(CONFIG.STYLE_CARTE).addTo(map);
            
            userMarker = L.circleMarker([0,0], { 
                radius: 10, color: '#fff', fillColor: CONFIG.COULEUR_KTM, fillOpacity: 1, weight: 4 
            }).addTo(map);

            // Capteurs
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', updateInclinometer, true);
            } else {
                showError('sensor');
            }

            startGPS();
        }

        function updateInclinometer(e) {
            let tilt = 0;
            const orientation = window.orientation || 0;

            if (orientation === 90) tilt = e.beta;
            else if (orientation === -90) tilt = -e.beta;
            else tilt = e.gamma;

            // Lissage (Interpolation linéaire)
            currentLean = (currentLean * (1 - CONFIG.LISSAGE_INCLINAISON)) + (tilt * CONFIG.LISSAGE_INCLINAISON);
            
            const horizon = document.getElementById('horizon-line');
            const leanTxt = document.getElementById('lean-val');
            const absLean = Math.abs(Math.round(currentLean));

            horizon.style.transform = `rotate(${currentLean}deg)`;
            leanTxt.innerText = absLean + "°";

            // Dynamique visuelle selon l'angle
            if (absLean > 35) {
                horizon.style.background = CONFIG.COULEUR_ALERTE;
                leanTxt.style.color = CONFIG.COULEUR_ALERTE;
            } else {
                horizon.style.background = "linear-gradient(90deg, transparent, #FFF, transparent)";
                leanTxt.style.color = "#FFF";
            }
        }

        function startGPS() {
            if (!navigator.geolocation) {
                showError('gps');
                return;
            }

            navigator.geolocation.watchPosition(
                (pos) => {
                    hideError('gps');
                    const { latitude, longitude, speed, altitude, heading } = pos.coords;
                    const coords = [latitude, longitude];

                    // Update UI
                    userMarker.setLatLng(coords);
                    map.panTo(coords);
                    
                    document.getElementById('speed-val').innerText = speed ? Math.round(speed * 3.6).toString().padStart(2, '0') : "00";
                    document.getElementById('alt').innerText = altitude ? Math.round(altitude) + "m" : "--";
                    document.getElementById('cap').innerText = heading ? Math.round(heading).toString().padStart(3, '0') + "°" : "---";

                    // Calcul Distance
                    if (lastCoord) {
                        const d = map.distance(lastCoord, coords);
                        if (d > 2) { // Ignorer le drift GPS < 2m
                            totalDist += d / 1000;
                            document.getElementById('dist').innerText = totalDist.toFixed(1);
                        }
                    }
                    lastCoord = coords;
                },
                () => showError('gps'),
                { enableHighAccuracy: true }
            );
        }

        function showError(type) {
            const el = document.getElementById(`alert-${type}`);
            if (el) el.style.display = 'block';
        }

        function hideError(type) {
            const el = document.getElementById(`alert-${type}`);
            if (el) el.style.display = 'none';
        }

        function recenter() {
            if (lastCoord) map.flyTo(lastCoord, CONFIG.Z_MAP);
        }

        window.onload = init;
    </script>
</body>
</html>
