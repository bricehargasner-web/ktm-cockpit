<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM HUD V59 - MASTER</title>
    
    <script>
        /* --- PANNEAU DE CONTRÔLE (MODIFIABLE) --- */
        const CONFIG = {
            NAME: "CARDONA",
            KTM_ORANGE: '#FF6600',
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records',
            MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
            SMOOTHING: 0.85 // Lissage de l'angle (0.1 = nerveux, 0.9 = très stable)
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        
        /* VERROUILLAGE PAYSAGE */
        #portrait-blocker { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; color: #FF6600; text-align: center; }
        @media (orientation: portrait) { #portrait-blocker { display: flex; } }

        #map { position: absolute; width: 100%; height: 100%; z-index: 1; filter: brightness(0.7) contrast(1.1); }

        /* HUD CENTRAL (FIXE) */
        #hud-fixed-container {
            position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; height: 300px; z-index: 60; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }
        #aim-circle { 
            position: absolute; width: 100%; height: 100%; 
            border: 2px solid #FF6600; border-radius: 50%; 
            box-shadow: 0 0 25px rgba(255, 102, 0, 0.3);
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.2) 100%);
        }
        #horizon-line { position: absolute; top: 50%; width: 140%; left: -20%; height: 2px; background: #FFF; box-shadow: 0 0 15px #FFF; z-index: 65; transition: transform 0.1s linear; }

        /* VITESSE */
        #speed-block { position: absolute; bottom: 85px; left: 30px; z-index: 80; }
        #speed-val { font-family: 'Barlow Condensed'; font-size: 7rem; font-weight: 900; line-height: 0.8; color: #FFF; text-shadow: 0 0 20px #000; }

        /* TOP UI */
        #top-ui { position: absolute; top: 10px; width: 96%; left: 2%; z-index: 100; display: flex; gap: 8px; }
        #search-input { flex-grow: 1; background: rgba(0,0,0,0.8); border: 1px solid #444; color: white; padding: 12px; border-radius: 4px; font-family: sans-serif; }
        .fuel-select { background: #111; color: #FF6600; border: 1px solid #FF6600; padding: 10px; border-radius: 4px; font-weight: bold; }
        .btn-ktm { background: #FF6600; color: #000; border: none; padding: 11px 18px; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        /* DASHBOARD BAS */
        #dashboard { position: absolute; bottom: 0; width: 100%; z-index: 90; display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(0,0,0,0.9); border-top: 2px solid #FF6600; }
        .widget { padding: 10px; text-align: center; border-right: 1px solid rgba(255,255,255,0.1); position: relative; }
        .label { font-size: 0.55rem; color: #888; text-transform: uppercase; }
        .value { font-family: 'Barlow Condensed'; font-size: 1.8rem; font-weight: 900; }

        /* BOUSSOLE / CAP DYNAMIQUE */
        #compass-ui { width: 55px; height: 55px; border: 1.5px solid #FF6600; border-radius: 50%; margin: 0 auto; position: relative; transition: transform 0.2s linear; }
        #compass-index { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); color: #FF6600; font-size: 10px; }
        #dir-name { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 14px; font-weight: 900; }

        /* BOUTON ZERO DANS LE COIN DE L'ANGLE */
        #btn-zero { position: absolute; bottom: 4px; right: 4px; background: #222; color: #666; font-size: 8px; padding: 4px; border: 1px solid #444; border-radius: 2px; cursor: pointer; z-index: 100; }
        
        .fuel-marker { background: #FF6600; color: white; padding: 2px 5px; border: 1px solid white; font-weight: bold; font-size: 12px; border-radius: 3px; box-shadow: 0 2px 5px #000; }
    </style>
</head>
<body>

    <div id="portrait-blocker">
        <h1>KTM HUD</h1>
        <p>BASCULEZ EN PAYSAGE Brice</p>
    </div>

    <div id="top-ui">
        <input type="text" id="search-input" placeholder="RECHERCHE...">
        <button class="btn-ktm" onclick="startNav()">NAV</button>
        <select id="fuel-type" class="fuel-select">
            <option value="gazole_prix">GAZOLE</option>
            <option value="sp95_prix">SP95</option>
            <option value="sp98_prix">SP98</option>
            <option value="e10_prix">E10</option>
        </select>
        <button class="btn-ktm" onclick="findFuel()">⛽ SCAN</button>
    </div>

    <div id="hud-fixed-container">
        <div id="aim-circle"></div>
        <div id="horizon-line"></div>
    </div>

    <div id="speed-block">
        <div id="speed-val">000</div>
        <div style="font-size:1.1rem; color:#FF6600; font-weight:900; letter-spacing: 2px;">KM/H</div>
    </div>

    <div id="map"></div>

    <div id="dashboard">
        <div class="widget"><div class="label">Altitude</div><div id="alt" class="value">--</div></div>
        <div class="widget">
            <div class="label">CAP</div>
            <div id="compass-ui"><div id="dir-name">N</div></div>
        </div>
        <div class="widget"><div class="label">Trip</div><div id="dist" class="value">0.0</div></div>
        <div class="widget">
            <div class="label">Angle</div>
            <div id="lean-val" class="value">0°</div>
            <button id="btn-zero" onclick="calibrate()">ZERO</button>
        </div>
    </div>

    <script>
        let map, userMarker, fuelLayer, totalDist = 0, offset = 0, lastRaw = 0, smoothedLean = 0, lastCoord = null;

        function init() {
            // Une seule carte pour éviter les plantages
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([42.15, 9.1], 15);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(map);
            
            fuelLayer = L.layerGroup().addTo(map);
            userMarker = L.circleMarker([0,0], { radius: 8, color: '#fff', fillColor: '#FF6600', fillOpacity: 1, weight: 2 }).addTo(map);

            window.addEventListener('deviceorientation', handleOrientation);
            startGps();
        }

        function handleOrientation(e) {
            let screenAngle = window.orientation || 0;
            // En paysage, l'inclinaison latérale est gérée par 'beta'
            let raw = (Math.abs(screenAngle) === 90) ? e.beta : e.gamma;
            if (screenAngle === -90) raw = -raw;

            lastRaw = raw;
            let currentLean = raw - offset;
            
            // Lissage pour éviter les tremblements KTM
            smoothedLean = (smoothedLean * CONFIG.SMOOTHING) + (currentLean * (1 - CONFIG.SMOOTHING));
            let angle = Math.abs(Math.round(smoothedLean));

            document.getElementById('horizon-line').style.transform = `translateY(-50%) rotate(${smoothedLean}deg)`;
            document.getElementById('lean-val').innerText = angle + "°";
            
            // Alerte visuelle
            const circle = document.getElementById('aim-circle');
            if(angle < 20) circle.style.borderColor = "#2ecc71";
            else if(angle < 42) circle.style.borderColor = "#FF6600";
            else circle.style.borderColor = "#ff4757";
        }

        function startGps() {
            navigator.geolocation.watchPosition(u => {
                const p = [u.coords.latitude, u.coords.longitude];
                userMarker.setLatLng(p);
                map.panTo(p);

                // Boussole / CAP : Recalage pour le mode paysage
                if (u.coords.heading !== null) {
                    const h = Math.round(u.coords.heading);
                    // On fait tourner le disque de la boussole
                    document.getElementById('compass-ui').style.transform = `rotate(${-h}deg)`;
                    const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
                    document.getElementById('dir-name').innerText = dirs[Math.round(h / 45) % 8];
                }

                document.getElementById('speed-val').innerText = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0).toString().padStart(3, '0');
                if (u.coords.altitude) document.getElementById('alt').innerText = Math.round(u.coords.altitude) + "m";
                
                if (lastCoord) totalDist += map.distance(lastCoord, p) / 1000;
                lastCoord = p;
                document.getElementById('dist').innerText = totalDist.toFixed(1);
            }, null, { enableHighAccuracy: true });
        }

        async function findFuel() {
            const c = map.getCenter();
            const fuelType = document.getElementById('fuel-type').value;
            // Retour logique V27 qui fonctionne
            const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${c.lng} ${c.lat})', 30000)&limit=40`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                fuelLayer.clearLayers();
                
                if (data.results) {
                    data.results.forEach(st => {
                        let price = st[fuelType]; // Utilisation des champs directs sp95_prix, gazole_prix...
                        if (price) {
                            L.marker([st.geom.lat, st.geom.lon], {
                                icon: L.divIcon({ 
                                    html: `<div class="fuel-marker">${price.toFixed(2)}</div>`,
                                    iconSize: [40, 20]
                                })
                            }).addTo(fuelLayer);
                        }
                    });
                    if (data.results.length === 0) alert("Aucune station à 30km");
                }
            } catch(e) { alert("Erreur Scan : Vérifiez votre connexion"); }
        }

        function startNav() {
            const dest = document.getElementById('search-input').value;
            if (dest) window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(dest)}&travelmode=driving`, '_blank');
        }

        function calibrate() { 
            offset = lastRaw; 
            smoothedLean = 0; 
        }

        window.onload = init;
    </script>
</body>
</html>
