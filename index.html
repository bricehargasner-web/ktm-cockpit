<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM HUD V76 - POCKET OVERLAY</title>
    
    <script>
        /* --- CONFIGURATION BRICE CARDONA --- */
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records',
            MAP_STYLE: 'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png'
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Barlow+Condensed:wght@900&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        
        /* LA CARTE (FOND DE L'OCÉAN) */
        #map { position: absolute; inset: 0; z-index: 1; filter: brightness(0.5); }

        /* CADRE DU MASQUE (V76 : Plus discret pour le mode fenêtre) */
        #goggle-frame {
            position: absolute; inset: 0; z-index: 100;
            border: 10px solid rgba(0,0,0,0.8);
            box-shadow: inset 0 0 50px #000;
            pointer-events: none;
        }

        /* COMPTEUR VITESSE GÉANT (CENTRAL) */
        #main-hud {
            position: absolute; inset: 0; z-index: 200;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-shadow: 0 0 20px #000; pointer-events: none;
        }
        #speed-val { font-family: 'Barlow Condensed'; font-size: 10rem; font-weight: 900; line-height: 0.8; }
        #lean-val { font-size: 3rem; color: #2ecc71; margin-top: 10px; }

        /* INTERFACE SCAN (HAUT) */
        #top-ui { position: absolute; top: 10px; width: 100%; z-index: 300; display: flex; justify-content: center; gap: 5px; }
        .btn-ktm { background: #FF6600; color: #000; border: none; padding: 10px 15px; font-weight: 900; border-radius: 4px; }

        /* LISTE DES STATIONS */
        #station-overlay {
            position: absolute; bottom: 0; width: 100%; max-height: 40%;
            background: rgba(0,0,0,0.9); z-index: 400; display: none; overflow-y: auto;
        }
        .st-item { padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .btn-osmand { background: #FFF; color: #000; border: none; padding: 10px; font-weight: 900; text-decoration: none; border-radius: 4px; }

        #horizon { position: absolute; top: 50%; width: 100%; height: 2px; background: rgba(255,255,255,0.2); z-index: 50; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="goggle-frame"></div>
    <div id="horizon"></div>

    <div id="top-ui">
        <select id="fuel-type" style="background:#000; color:#FF6600; border:1px solid #FF6600; font-weight:900;">
            <option value="gazole_prix">GAZOLE</option>
            <option value="sp95_prix">SP95</option>
        </select>
        <button class="btn-ktm" onclick="findFuel()">⛽ SCAN</button>
        <button class="btn-ktm" style="background:#444; color:#fff;" onclick="calibrate()">ZERO</button>
    </div>

    <div id="station-overlay"></div>

    <div id="main-hud">
        <div id="speed-val">000</div>
        <div id="lean-val">0°</div>
        <div id="alt-val" style="font-size: 1rem; color:#888;">--- M</div>
    </div>

    <script>
        let map, userMarker, fuelLayer, offset = 0, lastRaw = 0, smoothedLean = 0;

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.6, 1.9], 13);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(map);
            fuelLayer = L.layerGroup().addTo(map);
            userMarker = L.circleMarker([0,0], { radius: 8, color: '#fff', fillColor: CONFIG.KTM_ORANGE, fillOpacity: 1, weight: 3 }).addTo(map);
            window.addEventListener('deviceorientation', handleOrientation);
            startTracking();
        }

        function handleOrientation(e) {
            let screenAngle = window.orientation || 0;
            let raw = (Math.abs(screenAngle) === 90) ? e.beta : e.gamma;
            if (screenAngle === -90) raw = -raw;
            lastRaw = raw;
            let currentLean = raw - offset;
            smoothedLean = (smoothedLean * 0.8) + (currentLean * 0.2);
            let angle = Math.abs(Math.round(smoothedLean));
            document.getElementById('lean-val').innerText = angle + "°";
            document.getElementById('horizon').style.transform = `rotate(${smoothedLean}deg)`;
        }

        function startTracking() {
            navigator.geolocation.watchPosition(u => {
                const p = [u.coords.latitude, u.coords.longitude];
                userMarker.setLatLng(p);
                map.panTo(p);
                document.getElementById('speed-val').innerText = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0).toString().padStart(3, '0');
                if (u.coords.altitude) document.getElementById('alt-val').innerText = Math.round(u.coords.altitude) + " M";
            }, null, { enableHighAccuracy: true });
        }

        async function findFuel() {
            const center = map.getCenter();
            const fuelType = document.getElementById('fuel-type').value;
            const overlay = document.getElementById('station-overlay');
            const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${center.lng} ${center.lat})', 25000m)&limit=8`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                fuelLayer.clearLayers();
                overlay.innerHTML = "";
                overlay.style.display = "block";

                data.results.forEach(st => {
                    const price = st[fuelType];
                    if (!price) return;
                    const lat = st.geom.lat; const lon = st.geom.lon;

                    L.marker([lat, lon], {
                        icon: L.divIcon({ html: `<div style="background:#FF6600; color:white; padding:2px; border-radius:3px; font-weight:bold; border:1px solid white; font-size:10px;">${price.toFixed(2)}</div>`, iconSize: [40, 18] })
                    }).addTo(fuelLayer);

                    const card = document.createElement('div');
                    card.className = 'st-item';
                    card.innerHTML = `
                        <div style="font-size:0.8rem;">${price.toFixed(2)}€ - ${(st.nom || st.adresse).substring(0,15)}</div>
                        <a href="https://osmand.net/go?lat=${lat}&lon=${lon}&z=16" target="_blank" class="btn-osmand">NAV</a>
                    `;
                    overlay.appendChild(card);
                });
            } catch(e) { console.error(e); }
        }

        function calibrate() { offset = lastRaw; }
        window.onload = init;
    </script>
</body>
</html>
