<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KTM HUD V7.5 - MISSION CONTROL</title>
<script>
/* --- PANNEAU DE CONTRÔLE ENERGY CONCEPT (MODIFIABLE) --- */
const CONFIG = {
    USER: "Brice CARDONA",
    KTM: '#FF6600',       // Orange standard
    DANGER: '#FF0000',    // Rouge alerte
    NORMAL: '#FFFFFF',    // Blanc
    ANGLE_ORANGE: 15,     // Seuil passage Orange
    ANGLE_ROUGE: 35,      // Seuil passage Rouge
    SCAN_RADIUS: 20000,
    FUEL_TYPE: 'gazole_prix',
    DAMPING: 0.05,
    MAP_NIGHT: 'https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}{r}.png',
    MAP_DAY: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png'
};
</script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">

<style>
    :root { --ktm: #FF6600; --glass: rgba(0, 0, 0, 0.85); --txt: #FFFFFF; --dynamic-color: #FFFFFF; }
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Barlow Condensed', sans-serif; background: #000; overflow: hidden; color: var(--txt); }
    
    #map-main { position: absolute; width: 100%; height: 100%; z-index: 1; filter: brightness(0.6); transition: filter 0.3s; }
    .day-mode-map { filter: brightness(1) !important; }

    /* HUD CENTRAL */
    #hud-container { 
        position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
        width: 280px; height: 280px; z-index: 100; pointer-events: none;
    }
    
    #compass-frame { 
        width: 100%; height: 100%; border-radius: 50%; 
        border: 2px solid var(--dynamic-color); 
        position: relative; overflow: hidden; background: #000; 
        box-shadow: 0 0 20px rgba(0,0,0,0.5); 
        transition: border-color 0.2s;
    }

    /* GRADUATIONS 10° DYNAMIQUES */
    #graduations {
        position: absolute; inset: 5px; border-radius: 50%;
        /* Création des traits de 10° via gradient conique */
        background: repeating-conic-gradient(
            from -0.5deg, 
            var(--dynamic-color) 0deg 1deg, 
            transparent 1deg 10deg
        );
        -webkit-mask-image: radial-gradient(circle, transparent 88%, black 89%);
        z-index: 105;
        transition: background 0.2s;
    }

    #horizon-bar { 
        position: absolute; top: 50%; left: 0%; right: 0%; height: 2px; 
        background: var(--dynamic-color); 
        z-index: 140; transform-origin: center center; 
        box-shadow: 0 0 10px var(--dynamic-color);
        transition: background 0.2s, box-shadow 0.2s;
    }

    #cardinal-ring { position: absolute; width: 340px; height: 340px; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 110; pointer-events: none; }
    .cardinal { position: absolute; font-family: 'Orbitron'; font-weight: 900; font-size: 18px; color: var(--ktm); text-shadow: 0 0 8px #000; }
    #n { top: 0; left: 50%; transform: translateX(-50%); color: var(--dynamic-color); }
    #e { right: 0; top: 50%; transform: translateY(-50%); }
    #s { bottom: 0; left: 50%; transform: translateX(-50%); }
    #w { left: 0; top: 50%; transform: translateY(-50%); }

    /* UI & DASHBOARD (Inchangés selon consigne) */
    #top-right-ui { position: absolute; top: 15px; right: 15px; z-index: 700; display: flex; flex-direction: column; gap: 8px; }
    .btn-ktm { background: var(--ktm); color: #000; border: none; padding: 10px 18px; font-family: 'Orbitron'; font-weight: 900; font-size: 0.8rem; cursor: pointer; clip-path: polygon(0 0, 90% 0, 100% 25%, 100% 100%, 0 100%); }
    #search-box { position: absolute; top: 15px; left: 15px; z-index: 700; display: flex; }
    .input-stealth { background: var(--glass); border: 1px solid rgba(255,102,0,0.3); color: #fff; padding: 10px; font-family: 'Barlow Condensed'; font-size: 1rem; outline: none; }
    #dash-bottom { position: absolute; bottom: 0; width: 100%; height: 60px; z-index: 500; display: grid; grid-template-columns: repeat(5, 1fr); background: var(--glass); border-top: 2px solid var(--ktm); }
    .widget { text-align: center; padding: 5px; border-right: 1px solid rgba(255,255,255,0.05); }
    .stat-label { font-size: 0.55rem; color: #888; text-transform: uppercase; display: block; font-family: 'Orbitron'; }
    .stat-value { font-size: 1.4rem; font-weight: 700; display: block; color: #FFF; }
    #v-speed { font-size: 2.4rem; line-height: 0.8; margin-top: 4px; }
    #station-list { position: absolute; right: 15px; top: 120px; width: 230px; max-height: 40vh; background: var(--glass); border-right: 3px solid var(--ktm); display: none; z-index: 800; flex-direction: column; backdrop-filter: blur(10px); }
    #settings-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; background: rgba(0,0,0,0.95); border: 2px solid var(--ktm); z-index: 2000; display: none; padding: 20px; flex-direction: column; gap: 15px; }
    #map-tools { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); z-index: 800; display: flex; flex-direction: column; gap: 5px; }
    .btn-tool { width: 38px; height: 38px; background: var(--glass); border: 1px solid var(--ktm); color: #fff; font-family: 'Orbitron'; cursor: pointer; }
</style>
</head>
<body>

<div id="map-main"></div>

<div id="search-box">
    <input type="text" id="dest-input" class="input-stealth" style="width:130px;" placeholder="DESTINATION...">
    <button class="btn-ktm" onclick="runSearch()">NAV</button>
</div>

<div id="top-right-ui">
    <button class="btn-ktm" onclick="scanFuel()">⛽ SCAN</button>
    <button class="btn-ktm" onclick="toggleSettings()">SET</button>
</div>

<div id="map-tools">
    <button class="btn-tool" onclick="mapZoom(1)">+</button>
    <button class="btn-tool" onclick="mapZoom(-1)">-</button>
    <button class="btn-tool" style="font-size:0.55rem; background:var(--ktm); color:#000;" onclick="recenterMap()">RTR</button>
</div>

<div id="station-list">
    <div style="background: #000; color: var(--ktm); padding: 6px; font-size: 0.6rem; text-align: center; cursor:pointer;" onclick="this.parentElement.style.display='none'">FERMER [X]</div>
    <div id="fuel-results" style="overflow-y:auto; flex-grow:1;"></div>
</div>

<div id="settings-popup">
    <h3 style="font-family:Orbitron; color:var(--ktm); margin:0;">FACTORY SETUP</h3>
    <select id="cfg-fuel" class="input-stealth" onchange="updateConfig()">
        <option value="gazole_prix">GAZOLE</option>
        <option value="sp95_prix">SP95</option>
        <option value="sp98_prix">SP98</option>
    </select>
    <button class="btn-ktm" onclick="toggleSettings()">OK</button>
</div>

<div id="hud-container">
    <div id="cardinal-ring">
        <div class="cardinal" id="n">N</div><div class="cardinal" id="e">E</div>
        <div class="cardinal" id="s">S</div><div class="cardinal" id="w">W</div>
    </div>
    <div id="compass-frame">
        <div id="graduations"></div>
        <div id="horizon-bar"></div>
        <div id="map-zoom" style="width:100%; height:100%;"></div>
    </div>
</div>

<div id="dash-bottom">
    <div class="widget"><span class="stat-label">Altitude</span><span id="v-alt" class="stat-value">---</span></div>
    <div class="widget"><span class="stat-label">Angle</span><span id="v-lean" class="stat-value">0°</span></div>
    <div class="widget" style="background:rgba(255,102,0,0.15);"><span id="v-speed" class="stat-value">00</span><span class="stat-label">KM/H</span></div>
    <div class="widget"><span class="stat-label">Cap</span><span id="v-cap" class="stat-value">---</span></div>
    <div class="widget" style="border:none;"><span class="stat-label">Trip</span><span id="v-dist" class="stat-value">0.0</span></div>
</div>

<script>
let mainMap, zoomMap, fuelLayer, routeLayer, tileLayerMain, tileLayerZoom;
let userPos = [41.9, 8.7], lastPos = null, tripDist = 0, isFollow = true;
let curH = 0, tarH = 0;

function init() {
    mainMap = L.map('map-main', { zoomControl: false, attributionControl: false }).setView(userPos, 13);
    tileLayerMain = L.tileLayer(CONFIG.MAP_NIGHT).addTo(mainMap);
    
    zoomMap = L.map('map-zoom', { zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false, touchZoom: false }).setView(userPos, 15);
    tileLayerZoom = L.tileLayer(CONFIG.MAP_NIGHT).addTo(zoomMap);
    
    fuelLayer = L.layerGroup().addTo(mainMap);
    routeLayer = L.layerGroup().addTo(mainMap);

    mainMap.on('move', () => { zoomMap.setView(mainMap.getCenter(), mainMap.getZoom() + 2, { animate: false }); });
    mainMap.on('dragstart', () => isFollow = false);

    startGPS();
    animateHUD();
    window.addEventListener('deviceorientation', handleSensors);
}

function startGPS() {
    navigator.geolocation.watchPosition(p => {
        userPos = [p.coords.latitude, p.coords.longitude];
        if(isFollow) mainMap.panTo(userPos);
        
        document.getElementById('v-speed').innerText = p.coords.speed ? Math.round(p.coords.speed * 3.6) : "00";
        if(p.coords.altitude) document.getElementById('v-alt').innerText = Math.round(p.coords.altitude) + "m";
        
        tarH = p.coords.heading || 0;
        document.getElementById('v-cap').innerText = Math.round(tarH) + "°";

        if(lastPos) tripDist += (mainMap.distance(lastPos, userPos) / 1000);
        document.getElementById('v-dist').innerText = tripDist.toFixed(1);
        lastPos = userPos;
    }, null, { enableHighAccuracy: true });
}

function animateHUD() {
    let diff = tarH - curH;
    if (diff > 180) diff -= 360; if (diff < -180) diff += 360;
    curH += diff * CONFIG.DAMPING;
    
    // Rotation du cercle gradué et des points cardinaux
    document.getElementById('cardinal-ring').style.transform = `translate(-50%, -50%) rotate(${-curH}deg)`;
    document.getElementById('graduations').style.transform = `rotate(${-curH}deg)`;
    
    requestAnimationFrame(animateHUD);
}

function handleSensors(e) {
    // Mode Paysage : Roulis via beta.
    let lean = Math.round(e.beta); 
    if (window.orientation === -90) lean = -lean;
    const abs = Math.abs(lean);
    
    // Logique de couleur unifiée
    let activeColor = CONFIG.NORMAL;
    if (abs >= CONFIG.ANGLE_ROUGE) {
        activeColor = CONFIG.DANGER;
    } else if (abs >= CONFIG.ANGLE_ORANGE) {
        activeColor = CONFIG.KTM;
    }

    // Application de la couleur à la variable CSS racine
    document.documentElement.style.setProperty('--dynamic-color', activeColor);

    // Mise à jour visuelle de l'horizon
    const horizon = document.getElementById('horizon-bar');
    horizon.style.transform = `translateY(-50%) rotate(${-lean}deg)`;
    
    // Mise à jour de la valeur texte
    const txt = document.getElementById('v-lean');
    txt.innerText = abs + "°";
    txt.style.color = activeColor;
}

// FONCTIONS NAVIGATION / FUEL (Inchangées)
async function scanFuel() {
    const list = document.getElementById('fuel-results');
    document.getElementById('station-list').style.display = 'flex';
    list.innerHTML = "<p style='padding:10px; font-size:0.8rem;'>SCAN EN COURS...</p>";
    fuelLayer.clearLayers();
    const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?where=within_distance(geom, geom'POINT(${userPos[1]} ${userPos[0]})', ${CONFIG.SCAN_RADIUS}m)&limit=15`;
    try {
        const res = await fetch(url);
        const data = await res.json();
        list.innerHTML = "";
        data.results.forEach(st => {
            const p = parseFloat(st[CONFIG.FUEL_TYPE]);
            if(p) {
                const d = (mainMap.distance(userPos, [st.geom.lat, st.geom.lon]) / 1000).toFixed(1);
                const div = document.createElement('div');
                div.style.padding = "10px"; div.style.borderBottom = "1px solid #222";
                div.innerHTML = `<div style="color:#FFF; font-size:0.8rem;">${st.ville || 'STATION'} • ${d}km</div>
                                 <div style="color:var(--ktm); font-size:1.4rem; font-weight:900;">${p.toFixed(2)}€</div>`;
                list.appendChild(div);
            }
        });
    } catch(e) { list.innerHTML = "ERREUR API"; }
}

async function runSearch() {
    const q = document.getElementById('dest-input').value;
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
    const data = await res.json();
    if(data[0]) drawNav([data[0].lat, data[0].lon]);
}

async function drawNav(target) {
    const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${userPos[1]},${userPos[0]};${target[1]},${target[0]}?overview=full&geometries=geojson`);
    const data = await res.json();
    routeLayer.clearLayers();
    if(data.routes[0]) {
        const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
        L.polyline(coords, { color: CONFIG.KTM, weight: 6 }).addTo(routeLayer);
        mainMap.fitBounds(routeLayer.getBounds());
    }
}

function toggleSettings() { 
    const p = document.getElementById('settings-popup');
    p.style.display = (p.style.display === 'flex') ? 'none' : 'flex'; 
}
function updateConfig() { CONFIG.FUEL_TYPE = document.getElementById('cfg-fuel').value; }
function mapZoom(d) { mainMap.setZoom(mainMap.getZoom() + d); }
function recenterMap() { isFollow = true; mainMap.panTo(userPos); }

window.onload = init;
</script>
</body>
</html>
