<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM HUD V66 - MISSION CONTROL</title>
    
    <script>
        /* --- PANNEAU DE CONTRÔLE ENERGY CONCEPT (MODIFIABLE) --- */
        const CONFIG = {
            USER: "Brice CARDONA",
            KTM_ORANGE: '#FF6600',
            DANGER_RED: '#FF0000',
            SAFE_GREEN: '#2ecc71',
            SCAN_RADIUS: 30000, 
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records',
            MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png'
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        
        #portrait-blocker { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; color: #FF6600; text-align: center; }
        @media (orientation: portrait) { #portrait-blocker { display: flex; } }

        #map { position: absolute; width: 100%; height: 100%; z-index: 1; filter: brightness(0.6) contrast(1.2); }

        /* BOUTON RECENTER GPS */
        #btn-recenter {
            position: absolute; bottom: 100px; right: 20px; z-index: 400;
            background: rgba(0,0,0,0.8); border: 2px solid #FF6600; color: #FF6600;
            width: 50px; height: 50px; border-radius: 50%; font-size: 1.5rem;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* PANNEAU LISTE & FILTRES */
        #fuel-list-panel {
            position: absolute; top: 70px; right: 10px; width: 320px; max-height: 65%;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px);
            border: 1px solid #333; border-top: 3px solid #FF6600;
            z-index: 300; display: none; overflow-y: auto; border-radius: 4px;
        }
        .panel-header { position: sticky; top: 0; background: #111; padding: 10px; z-index: 10; border-bottom: 1px solid #444; }
        .filter-bar { display: flex; gap: 5px; margin-top: 8px; }
        .btn-filter { flex: 1; background: #222; color: #888; border: 1px solid #444; padding: 5px; font-size: 0.6rem; cursor: pointer; font-family: 'Orbitron'; }
        .btn-filter.active { border-color: #FF6600; color: #FF6600; background: rgba(255,102,0,0.1); }

        .fuel-item { padding: 12px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .fuel-info { flex-grow: 1; cursor: pointer; }
        .fuel-name { font-size: 0.65rem; color: #888; text-transform: uppercase; }
        .fuel-price { font-family: 'Barlow Condensed'; font-size: 1.5rem; color: #FFF; font-weight: 900; }
        .fuel-dist { font-size: 0.8rem; color: #FF6600; font-weight: bold; }
        
        .btn-go { background: #FF6600; color: #000; border: none; padding: 10px; border-radius: 4px; font-weight: 900; cursor: pointer; }

        /* HUD & DASHBOARD */
        #hud-container { position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%); width: 340px; height: 340px; z-index: 60; pointer-events: none; }
        #aim-circle { position: absolute; width: 100%; height: 100%; border: 2px solid rgba(255,102,0,0.3); border-radius: 50%; transition: border-color 0.2s; }
        .tick { position: absolute; width: 2px; height: 10px; background: rgba(255,255,255,0.3); left: 50%; transform-origin: 0 170px; }
        #speed-block { position: absolute; bottom: 85px; left: 30px; z-index: 80; }
        #speed-val { font-family: 'Barlow Condensed'; font-size: 7rem; font-weight: 900; line-height: 0.8; color: #FFF; }
        #top-ui { position: absolute; top: 10px; width: 96%; left: 2%; z-index: 400; display: flex; gap: 10px; }
        #search-input { flex-grow: 1; background: rgba(0,0,0,0.8); border: 1px solid #444; color: white; padding: 12px; border-radius: 4px; }
        .btn-ktm { background: #FF6600; color: #000; border: none; padding: 12px 20px; border-radius: 4px; font-weight: 900; cursor: pointer; }
        #dashboard { position: absolute; bottom: 0; width: 100%; z-index: 90; display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(0,0,0,0.9); border-top: 2px solid #FF6600; height: 85px; }
        .widget { padding: 5px; text-align: center; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; justify-content: center; }
        .fuel-marker { background: #FF6600; color: white; padding: 3px 6px; border: 1.5px solid white; font-weight: bold; font-size: 13px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="portrait-blocker"><h1>KTM</h1><p>REPASSEZ EN PAYSAGE</p></div>

    <div id="top-ui">
        <input type="text" id="search-input" placeholder="DESTINATION / VILLE...">
        <select id="fuel-type" style="background:#111; color:#FF6600; border:1px solid #FF6600; padding:10px; border-radius:4px; font-weight:bold;">
            <option value="gazole_prix">GAZOLE</option>
            <option value="sp95_prix">SP95</option>
            <option value="e10_prix">E10</option>
        </select>
        <button class="btn-ktm" onclick="findFuel()">⛽ SCAN</button>
    </div>

    <div id="fuel-list-panel">
        <div class="panel-header">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="color:#FF6600; font-size:0.7rem; font-weight:900;">STATIONS DISPONIBLES</span>
                <button onclick="document.getElementById('fuel-list-panel').style.display='none'" style="background:none; border:none; color:white; font-weight:bold; cursor:pointer;">✕</button>
            </div>
            <div class="filter-bar">
                <button id="sort-price" class="btn-filter active" onclick="sortStations('price')">TRI PRIX</button>
                <button id="sort-dist" class="btn-filter" onclick="sortStations('distance')">TRI DISTANCE</button>
            </div>
        </div>
        <div id="fuel-list-content"></div>
    </div>

    <div id="btn-recenter" onclick="recenterGPS()" title="Recenter GPS">⊕</div>

    <div id="hud-container">
        <div id="aim-circle"></div>
        <div id="horizon-line" style="position: absolute; top: 50%; width: 140%; left: -20%; height: 2px; background: rgba(255,255,255,0.8);"></div>
    </div>

    <div id="speed-block">
        <div id="speed-val">000</div>
        <div style="font-size:1.2rem; color:#FF6600; font-weight:900;">KM/H</div>
    </div>

    <div id="map"></div>

    <div id="dashboard">
        <div class="widget"><div style="font-size:0.6rem; color:#888;">ALTITUDE</div><div id="alt" style="font-size:2.2rem; font-family:'Barlow Condensed'; font-weight:900;">--</div></div>
        <div class="widget"><div style="font-size:0.6rem; color:#888;">TRIP</div><div id="dist" style="font-size:2.2rem; font-family:'Barlow Condensed'; font-weight:900;">0.0</div></div>
        <div class="widget"><div style="font-size:0.6rem; color:#888;">CAP</div><div id="cap" style="font-size:1.6rem; font-family:'Barlow Condensed'; font-weight:900;">---</div></div>
        <div class="widget">
            <div id="lean-val" style="font-size: 4.5rem; line-height: 1; font-family: 'Barlow Condensed'; font-weight: 900;">0°</div>
            <button onclick="calibrate()" style="background:#222; color:#666; border:none; font-size:10px; cursor:pointer;">ZERO</button>
        </div>
    </div>

    <script>
        let map, userMarker, fuelLayer, totalDist = 0, offset = 0, lastRaw = 0, smoothedLean = 0, lastCoord = null;
        let currentStations = [];

        function createCompassTicks() {
            const container = document.getElementById('aim-circle');
            for (let i = 0; i < 360; i += 10) {
                const tick = document.createElement('div');
                tick.className = i % 30 === 0 ? 'tick major' : 'tick';
                tick.style.cssText = `position:absolute; width:2px; height:${i%30===0?18:10}px; background:rgba(255,255,255,${i%30===0?0.6:0.3}); left:50%; transform-origin:0 170px; transform:translateX(-50%) rotate(${i}deg);`;
                container.appendChild(tick);
            }
        }

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.6, 1.9], 14);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(map);
            fuelLayer = L.layerGroup().addTo(map);
            userMarker = L.circleMarker([0,0], { radius: 10, color: '#fff', fillColor: CONFIG.KTM_ORANGE, fillOpacity: 1, weight: 3 }).addTo(map);

            createCompassTicks();
            window.addEventListener('deviceorientation', handleOrientation);
            startTracking();
            
            document.getElementById('search-input').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') searchCity(this.value);
            });
        }

        function handleOrientation(e) {
            let screenAngle = window.orientation || 0;
            let raw = (Math.abs(screenAngle) === 90) ? e.beta : e.gamma;
            if (screenAngle === -90) raw = -raw;
            lastRaw = raw;
            let currentLean = raw - offset;
            smoothedLean = (smoothedLean * 0.85) + (currentLean * 0.15);
            let angle = Math.abs(Math.round(smoothedLean));

            const ratio = Math.min(angle / 60, 1);
            const color = `rgb(255, ${Math.floor(102 * (1 - ratio))}, 0)`;
            
            document.getElementById('horizon-line').style.transform = `translateY(-50%) rotate(${smoothedLean}deg)`;
            const leanTxt = document.getElementById('lean-val');
            leanTxt.innerText = angle + "°";
            leanTxt.style.color = color;
            document.getElementById('aim-circle').style.borderColor = color;
        }

        async function findFuel() {
            const center = map.getCenter();
            const fuelType = document.getElementById('fuel-type').value;
            
            try {
                const res = await fetch(`${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${center.lng} ${center.lat})', ${CONFIG.SCAN_RADIUS}m)&limit=50`);
                const data = await res.json();
                
                if (data.results) {
                    currentStations = data.results.map(st => {
                        let price = st[fuelType];
                        const d = parseFloat((map.distance([center.lat, center.lng], [st.geom.lat, st.geom.lon]) / 1000).toFixed(1));
                        return { ...st, price, distance: d };
                    }).filter(st => st.price);
                    
                    sortStations('price'); 
                    document.getElementById('fuel-list-panel').style.display = "block";
                }
            } catch(e) { console.error("Erreur Scan"); }
        }

        function sortStations(criteria) {
            if (criteria === 'price') {
                currentStations.sort((a,b) => a.price - b.price);
                document.getElementById('sort-price').classList.add('active');
                document.getElementById('sort-dist').classList.remove('active');
            } else {
                currentStations.sort((a,b) => a.distance - b.distance);
                document.getElementById('sort-dist').classList.add('active');
                document.getElementById('sort-price').classList.remove('active');
            }
            renderList();
        }

        function renderList() {
            const listContent = document.getElementById('fuel-list-content');
            fuelLayer.clearLayers();
            listContent.innerHTML = "";

            currentStations.slice(0, 20).forEach(st => {
                L.marker([st.geom.lat, st.geom.lon], {
                    icon: L.divIcon({ html: `<div class="fuel-marker">${st.price.toFixed(2)}</div>`, iconSize: [45, 20] })
                }).addTo(fuelLayer).on('click', () => map.flyTo([st.geom.lat, st.geom.lon], 16));

                const item = document.createElement('div');
                item.className = 'fuel-item';
                item.innerHTML = `
                    <div class="fuel-info" onclick="map.flyTo([${st.geom.lat}, ${st.geom.lon}], 16)">
                        <div class="fuel-name">${st.nom || st.adresse}</div>
                        <div class="fuel-price">${st.price.toFixed(2)}€ <span class="fuel-dist">${st.distance} KM</span></div>
                    </div>
                    <button class="btn-go" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${st.geom.lat},${st.geom.lon}&travelmode=driving')">GO</button>
                `;
                listContent.appendChild(item);
            });
        }

        function recenterGPS() {
            if (lastCoord) map.flyTo(lastCoord, 15);
        }

        function startTracking() {
            navigator.geolocation.watchPosition(u => {
                const p = [u.coords.latitude, u.coords.longitude];
                userMarker.setLatLng(p);
                document.getElementById('speed-val').innerText = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0).toString().padStart(3, '0');
                if (u.coords.altitude) document.getElementById('alt').innerText = Math.round(u.coords.altitude) + "m";
                if (lastCoord) totalDist += map.distance(lastCoord, p) / 1000;
                lastCoord = p;
                document.getElementById('dist').innerText = totalDist.toFixed(1);
            }, null, { enableHighAccuracy: true });
        }

        async function searchCity(query) {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
            const data = await res.json();
            if (data.length > 0) map.flyTo([data[0].lat, data[0].lon], 13);
        }

        function calibrate() { offset = lastRaw; smoothedLean = 0; }
        window.onload = init;
    </script>
</body>
</html>
