<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>CARDONA - KTM 890 - GHOST HUD V20</title>
    
    <script>
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png'
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        
        /* CARTE EN PLEIN ÉCRAN SANS FILTRE TROP SOMBRE */
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; filter: contrast(1.1) brightness(0.9); }

        /* EFFET GHOST (TRANSPARENCE TOTALE) */
        .ghost-panel { background: transparent; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }

        /* --- HUD GYRO FILAIRE (ROND & LÉGER) --- */
        #hud-container {
            position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; height: 300px; z-index: 60; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }

        /* Cercle de visée fin */
        #aim-circle {
            position: absolute; width: 200px; height: 200px;
            border: 1px solid rgba(255, 102, 0, 0.4); border-radius: 50%;
        }

        /* Ligne d'horizon lumineuse fine */
        #horizon-wire {
            position: absolute; width: 280px; height: 1.5px;
            background: #FF6600; box-shadow: 0 0 8px #FF6600;
            transition: transform 0.1s linear;
        }

        /* Croix centrale fixe (La moto) */
        #fixed-cross {
            position: absolute; width: 20px; height: 20px;
            border-top: 2px solid #FF6600; border-bottom: 2px solid #FF6600;
            z-index: 70;
        }

        /* Angle numérique en haut du cercle */
        #lean-val-hud {
            position: absolute; top: 15px; font-size: 2.2rem; font-weight: 900;
            color: #FF6600; letter-spacing: -1px;
        }

        /* --- DASHBOARD BAS --- */
        #dashboard {
            position: absolute; bottom: 15px; width: 96%; left: 2%;
            z-index: 40; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;
        }
        .widget { padding: 5px; text-align: center; border-bottom: 2px solid rgba(255,102,0,0.5); }
        .label { font-size: 0.65rem; color: #FF6600; letter-spacing: 2px; font-weight: bold; }
        .value { font-family: 'Barlow Condensed'; font-size: 2.5rem; font-weight: 900; line-height: 1; }
        .unit { font-size: 0.8rem; color: #FF6600; margin-left: 2px; }

        /* COMMANDES HAUTES LÉGÈRES */
        #top-ui { position: absolute; top: 10px; width: 96%; left: 2%; z-index: 50; display: flex; gap: 10px; }
        .btn-minimal { background: rgba(0,0,0,0.5); color: #FF6600; border: 1px solid #FF6600; padding: 8px 12px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; backdrop-filter: blur(5px); }
        #search-input { flex-grow: 1; background: rgba(0,0,0,0.5); border: none; border-bottom: 1px solid #FF6600; color: white; padding: 5px 10px; font-family: sans-serif; backdrop-filter: blur(5px); }

        #corse-icon { position: absolute; right: 0; bottom: 25px; height: 50px; opacity: 0.4; }
    </style>
</head>
<body>

    <div id="top-ui">
        <input type="text" id="search-input" placeholder="GO TO...">
        <button class="btn-minimal" onclick="goNav()">NAV</button>
        <button class="btn-minimal" onclick="findFuel()">FUEL</button>
        <button class="btn-minimal" style="border-color:#444; color:#666;" onclick="calibrate()">ZERO</button>
    </div>

    <div id="hud-container">
        <div id="lean-val-hud">0°</div>
        <div id="aim-circle"></div> <div id="fixed-cross"></div> <div id="horizon-wire"></div> </div>

    <div id="map"></div>

    <div id="dashboard">
        <div class="widget ghost-panel">
            <svg id="corse-icon" viewBox="0 0 320 600"><path d="M192 1c18 10 43 12 55 24 9 9 7 24 16 33 24 23 20 62 19 88 0 14-8 27-6 41 5 19 22 34 22 56 1 11-1 22-1 32 0 16 5 32 3 48-1 11-8 19-11 30-11 33-1 74-6 108-3 23-14 42-17 66-5 29-23 51-31 79 0 25-10 47-21 70-12 18-35 24-51 43-7 8-7 19-14 27-22 28-56 38-84 63-14 13-20 30-31 44-24 28-66 38-100 42-12 2-24-3-37-3-22 0-47-1-65-15-18-13-25-36-41-51-12-11-30-15-41-28-26-29-25-83-50-113-14-16-36-21-50-37-14-16-16-39-19-60-2-19 6-40 2-59-1-7-10-10-10-18-1-20 11-38 10-58-1-17-9-34-7-51 1-10 6-18 6-28 0-14-4-28-5-42-1-31 5-63 7-95 1-27-8-55-1-82 5-21 21-36 29-56 12-29 11-64 16-95 3-19 14-36 17-56z" fill="#FF6600"/></svg>
            <div class="label">Operation</div>
            <div class="value" style="color:#FF6600; font-size: 1.5rem;">CORSICA</div>
        </div>

        <div class="widget ghost-panel">
            <div class="label">Airspeed</div>
            <div id="speed" class="value">000</div>
            <div class="unit">KM/H</div>
        </div>

        <div class="widget ghost-panel">
            <div class="label">Altitude</div>
            <div id="alt" class="value">--</div>
            <div class="unit">M</div>
        </div>

        <div class="widget ghost-panel">
            <div class="label">Distance</div>
            <div id="dist" class="value">0.0</div>
            <div class="unit">KM</div>
        </div>
    </div>

    <script>
        let map, userMarker, coords = [], totalDist = 0, offset = 0, lastG = 0;

        function initApp() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([42.15, 9.1], 10);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(map);
            userMarker = L.circleMarker([0,0], { radius: 8, color: '#fff', fillColor: '#005fb7', fillOpacity: 1, weight: 3 }).addTo(map);
            
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', e => {
                    lastG = e.gamma;
                    let angle = Math.abs(Math.round(e.gamma - offset));
                    // Rotation de la ligne d'horizon filaire
                    document.getElementById('horizon-wire').style.transform = `rotate(${e.gamma - offset}deg)`;
                    document.getElementById('lean-val-hud').innerText = angle + "°";
                });
            }
            
            navigator.geolocation.watchPosition(u => {
                const p = [u.coords.latitude, u.coords.longitude];
                userMarker.setLatLng(p);
                map.panTo(p);
                document.getElementById('speed').innerText = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0).toString().padStart(3, '0');
                if (u.coords.altitude) document.getElementById('alt').innerText = Math.round(u.coords.altitude);
                if (coords.length > 0) totalDist += map.distance(coords[coords.length-1], p) / 1000;
                coords.push(p);
                document.getElementById('dist').innerText = totalDist.toFixed(1);
            }, null, { enableHighAccuracy: true });
        }

        function calibrate() { offset = lastG; }
        function goNav() { /* Ouvre Google Maps si besoin */ }
        function findFuel() { /* Scan essence */ }

        window.onload = initApp;
    </script>
</body>
</html>
