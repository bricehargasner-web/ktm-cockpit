<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM 890 - V25 FACTORY</title>
    
    <script>
        const CONFIG = {
            KTM_ORANGE: '#FF6600',
            MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records'
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        
        #map { position: absolute; width: 100%; height: 100%; z-index: 1; filter: brightness(0.6) contrast(1.2); }

        /* --- HUD CENTRAL REDESSINÉ --- */
        #hud-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 280px; height: 280px; z-index: 60; pointer-events: none;
        }
        #aim-sphere { position: absolute; width: 100%; height: 100%; border: 1px solid rgba(255,102,0,0.4); border-radius: 50%; box-shadow: inset 0 0 20px rgba(255,102,0,0.1); }
        
        /* Horizon avec lissage */
        #horizon-gyro { position: absolute; top: 50%; width: 140%; left: -20%; height: 2px; background: #FF6600; box-shadow: 0 0 15px #FF6600; transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Angle au centre de la sphère */
        #lean-display { position: absolute; width: 100%; top: 50%; transform: translateY(-50%); text-align: center; font-size: 3rem; font-weight: 900; color: #FF6600; text-shadow: 0 0 10px #000; z-index: 70; }

        /* --- VITESSE (Optimisée paysage) --- */
        #speed-block {
            position: absolute; bottom: 20%; left: 5%; z-index: 80;
            text-align: left; pointer-events: none;
        }
        #speed-val { font-family: 'Barlow Condensed'; font-size: 6rem; font-weight: 900; line-height: 0.8; color: #FFF; }
        .unit { font-size: 1.2rem; color: #FF6600; margin-left: 5px; }

        /* --- INTERFACE --- */
        #top-ui { position: absolute; top: 10px; width: 96%; left: 2%; z-index: 100; display: flex; gap: 10px; }
        .btn-ktm { background: rgba(0,0,0,0.8); color: #FF6600; border: 1px solid #FF6600; padding: 12px; border-radius: 4px; font-weight: 900; font-size: 0.8rem; cursor: pointer; }

        /* Widgets du bas compacts */
        #dashboard { position: absolute; bottom: 5px; width: 98%; left: 1%; z-index: 90; display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .widget { background: rgba(0,0,0,0.75); border-top: 2px solid #FF6600; padding: 5px; text-align: center; backdrop-filter: blur(5px); }
        .label { font-size: 0.6rem; color: #FF6600; text-transform: uppercase; }
        .value { font-family: 'Barlow Condensed'; font-size: 1.8rem; font-weight: 900; }

        /* Marqueur Essence Custom */
        .fuel-marker { background: #FF6600; color: white; padding: 4px 6px; border-radius: 4px; font-weight: bold; font-size: 14px; border: 1px solid white; box-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

    <div id="top-ui">
        <button class="btn-ktm" onclick="calibrate()">CALIBRER ZERO</button>
        <button class="btn-ktm" style="background:#FF6600; color:#000;" onclick="findFuel()">⛽ SCAN ESSENCE</button>
        <div id="status" style="margin-left:auto; font-size:0.6rem; text-align:right;">KTM FACTORY<br>OFF-ROAD READY</div>
    </div>

    <div id="hud-container">
        <div id="lean-display">0°</div>
        <div id="aim-sphere"></div>
        <div id="horizon-gyro"></div>
    </div>

    <div id="speed-block">
        <div id="speed-val">000</div>
        <div class="unit">KM/H</div>
    </div>

    <div id="map"></div>

    <div id="dashboard">
        <div class="widget"><div class="label">Altitude</div><div id="alt" class="value">--</div></div>
        <div class="widget"><div class="label">Cap</div><div id="cap" class="value">---</div></div>
        <div class="widget"><div class="label">Trip</div><div id="dist" class="value">0.0</div></div>
        <div class="widget"><div class="label">Pitch</div><div id="pitch" class="value">0°</div></div>
    </div>

    <script>
        let map, userMarker, totalDist = 0, offset = 0, lastG = 0;
        let smoothedLean = 0, lastCoord = null;
        let fuelLayer = L.layerGroup();

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([42.15, 9.1], 14);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(map);
            fuelLayer.addTo(map);
            userMarker = L.circleMarker([0,0], { radius: 10, color: '#fff', fillColor: '#FF6600', fillOpacity: 1, weight: 3 }).addTo(map);

            // GYROSCOPE AVEC FILTRE PASSE-BAS (Lissage extrême)
            window.addEventListener('deviceorientation', e => {
                lastG = e.gamma;
                let raw = e.gamma - offset;
                // On ne garde que 15% de la nouvelle valeur pour gommer les vibrations
                smoothedLean = (smoothedLean * 0.85) + (raw * 0.15);
                
                document.getElementById('horizon-gyro').style.transform = `rotate(${smoothedLean}deg)`;
                document.getElementById('lean-display').innerText = Math.abs(Math.round(smoothedLean)) + "°";
                document.getElementById('pitch').innerText = Math.round(e.beta) + "°";
            });

            // GPS & VITESSE
            navigator.geolocation.watchPosition(u => {
                const p = [u.coords.latitude, u.coords.longitude];
                userMarker.setLatLng(p);
                map.panTo(p);

                // Rotation de la carte uniquement si on bouge > 5 km/h
                if (u.coords.heading !== null && u.coords.speed > 1.5) {
                    map.setBearing(u.coords.heading);
                    document.getElementById('cap').innerText = Math.round(u.coords.heading) + "°";
                }

                const s = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0);
                document.getElementById('speed-val').innerText = s.toString().padStart(3, '0');
                
                if (u.coords.altitude) document.getElementById('alt').innerText = Math.round(u.coords.altitude) + "m";

                if (lastCoord) totalDist += map.distance(lastCoord, p) / 1000;
                lastCoord = p;
                document.getElementById('dist').innerText = totalDist.toFixed(1);
            }, null, { enableHighAccuracy: true });
        }

        async function findFuel() {
            const c = map.getCenter();
            // Recherche élargie à 30km
            const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${c.lng} ${c.lat})', 30000)&limit=20`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                fuelLayer.clearLayers();
                data.results.forEach(st => {
                    let p = st.gazole_prix || st.sp95_prix || st.e10_prix;
                    if (p) {
                        L.marker([st.geom.lat, st.geom.lon], {
                            icon: L.divIcon({ className: '', html: `<div class="fuel-marker">${p.toFixed(2)}€</div>`, iconSize: [50, 25] })
                        }).addTo(fuelLayer);
                    }
                });
            } catch(e) { console.error("Fuel API Error"); }
        }

        function calibrate() { offset = lastG; }
        window.onload = init;
    </script>
</body>
</html>
