<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTM HUD V72 - GOGGLE VISION</title>
    
    <script>
        /* --- PANNEAU DE CONTRÔLE ENERGY CONCEPT --- */
        const CONFIG = {
            USER: "Brice CARDONA",
            KTM_ORANGE: '#FF6600',
            SAFE_GREEN: '#2ecc71',
            DANGER_RED: '#ff4757',
            SCAN_RADIUS: 25000, 
            FUEL_API: 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records',
            MAP_STYLE: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; color: white; }
        
        /* LA CARTE (LE FOND DE L'OCÉAN) */
        #map { position: absolute; inset: 0; z-index: 1; filter: saturate(1.5) contrast(1.1); }

        /* LE CADRE DU MASQUE (L'OVERLAY) */
        #goggle-frame {
            position: absolute; inset: 0; z-index: 100;
            border: 15px solid rgba(0,0,0,0.8);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
            pointer-events: none; /* Laisse passer les clics sur la carte */
        }

        /* HUD GAUCHE : VITESSE */
        #speed-block { 
            position: absolute; bottom: 40px; left: 40px; z-index: 200; 
            text-align: left; pointer-events: auto;
        }
        #speed-val { font-family: 'Barlow Condensed'; font-size: 8rem; font-weight: 900; line-height: 0.7; color: #FFF; }
        
        /* HUD DROITE : ANGLE & NAV */
        #right-hud { 
            position: absolute; bottom: 40px; right: 40px; z-index: 200; 
            text-align: right; pointer-events: auto;
        }
        #lean-val { font-family: 'Barlow Condensed'; font-size: 5rem; font-weight: 900; color: #2ecc71; }

        /* PORTAILS DE NAVIGATION (BOUTONS) */
        #nav-portals {
            position: absolute; top: 20px; right: 20px; z-index: 300;
            display: flex; flex-direction: column; gap: 10px; pointer-events: auto;
        }
        .btn-portal { 
            padding: 12px; border-radius: 50%; width: 50px; height: 50px; 
            border: 2px solid #FFF; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 0.7rem; color: #000;
        }

        /* SCAN & STATIONS */
        #scan-ui { position: absolute; top: 20px; left: 20px; z-index: 300; pointer-events: auto; display: flex; gap: 10px; }
        .btn-scan { background: #FF6600; color: #000; border: none; padding: 15px 25px; font-weight: 900; border-radius: 5px; }

        #station-overlay {
            position: absolute; top: 85px; left: 20px; width: 250px; max-height: 50%;
            background: rgba(0,0,0,0.85); border-left: 5px solid #FF6600; 
            overflow-y: auto; display: none; z-index: 250; pointer-events: auto;
        }
        .station-card { padding: 12px; border-bottom: 1px solid #333; cursor: pointer; }
        .station-card:active { background: #333; }

        /* LIGNE D'HORIZON */
        #horizon {
            position: absolute; top: 50%; left: 50%; width: 40%; height: 2px;
            background: rgba(255,255,255,0.3); transform: translate(-50%, -50%);
            z-index: 50; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="goggle-frame"></div>
    <div id="horizon"></div>

    <div id="nav-portals">
        <div class="btn-portal" style="background: #34a853;" onclick="window.open('https://www.google.com/maps')">MAPS</div>
        <div class="btn-portal" style="background: #33ccff;" onclick="window.open('waze://')">WAZE</div>
    </div>

    <div id="scan-ui">
        <select id="fuel-type" style="background: #000; color: #FF6600; border: 1px solid #FF6600; padding: 10px; font-weight: 900;">
            <option value="gazole_prix">GAZOLE</option>
            <option value="sp95_prix">SP95</option>
            <option value="e10_prix">E10</option>
        </select>
        <button class="btn-scan" onclick="findFuel()">⛽ SCAN</button>
    </div>

    <div id="station-overlay"></div>

    <div id="speed-block">
        <div id="speed-val">000</div>
        <div style="color:#FF6600; font-weight:900; font-size:1.2rem;">KM/H</div>
    </div>

    <div id="right-hud">
        <div id="lean-val">0°</div>
        <div id="alt-val" style="font-size: 1.5rem; color:#aaa;">--- M</div>
    </div>

    <script>
        let map, userMarker, fuelLayer, offset = 0, lastRaw = 0, smoothedLean = 0;

        function init() {
            // Initialisation de la carte (Fond de l'océan)
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.6, 1.9], 14);
            L.tileLayer(CONFIG.MAP_STYLE).addTo(map);
            fuelLayer = L.layerGroup().addTo(map);
            
            userMarker = L.circleMarker([0,0], { radius: 10, color: '#fff', fillColor: CONFIG.KTM_ORANGE, fillOpacity: 1, weight: 3 }).addTo(map);

            window.addEventListener('deviceorientation', handleOrientation);
            startTracking();
        }

        function handleOrientation(e) {
            let screenAngle = window.orientation || 0;
            let raw = (Math.abs(screenAngle) === 90) ? e.beta : e.gamma;
            if (screenAngle === -90) raw = -raw;
            lastRaw = raw;
            let currentLean = raw - offset;
            smoothedLean = (smoothedLean * 0.8) + (currentLean * 0.2);
            let angle = Math.abs(Math.round(smoothedLean));

            document.getElementById('lean-val').innerText = angle + "°";
            document.getElementById('horizon').style.transform = `translate(-50%, -50%) rotate(${smoothedLean}deg)`;
            
            const val = document.getElementById('lean-val');
            if (angle < 20) val.style.color = CONFIG.SAFE_GREEN;
            else if (angle < 42) val.style.color = CONFIG.KTM_ORANGE;
            else val.style.color = CONFIG.DANGER_RED;
        }

        function startTracking() {
            navigator.geolocation.watchPosition(u => {
                const p = [u.coords.latitude, u.coords.longitude];
                userMarker.setLatLng(p);
                map.panTo(p);

                document.getElementById('speed-val').innerText = (u.coords.speed ? Math.round(u.coords.speed * 3.6) : 0).toString().padStart(3, '0');
                if (u.coords.altitude) document.getElementById('alt-val').innerText = Math.round(u.coords.altitude) + " M";
            }, null, { enableHighAccuracy: true });
        }

        async function findFuel() {
            const center = map.getCenter();
            const fuelType = document.getElementById('fuel-type').value;
            const overlay = document.getElementById('station-overlay');
            const url = `${CONFIG.FUEL_API}?where=within_distance(geom, geom'POINT(${center.lng} ${center.lat})', ${CONFIG.SCAN_RADIUS}m)&limit=20`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                fuelLayer.clearLayers();
                overlay.innerHTML = "";
                overlay.style.display = "block";

                if (data.results) {
                    data.results.forEach(st => {
                        const price = st[fuelType];
                        if (!price) return;
                        
                        L.marker([st.geom.lat, st.geom.lon], {
                            icon: L.divIcon({ html: `<div style="background:#FF6600; color:white; padding:2px; border-radius:3px; font-weight:bold; border:1px solid white; font-size:10px;">${price.toFixed(2)}</div>`, iconSize: [40, 18] })
                        }).addTo(fuelLayer);

                        const card = document.createElement('div');
                        card.className = 'station-card';
                        card.innerHTML = `<div style="font-size:0.6rem; color:#aaa;">${st.nom || 'STATION'}</div><div style="font-size:1.2rem; font-weight:900;">${price.toFixed(2)}€</div>`;
                        card.onclick = () => {
                            // On ouvre la navigation dans un nouvel onglet pour garder le HUD
                            window.open(`https://www.google.com/maps/dir/?api=1&destination=${st.geom.lat},${st.geom.lon}&travelmode=motorcycle`, '_blank');
                        };
                        overlay.appendChild(card);
                    });
                }
            } catch(e) { console.error("Erreur API", e); }
        }

        function calibrate() { offset = lastRaw; }
        window.onload = init;
    </script>
</body>
</html>
